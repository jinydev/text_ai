<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">위치 시퀀스(Sequence Position) 텐서 소거 모델: 단어 집합 빈도 모형 (Bag of Words)</text>

  <!-- Input Sequences -->
  <rect x="50" y="80" width="300" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="200" y="110" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">입력 문서 (시계열 Sequence 유지)</text>

  <text x="70" y="140" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">Doc A:</text>
  <rect x="130" y="125" width="40" height="20" fill="#1e3a8a" rx="4"/>
  <text x="150" y="140" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">나는</text>
  <rect x="180" y="125" width="40" height="20" fill="#450a0a" rx="4"/>
  <text x="200" y="140" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">사과</text>
  <rect x="230" y="125" width="40" height="20" fill="#3f3f46" rx="4"/>
  <text x="250" y="140" fill="#d4d4d8" font-family="sans-serif" font-size="12" text-anchor="middle">매우</text>
  <rect x="280" y="125" width="40" height="20" fill="#064e3b" rx="4"/>
  <text x="300" y="140" fill="#6ee7b7" font-family="sans-serif" font-size="12" text-anchor="middle">좋아</text>

  <!-- Big arrow down -->
  <path d="M 200 190 L 200 230" stroke="#fcd34d" stroke-width="3"/>
  <polygon points="195,225 205,225 200,235" fill="#fcd34d"/>
  <text x="130" y="215" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold">순서(방향성) 파괴 결함</text>

  <!-- Bag Output -->
  <path d="M 120 250 Q 80 250 100 350 Q 200 400 300 350 Q 320 250 280 250 Z" fill="#451a03" stroke="#f59e0b" stroke-width="3"/>
  <text x="200" y="280" fill="#fcd34d" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">무정형 Bag (주머니)</text>
  
  <!-- Tokens floating in bag -->
  <rect x="140" y="300" width="40" height="20" fill="#1e3a8a" rx="4"/>
  <text x="160" y="315" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">나는</text>

  <rect x="190" y="330" width="40" height="20" fill="#064e3b" rx="4"/>
  <text x="210" y="345" fill="#6ee7b7" font-family="sans-serif" font-size="12" text-anchor="middle">좋아</text>

  <rect x="120" y="350" width="40" height="20" fill="#3f3f46" rx="4"/>
  <text x="140" y="365" fill="#d4d4d8" font-family="sans-serif" font-size="12" text-anchor="middle">매우</text>

  <rect x="230" y="295" width="40" height="20" fill="#450a0a" rx="4"/>
  <text x="250" y="310" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">사과</text>


  <!-- Arrow to Matrix -->
  <path d="M 320 300 L 410 300" stroke="#10b981" stroke-width="3"/>
  <polygon points="405,295 415,300 405,305" fill="#10b981"/>
  <text x="365" y="290" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">카운팅 맵핑</text>

  <!-- Final Matrix Array -->
  <rect x="440" y="220" width="310" height="150" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="595" y="250" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Count Vector (빈도 배열 치환)</text>

  <rect x="460" y="270" width="60" height="80" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="490" y="290" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">[나는]</text>
  <text x="490" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>

  <rect x="520" y="270" width="60" height="80" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="550" y="290" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">[사과]</text>
  <text x="550" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>

  <rect x="580" y="270" width="60" height="80" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="610" y="290" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">[매우]</text>
  <text x="610" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>

  <rect x="640" y="270" width="60" height="80" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="670" y="290" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">[좋아]</text>
  <text x="670" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>

  <!-- Explanation Top Right -->
  <rect x="440" y="80" width="310" height="90" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="4"/>
  <text x="595" y="105" fill="#fde68a" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">BoW 모델 극단적 전제 조건 매핑</text>
  <text x="595" y="130" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">1. OOM 방어를 위해 순서(어순) 시공간 정보 완전 소거</text>
  <text x="595" y="150" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">2. 차원 길이를 오직 단어 '생존 빈도 카운트' 스칼라로 압축</text>


</svg>
