<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">어순(Sequence) 기억상실증: Bag of Words (단어 주머니)</text>

  <!-- Input Phrase -->
  <rect x="50" y="120" width="200" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="150" y="155" fill="#93c5fd" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">"강아지가 사과를 먹다"</text>

  <path d="M 260 150 L 320 150" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="290" y="140" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">가방에 쑤셔넣기!</text>

  <!-- The Bag -->
  <path d="M 400 250 C 330 250 340 100 400 90 C 460 100 470 250 400 250" fill="#1e3a8a" stroke="#60a5fa" stroke-width="4"/>
  <rect x="375" y="75" width="50" height="15" fill="#60a5fa" rx="5"/>
  <text x="400" y="115" fill="#eff6ff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Bag (가방)</text>

  <!-- Shaken words inside -->
  <circle cx="380" cy="150" r="20" fill="#fca5a5"/>
  <text x="380" y="155" fill="#7f1d1d" font-family="sans-serif" font-size="12" text-anchor="middle">를</text>

  <circle cx="430" cy="140" r="20" fill="#fca5a5"/>
  <text x="430" y="145" fill="#7f1d1d" font-family="sans-serif" font-size="12" text-anchor="middle">먹다</text>

  <circle cx="400" cy="190" r="22" fill="#fca5a5"/>
  <text x="400" y="195" fill="#7f1d1d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">사과</text>

  <circle cx="370" cy="220" r="24" fill="#fca5a5"/>
  <text x="370" y="225" fill="#7f1d1d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">강아지</text>

  <circle cx="430" cy="210" r="18" fill="#fca5a5"/>
  <text x="430" y="215" fill="#7f1d1d" font-family="sans-serif" font-size="12" text-anchor="middle">가</text>


  <!-- Shaking lines -->
  <path d="M 460 120 C 480 100 480 140 460 160" fill="none" stroke="#fcd34d" stroke-width="2"/>
  <path d="M 470 140 C 490 120 490 160 470 180" fill="none" stroke="#fcd34d" stroke-width="2"/>
  <text x="520" y="150" fill="#fde047" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">S H A K E !</text>

  <!-- Output Concept -->
  <path d="M 570 150 L 630 150" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>
  
  <rect x="640" y="100" width="120" height="100" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="700" y="130" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">순서 완전 붕괴</text>
  <text x="700" y="160" fill="#ef4444" font-family="sans-serif" font-size="12" text-anchor="middle">누가 먼저 왔는지</text>
  <text x="700" y="180" fill="#ef4444" font-family="sans-serif" font-size="12" text-anchor="middle">시간정보 0% 기록</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">원-핫 인코딩의 차원 폭발을 막기 위해 타협한 꼼수입니다. 문장의 단어들을 가방에 집어넣어 뒤죽박죽 섞어버려서, 빈도수 숫자만 남습니다.</text>

</svg>
