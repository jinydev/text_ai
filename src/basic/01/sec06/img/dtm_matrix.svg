<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">문서-단어 행렬 (DTM): 수많은 문서들의 카운팅(Counting) 결집표</text>

  <!-- DTM Table -->
  <rect x="80" y="80" width="640" height="150" fill="#1e293b" stroke="#10b981" stroke-width="3" rx="5"/>

  <!-- Lines -->
  <line x1="200" y1="80" x2="200" y2="230" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="130" x2="720" y2="130" stroke="#334155" stroke-width="2"/>
  
  <line x1="300" y1="80" x2="300" y2="230" stroke="#334155" stroke-width="2"/>
  <line x1="400" y1="80" x2="400" y2="230" stroke="#334155" stroke-width="2"/>
  <line x1="500" y1="80" x2="500" y2="230" stroke="#334155" stroke-width="2"/>
  <line x1="600" y1="80" x2="600" y2="230" stroke="#334155" stroke-width="2"/>

  <!-- Headers -->
  <text x="140" y="110" fill="#cbd5e1" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">문서 (Doc)</text>
  <text x="250" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사랑해요</text>
  <text x="350" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">당신</text>
  <text x="450" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">정말</text>
  <text x="550" y="110" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">미워요</text>
  <text x="660" y="110" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">영원히</text>


  <!-- Doc A -->
  <text x="140" y="160" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">문서 A</text>
  
  <rect x="235" y="145" width="30" height="20" fill="#064e3b" rx="2"/>
  <text x="250" y="160" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">2</text>
  
  <rect x="335" y="145" width="30" height="20" fill="#064e3b" rx="2"/>
  <text x="350" y="160" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  
  <rect x="435" y="145" width="30" height="20" fill="#064e3b" rx="2"/>
  <text x="450" y="160" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  
  <text x="550" y="160" fill="#94a3b8" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="660" y="160" fill="#94a3b8" font-family="monospace" font-size="16" text-anchor="middle">0</text>

  <!-- Doc B -->
  <line x1="80" y1="180" x2="720" y2="180" stroke="#334155" stroke-width="2"/>
  
  <text x="140" y="210" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">문서 B</text>
  
  <text x="250" y="210" fill="#94a3b8" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="350" y="210" fill="#94a3b8" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  
  <rect x="435" y="195" width="30" height="20" fill="#064e3b" rx="2"/>
  <text x="450" y="210" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>

  <rect x="535" y="195" width="30" height="20" fill="#450a0a" rx="2"/>
  <text x="550" y="210" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">2</text>

  <rect x="645" y="195" width="30" height="20" fill="#450a0a" rx="2"/>
  <text x="660" y="210" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>


  <!-- Tooltips -->
  <path d="M 60 160 L 30 160 C 20 160 20 185 30 185 L 60 185" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="10" y="175" fill="#34d399" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" transform="rotate(-90 10 175)">긍정적</text>


  <text x="400" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">문장은 파괴되었지만, 단어 백과사전의 인덱스 칸마다 '등장 횟수 숫자(Count)'들이 적립되면서 하나의 문서를 두툼하게 요약하는 벡터가 완성됩니다.</text>
</svg>
