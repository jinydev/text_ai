<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">차원 압축 통계 행렬 도출: 문서-단어 빈도 행렬 (DTM: Document-Term Matrix)</text>

  <!-- Voca Vector -->
  <rect x="50" y="90" width="700" height="70" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="400" y="115" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">통합 텍스트 코퍼스 기저 사전 (Feature Vocabulary Columns Indexing)</text>
  
  <text x="150" y="140" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">V_0: 사랑해요</text>
  <text x="280" y="140" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">V_1: 당신</text>
  <text x="390" y="140" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">V_2: 정말</text>
  <text x="500" y="140" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">V_3: 미워요</text>
  <text x="630" y="140" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">V_4: 영원히</text>


  <!-- DTM Matrix Array -->
  <rect x="50" y="200" width="700" height="150" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="6"/>
  
  <!-- Headers -->
  <rect x="50" y="200" width="100" height="40" fill="#0f172a" rx="6"/>
  <text x="100" y="225" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Documents \ V</text>

  <text x="190" y="225" fill="#bfdbfe" font-family="monospace" font-size="14" text-anchor="middle">[사랑해요]</text>
  <text x="295" y="225" fill="#bfdbfe" font-family="monospace" font-size="14" text-anchor="middle">[당신]</text>
  <text x="390" y="225" fill="#bfdbfe" font-family="monospace" font-size="14" text-anchor="middle">[정말]</text>
  <text x="495" y="225" fill="#bfdbfe" font-family="monospace" font-size="14" text-anchor="middle">[미워요]</text>
  <text x="605" y="225" fill="#bfdbfe" font-family="monospace" font-size="14" text-anchor="middle">[영원히]</text>


  <!-- Doc A -->
  <rect x="50" y="250" width="100" height="40" fill="#0f172a"/>
  <text x="100" y="275" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Doc A</text>
  <text x="110" y="295" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">사랑해요 당신 정말 사랑해요</text>
  
  <text x="190" y="275" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">2</text>
  <text x="295" y="275" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>
  <text x="390" y="275" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>
  <text x="495" y="275" fill="#64748b" font-family="monospace" font-size="20" text-anchor="middle">0</text>
  <text x="605" y="275" fill="#64748b" font-family="monospace" font-size="20" text-anchor="middle">0</text>

  <!-- Doc B -->
  <rect x="50" y="300" width="100" height="40" fill="#0f172a"/>
  <text x="100" y="325" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Doc B</text>
  <text x="110" y="345" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">정말 미워요 영원히 미워요</text>
  
  <text x="190" y="325" fill="#64748b" font-family="monospace" font-size="20" text-anchor="middle">0</text>
  <text x="295" y="325" fill="#64748b" font-family="monospace" font-size="20" text-anchor="middle">0</text>
  <text x="390" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>
  <text x="495" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">2</text>
  <text x="605" y="325" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>


  <!-- Lines -->
  <line x1="50" y1="245" x2="750" y2="245" stroke="#3b82f6" stroke-width="2"/>
  <line x1="150" y1="200" x2="150" y2="350" stroke="#3b82f6" stroke-width="2"/>


  <!-- Conclusion Box -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="410" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">DTM 매트릭스 변환 매핑 완료: 비정형 텍스트 늪을 선형 분류 머신러닝 연산이 즉시 가능한 엑셀 확률 스칼라 좌표로 압축 계산</text>

</svg>
