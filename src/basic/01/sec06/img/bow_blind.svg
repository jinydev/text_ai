<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">BoW 카운팅의 치명적 눈먼 버그: 맥락 파괴가 낳은 비극적 동질화</text>

  <!-- Sentence 1 -->
  <rect x="50" y="80" width="300" height="50" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="200" y="110" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"강아지가 나를 싫어해서 나는 슬프다"</text>
  <text x="50" y="70" fill="#60a5fa" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="start">문서 1 (강아지 원망, 나는 피해자)</text>

  <!-- Sentence 2 -->
  <rect x="50" y="180" width="300" height="50" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="200" y="210" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"내가 강아지를 싫어해서 강아지가 슬프다"</text>
  <text x="50" y="170" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="start">문서 2 (강아지가 피해자)</text>

  <!-- Funnels -->
  <path d="M 360 105 C 400 105 400 135 440 135" stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 360 205 C 400 205 400 165 440 165" stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>


  <!-- Combined BoW Array Result -->
  <rect x="460" y="100" width="100" height="100" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="10"/>
  <text x="510" y="130" fill="#34d399" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">BoW 결과</text>
  
  <text x="510" y="160" fill="#6ee7b7" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">[2, 2, 1, 1]</text>
  <text x="510" y="180" fill="#10b981" font-family="sans-serif" font-size="10" text-anchor="middle">강아지(2) 나(2) 싫어(1) 슬프다(1)</text>


  <!-- Equal Sign and Exclamation -->
  <path d="M 570 150 L 630 150" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow)"/>
  
  <rect x="650" y="110" width="100" height="80" fill="#1e293b" stroke="#fcd34d" stroke-width="3" rx="5"/>
  <text x="700" y="145" fill="#fef08a" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"두 문서는</text>
  <text x="700" y="170" fill="#fef08a" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">동일하다!!"</text>

  <circle cx="780" cy="110" r="15" fill="#ef4444"/>
  <text x="780" y="115" fill="#fecaca" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">?</text>

  <text x="400" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">누가 가해자이고 누가 피해자인지 맥락(주어/목적어 서열)이 뒤바뀌었지만, 글자 카운팅 횟수가 완전히 동일하기 때문에 기계는 100% 똑같은 내용물로 착각합니다.</text>

</svg>
