<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">순서 구조 파괴 모델(Order-agnostic Model)의 치명적 인퍼런스 교차 결함 현상 증명</text>

  <!-- Subject Mismatch Input -->
  <rect x="50" y="80" width="700" height="130" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">현실 세계 유기체 관점: 완전히 의미 밀도(Meaning Polarity)가 정반대인 두 타겟 문장</text>

  <rect x="80" y="130" width="300" height="60" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="130" y="155" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Doc 1:</text>
  <text x="230" y="155" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">알리스가 밥을 사랑해</text>
  <text x="230" y="175" fill="#64748b" font-family="sans-serif" font-size="11" text-anchor="middle">주어(Alice) -> 목적어(Bob) 애정 매핑</text>

  <text x="400" y="165" fill="#cbd5e1" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">!=</text>

  <rect x="420" y="130" width="300" height="60" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="470" y="155" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Doc 2:</text>
  <text x="570" y="155" fill="#6ee7b7" font-family="sans-serif" font-size="14" text-anchor="middle">밥이 알리스를 사랑해</text>
  <text x="570" y="175" fill="#64748b" font-family="sans-serif" font-size="11" text-anchor="middle">주어(Bob) -> 목적어(Alice) 역방향 매핑</text>


  <!-- Big Error Arrow Down -->
  <path d="M 400 210 L 400 240" stroke="#fca5a5" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="395,235 400,245 405,235" fill="#fca5a5"/>
  <text x="400" y="260" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">BoW 카운팅 매트릭스 압축 모델 통과</text>


  <!-- Machine Output Mismatch -->
  <rect x="50" y="280" width="700" height="100" fill="#450a0a" stroke="#7f1d1d" stroke-width="3" rx="6"/>
  <text x="400" y="310" fill="#fecaca" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">BoW 기계 인퍼런스 결과 타겟 오작동 발생: "두 문서는 스코어가 똑같은 도플갱어 클론이다!"</text>

  <rect x="180" y="330" width="180" height="30" fill="#0f172a" rx="4"/>
  <text x="270" y="350" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">[ "알리스": 1, "밥": 1, "사랑해": 1 ]</text>

  <text x="400" y="350" fill="#ef4444" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">==</text>

  <rect x="440" y="330" width="180" height="30" fill="#0f172a" rx="4"/>
  <text x="530" y="350" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">[ "알리스": 1, "밥": 1, "사랑해": 1 ]</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="400" width="700" height="40" fill="#334155" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="425" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">시퀀스(Sequence Position) 텐서 소거의 악몽: 배열의 타임 인덱스(누가 가해자고 피해자인지) 결합 모수를 영구 소실시킴</text>

</svg>
