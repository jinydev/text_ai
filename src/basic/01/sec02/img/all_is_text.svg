<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">확장되는 자연어의 세계: 패턴 기호 덩어리는 모두 "텍스트"다</text>

  <!-- Source 1: Code -->
  <rect x="80" y="90" width="100" height="80" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="130" y="125" fill="#60a5fa" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">def func():</text>
  <text x="130" y="150" fill="#93c5fd" font-family="sans-serif" font-size="14" text-anchor="middle">소스코드 깃허브</text>

  <!-- Source 2: Music -->
  <rect x="220" y="90" width="100" height="80" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="270" y="125" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">도-레-미-솔</text>
  <text x="270" y="150" fill="#fcd34d" font-family="sans-serif" font-size="14" text-anchor="middle">모차르트 악보</text>

  <!-- Source 3: DNA -->
  <rect x="360" y="90" width="100" height="80" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="410" y="125" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">A-C-G-G-T</text>
  <text x="410" y="150" fill="#6ee7b7" font-family="sans-serif" font-size="14" text-anchor="middle">유전자 염기서열</text>


  <!-- Funnel -->
  <path d="M 270 190 L 270 230" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="320" y="215" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">LLM 변환망</text>

  <!-- Output Matrix -->
  <rect x="520" y="100" width="220" height="120" fill="#020617" stroke="#f43f5e" stroke-width="3" rx="10"/>
  <text x="630" y="140" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">자연어 Sequence (시계열)</text>
  <text x="630" y="170" fill="#fda4af" font-family="sans-serif" font-size="14" text-anchor="middle">[X1, X2, X3, X4]</text>
  <text x="630" y="195" fill="#fecdd3" font-family="sans-serif" font-size="12" text-anchor="middle">통계 확률 연산 체계로 흡수</text>

  <!-- Arrows -->
  <path d="M 480 150 L 510 150" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>


  <text x="400" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">규칙적인 확률 배열을 띄는 데이터라면, 기계에게는 그것이 음악이든 생물학 염기서열이든 모조리 "번역 대상 텍스트(언어)" 취급을 받습니다.</text>

</svg>
