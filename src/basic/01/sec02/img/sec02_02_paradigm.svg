<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="350" fill="#f8f9fa" rx="15"/>

  <!-- Left Side: Statistical/Rule-based -->
  <g transform="translate(50, 50)">
    <rect width="320" height="250" rx="10" fill="#e9ecef" filter="url(#shadow)"/>
    <rect width="320" height="50" rx="10" fill="#868e96"/>
    <text x="160" y="32" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">통계 기반 (과거)</text>
    
    <g transform="translate(40, 80)">
      <circle cx="50" cy="40" r="30" fill="#ffc9c9" stroke="#fa5252" stroke-width="3"/>
      <text x="50" y="45" font-family="'Inter', sans-serif" font-size="14" fill="#c92a2a" text-anchor="middle">단어 카운트</text>
    </g>
    <g transform="translate(180, 80)">
      <circle cx="50" cy="40" r="30" fill="#d0ebff" stroke="#339af0" stroke-width="3"/>
      <text x="50" y="45" font-family="'Inter', sans-serif" font-size="14" fill="#1864ab" text-anchor="middle">형태소 절단</text>
    </g>
    <g transform="translate(110, 160)">
      <circle cx="50" cy="40" r="30" fill="#fff3bf" stroke="#fcc419" stroke-width="3"/>
      <text x="50" y="45" font-family="'Inter', sans-serif" font-size="14" fill="#e67700" text-anchor="middle">TF-IDF</text>
    </g>
    <path d="M 160 140 L 160 160" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,4"/>
  </g>

  <!-- VS -->
  <text x="400" y="180" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#fa5252" text-anchor="middle">VS</text>

  <!-- Right Side: LLM/Transformer -->
  <g transform="translate(430, 50)">
    <rect width="320" height="250" rx="10" fill="#e3fafc" filter="url(#shadow)"/>
    <rect width="320" height="50" rx="10" fill="#0b7285"/>
    <text x="160" y="32" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">트랜스포머 (LLM) 기반 (현대)</text>
    
    <!-- Big neural brain concept -->
    <path d="M 100 120 C 100 60, 220 60, 220 120 C 220 180, 100 180, 100 120 Z" fill="#99e9f2" stroke="#1098ad" stroke-width="3"/>
    <circle cx="120" cy="100" r="8" fill="#15aabf"/>
    <circle cx="160" cy="90" r="8" fill="#15aabf"/>
    <circle cx="200" cy="110" r="8" fill="#15aabf"/>
    <circle cx="140" cy="140" r="8" fill="#15aabf"/>
    <circle cx="190" cy="140" r="8" fill="#15aabf"/>
    
    <!-- Connectors -->
    <path d="M 120 100 L 160 90 L 200 110 L 190 140 L 140 140 Z" stroke="#1098ad" stroke-width="2" fill="none"/>
    <path d="M 160 90 L 140 140" stroke="#1098ad" stroke-width="2"/>
    
    <text x="160" y="210" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#0b7285" text-anchor="middle">거대 신경망의 문맥 이해</text>
    <text x="160" y="230" font-family="'Inter', sans-serif" font-size="12" fill="#0b7285" text-anchor="middle">문맥, 뉘앙스, 일반화를 스스로 학습</text>
  </g>

</svg>
