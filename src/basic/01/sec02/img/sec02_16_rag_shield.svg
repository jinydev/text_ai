<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#fff"/>

  <!-- LLM side emitting toxic / hallucinations -->
  <g transform="translate(100, 80)">
    <circle cx="50" cy="40" r="40" fill="#343a40"/>
    <text x="50" y="45" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">LLM 뇌</text>
    
    <path d="M 100 40 L 160 20" stroke="#f03e3e" stroke-width="4" stroke-dasharray="5,5"/>
    <path d="M 100 40 L 160 40" stroke="#f03e3e" stroke-width="4" stroke-dasharray="5,5"/>
    <path d="M 100 40 L 160 60" stroke="#f03e3e" stroke-width="4" stroke-dasharray="5,5"/>
    <text x="180" y="25" font-family="'Inter', sans-serif" font-size="12" fill="#c92a2a">거짓말 (Hallucination)</text>
    <text x="180" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#c92a2a">편향성 (Bias)</text>
  </g>

  <!-- Shield -->
  <g transform="translate(350, 40)" filter="url(#shadow)">
    <path d="M 50 10 L 90 30 L 90 90 C 90 120, 50 150, 50 150 C 50 150, 10 120, 10 90 L 10 30 Z" fill="#339af0" stroke="#1864ab" stroke-width="4"/>
    <text x="50" y="80" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">RAG / RLHF</text>
    <text x="50" y="100" font-family="'Inter', sans-serif" font-size="12" fill="#d0ebff" text-anchor="middle">방패 (보완 기법)</text>
  </g>

  <!-- Clean Arrow -->
  <path d="M 460 120 L 520 120" stroke="#40c057" stroke-width="6" marker-end="url(#arrow)"/>

  <!-- User Output -->
  <g transform="translate(550, 80)">
    <rect width="150" height="80" rx="10" fill="#e2ffe8" stroke="#2b8a3e" stroke-width="2"/>
    <text x="75" y="45" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#2b8a3e" text-anchor="middle">팩트 기반의 깨끗한 답변</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#40c057" />
    </marker>
  </defs>
</svg>
