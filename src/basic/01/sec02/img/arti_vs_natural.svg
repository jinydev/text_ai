<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">결정론적 인공 언어(Artificial) vs 맥락 의존적 자연 언어(Natural) 매핑 텐서 구조 비교</text>

  <!-- Left: Artificial Language -->
  <rect x="50" y="80" width="330" height="260" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="215" y="115" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">인공 언어 (Programming &amp; Formal)</text>
  <text x="215" y="135" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">1:1 결정론적 구문(Deterministic Syntax) 매핑망</text>

  <rect x="110" y="155" width="210" height="40" fill="#0f172a" stroke="#60a5fa" stroke-width="1" rx="4"/>
  <text x="215" y="180" fill="#bfdbfe" font-family="monospace" font-size="14" text-anchor="middle">if param == 1 : return "A"</text>

  <path d="M 215 195 L 215 225" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="210,220 215,230 220,220" fill="#3b82f6"/>

  <rect x="140" y="230" width="150" height="40" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="215" y="255" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Result = "A"</text>

  <text x="215" y="300" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">오직 단일 해만 존재 (No Ambiguity)</text>
  <text x="215" y="320" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">스펠링 에러 시 즉각 차단 (Syntax Error)</text>


  <!-- Right: Natural Language -->
  <rect x="420" y="80" width="330" height="260" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="585" y="115" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">자연 언어 (Natural Language)</text>
  <text x="585" y="135" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">1:N 확률적 문맥 의존(Context-Dependent) 매핑</text>

  <rect x="520" y="155" width="130" height="40" fill="#0f172a" stroke="#fcd34d" stroke-width="1" rx="4"/>
  <text x="585" y="180" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"차 빼주세요"</text>

  <path d="M 585 195 L 585 225" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 585 210 L 490 210 L 490 230" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <path d="M 585 210 L 680 210 L 680 230" stroke="#f59e0b" stroke-width="2" fill="none"/>
  
  <polygon points="580,220 585,230 590,220" fill="#f59e0b"/>
  <polygon points="485,225 490,235 495,225" fill="#f59e0b"/>
  <polygon points="675,225 680,235 685,225" fill="#f59e0b"/>

  <rect x="445" y="235" width="90" height="30" fill="#7f1d1d" rx="4"/>
  <text x="490" y="255" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">의미망: Car</text>

  <rect x="540" y="235" width="90" height="30" fill="#064e3b" rx="4"/>
  <text x="585" y="255" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">의미망: Tea</text>

  <rect x="635" y="235" width="90" height="30" fill="#1e3a8a" rx="4"/>
  <text x="680" y="255" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">의미망: Kick</text>

  <text x="585" y="300" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">관측 단어 노드 1종에 다수 타겟 의미 중첩</text>
  <text x="585" y="320" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">외부 문맥(Context) 파라미터 결합 필수 모델링</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="360" width="700" height="50" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="390" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">자연어 모델링의 공학적 장벽: 다형성(형태는 다르나 같은 의미)과 다의성/모호성(형태는 같으나 다른 의미)의 이중 통제 한계</text>

</svg>
