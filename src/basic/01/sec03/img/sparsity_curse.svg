<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">자연어 처리를 지옥으로 몰고 간 최악의 버그: 차원의 저주 (Curse of Sparsity)</text>

  <!-- Array visual -->
  <text x="400" y="90" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">단어 "사과" 를 기계 메모리에 저장하기 위한 Vector 배열 형태</text>
  
  <rect x="50" y="120" width="700" height="60" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  
  <!-- Index 0 -->
  <rect x="70" y="130" width="40" height="40" fill="#0f172a" stroke="#475569" stroke-width="2" rx="3"/>
  <text x="90" y="155" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>
  <text x="90" y="200" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">가방</text>

  <!-- Index 1 -->
  <rect x="120" y="130" width="40" height="40" fill="#0f172a" stroke="#475569" stroke-width="2" rx="3"/>
  <text x="140" y="155" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>
  <text x="140" y="200" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">가위</text>

  <!-- Index 2 -->
  <rect x="170" y="130" width="40" height="40" fill="#0f172a" stroke="#475569" stroke-width="2" rx="3"/>
  <text x="190" y="155" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>
  <text x="190" y="200" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">가지</text>

  <text x="240" y="155" fill="#94a3b8" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">...</text>

  <!-- Target Index -->
  <rect x="290" y="120" width="60" height="60" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="320" y="157" fill="#6ee7b7" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle">1</text>
  <text x="320" y="200" fill="#34d399" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사과</text>

  <text x="400" y="155" fill="#94a3b8" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">...</text>

  <!-- Zeros everywhere -->
  <rect x="450" y="130" width="40" height="40" fill="#0f172a" stroke="#475569" stroke-width="2" rx="3"/>
  <text x="470" y="155" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>

  <rect x="500" y="130" width="40" height="40" fill="#0f172a" stroke="#475569" stroke-width="2" rx="3"/>
  <text x="520" y="155" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>

  <text x="590" y="155" fill="#94a3b8" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">...</text>

  <rect x="650" y="130" width="70" height="40" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="3"/>
  <text x="685" y="155" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>
  <text x="685" y="200" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">하마 (50만번째)</text>


  <!-- Warning block -->
  <path d="M 400 210 L 400 230" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow)"/>
  
  <text x="400" y="250" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">단어 한 개를 기억하기 위해 무려 499,999칸의 쓸모없는 0 (영)을 RAM 메모리에 강제 할당해야 하는 절망적 낭비!</text>
  <text x="400" y="275" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">이 엄청난 허들 때문에 과거 AI 연산은 1문장만 넣어도 그래픽카드가 타버렸습니다.</text>

</svg>
