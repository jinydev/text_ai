<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">고전 규칙 기반(Rule-based) 모델의 치명적 인퍼런스 한계와 모호성 패널티</text>

  <!-- Input Data Node -->
  <rect x="50" y="90" width="700" height="70" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <text x="400" y="120" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">비정형 야생 텍스트 관측 유입 데이터</text>
  <text x="400" y="145" fill="#f8fafc" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle">"배송 속도 진짜 눈물 나게 빠르네요~ 해외 직구에서 걸어 오시나 봐요~ ^^"</text>

  <!-- Big arrow down -->
  <path d="M 400 170 L 400 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="395,195 400,205 405,195" fill="#cbd5e1"/>

  <!-- Rule Based Processing Engine -->
  <rect x="50" y="210" width="330" height="150" fill="#1e293b" stroke="#fcd34d" stroke-width="2" rx="4"/>
  <text x="215" y="240" fill="#fde68a" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1세대 하드코딩 룰 베이스 엔진</text>
  <rect x="70" y="260" width="290" height="80" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="215" y="285" fill="#a7f3d0" font-family="monospace" font-size="13" text-anchor="middle">If Token == "빠르다":</text>
  <text x="215" y="305" fill="#a7f3d0" font-family="monospace" font-size="13" text-anchor="middle">  return POSITIVE (+1)</text>
  <text x="215" y="325" fill="#fca5a5" font-family="monospace" font-size="13" text-anchor="middle">else: return SYNTAX_ERROR</text>


  <!-- Flow right -->
  <path d="M 390 280 L 440 280" stroke="#fca5a5" stroke-width="4" stroke-dasharray="6,4"/>
  <polygon points="430,270 445,280 430,290" fill="#fca5a5"/>
  <text x="415" y="270" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">오역 오답</text>


  <!-- Sarcasm Failure Output -->
  <rect x="460" y="210" width="290" height="150" fill="#7f1d1d" stroke="#ef4444" stroke-width="3" rx="4"/>
  <text x="605" y="250" fill="#fca5a5" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">[극도 긍정 리뷰] 판별 확정</text>
  <text x="605" y="280" fill="#fecaca" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">"빠르다" 라는 표면 매칭에 1차원적으로 속음</text>
  <rect x="520" y="300" width="170" height="30" fill="#450a0a" rx="4"/>
  <text x="605" y="320" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">비즈니스 로직 연쇄 대참사</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#fca5a5" stroke-width="2" rx="6"/>
  <text x="400" y="410" fill="#fecaca" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">자연어 기만 확률 파라미터 : 사전적 하드코딩 매치 룰은 반어법/비꼬기(Sarcasm)나 다의어 차원 문맥 변수를 절대로 극복 분해 불가능</text>

</svg>
