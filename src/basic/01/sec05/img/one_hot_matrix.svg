<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">왕의 자리는 오직 내 영토뿐! 원-핫(One-hot) 인코딩 직교 매트릭스</text>

  <rect x="150" y="70" width="500" height="180" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>

  <!-- Lines -->
  <line x1="250" y1="70" x2="250" y2="250" stroke="#334155" stroke-width="2"/>
  <line x1="150" y1="120" x2="650" y2="120" stroke="#334155" stroke-width="2"/>

  <!-- Headers -->
  <text x="200" y="100" fill="#cbd5e1" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">단어 (ID)</text>
  <text x="290" y="100" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Col 0</text>
  <text x="360" y="100" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Col 1</text>
  <text x="430" y="100" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Col 2</text>
  <text x="500" y="100" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Col 3</text>
  <text x="580" y="100" fill="#64748b" font-family="sans-serif" font-size="14" text-anchor="middle">Vector 반환</text>

  <!-- Row 1 -->
  <text x="200" y="145" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">나는 (0)</text>
  <rect x="270" y="130" width="40" height="20" fill="#064e3b" rx="2"/>
  <text x="290" y="145" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  <text x="360" y="145" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="430" y="145" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="500" y="145" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="580" y="145" fill="#ecfeff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[1, 0, 0, 0]</text>

  <!-- Row 2 -->
  <text x="200" y="175" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">너를 (1)</text>
  <text x="290" y="175" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <rect x="340" y="160" width="40" height="20" fill="#064e3b" rx="2"/>
  <text x="360" y="175" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  <text x="430" y="175" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="500" y="175" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="580" y="175" fill="#ecfeff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[0, 1, 0, 0]</text>

  <!-- Row 3 -->
  <text x="200" y="205" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사랑 (2)</text>
  <text x="290" y="205" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="360" y="205" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <rect x="410" y="190" width="40" height="20" fill="#064e3b" rx="2"/>
  <text x="430" y="205" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  <text x="500" y="205" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="580" y="205" fill="#ecfeff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[0, 0, 1, 0]</text>

  <!-- Row 4 -->
  <text x="200" y="235" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">증오 (3)</text>
  <text x="290" y="235" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="360" y="235" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="430" y="235" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <rect x="480" y="220" width="40" height="20" fill="#064e3b" rx="2"/>
  <text x="500" y="235" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  <text x="580" y="235" fill="#ecfeff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[0, 0, 0, 1]</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">자신의 ID 번호 위치에만 1 (Hot)을 찍고, 나머지는 모두 자멸하여 0 (Zero)으로 도배하는 배타적 성질</text>
</svg>
