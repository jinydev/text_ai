<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">원-핫 인코딩의 파멸: 100만 차원(Dimension) RAM 메모리 펑크!</text>

  <!-- Single Variable Representation -->
  <rect x="50" y="100" width="100" height="60" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="100" y="135" fill="#fcd34d" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">"사과"</text>
  <text x="100" y="155" fill="#fcd34d" font-family="sans-serif" font-size="12" text-anchor="middle">단어 1개</text>

  <path d="M 160 130 L 210 130" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="185" y="120" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">One-hot 변환</text>

  <!-- Massive Array Representation -->
  <rect x="230" y="100" width="520" height="60" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  
  <rect x="240" y="110" width="30" height="40" fill="#0f172a" stroke="#ef4444" stroke-width="1" rx="2"/>
  <text x="255" y="135" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>

  <rect x="280" y="110" width="30" height="40" fill="#0f172a" stroke="#ef4444" stroke-width="1" rx="2"/>
  <text x="295" y="135" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>

  <rect x="320" y="110" width="30" height="40" fill="#0f172a" stroke="#ef4444" stroke-width="1" rx="2"/>
  <text x="335" y="135" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>

  <!-- The "1" -->
  <rect x="360" y="105" width="40" height="50" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="2"/>
  <text x="380" y="135" fill="#34d399" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>
  <text x="380" y="175" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(사과 위치)</text>

  <text x="430" y="135" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>
  <text x="460" y="135" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>
  <text x="490" y="135" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0</text>

  <text x="590" y="135" fill="#fca5a5" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">무한히 쪼개진 영(Zero)의 늪...</text>
  
  <text x="690" y="180" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">총 1,000,000 칸 배열 폭발</text>

  <text x="400" y="250" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">국어사전에 존재하는 모든 고유 단어(Unique Token)의 개수만큼 가로 길이가 미친듯이 끝없이 팽창합니다.</text>
  <text x="400" y="275" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">단어 간격은 서로 기하학적으로 철저히 직교(Orthogonal)하여 단어간 '유사성' 연산이 원천 봉쇄됩니다.</text>

</svg>
