<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">텍스트 전처리 (Preprocessing) 3대 핵심 분해 공정</text>

  <!-- Input -->
  <rect x="30" y="110" width="100" height="60" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="80" y="145" fill="#fcd34d" font-family="sans-serif" font-size="14" text-anchor="middle">"안녕!!!ㅋㅋㅋ"</text>

  <path d="M 130 140 L 170 140" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <rect x="180" y="90" width="130" height="100" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="245" y="120" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1. 클렌징</text>
  <text x="245" y="145" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">(노이즈 정제)</text>
  <text x="245" y="175" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"안녕"</text>

  <path d="M 310 140 L 350 140" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="360" y="90" width="130" height="100" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="425" y="120" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">2. 토큰화</text>
  <text x="425" y="145" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">(단어 배열 분해)</text>
  <text x="425" y="175" fill="#ecfdf5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">['안녕']</text>

  <path d="M 490 140 L 530 140" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="540" y="90" width="130" height="100" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="605" y="120" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">3. 벡터화</text>
  <text x="605" y="145" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">(숫자 매트릭스화)</text>
  <text x="605" y="175" fill="#fef2f2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[1, 0, 0]</text>

  <path d="M 670 140 L 710 140" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="720" y="110" width="70" height="60" fill="#020617" stroke="#94a3b8" stroke-width="2" rx="5"/>
  <text x="755" y="145" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">기계 뇌</text>

  <text x="400" y="250" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">더러운 불순물을 씻어내어(정규식), 컴퓨터 수학으로 먹기 좋게 자르고(토큰), 최종적으로 완전한 0과 1의 숫자 행렬로 맵핑(인코딩)합니다.</text>

</svg>
