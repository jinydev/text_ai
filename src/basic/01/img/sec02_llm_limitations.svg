<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .icon { font-size: 30px; }
      .card-title { font-size: 16px; font-weight: bold; fill: white; }
      .desc { font-size: 13px; fill: #1e293b; }
      .solution { font-size: 12px; font-weight: bold; fill: white; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">완벽해 보이는 LLM의 4가지 주요 한계점</text>
  <text x="400" y="55" font-size="14" fill="#64748b">비약적인 발전을 이루었지만, 아직 AI 엔지니어들이 해결해야 할 극복 과제들이 존재합니다.</text>

  <!-- 1. Hallucination -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="160" height="230" class="box" fill="#fef2f2" stroke="#ef4444" />
    <rect x="0" y="0" width="160" height="40" fill="#ef4444" rx="8" />
    <path d="M 0 30 L 160 30 L 160 40 L 0 40 Z" fill="#ef4444" />
    <text x="80" y="20" class="card-title">1. 환각 (기억 조작)</text>
    
    <text x="80" y="70" class="icon">👻</text>
    
    <text x="80" y="110" class="desc">존재하지 않거나,</text>
    <text x="80" y="130" class="desc">역사적으로 잘못된</text>
    <text x="80" y="150" class="desc" font-weight="bold" fill="#b91c1c">거짓 정보를 진실처럼</text>
    <text x="80" y="170" class="desc">자신만만하게 생성함</text>

    <!-- Solution Tag -->
    <rect x="20" y="195" width="120" height="24" rx="12" fill="#b91c1c" />
    <text x="80" y="207" class="solution">해결: RAG 기술</text>
  </g>

  <!-- 2. Bias -->
  <g transform="translate(230, 90)">
    <rect x="0" y="0" width="160" height="230" class="box" fill="#fff7ed" stroke="#f97316" />
    <rect x="0" y="0" width="160" height="40" fill="#f97316" rx="8" />
    <path d="M 0 30 L 160 30 L 160 40 L 0 40 Z" fill="#f97316" />
    <text x="80" y="20" class="card-title">2. 사회적 편향성</text>
    
    <text x="80" y="70" class="icon">⚖️</text>
    
    <text x="80" y="110" class="desc">과거 인간들의</text>
    <text x="80" y="130" class="desc">안 좋은 데이터까지</text>
    <text x="80" y="150" class="desc" font-weight="bold" fill="#c2410c">여과형 없이 거울처럼</text>
    <text x="80" y="170" class="desc">반영하여 생성됨</text>

    <rect x="20" y="195" width="120" height="24" rx="12" fill="#c2410c" />
    <text x="80" y="207" class="solution">해결: RLHF</text>
  </g>

  <!-- 3. Interpretability -->
  <g transform="translate(400, 90)">
    <rect x="0" y="0" width="160" height="230" class="box" fill="#f8fafc" stroke="#64748b" />
    <rect x="0" y="0" width="160" height="40" fill="#64748b" rx="8" />
    <path d="M 0 30 L 160 30 L 160 40 L 0 40 Z" fill="#64748b" />
    <text x="80" y="20" class="card-title">3. 해석 블록(블랙박스)</text>
    
    <text x="80" y="70" class="icon">⬛</text>
    
    <text x="80" y="110" class="desc">결과는 매우 좋지만</text>
    <text x="80" y="130" class="desc">도대체 "왜" 이 결과가</text>
    <text x="80" y="150" class="desc" font-weight="bold" fill="#334155">나왔는지 수식적으로</text>
    <text x="80" y="170" class="desc">완벽히 설명 불가능</text>

    <rect x="20" y="195" width="120" height="24" rx="12" fill="#475569" />
    <text x="80" y="207" class="solution">설명 가능한 AI 연구</text>
  </g>

  <!-- 4. Unhelpfulness -->
  <g transform="translate(570, 90)">
    <rect x="0" y="0" width="160" height="230" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <rect x="0" y="0" width="160" height="40" fill="#3b82f6" rx="8" />
    <path d="M 0 30 L 160 30 L 160 40 L 0 40 Z" fill="#3b82f6" />
    <text x="80" y="20" class="card-title">4. 유용성 결여(명령 무시)</text>
    
    <text x="80" y="70" class="icon">🤷‍♂️</text>
    
    <text x="80" y="110" class="desc">사용자가 텍스트의</text>
    <text x="80" y="130" class="desc">특정 스타일이나 포맷을</text>
    <text x="80" y="150" class="desc" font-weight="bold" fill="#1d4ed8">강하게 명시해도</text>
    <text x="80" y="170" class="desc">제멋대로 따르지 않음</text>

    <rect x="15" y="195" width="130" height="24" rx="12" fill="#1d4ed8" />
    <text x="80" y="207" class="solution">프롬프트 엔지니어링</text>
  </g>

</svg>
