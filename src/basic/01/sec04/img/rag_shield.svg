<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">환각을 억제하기 위한 기업의 최종 방패: RAG (검색 증강 생성)</text>

  <!-- User Input -->
  <rect x="30" y="120" width="120" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="90" y="145" fill="#60a5fa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"휴가 일수 며칠이야?"</text>
  <text x="90" y="165" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">유저 질문</text>

  <!-- Split Paths -->
  <path d="M 150 150 L 220 100" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 150 150 L 220 200" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- LLM Direct (Hallucination) -->
  <rect x="230" y="70" width="100" height="60" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="280" y="95" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">LLM 혼자 대답</text>
  <text x="280" y="115" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(뇌피셜 가동)</text>

  <path d="M 330 100 L 380 100" stroke="#f43f5e" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="390" y="70" width="220" height="60" fill="#450a0a" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="500" y="105" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"국내법상 최소 100일입니다!"</text>

  <!-- RAG Shield -->
  <rect x="230" y="170" width="100" height="80" fill="#1e3a8a" stroke="#3b82f6" stroke-width="3" rx="5"/>
  <text x="280" y="195" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사내 DB 검색</text>
  <text x="280" y="215" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">(RAG 시스템)</text>
  <text x="280" y="235" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">[취업규칙 PDF 발췌]</text>

  <path d="M 330 210 L 380 210" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="390" y="180" width="150" height="60" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="465" y="205" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">LLM + PDF 컨닝페이퍼</text>
  <text x="465" y="225" fill="#34d399" font-family="sans-serif" font-size="12" text-anchor="middle">"검색 문서 요약"</text>

  <path d="M 540 210 L 590 210" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="600" y="180" width="180" height="60" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="690" y="215" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"당사 규정상 연차는 15일입니다."</text>

  <!-- Barrier line -->
  <line x1="365" y1="50" x2="365" y2="150" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="365" y="40" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">위험구역</text>

  <line x1="365" y1="160" x2="365" y2="280" stroke="#10b981" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="365" y="295" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">안전구역</text>


</svg>
