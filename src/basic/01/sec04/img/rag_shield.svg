<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">안전한 AI 비즈니스 배포를 위한 양대 방패 파이프라인 (RAG &amp; RLHF)</text>

  <!-- Left: RAG -->
  <rect x="40" y="80" width="350" height="250" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="215" y="110" fill="#93c5fd" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">1. RAG (외부 벡터 서치 검색 증강 생성)</text>
  <text x="215" y="130" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">외부 신뢰 DB를 실시간 참조하여 환각 원천 차단망</text>

  <rect x="60" y="150" width="100" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="110" y="175" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">1. User Query</text>

  <path d="M 160 170 L 190 170" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="185,165 195,170 185,175" fill="#3b82f6"/>

  <rect x="200" y="150" width="120" height="40" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1" rx="4"/>
  <text x="260" y="170" fill="#bfdbfe" font-family="sans-serif" font-size="11" text-anchor="middle">2. 사내 매뉴얼 DB</text>
  <text x="260" y="185" fill="#bfdbfe" font-family="sans-serif" font-size="11" text-anchor="middle">유사도 검색(Retrieval)</text>

  <path d="M 260 190 L 260 210" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="255,205 260,215 265,205" fill="#3b82f6"/>

  <rect x="180" y="220" width="160" height="40" fill="#064e3b" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="260" y="235" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">3. 확실한 Fact Context를</text>
  <text x="260" y="250" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">LLM 프롬프트에 주입 (Injection)</text>

  <path d="M 260 260 L 260 280" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="255,275 260,285 265,275" fill="#3b82f6"/>

  <rect x="200" y="290" width="120" height="30" fill="#1e293b" stroke="#fcd34d" stroke-width="2" rx="4"/>
  <text x="260" y="310" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">4. 가두리 팩트 답변</text>


  <!-- Right: RLHF -->
  <rect x="410" y="80" width="350" height="250" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="585" y="110" fill="#d8b4fe" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">2. RLHF (인간 피드백 강화 학습)</text>
  <text x="585" y="130" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">보상/체벌 가중치 조절을 통한 인류 윤리 정렬(Alignment)망</text>

  <rect x="525" y="150" width="120" height="30" fill="#451a03" stroke="#f59e0b" rx="4"/>
  <text x="585" y="170" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">LLM 출력 답변 3개 샘플</text>

  <path d="M 585 180 L 585 200" stroke="#a855f7" stroke-width="2"/>
  <polygon points="580,195 585,205 590,195" fill="#a855f7"/>

  <rect x="450" y="210" width="270" height="60" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="585" y="230" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">인간 Reward Model (지시 라벨러 튜닝)</text>
  <text x="585" y="250" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">"응답 A: 착함 (+10점) / 응답 B: 욕설 차단 (-50점)"</text>

  <path d="M 585 270 L 585 290" stroke="#a855f7" stroke-width="2"/>
  <polygon points="580,285 585,295 590,285" fill="#a855f7"/>

  <rect x="525" y="300" width="120" height="20" fill="#4c1d95" rx="4"/>
  <text x="585" y="315" fill="#e9d5ff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">파라미터 가중치 PPO 보정</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="350" width="700" height="80" fill="#334155" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="400" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">상용화 딥러닝 텍스트 마이닝의 2단 통제 컴포넌트 방벽</text>
  <text x="400" y="395" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">자체 뇌피셜을 원천 방어하고 사내 DB의 지식 파편(Chunk)을 외부 검색 조달하여 문맥 보간을 강제하는 RAG 시스템 구성과,</text>
  <text x="400" y="415" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">거대 모델 네트워크의 행동 편향 모수를 인간의 윤리적 기조(Alignment)에 맞추어 수학적으로 조율 갱신하는 RLHF 파이프라인.</text>

</svg>
