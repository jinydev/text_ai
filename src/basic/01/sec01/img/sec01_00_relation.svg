<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#e9ecef" />
    </linearGradient>
    <linearGradient id="nlp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <linearGradient id="tm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fa709a" />
      <stop offset="100%" stop-color="#fee140" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg-grad)" rx="20"/>

  <!-- Title -->
  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#343a40" text-anchor="middle">자연어 처리(NLP)와 텍스트 마이닝의 관계</text>

  <!-- NLP Group -->
  <g transform="translate(150, 100)" filter="url(#shadow)">
    <circle cx="100" cy="150" r="140" fill="url(#nlp-grad)" opacity="0.85"/>
    <text x="100" y="80" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">자연어 처리 (NLP)</text>
    <text x="100" y="120" font-family="'Inter', sans-serif" font-size="16" fill="white" text-anchor="middle">컴퓨터와의 상호소통</text>
    <text x="100" y="160" font-family="'Inter', sans-serif" font-size="14" fill="white" text-anchor="middle">• 기계 번역</text>
    <text x="100" y="185" font-family="'Inter', sans-serif" font-size="14" fill="white" text-anchor="middle">• 챗봇 대화</text>
    <text x="100" y="210" font-family="'Inter', sans-serif" font-size="14" fill="white" text-anchor="middle">• 자연어 생성</text>
  </g>

  <!-- Text Mining Group -->
  <g transform="translate(450, 100)" filter="url(#shadow)">
    <circle cx="100" cy="150" r="140" fill="url(#tm-grad)" opacity="0.85"/>
    <text x="100" y="80" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">텍스트 마이닝</text>
    <text x="100" y="120" font-family="'Inter', sans-serif" font-size="16" fill="white" text-anchor="middle">패턴과 인사이트 발견</text>
    <text x="100" y="160" font-family="'Inter', sans-serif" font-size="14" fill="white" text-anchor="middle">• 키워드 추출</text>
    <text x="100" y="185" font-family="'Inter', sans-serif" font-size="14" fill="white" text-anchor="middle">• 트렌드 분석</text>
    <text x="100" y="210" font-family="'Inter', sans-serif" font-size="14" fill="white" text-anchor="middle">• 문서 군집화</text>
  </g>

  <!-- Intersection -->
  <g transform="translate(300, 100)">
    <path d="M 50 150 A 140 140 0 0 1 150 10 A 140 140 0 0 1 250 150 A 140 140 0 0 1 150 290 A 140 140 0 0 1 50 150 Z" fill="white" opacity="0.1"/>
    <text x="150" y="145" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#343a40" text-anchor="middle">교집합</text>
    <text x="150" y="175" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">자연어 이해(NLU)</text>
    <text x="150" y="200" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">기반 전처리</text>
  </g>
</svg>
