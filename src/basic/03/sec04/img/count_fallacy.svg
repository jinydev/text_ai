  <text x="150" y="40" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">빈도 9,800회</text>
  <text x="150" y="275" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">The</text>

