  <text x="350" y="140" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">빈도 3,400회</text>
  <text x="350" y="275" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">is</text>

