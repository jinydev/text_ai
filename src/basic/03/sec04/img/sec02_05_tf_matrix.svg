<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#fff" rx="10"/>

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#343a40" text-anchor="middle">빈도수 (TF) 단어 카운팅 매트릭스</text>

  <g transform="translate(100, 60)" filter="url(#shadow)">
    <!-- Header -->
    <rect x="0" y="0" width="120" height="40" fill="#f8f9fa" stroke="#dee2e6"/>
    <rect x="120" y="0" width="120" height="40" fill="#ffd8a8" stroke="#dee2e6"/>
    <text x="180" y="25" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#d9480f" text-anchor="middle">먹고</text>

    <rect x="240" y="0" width="120" height="40" fill="#ffd8a8" stroke="#dee2e6"/>
    <text x="300" y="25" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#d9480f" text-anchor="middle">사과</text>

    <rect x="360" y="0" width="120" height="40" fill="#ffd8a8" stroke="#dee2e6"/>
    <text x="420" y="25" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#d9480f" text-anchor="middle">바나나</text>

    <rect x="480" y="0" width="120" height="40" fill="#ffd8a8" stroke="#dee2e6"/>
    <text x="540" y="25" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#d9480f" text-anchor="middle">종아요</text>

    <!-- Row 1 -->
    <rect x="0" y="40" width="120" height="40" fill="#f8f9fa" stroke="#dee2e6"/>
    <text x="60" y="65" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">문서1</text>
    <rect x="120" y="40" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="180" y="65" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#e03131" text-anchor="middle">1</text>
    <rect x="240" y="40" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="300" y="65" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#e03131" text-anchor="middle">1</text>
    <rect x="360" y="40" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="420" y="65" font-family="'Inter', sans-serif" font-size="16" fill="#adb5bd" text-anchor="middle">0</text>
    <rect x="480" y="40" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="540" y="65" font-family="'Inter', sans-serif" font-size="16" fill="#adb5bd" text-anchor="middle">0</text>

    <!-- Row 3 -->
    <rect x="0" y="80" width="120" height="40" fill="#f8f9fa" stroke="#dee2e6"/>
    <text x="60" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">문서3</text>
    <rect x="120" y="80" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="180" y="105" font-family="'Inter', sans-serif" font-size="16" fill="#adb5bd" text-anchor="middle">0</text>
    <rect x="240" y="80" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="300" y="105" font-family="'Inter', sans-serif" font-size="16" fill="#adb5bd" text-anchor="middle">0</text>
    <rect x="360" y="80" width="120" height="40" fill="#e3fafc" stroke="#dee2e6"/>
    <text x="420" y="105" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#0b7285" text-anchor="middle">2</text>
    <rect x="480" y="80" width="120" height="40" fill="#fff" stroke="#dee2e6"/>
    <text x="540" y="105" font-family="'Inter', sans-serif" font-size="16" fill="#adb5bd" text-anchor="middle">0</text>

  </g>
  <text x="400" y="200" font-family="'Inter', sans-serif" font-size="14" fill="#868e96" text-anchor="middle">단어가 등장한 절대 횟수 그 자체입니다.</text>
</svg>
