<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">불용어 사전(Stopwords Dictionary) 기반 거름망 필터링 시스템</text>

  <!-- Input Data -->
  <rect x="50" y="60" width="200" height="180" fill="#1e293b" stroke="#334155" stroke-width="2" rx="5"/>
  <text x="150" y="90" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">원시 문서 단어들 (Raw)</text>
  <text x="150" y="125" fill="#fca5a5" font-family="monospace" font-size="18" text-anchor="middle">the (85번)</text>
  <text x="150" y="155" fill="#6ee7b7" font-family="monospace" font-size="18" text-anchor="middle">마법 (4번)</text>
  <text x="150" y="185" fill="#fca5a5" font-family="monospace" font-size="18" text-anchor="middle">is (60번)</text>
  <text x="150" y="215" fill="#6ee7b7" font-family="monospace" font-size="18" text-anchor="middle">지팡이 (2번)</text>

  <!-- Filter Line -->
  <path d="M 270 150 L 330 150" stroke="#f59e0b" stroke-width="4" stroke-dasharray="6,6"/>
  <polygon points="320,143 335,150 320,157" fill="#f59e0b"/>

  <!-- Funnel / Filter -->
  <path d="M 360 80 L 440 80 L 420 180 L 380 180 Z" fill="#334155" stroke="#f59e0b" stroke-width="2"/>
  <rect x="380" y="180" width="40" height="40" fill="#334155" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="130" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">불용어</text>
  <text x="400" y="150" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">사전</text>

  <!-- Ejected (Stopwords) -->
  <path d="M 400 60 L 400 20" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="395,30 400,20 405,30" fill="#ef4444"/>
  <text x="400" y="15" fill="#ef4444" font-family="sans-serif" font-size="12" text-anchor="middle">The, Is 폐기처분</text>

  <!-- Output Arrow -->
  <path d="M 400 220 L 400 260 L 480 260 L 480 150 L 530 150" stroke="#10b981" stroke-width="4"/>
  <polygon points="520,143 535,150 520,157" fill="#10b981"/>

  <!-- Clean Output -->
  <rect x="550" y="110" width="200" height="80" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="650" y="135" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">정제된 핵심 키워드 공간</text>
  <text x="650" y="165" fill="#10b981" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">[마법, 지팡이]</text>

</svg>
