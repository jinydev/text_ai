<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">지프의 법칙 계단형 수식 (f ∝ 1/r) 증명</text>

  <!-- Rank 1 -->
  <rect x="150" y="90" width="120" height="160" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="210" y="120" fill="#ef4444" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">랭킹 1위</text>
  <text x="210" y="150" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">The</text>
  <text x="210" y="190" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">출현 빈도수</text>
  <text x="210" y="220" fill="#fca5a5" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">100회</text>

  <path d="M 290 170 C 310 170, 310 200, 330 200" stroke="#cbd5e1" stroke-width="3" fill="none"/>
  <polygon points="325,195 335,200 325,205" fill="#cbd5e1"/>
  <text x="310" y="185" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">1/2 배</text>

  <!-- Rank 2 -->
  <rect x="350" y="130" width="120" height="120" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="410" y="160" fill="#f59e0b" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">랭킹 2위</text>
  <text x="410" y="190" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">Of</text>
  <text x="410" y="230" fill="#fcd34d" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">50회</text>

  <path d="M 490 190 C 510 190, 510 220, 530 220" stroke="#cbd5e1" stroke-width="3" fill="none"/>
  <polygon points="525,215 535,220 525,225" fill="#cbd5e1"/>
  <text x="510" y="205" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">1/3 배</text>

  <!-- Rank 3 -->
  <rect x="550" y="170" width="120" height="80" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="610" y="200" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">랭킹 3위</text>
  <text x="610" y="235" fill="#6ee7b7" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">33회</text>

  <!-- Floor Line -->
  <line x1="100" y1="270" x2="700" y2="270" stroke="#334155" stroke-width="3"/>
</svg>
