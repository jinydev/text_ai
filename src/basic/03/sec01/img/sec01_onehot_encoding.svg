<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 1; rx: 4; ry: 4; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .word { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #334155; }
      .vec { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; }
      .highlight { font-size: 20px; font-weight: bold; fill: #ef4444; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">원-핫 인코딩 (One-hot encoding)의 한계점: 방대한 희소 벡터</text>
  <text x="400" y="55" font-size="14" fill="#64748b">정해진 단어 집합 내에서 자신의 인덱스만 1, 나머지는 모조리 0으로 채우는 비효율적인 방식</text>

  <g transform="translate(100, 100)">
    
    <!-- Header -->
    <text x="80" y="0" class="word">Vocabulary:</text>
    <text x="200" y="0" class="word" fill="#2563eb">[ 'the',</text>
    <text x="270" y="0" class="word" fill="#2563eb">'red',</text>
    <text x="340" y="0" class="word" fill="#2563eb">'dog',</text>
    <text x="410" y="0" class="word" fill="#2563eb">'cat',</text>
    <text x="480" y="0" class="word" fill="#2563eb">'eats',</text>
    <text x="560" y="0" class="word" fill="#2563eb">'food' ]</text>

    <!-- Word 'the' -->
    <rect x="0" y="40" width="80" height="30" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <text x="40" y="55" class="word" fill="#1d4ed8">the</text>
    <text x="110" y="55" class="vec">→</text>
    <text x="150" y="55" class="vec">[</text>
    <text x="200" y="55" class="highlight">1</text>
    <text x="240" y="55" class="vec">,</text>
    <text x="270" y="55" class="vec">0</text>
    <text x="310" y="55" class="vec">,</text>
    <text x="340" y="55" class="vec">0</text>
    <text x="380" y="55" class="vec">,</text>
    <text x="410" y="55" class="vec">0</text>
    <text x="450" y="55" class="vec">,</text>
    <text x="480" y="55" class="vec">0</text>
    <text x="520" y="55" class="vec">,</text>
    <text x="560" y="55" class="vec">0</text>
    <text x="600" y="55" class="vec">]</text>

    <!-- Word 'cat' -->
    <rect x="0" y="90" width="80" height="30" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <text x="40" y="105" class="word" fill="#1d4ed8">cat</text>
    <text x="110" y="105" class="vec">→</text>
    <text x="150" y="105" class="vec">[</text>
    <text x="200" y="105" class="vec">0</text>
    <text x="240" y="105" class="vec">,</text>
    <text x="270" y="105" class="vec">0</text>
    <text x="310" y="105" class="vec">,</text>
    <text x="340" y="105" class="vec">0</text>
    <text x="380" y="105" class="vec">,</text>
    <text x="410" y="105" class="highlight">1</text>
    <text x="450" y="105" class="vec">,</text>
    <text x="480" y="105" class="vec">0</text>
    <text x="520" y="105" class="vec">,</text>
    <text x="560" y="105" class="vec">0</text>
    <text x="600" y="105" class="vec">]</text>

  </g>

  <rect x="100" y="240" width="600" height="40" fill="#fef2f2" stroke="#ef4444" rx="8" />
  <text x="400" y="260" font-size="14" font-weight="bold" fill="#b91c1c">단어장이 10만 개라면? 오직 하나의 1을 위해 99,999개의 0을 메모리에 저장하는 극도의 낭비 발생</text>

</svg>
