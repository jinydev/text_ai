<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">언어의 장벽을 부수고 숫자의 주사기로</text>

  <!-- Book -->
  <rect x="100" y="100" width="120" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="3" rx="5"/>
  <text x="160" y="150" fill="#3b82f6" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"사과가 맛있다"</text>
  <text x="160" y="180" fill="#60a5fa" font-family="sans-serif" font-size="14" text-anchor="middle">(문맹인 컴퓨터)</text>

  <!-- Scanner -->
  <path d="M 250 150 L 500 150" stroke="#f59e0b" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="325" y="110" width="100" height="80" fill="#475569" rx="5"/>
  <text x="375" y="155" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">카운트 스캔</text>

  <!-- Number Array -->
  <rect x="550" y="100" width="150" height="150" fill="#0f172a" stroke="#10b981" stroke-width="3" rx="5" stroke-dasharray="5,5"/>
  <text x="625" y="150" fill="#10b981" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">[ 3, 1, 0, 5 ]</text>
  <text x="625" y="180" fill="#34d399" font-family="sans-serif" font-size="14" text-anchor="middle">컴퓨터가 이해하는</text>
  <text x="625" y="200" fill="#34d399" font-family="sans-serif" font-size="14" text-anchor="middle">유일한 형태 (숫자 열)</text>
</svg>
