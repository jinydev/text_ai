<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">최신 인공지능(트랜스포머)의 공간적 멀티태스킹 독해 방식</text>

  <circle cx="700" cy="150" r="40" fill="#3b82f6" />
  <text x="700" y="155" fill="#eff6ff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">로봇 뇌</text>

  <text x="300" y="200" fill="#cbd5e1" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">나는</text>
  <text x="450" y="150" fill="#cbd5e1" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">사과가</text>
  <text x="350" y="100" fill="#cbd5e1" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">좋다</text>
  
  <path d="M 300 200 Q 375 175 450 150" stroke="#60a5fa" stroke-width="3" stroke-dasharray="5,5" fill="none"/>
  <path d="M 450 150 Q 400 125 350 100" stroke="#60a5fa" stroke-width="3" stroke-dasharray="5,5" fill="none"/>
  <path d="M 350 100 Q 325 150 300 200" stroke="#60a5fa" stroke-width="3" stroke-dasharray="5,5" fill="none"/>

  <text x="250" y="150" fill="#93c5fd" font-family="sans-serif" font-size="14" text-anchor="middle">맥락(Attention) 점수 연결</text>
  
  <path d="M 500 150 L 650 150" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="575" y="140" fill="#60a5fa" font-family="sans-serif" font-size="14" text-anchor="middle">행렬로 한방에 스캔</text>
</svg>
