<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">과거 통계 모델의 단순 무식한 빈도수 계측기 (고대 컴퓨터)</text>

  <rect x="150" y="100" width="150" height="150" fill="#1e293b" stroke="#f59e0b" stroke-width="3" rx="5"/>
  <text x="225" y="150" fill="#f59e0b" font-family="sans-serif" font-size="80" font-weight="bold" text-anchor="middle">정</text>
  <text x="225" y="220" fill="#fbbf24" font-family="sans-serif" font-size="16" text-anchor="middle">"우울하다" x 5번</text>

  <rect x="500" y="100" width="150" height="150" fill="#1e293b" stroke="#f59e0b" stroke-width="3" rx="5"/>
  <text x="575" y="150" fill="#f59e0b" font-family="sans-serif" font-size="80" font-weight="bold" text-anchor="middle">정</text>
  <text x="575" y="220" fill="#fbbf24" font-family="sans-serif" font-size="16" text-anchor="middle">"주식차트" x 7번</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">문맥은 모르지만 절대수치가 높으니 "이 글은 슬픈 주주총회"다! 라고 눈치 게임으로 정답을 유추</text>
</svg>
