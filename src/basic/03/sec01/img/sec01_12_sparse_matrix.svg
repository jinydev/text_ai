<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#fff" rx="10"/>

  <g transform="translate(100, 50)">
    <!-- Main Matrix Outline -->
    <rect width="600" height="120" fill="#f1f3f5" stroke="#adb5bd" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Columns -->
    <!-- Column 1 -->
    <rect x="0" y="0" width="60" height="120" fill="#ffc9c9" stroke="#adb5bd" stroke-width="1"/>
    <text x="30" y="65" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#c92a2a" text-anchor="middle">1</text>
    
    <!-- 0 Columns -->
    <text x="90" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="150" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="210" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="270" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="330" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="390" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="450" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>
    <text x="510" y="65" font-family="'Inter', sans-serif" font-size="20" fill="#ced4da" text-anchor="middle">0</text>

    <!-- Column last -->
    <rect x="540" y="0" width="60" height="120" fill="#d0ebff" stroke="#adb5bd" stroke-width="1"/>
    <text x="570" y="65" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#1864ab" text-anchor="middle">2</text>
  </g>

  <text x="400" y="210" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#fa5252" text-anchor="middle">희소 현상 (Sparsity Problem): 메모리의 99%가 텅 빈 0으로 낭비됨!</text>

</svg>
