<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">DTM (Document-Term Matrix) 거대한 표의 구조</text>

  <!-- Table headers horizontally -->
  <text x="240" y="100" fill="#f59e0b" font-family="sans-serif" font-size="16" font-weight="bold">Term1(사과)</text>
  <text x="360" y="100" fill="#f59e0b" font-family="sans-serif" font-size="16" font-weight="bold">Term2(사랑)</text>
  <text x="480" y="100" fill="#f59e0b" font-family="sans-serif" font-size="16" font-weight="bold">Term3(피시)</text>
  <text x="600" y="100" fill="#f59e0b" font-family="sans-serif" font-size="16" font-weight="bold">TermN(강아지)</text>

  <!-- Table headers vertically -->
  <text x="140" y="160" fill="#3b82f6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="end">문서 1호</text>
  <text x="140" y="210" fill="#3b82f6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="end">문서 2호</text>
  <text x="140" y="260" fill="#3b82f6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="end">문서 3호</text>
  
  <line x1="160" y1="120" x2="700" y2="120" stroke="#475569" stroke-width="2"/>
  <line x1="160" y1="70" x2="160" y2="300" stroke="#475569" stroke-width="2"/>

  <!-- Matrix Values -->
  <text x="270" y="160" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">3</text>
  <text x="390" y="160" fill="#64748b" font-family="sans-serif" font-size="18" text-anchor="middle">0</text>
  <text x="510" y="160" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">1</text>
  <text x="640" y="160" fill="#64748b" font-family="sans-serif" font-size="18" text-anchor="middle">0</text>

  <text x="270" y="210" fill="#64748b" font-family="sans-serif" font-size="18" text-anchor="middle">0</text>
  <text x="390" y="210" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">5</text>
  <text x="510" y="210" fill="#64748b" font-family="sans-serif" font-size="18" text-anchor="middle">0</text>
  <text x="640" y="210" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">2</text>

  <text x="270" y="260" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">1</text>
  <text x="390" y="260" fill="#64748b" font-family="sans-serif" font-size="18" text-anchor="middle">0</text>
  <text x="510" y="260" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">2</text>
  <text x="640" y="260" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">1</text>

  <text x="400" y="330" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">수백만 개의 세로열 방대한 책들(문서)과 수백만 종류 가로열 단어 사전들이 교차하는 공간 좌표 엑셀 파일 설계 완료</text>
</svg>
