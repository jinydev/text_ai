<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-size: 28px; font-weight: bold; fill: #1e3a8a; }
      .desc { font-size: 14px; font-weight: bold; fill: #475569; }
      .sub { font-size: 12px; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">TF-IDF의 구성 수식</text>
  <text x="400" y="55" font-size="14" fill="#64748b">특정 문서에서의 등장 빈도(TF)와 전체 문서에서의 희소성(IDF)을 곱하여 단어의 진짜 중요도를 산출합니다.</text>

  <g transform="translate(50, 100)">
    
    <!-- TF-IDF Result -->
    <rect x="0" y="40" width="160" height="80" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <text x="80" y="70" class="math" fill="#1d4ed8">TF-IDF</text>
    <text x="80" y="100" class="desc" fill="#1e3a8a">단어의 가중치</text>

    <text x="200" y="80" class="math" fill="#0f172a">=</text>

    <!-- TF -->
    <rect x="240" y="20" width="200" height="120" class="box" fill="#f0fdf4" stroke="#22c55e" />
    <text x="340" y="50" class="math" fill="#15803d">TF(t, d)</text>
    <text x="340" y="80" class="desc" fill="#166534">특정 문서(d) 안에서</text>
    <text x="340" y="100" class="desc" fill="#166534">단어(t)의 등장 횟수</text>
    <text x="340" y="125" class="sub">값이 클수록 중요 단어 후보</text>

    <text x="480" y="80" class="math" fill="#ef4444">×</text>

    <!-- IDF -->
    <rect x="520" y="20" width="240" height="120" class="box" fill="#fef2f2" stroke="#ef4444" />
    <text x="640" y="50" class="math" fill="#b91c1c">IDF(t, D)</text>
    <text x="640" y="80" class="desc" fill="#991b1b">전체 문서집합(D) 안에서</text>
    <text x="640" y="100" class="desc" fill="#991b1b">해당 단어(t)의 희귀도</text>
    <text x="640" y="125" class="sub">흔한 단어('the', '의') 패널티 부여</text>

  </g>

  <rect x="100" y="270" width="600" height="40" fill="#fffbeb" stroke="#f59e0b" rx="8" />
  <text x="400" y="290" font-size="14" font-weight="bold" fill="#b45309">"내 글에서는 많이 쓰였는데, 남의 글에서는 찾아보기 힘든 단어인가?" (핵심 키워드 조건)</text>

</svg>
