op-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><rect width="700" height="500" class="background" fill="white"/><g class="chart-title"><text x="0" y="0" fill="#131300" font-size="20" dominant-baseline="middle" text-anchor="middle" transform="translate(350, 21.5) rotate(0)">월스트리트 저널 3800만어 데이터 PPL 성능 (수치가 낮을수록 똑똑함)</text></g><g class="plot"><g class="bar-plot-0"><rect x="79.12539253234863" y="66.46600000000001" width="117.8" height="399.534" fill="#ECECFF" stroke="#ECECFF" stroke-width="0"/><rect x="329.11269626617434" y="388.81" width="117.8" height="77.19" fill="#ECECFF" stroke="#ECECFF" stroke-width="0"/><rect x="579.1" y="413.63700000000006" width="117.8" height="52.36299999999994" fill="#ECECFF" stroke="#ECECFF" stroke-width="0"/></g></g><g class="bottom-axis"><g class="axis-line"><path d="M 76.02539253234863,467 L 700,467" fill="none" stroke="#131300" stroke-width="2"/></g><g class="label"><text x="0" y="0" fill="#131300" font-size="14" dominant-baseline="text-before-edge" text-anchor="middle" transform="translate(138.02539253234863, 478) rotate(0)">Unigram (장님)</text><text x="0" y="0" fill="#131300" font-size="14" dominant-baseline="text-before-edge" text-anchor="middle" transform="translate(388.0126962661743, 478) rotate(0)">Bigram (근시)</text><text x="0" y="0" fill="#131300" font-size="14" dominant-baseline="text-before-edge" text-anchor="middle" transform="translate(638, 478) rotate(0)">Trigram (양반)</text></g><g class="ticks"><path d="M 138.02539253234863,468 L 138.02539253234863,473" fill="none" stroke="#131300" stroke-width="2"/><path d="M 388.0126962661743,468 L 388.0126962661743,473" fill="none" stroke="#131300" stroke-width="2"/><path d="M 638,468 L 638,473" fill="none" stroke="#131300" stroke-width="2"/></g></g><g class="left-axi