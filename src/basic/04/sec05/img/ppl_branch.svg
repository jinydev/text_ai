<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Perplexity(PPL)와 분기 계수(Branching Factor)의 상관관계</text>

  <!-- Left: High PPL Area -->
  <rect x="50" y="80" width="320" height="230" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="210" y="115" fill="#fca5a5" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">PPL 수치가 높을 경우 (성능 저하)</text>
  <text x="210" y="140" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">다음 예측 단어의 분기 확률이 고도로 분산됨</text>

  <circle cx="100" cy="200" r="20" fill="#3b82f6"/>
  <text x="100" y="205" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">W_t</text>

  <!-- High Branching Arrows -->
  <path d="M 125 190 Q 180 150 250 150" stroke="#ef4444" stroke-width="2" fill="none"/>
  <path d="M 130 195 Q 180 170 260 170" stroke="#ef4444" stroke-width="2" fill="none"/>
  <path d="M 135 200 L 270 200" stroke="#ef4444" stroke-width="2" fill="none"/>
  <path d="M 130 205 Q 180 230 260 230" stroke="#ef4444" stroke-width="2" fill="none"/>
  <path d="M 125 210 Q 180 250 250 250" stroke="#ef4444" stroke-width="2" fill="none"/>
  
  <text x="290" y="155" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">의자?</text>
  <text x="290" y="175" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">책상?</text>
  <text x="290" y="205" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">사과?</text>
  <text x="290" y="235" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">달린다?</text>
  <text x="290" y="255" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">매우?</text>

  <text x="210" y="285" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">PPL = 5,000 (혼란 폭발)</text>


  <!-- Right: Low PPL Area -->
  <rect x="430" y="80" width="320" height="230" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="590" y="115" fill="#6ee7b7" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">PPL 수치가 낮을 경우 (성능 우수)</text>
  <text x="590" y="140" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">특정 소수 단어로 높은 확률이 압축 및 수렴됨</text>

  <circle cx="480" cy="200" r="20" fill="#3b82f6"/>
  <text x="480" y="205" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">W_t</text>

  <!-- Low Branching Arrows -->
  <path d="M 505 195 Q 550 170 630 170" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <path d="M 505 200 L 650 200" stroke="#10b981" stroke-width="6" fill="none"/>
  <polygon points="640,190 660,200 640,210" fill="#10b981"/> <!-- Green Arrowhead -->
  <path d="M 505 205 Q 550 230 630 230" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  
  <text x="670" y="175" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">기타 (1%)</text>
  <text x="690" y="205" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">정답 (98%)</text>
  <text x="670" y="235" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">기타 (1%)</text>

  <text x="590" y="285" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">PPL = 1.2 (통계적 확신)</text>

  <!-- VS -->
  <circle cx="400" cy="195" r="20" fill="#334155"/>
  <text x="400" y="201" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">VS</text>

</svg>
