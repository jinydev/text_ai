<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .card-title { font-size: 16px; font-weight: bold; fill: #1e3a8a; }
      .prob { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: bold; fill: #166534; }
      .prob-low { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: bold; fill: #b91c1c; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">언어 모델(Language Model)의 주요 적용 분야</text>
  <text x="400" y="55" font-size="14" fill="#64748b">여러 가능한 선택지 중에서 "어떤 문장이 더 자연스러운가?"를 확률적으로 판단합니다.</text>

  <!-- 1. Machine Translation -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="220" height="200" class="box" fill="#eff6ff" />
    <text x="110" y="30" class="card-title">1. 기계 번역</text>
    <path d="M 20 50 L 200 50" stroke="#bfdbfe" stroke-width="2" />
    
    <text x="110" y="70" font-size="14" font-weight="bold" fill="#0f172a">"I took a bus."</text>
    <text x="110" y="100" font-size="20">👇</text>
    
    <rect x="10" y="120" width="200" height="30" rx="4" fill="#dcfce7" />
    <text x="110" y="135" class="prob">P(버스를 탔다) = 0.85</text>
    
    <rect x="10" y="160" width="200" height="30" rx="4" fill="#fee2e2" />
    <text x="110" y="175" class="prob-low">P(버스를 태운다) = 0.05</text>
  </g>

  <!-- 2. Spell Correction -->
  <g transform="translate(290, 90)">
    <rect x="0" y="0" width="220" height="200" class="box" fill="#fdf4ff" />
    <text x="110" y="30" class="card-title" fill="#7e22ce">2. 오타 교정</text>
    <path d="M 20 50 L 200 50" stroke="#e9d5ff" stroke-width="2" />
    
    <text x="110" y="70" font-size="14" font-weight="bold" fill="#0f172a">"선생님이 부리나케 ~"</text>
    <text x="110" y="100" font-size="20">👇</text>
    
    <rect x="10" y="120" width="200" height="30" rx="4" fill="#dcfce7" />
    <text x="110" y="135" class="prob">P(달려갔다) = 0.90</text>
    
    <rect x="10" y="160" width="200" height="30" rx="4" fill="#fee2e2" />
    <text x="110" y="175" class="prob-low">P(잘려갔다) = 0.01</text>
  </g>

  <!-- 3. Speech Recognition -->
  <g transform="translate(530, 90)">
    <rect x="0" y="0" width="220" height="200" class="box" fill="#fffbeb" />
    <text x="110" y="30" class="card-title" fill="#b45309">3. 음성 인식</text>
    <path d="M 20 50 L 200 50" stroke="#fde68a" stroke-width="2" />
    
    <text x="110" y="70" font-size="14" font-weight="bold" fill="#0f172a">[na-neun me-ro-neul]</text>
    <text x="110" y="100" font-size="20">👇</text>
    
    <rect x="10" y="120" width="200" height="30" rx="4" fill="#dcfce7" />
    <text x="110" y="135" class="prob">P(메론을 먹는다) = 0.95</text>
    
    <rect x="10" y="160" width="200" height="30" rx="4" fill="#fee2e2" />
    <text x="110" y="175" class="prob-low">P(메롱을 먹는다) = 0.02</text>
  </g>

</svg>
