<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .subtitle { font-size: 16px; font-weight: bold; fill: #1e293b; }
      .desc { font-size: 14px; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">언어 모델의 근원적 한계: 확률적 앵무새 (Stochastic Parrot)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">"이해"하는 것이 아니라, 학습된 데이터 분포 내에서 그럴듯한 다음 단어를 통계적으로 "흉내" 낼 뿐입니다.</text>

  <g transform="translate(100, 100)">
    
    <!-- Old N-gram Issue -->
    <rect x="0" y="0" width="280" height="200" class="box" fill="#fef2f2" stroke="#fca5a5" />
    <text x="140" y="30" class="subtitle" fill="#991b1b">N-gram 계열 모델</text>
    <text x="140" y="80" font-size="30">📉</text>
    <text x="140" y="130" class="desc" font-weight="bold" fill="#ef4444">데이터 희소(Sparsity) 문제</text>
    <text x="140" y="155" font-size="12" fill="#b91c1c">관측되지 않으면 확률이 0</text>
    <text x="140" y="175" font-size="12" fill="#b91c1c">문장이 길어질수록 극도로 불안정</text>
    
    <!-- Vs -->
    <text x="300" y="90" font-size="20" font-weight="bold" fill="#64748b">VS</text>

    <!-- Modern LLM Issue -->
    <rect x="320" y="0" width="280" height="200" class="box" fill="#eff6ff" stroke="#93c5fd" />
    <text x="460" y="30" class="subtitle" fill="#1e3a8a">최신 대형언어모델 (LLM)</text>
    <text x="460" y="80" font-size="30">🦜</text>
    <text x="460" y="130" class="desc" font-weight="bold" fill="#3b82f6">환각(Hallucination) 현상</text>
    <text x="460" y="155" font-size="12" fill="#1d4ed8">의미를 모른 채 훈련 데이터 편향만 복제</text>
    <text x="460" y="175" font-size="12" fill="#1d4ed8">그럴듯하지만 사실이 아닌 헛소리 생성</text>

  </g>

</svg>
