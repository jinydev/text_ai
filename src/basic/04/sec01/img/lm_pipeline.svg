<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">확률 채점표의 세상 침공: 스마트폰에 녹아든 3대 통계 마법</text>

  <!-- Feature 1: Translation -->
  <rect x="50" y="100" width="220" height="120" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="160" y="130" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">기계 번역 (Papago)</text>
  <text x="160" y="155" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">I rode a bus</text>
  <line x1="80" y1="165" x2="240" y2="165" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="185" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">P(버스를 탔다) = 99%</text>
  <text x="160" y="205" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle" text-decoration="line-through">P(버스를 태웠다) = 1%</text>

  <!-- Feature 2: Auto-correct -->
  <rect x="290" y="100" width="220" height="120" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="400" y="130" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">스마트폰 자동 교정</text>
  <text x="400" y="155" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">부리나케 ( )</text>
  <line x1="320" y1="165" x2="480" y2="165" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="185" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">P(달려갔다) = 95%</text>
  <text x="400" y="205" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle" text-decoration="line-through">P(잘려갔다) = 0.01%</text>

  <!-- Feature 3: Voice Recognition -->
  <rect x="530" y="100" width="220" height="120" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="640" y="130" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">음성 인식 (Siri)</text>
  <text x="640" y="155" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">마스크 끼고 "메ㄹ을 먹자"</text>
  <line x1="560" y1="165" x2="720" y2="165" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="185" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">P(메론을 먹자) = 90%</text>
  <text x="640" y="205" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle" text-decoration="line-through">P(메롱을 먹자) = 0%</text>


  <!-- Explanation -->
  <text x="400" y="260" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">컴퓨터는 문법(Grammar)을 모르지만, 인터넷 데이터에서 압도적으로 많이 등장했던(확률이 높은) 배열 텍스트를 무조건 정답으로 숭배하여 채택합니다.</text>
</svg>
