<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .branch-title { font-size: 18px; font-weight: bold; fill: #1e293b; }
      .node { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .node-bad { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">분기 계수 (Branching Factor)로서의 PPL의 의미</text>
  <text x="400" y="55" font-size="14" fill="#64748b">모델이 다음 단어를 예측할 때 "마음속으로 평균 몇 개의 보기 중 고민하고 있는가"를 직관적으로 나타냅니다.</text>

  <!-- PPL = 1 (Best) -->
  <g transform="translate(100, 100)">
    <rect x="-20" y="0" width="240" height="200" class="box" fill="#f0fdf4" />
    <text x="100" y="30" class="branch-title" fill="#166534">PPL = 1</text>
    <text x="100" y="55" font-size="12" fill="#15803d">(다음 단어가 정답임을 100% 확신)</text>
    
    <text x="50" y="110" font-size="30">🤔</text>
    <path d="M 80 110 L 140 110" stroke="#22c55e" stroke-width="3" />
    <circle cx="160" cy="110" r="15" class="node" />
    <text x="160" y="110" font-weight="bold" fill="#166534">!</text>
    <text x="100" y="170" font-size="14" font-weight="bold" fill="#166534">고민 없이 오직 1개만 고려</text>
  </g>

  <!-- PPL = 10 -->
  <g transform="translate(460, 100)">
    <rect x="-20" y="0" width="240" height="200" class="box" fill="#fef2f2" />
    <text x="100" y="30" class="branch-title" fill="#b91c1c">PPL = 10</text>
    <text x="100" y="55" font-size="12" fill="#b91c1c">(다음 단어로 대충 10개쯤 고민)</text>
    
    <text x="30" y="110" font-size="30">🤯</text>

    <!-- Branch lines -->
    <path d="M 60 110 L 110 70" stroke="#fca5a5" stroke-width="2" />
    <path d="M 60 110 L 120 90" stroke="#fca5a5" stroke-width="2" />
    <path d="M 60 110 L 130 110" stroke="#fca5a5" stroke-width="2" />
    <path d="M 60 110 L 120 130" stroke="#fca5a5" stroke-width="2" />
    <path d="M 60 110 L 110 150" stroke="#fca5a5" stroke-width="2" />

    <!-- Nodes -->
    <circle cx="120" cy="70" r="8" class="node-bad" />
    <circle cx="130" cy="90" r="8" class="node-bad" />
    <circle cx="140" cy="110" r="8" class="node-bad" />
    <circle cx="130" cy="130" r="8" class="node-bad" />
    <circle cx="120" cy="150" r="8" class="node-bad" />

    <text x="175" y="110" font-size="20" fill="#ef4444">...</text>

    <text x="100" y="180" font-size="14" font-weight="bold" fill="#b91c1c">10가지 후보 중 혼란스러움</text>
  </g>

</svg>
