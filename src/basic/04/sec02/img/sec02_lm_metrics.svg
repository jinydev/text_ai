<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .card-name { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: bold; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">기타 NLP 과업에 특화된 언어 모델 주요 평가 지표</text>
  <text x="400" y="65" font-size="14" fill="#64748b">특정 도메인의 목적(기계번역, 요약, 논리 추론 여부)에 따라 PPL 외에 다양한 지표를 사용합니다.</text>

  <!-- BLEU -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="320" height="150" class="box" fill="#eff6ff" stroke="#93c5fd" />
    <text x="160" y="30" class="card-name" fill="#1d4ed8">BLEU</text>
    <text x="160" y="55" font-size="12" fill="#3b82f6">(Bilingual Evaluation Understudy)</text>
    
    <text x="160" y="90" font-size="14" font-weight="bold" fill="#0f172a">사용 분야: 번역 및 문장 생성</text>
    <text x="160" y="115" font-size="13" fill="#1e3a8a">사람이 번역한 정답 문장(Reference)과</text>
    <text x="160" y="135" font-size="13" fill="#1e3a8a">모델이 생성한 문장의 단어 겹침 비율 측정</text>
  </g>

  <!-- ROUGE -->
  <g transform="translate(420, 110)">
    <rect x="0" y="0" width="320" height="150" class="box" fill="#fdf4ff" stroke="#d8b4fe" />
    <text x="160" y="30" class="card-name" fill="#7e22ce">ROUGE</text>
    <text x="160" y="55" font-size="12" fill="#a855f7">(Recall-Oriented Understudy for Gisting)</text>
    
    <text x="160" y="90" font-size="14" font-weight="bold" fill="#0f172a">사용 분야: 자연어 요약 (Summarization)</text>
    <text x="160" y="115" font-size="13" fill="#581c87">정답 요약문의 '핵심 단어'들을 모델이</text>
    <text x="160" y="135" font-size="13" fill="#581c87">빠뜨리지 않고 포함했는지(Recall)를 중점 측정</text>
  </g>

  <!-- MMLU -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="320" height="150" class="box" fill="#f0fdf4" stroke="#86efac" />
    <text x="160" y="30" class="card-name" fill="#15803d">MMLU</text>
    <text x="160" y="55" font-size="12" fill="#22c55e">(Massive Multitask Language Understanding)</text>
    
    <text x="160" y="90" font-size="14" font-weight="bold" fill="#0f172a">사용 분야: 지식 및 논리 추론</text>
    <text x="160" y="115" font-size="13" fill="#14532d">수학, 역사, 법률, 의학 등 57개 주제의</text>
    <text x="160" y="135" font-size="13" fill="#14532d">객관식 문제를 풀게 하여 정답률(Accuracy) 측정</text>
  </g>

  <!-- LLM-as-a-Judge -->
  <g transform="translate(420, 280)">
    <rect x="0" y="0" width="320" height="150" class="box" fill="#fffbeb" stroke="#fcd34d" />
    <text x="160" y="30" class="card-name" fill="#b45309">LLM-as-a-Judge</text>
    <text x="160" y="55" font-size="12" fill="#fbbf24">(LLM을 심사위원으로 활용)</text>
    
    <text x="160" y="90" font-size="14" font-weight="bold" fill="#0f172a">사용 분야: 최신 챗봇 자동화 평가</text>
    <text x="160" y="115" font-size="13" fill="#78350f">GPT-4 같은 최상위 모델에게 채점을 맡겨,</text>
    <text x="160" y="135" font-size="13" fill="#78350f">유용성/안전성을 사람처럼 1~10점으로 평가</text>
  </g>

</svg>
