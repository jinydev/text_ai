<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">머신러닝 지도학습 분류망의 이중 런타임 아키텍처 (Train vs Predict)</text>

  <!-- ======= TOP HALF: TRAINING PHASE ======= -->
  <rect x="40" y="80" width="720" height="180" fill="#1e293b" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2" rx="8" stroke-dasharray="6,6"/>
  <text x="60" y="105" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold">Phase 1. 모델 학습 및 가중치 최적화 (Train Mode)</text>

  <!-- Input X -->
  <rect x="70" y="130" width="100" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="120" y="155" fill="#bfdbfe" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">데이터 X (텍스트)</text>
  
  <path d="M 170 150 L 260 150" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="255,145 265,150 255,155" fill="#3b82f6"/>

  <!-- Model Core -->
  <circle cx="320" cy="170" r="50" fill="#334155" stroke="#f59e0b" stroke-width="3"/>
  <text x="320" y="165" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">분류 신경망</text>
  <text x="320" y="185" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">W (가중치)</text>

  <path d="M 370 150 L 460 150" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="455,145 465,150 455,155" fill="#f59e0b"/>

  <!-- Output Prediction -->
  <rect x="470" y="130" width="100" height="40" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="520" y="155" fill="#fde68a" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">예측 스팸 (Y^)</text>

  <!-- Label Y -->
  <rect x="470" y="195" width="100" height="40" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="520" y="220" fill="#6ee7b7" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">지도 정답 Y</text>

  <!-- Comparator -->
  <path d="M 520 170 L 520 195" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
  
  <rect x="580" y="155" width="160" height="60" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="660" y="175" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">손실 함수 계산 (Loss)</text>
  <text x="660" y="195" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">Y 와 Y^ 오차량 산출</text>

  <!-- Backpropagation Loop -->
  <path d="M 660 215 Q 660 260 320 260 T 320 230" stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <polygon points="315,235 320,225 325,235" fill="#ef4444"/>
  <text x="490" y="250" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">오차 역전파: W 미세 조정 (Update)</text>


  <!-- ======= BOTTOM HALF: PREDICTION PHASE ======= -->
  <rect x="40" y="300" width="720" height="150" fill="#064e3b" fill-opacity="0.3" stroke="#10b981" stroke-width="2" rx="8" stroke-dasharray="6,6"/>
  <text x="60" y="325" fill="#a7f3d0" font-family="sans-serif" font-size="16" font-weight="bold">Phase 2. 실전 모델 배포 및 추론 (Predict Mode)</text>

  <!-- New Input X -->
  <rect x="70" y="360" width="140" height="40" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="140" y="385" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">신규 검증 데이터 X'</text>

  <path d="M 210 380 L 260 380" stroke="#10b981" stroke-width="3"/>
  <polygon points="255,375 265,380 255,385" fill="#10b981"/>

  <!-- Frozen Model Core -->
  <circle cx="320" cy="380" r="50" fill="#1e293b" stroke="#3b82f6" stroke-width="3"/>
  <text x="320" y="375" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">완성된 AI망</text>
  <text x="320" y="395" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">W (고정, Frozen)</text>

  <path d="M 370 380 L 510 380" stroke="#f59e0b" stroke-width="4"/>
  <polygon points="500,374 510,380 500,386" fill="#f59e0b"/>

  <!-- Final Prediction Output -->
  <rect x="520" y="350" width="200" height="60" fill="#b45309" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="620" y="375" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">실전 판독 정답 출력 (Y^')</text>
  <text x="620" y="395" fill="#fcd34d" font-family="monospace" font-size="12" text-anchor="middle">정답지 Y 없이 홀로 예측!</text>

</svg>
