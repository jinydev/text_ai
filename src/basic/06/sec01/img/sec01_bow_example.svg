<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #ffffff; }
      .cell { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; }
      .header { fill: #f1f5f9; font-weight: bold; font-size: 15px; color: #334155; }
      .val { fill: #0ea5e9; font-size: 18px; font-weight: bold; }
      .label-text { fill: #475569; font-size: 15px; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .doc-string { font-size: 18px; font-weight: bold; fill: #be185d; text-anchor: start; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a">Bag of Words (BoW) 특성 추출</text>
  <text x="400" y="65" font-size="14" fill="#64748b">특성은 각 단어, 값은 각 단어가 등장한 빈도수(Count)를 나타냄</text>

  <g transform="translate(100, 110)">
    <!-- Document Text Example -->
    <text x="0" y="10" class="doc-string">"The red dog eats the red cat."</text>

    <!-- Table Headers -->
    <rect x="0" y="50" width="80" height="40" class="cell header" />
    <rect x="80" y="50" width="80" height="40" class="cell header" />
    <rect x="160" y="50" width="80" height="40" class="cell header" />
    <rect x="240" y="50" width="80" height="40" class="cell header" />
    <rect x="320" y="50" width="80" height="40" class="cell header" />
    <rect x="400" y="50" width="80" height="40" class="cell header" />
    <rect x="480" y="50" width="80" height="40" class="cell header" />

    <text x="40" y="70" font-weight="bold" fill="#334155">the</text>
    <text x="120" y="70" font-weight="bold" fill="#334155">red</text>
    <text x="200" y="70" font-weight="bold" fill="#334155">dog</text>
    <text x="280" y="70" font-weight="bold" fill="#334155">eats</text>
    <text x="360" y="70" font-weight="bold" fill="#334155">cat</text>
    <text x="440" y="70" font-weight="bold" fill="#334155">food</text>
    <text x="520" y="70" font-weight="bold" fill="#334155">...</text>

    <!-- Values -->
    <rect x="0" y="90" width="80" height="50" class="cell" />
    <rect x="80" y="90" width="80" height="50" class="cell" />
    <rect x="160" y="90" width="80" height="50" class="cell" />
    <rect x="240" y="90" width="80" height="50" class="cell" />
    <rect x="320" y="90" width="80" height="50" class="cell" />
    <rect x="400" y="90" width="80" height="50" class="cell" />
    <rect x="480" y="90" width="80" height="50" class="cell" />
    
    <text x="40" y="115" class="val">2</text>
    <text x="120" y="115" class="val" fill="#ef4444">2</text>
    <text x="200" y="115" class="val">1</text>
    <text x="280" y="115" class="val">1</text>
    <text x="360" y="115" class="val">1</text>
    <text x="440" y="115" class="val" fill="#94a3b8">0</text>
    
    <text x="280" y="180" font-size="16" fill="#1e293b" font-weight="bold">Feature Vector = [ 2, 2, 1, 1, 1, 0, ... ]</text>
  </g>

  <rect x="100" y="320" width="600" height="50" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="8" />
  <text x="400" y="345" font-size="14" fill="#b91c1c" font-weight="bold">어순(단어의 위치)은 전혀 고려하지 않고 오직 "단어의 등장 빈도"만 파악합니다.</text>

</svg>
