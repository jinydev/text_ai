<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #3b82f6; stroke-width: 2; rx: 8; ry: 8; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .math-bold { font-family: 'Roboto', sans-serif; font-weight: bold; font-style: italic; }
      .title { font-size: 24px; font-weight: bold; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">나이브 베이즈 (Naive Bayes) 분류기 기반 공식</text>
  <text x="400" y="70" font-size="14" fill="#64748b">베이즈 정리를 이용한 문서 분류 모델의 핵심 수식과 특성 독립 가정</text>

  <rect x="100" y="110" width="600" height="120" class="box" fill="#eff6ff" />
  
  <text x="400" y="150" font-size="40" class="math-bold" fill="#1e3a8a">
    P(c|d) = <tspan y="130" x="480" font-size="32">P(d|c) P(c)</tspan>
  </text>
  <line x1="400" y1="160" x2="560" y2="160" stroke="#1e3a8a" stroke-width="3" />
  <text x="480" y="190" font-size="32" class="math-bold" fill="#1e3a8a">P(d)</text>

  <!-- Annotations -->
  <text x="250" y="150" font-size="16" font-weight="bold" fill="#b91c1c">사후 확률 (Posterior)</text>
  <text x="250" y="175" font-size="14" fill="#475569">문서 d가 주어졌을 때</text>
  <text x="250" y="195" font-size="14" fill="#475569">클래스 c일 확률</text>

  <!-- Features Assumption Box -->
  <rect x="50" y="270" width="700" height="140" class="box" stroke="#10b981" />
  <text x="400" y="300" font-size="18" font-weight="bold" fill="#047857">"Naive (단순한)" 독립성 가정</text>
  
  <text x="250" y="340" font-size="16" font-weight="bold" fill="#1e293b">1. 위치 독립성 (Position)</text>
  <text x="250" y="365" font-size="14" fill="#64748b">단어가 발생한 위치나 어순은 무시함</text>

  <text x="550" y="340" font-size="16" font-weight="bold" fill="#1e293b">2. 조건부 독립성 (Conditional)</text>
  <text x="550" y="365" font-size="14" fill="#64748b">각 단어는 서로 독립적으로 등장한다고 가정</text>

  <line x1="400" y1="320" x2="400" y2="380" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4" />

</svg>
