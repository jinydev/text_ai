<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">자연어 텍스트 분류 (Text Classification) 파이프라인 전주기</text>

  <!-- Step 1: Raw Text -->
  <rect x="50" y="80" width="140" height="80" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="6"/>
  <text x="120" y="105" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1. 원시 데이터 수집</text>
  <text x="120" y="125" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">(Raw Text)</text>
  <text x="120" y="145" fill="#cbd5e1" font-family="monospace" font-size="10" text-anchor="middle">&lt;html&gt; 완전 구려! &amp;%$</text>

  <path d="M 190 120 L 230 120" stroke="#64748b" stroke-width="3"/>
  <polygon points="225,115 235,120 225,125" fill="#64748b"/>

  <!-- Step 2: Preprocessing -->
  <rect x="240" y="80" width="140" height="80" fill="#334155" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="310" y="105" fill="#bfdbfe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2. 전처리 및 정제</text>
  <text x="310" y="125" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">(Preprocessing)</text>
  <text x="310" y="145" fill="#dbeafe" font-family="monospace" font-size="10" text-anchor="middle">[완전, 구려]</text>

  <path d="M 380 120 L 420 120" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="415,115 425,120 415,125" fill="#3b82f6"/>

  <!-- Step 3: Feature Extraction -->
  <rect x="430" y="80" width="140" height="80" fill="#1e3a8a" stroke="#8b5cf6" stroke-width="2" rx="6"/>
  <text x="500" y="105" fill="#ddd6fe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">3. 특성 추출 통계화</text>
  <text x="500" y="125" fill="#c4b5fd" font-family="sans-serif" font-size="12" text-anchor="middle">(Feature Extraction)</text>
  <text x="500" y="145" fill="#ede9fe" font-family="monospace" font-size="10" text-anchor="middle">TF-IDF / Word2Vec</text>

  <!-- Big Arrow down to ML Model -->
  <path d="M 500 160 Q 500 240 400 240" stroke="#8b5cf6" stroke-width="4" fill="none"/>
  <polygon points="410,234 400,240 410,246" fill="#8b5cf6"/>

  <!-- Step 4: ML Classifier Box -->
  <rect x="200" y="200" width="200" height="100" fill="#1e293b" stroke="#f59e0b" stroke-width="3" rx="8"/>
  <text x="300" y="230" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">4. 분류기 추론망</text>
  <text x="300" y="255" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">(Classifier Inference)</text>
  <text x="300" y="275" fill="#fcd34d" font-family="sans-serif" font-size="12" text-anchor="middle">Naive Bayes / SVM / NN</text>

  <path d="M 400 250 L 460 250" stroke="#f59e0b" stroke-width="4"/>
  <polygon points="450,244 460,250 450,256" fill="#f59e0b"/>

  <!-- Step 5: Output Categories -->
  <rect x="470" y="190" width="130" height="120" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="535" y="220" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">출력 결정 행렬</text>
  
  <rect x="480" y="235" width="110" height="25" fill="#ef4444" rx="2"/>
  <text x="535" y="252" fill="#fecaca" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">악플 (Negative)</text>

  <rect x="480" y="270" width="110" height="25" fill="#3b82f6" rx="2"/>
  <text x="535" y="287" fill="#dbeafe" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">정상 (Positive)</text>

  <text x="400" y="360" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">비정형 문자열을 다차원 수치 텐서로 변환한 후, 소프트맥스 결정을 거쳐 카테고리 레이블을 분할 추론함</text>

</svg>
