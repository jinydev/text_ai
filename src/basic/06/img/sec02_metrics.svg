<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .desc { font-size: 13px; fill: #475569; }
      .math { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: bold; fill: #1e293b; }
      .highlight { fill: #e11d48; font-weight: bold; font-family: 'Roboto', sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" font-size="22" font-weight="bold" fill="#0f172a">분류 모델 성능 평가 지표 정리</text>
  <text x="400" y="55" font-size="14" fill="#64748b">스팸 메일 분류기(Positive=스팸)를 예시로 한 지표 해석</text>

  <!-- Precision -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="320" height="130" class="box" />
    <text x="160" y="25" class="title" fill="#3b82f6">정밀도 (Precision)</text>
    
    <text x="160" y="60" class="math">TP / (TP + FP)</text>
    <line x1="80" y1="75" x2="240" y2="75" stroke="#cbd5e1" stroke-width="1" />
    
    <text x="160" y="95" class="desc">"내가 스팸이라고 지목한 것 중</text>
    <text x="160" y="115" class="desc">실제로 진짜 스팸의 비율"</text>
  </g>

  <!-- Recall -->
  <g transform="translate(420, 90)">
    <rect x="0" y="0" width="320" height="130" class="box" />
    <text x="160" y="25" class="title" fill="#f59e0b">재현율 (Recall)</text>
    
    <text x="160" y="60" class="math">TP / (TP + FN)</text>
    <line x1="80" y1="75" x2="240" y2="75" stroke="#cbd5e1" stroke-width="1" />
    
    <text x="160" y="95" class="desc">"실존하는 전체 스팸 중에</text>
    <text x="160" y="115" class="desc">내가 놓치지 않고 잡아낸 비율"</text>
  </g>

  <!-- Accuracy -->
  <g transform="translate(60, 240)">
    <rect x="0" y="0" width="320" height="130" class="box" />
    <text x="160" y="25" class="title" fill="#10b981">정확도 (Accuracy)</text>
    
    <text x="160" y="60" class="math">(TP + TN) / TOTAL</text>
    <line x1="80" y1="75" x2="240" y2="75" stroke="#cbd5e1" stroke-width="1" />
    
    <text x="160" y="95" class="desc">"전체 메일 중에 내가 스팸은 스팸으로,</text>
    <text x="160" y="115" class="desc">정상은 정상으로 올바르게 맞춘 비율"</text>
  </g>

  <!-- F1-Score -->
  <g transform="translate(420, 240)">
    <rect x="0" y="0" width="320" height="130" class="box" fill="#fdf2f8" stroke="#be185d" />
    <text x="160" y="25" class="title" fill="#be185d">F1 - Score</text>
    
    <text x="160" y="60" class="math highlight">2 × (Precision × Recall) / (P + R)</text>
    <line x1="30" y1="75" x2="290" y2="75" stroke="#fbcfe8" stroke-width="1" />
    
    <text x="160" y="95" class="desc" font-weight="bold" fill="#9f1239">정밀도와 재현율의 "조화 평균"</text>
    <text x="160" y="115" class="desc" fill="#9f1239">어느 한쪽에 치우치지 않는 지표</text>
  </g>

</svg>
