<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .box { stroke: #1e293b; stroke-width: 2; fill: none; }
      .cell-feature { fill: #2dd4bf; stroke: #0f172a; stroke-width: 1; }
      .cell-target { fill: #facc15; stroke: #0f172a; stroke-width: 1; }
      .cell-empty { fill: white; stroke: #0f172a; stroke-width: 1; }
      .text-bold { font-weight: bold; font-size: 16px; fill: #1e293b; }
      .text-small { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">모델 학습을 위한 데이터 준비 워크플로 (Data Workflow)</text>

  <!-- Step 1: Raw Data -->
  <g transform="translate(50, 100)">
    <text x="50" y="-15" class="text-bold">원본 데이터셋</text>
    <rect x="0" y="0" width="100" height="200" fill="none" stroke="#0f172a" stroke-width="2" />
    <!-- Grid -->
    <path d="M 25 0 L 25 200 M 50 0 L 50 200 M 75 0 L 75 200" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 0 20 L 100 20 M 0 40 L 100 40 M 0 60 L 100 60 M 0 80 L 100 80 M 0 100 L 100 100 M 0 120 L 100 120 M 0 140 L 100 140 M 0 160 L 100 160 M 0 180 L 100 180" stroke="#cbd5e1" stroke-width="1" />
  </g>

  <!-- Array splitting -->
  <path d="M 170 200 L 210 200" stroke="#1e293b" stroke-width="3" marker-end="url(#arrow)" />
  <text x="190" y="180" class="text-small">Arrange</text>
  <text x="190" y="215" class="text-small">Data</text>

  <!-- Step 2: Features and Targets -->
  <g transform="translate(230, 100)">
    <text x="35" y="-15" class="text-bold">특성(X)</text>
    <text x="105" y="-15" class="text-bold">정답(y)</text>
    
    <!-- X Data -->
    <rect x="0" y="0" width="75" height="200" class="cell-feature" />
    <path d="M 25 0 L 25 200 M 50 0 L 50 200" stroke="#0f172a" stroke-width="1" />
    <path d="M 0 20 L 75 20 M 0 40 L 75 40 M 0 60 L 75 60 M 0 80 L 75 80 M 0 100 L 75 100 M 0 120 L 75 120 M 0 140 L 75 140 M 0 160 L 75 160 M 0 180 L 75 180" stroke="#0f172a" stroke-width="1" />

    <!-- Y Data -->
    <rect x="90" y="0" width="30" height="200" class="cell-target" />
    <path d="M 90 20 L 120 20 M 90 40 L 120 40 M 90 60 L 120 60 M 90 80 L 120 80 M 90 100 L 120 100 M 90 120 L 120 120 M 90 140 L 120 140 M 90 160 L 120 160 M 90 180 L 120 180" stroke="#0f172a" stroke-width="1" />
  </g>

  <!-- Train/Test Split -->
  <path d="M 370 200 L 420 200" stroke="#1e293b" stroke-width="3" marker-end="url(#arrow)" />
  <text x="395" y="160" class="text-bold">Train Test Split</text>
  <text x="395" y="180" class="text-small" fill="#ef4444">(Random Sampling)</text>

  <!-- Step 3: Train and Test Sets -->
  <g transform="translate(440, 80)">
    <text x="35" y="-15" class="text-bold">X_train</text>
    <text x="105" y="-15" class="text-bold">y_train</text>
    <!-- X Train Data -->
    <rect x="0" y="0" width="75" height="140" class="cell-feature" fill="#2dd4bf" />
    <path d="M 25 0 L 25 140 M 50 0 L 50 140" stroke="#0f172a" stroke-width="1" />
    <path d="M 0 20 L 75 20 M 0 40 L 75 40 M 0 60 L 75 60 M 0 80 L 75 80 M 0 100 L 75 100 M 0 120 L 75 120" stroke="#0f172a" stroke-width="1" />

    <!-- Y Train Data -->
    <rect x="90" y="0" width="30" height="140" class="cell-target" />
    <path d="M 90 20 L 120 20 M 90 40 L 120 40 M 90 60 L 120 60 M 90 80 L 120 80 M 90 100 L 120 100 M 90 120 L 120 120" stroke="#0f172a" stroke-width="1" />
    
    <path d="M 130 50 L 180 50" stroke="#1e293b" stroke-width="3" marker-end="url(#arrow)" />
    <text x="155" y="30" class="text-bold">Training</text>

    <!-- Test Set -->
    <text x="35" y="175" class="text-bold">X_test</text>
    <text x="105" y="175" class="text-bold">y_test</text>
    <!-- X Test Data -->
    <rect x="0" y="190" width="75" height="60" fill="#06b6d4" stroke="#0f172a" stroke-width="1" />
    <path d="M 25 190 L 25 250 M 50 190 L 50 250" stroke="#0f172a" stroke-width="1" />
    <path d="M 0 210 L 75 210 M 0 230 L 75 230" stroke="#0f172a" stroke-width="1" />

    <!-- Y Test Data -->
    <rect x="90" y="190" width="30" height="60" class="cell-target" />
    <path d="M 90 210 L 120 210 M 90 230 L 120 230" stroke="#0f172a" stroke-width="1" />

    <path d="M 130 220 L 180 220" stroke="#1e293b" stroke-width="3" marker-end="url(#arrow)" />
    <text x="155" y="200" class="text-bold">Testing</text>
  </g>

  <!-- Step 4: ML Model -->
  <g transform="translate(640, 100)">
    <rect x="0" y="0" width="120" height="200" fill="white" stroke="#0f172a" stroke-width="3" />
    <text x="60" y="100" class="text-bold" font-size="20">ML Model</text>

    <!-- Tuning loop arrows -->
    <path d="M 55 120 C 40 140, 80 140, 65 120" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="-50" y="130" class="text-bold" fill="#f59e0b">Hyperparameter</text>
    <text x="-50" y="150" class="text-bold" fill="#f59e0b">Tuning</text>
  </g>

</svg>
