<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .box { rx: 4; ry: 4; }
      .text-box { font-weight: bold; font-size: 16px; fill: white; }
      .desc { font-size: 14px; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">모델 성능평가를 위한 데이터 분할</text>

  <!-- Total Data Bar -->
  <g transform="translate(100, 80)">
    
    <!-- Train -->
    <rect x="0" y="0" width="360" height="60" class="box" fill="#3b82f6" />
    <text x="180" y="30" class="text-box">Training Data (학습용)</text>
    
    <!-- Validation -->
    <rect x="365" y="0" width="110" height="60" class="box" fill="#f59e0b" />
    <text x="420" y="30" class="text-box" font-size="14">Validation</text>
    <text x="420" y="50" class="text-box" font-size="12">(검증용)</text>

    <!-- Test -->
    <rect x="480" y="0" width="120" height="60" class="box" fill="#10b981" />
    <text x="540" y="30" class="text-box">Test Data</text>
    <text x="540" y="50" class="text-box" font-size="12">(평가용)</text>

    <!-- Explanations -->
    <path d="M 180 65 L 180 85" stroke="#3b82f6" stroke-width="2" />
    <text x="180" y="100" class="desc" fill="#1e40af">모델을 본격적으로 학습시키는 메인 데이터</text>

    <path d="M 420 65 L 420 105" stroke="#f59e0b" stroke-width="2" />
    <text x="420" y="120" class="desc" fill="#b45309">모델 하이퍼파라미터 최적화</text>
    <text x="420" y="140" class="desc" fill="#b45309">및 학습 중단 시점 결정</text>

    <path d="M 540 65 L 540 85" stroke="#10b981" stroke-width="2" />
    <text x="540" y="100" class="desc" fill="#047857">최종 학습된 모델의 찐 실력 평가</text>
  </g>

</svg>
