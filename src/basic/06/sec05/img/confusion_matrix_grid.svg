<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">진실의 방: 혼동 행렬 (Confusion Matrix) 4사분면</text>

  <text x="150" y="80" fill="#60a5fa" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">AI 입방정 예측 (경찰관 무전)</text>
  <text x="650" y="50" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">실제 범죄 정답</text>


  <!-- Background Grid Box -->
  <rect x="300" y="60" width="400" height="200" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <line x1="500" y1="60" x2="500" y2="260" stroke="#475569" stroke-width="2"/>
  <line x1="300" y1="160" x2="700" y2="160" stroke="#475569" stroke-width="2"/>


  <!-- AI Prediction Labels (Rows) -->
  <rect x="230" y="60" width="70" height="100" fill="#1e3a8a"/>
  <text x="265" y="115" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">P (!)</text>

  <rect x="230" y="160" width="70" height="100" fill="#064e3b"/>
  <text x="265" y="215" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">N (-)</text>
  <text x="130" y="115" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">"이건 스팸 범인이다!"</text>
  <text x="130" y="215" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">"일반 무고한 메일이다"</text>

  <!-- Reality Labels (Columns) -->
  <rect x="300" y="30" width="200" height="30" fill="#450a0a"/>
  <text x="400" y="50" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">범인이야! (T)</text>

  <rect x="500" y="30" width="200" height="30" fill="#422006"/>
  <text x="600" y="50" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">선량해 (F)</text>


  <!-- The 4 Cells -->

  <!-- TP (Top Left) -->
  <text x="400" y="100" fill="#10b981" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">TP</text>
  <text x="400" y="125" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">진짜 악당체포 성공</text>
  <text x="400" y="145" fill="#a7f3d0" font-family="sans-serif" font-size="10" text-anchor="middle">(특진 보장)</text>

  <!-- FP (Top Right) -->
  <text x="600" y="100" fill="#ef4444" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">FP</text>
  <text x="600" y="125" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">선량한 시민 누명 씌움!</text>
  <text x="600" y="145" fill="#fca5a5" font-family="sans-serif" font-size="10" text-anchor="middle">(1종 오류: 조작수사 참사)</text>

  <!-- FN (Bottom Left) -->
  <text x="400" y="200" fill="#ef4444" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">FN</text>
  <text x="400" y="225" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">테러범을 그냥 방관함!</text>
  <text x="400" y="245" fill="#fca5a5" font-family="sans-serif" font-size="10" text-anchor="middle">(2종 오류: 장님 경찰 무능)</text>

  <!-- TN (Bottom Right) -->
  <text x="600" y="200" fill="#10b981" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">TN</text>
  <text x="600" y="225" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">선량한 시민 무사통과</text>
  <text x="600" y="245" fill="#a7f3d0" font-family="sans-serif" font-size="10" text-anchor="middle">(이상 무)</text>

</svg>
