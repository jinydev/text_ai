<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">로지스틱 회귀 이진 분류기: 활성화 함수 시그모이드 (Sigmoid S-Curve)</text>

  <!-- Coordinate System -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#475569" stroke-width="2"/> <!-- X axis -->
  <line x1="400" y1="80" x2="400" y2="380" stroke="#475569" stroke-width="2"/> <!-- Y axis -->
  
  <text x="710" y="355" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="start">가중합 Z (무한 선형공간)</text>
  <text x="390" y="70" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="end">확률 p</text>
  
  <text x="380" y="375" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">0</text>
  <text x="380" y="105" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">1.0</text>
  <line x1="395" y1="100" x2="405" y2="100" stroke="#475569" stroke-width="2"/>

  <!-- Decision Threshold -->
  <line x1="100" y1="225" x2="700" y2="225" stroke="#fcd34d" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="730" y="230" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Threshold = 0.5 (결정 경계)</text>
  <text x="375" y="230" fill="#fde68a" font-family="sans-serif" font-size="14" text-anchor="middle">0.5</text>

  <!-- Asymptote 1.0 limit visual -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- S Curve -->
  <!-- Sigmoid: starts low ~350, crosses at 400,225, ends high ~100 -->
  <path d="M 100 348 Q 300 348 400 225 T 700 102" stroke="#3b82f6" stroke-width="4" fill="none"/>
  
  <!-- Areas highlighting binary domains -->
  <rect x="400" y="100" width="300" height="125" fill="#10b981" fill-opacity="0.15" rx="4"/>
  <text x="550" y="160" fill="#a7f3d0" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">분류 성공 구역 (Positive/Spam)</text>
  <text x="550" y="180" fill="#6ee7b7" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">p ^ >= 0.5 타겟 판별</text>

  <rect x="100" y="225" width="300" height="125" fill="#ef4444" fill-opacity="0.15" rx="4"/>
  <text x="250" y="280" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">기각 분극 구역 (Negative/Normal)</text>
  <text x="250" y="300" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">p ^ < 0.5 제외 처리</text>

  <!-- Formula Panel -->
  <rect x="120" y="80" width="180" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="210" y="115" fill="#bfdbfe" font-family="serif" font-size="18" text-anchor="middle">σ(z) = 1 / (1 + e^-z)</text>
  
  <!-- Footer text -->
  <text x="400" y="420" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">가중 결합으로 생성된 무한대의 야생형 입력 수치 Z 를 단층(Binary) 확률 모수 공간 0.0 과 1.0 사이로 강제 근사 수렴 압축시키는 활성화 함수</text>

</svg>
