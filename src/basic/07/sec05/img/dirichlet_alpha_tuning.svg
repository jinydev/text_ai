<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">디리클레 함수를 요리하는 알파(α) 하이퍼파라미터 조작술</text>

  <!-- Title / Legend -->
  <text x="400" y="65" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">합계가 1.0(100%) 이 되는 3개의 토픽 확률 배분표(비율) 룰렛을 어떻게 극단적으로 짜낼 것인가?</text>


  <!-- Left Triangle: Alpha > 1 (Hybrid Box) -->
  <path d="M 150 250 L 300 250 L 225 120 Z" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="225" y="100" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">평화 주의자 (α = 10.0)</text>
  <text x="225" y="115" fill="#93c5fd" font-family="sans-serif" font-size="10" text-anchor="middle">Hybrid 평준화</text>
  
  <text x="120" y="270" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">정치 토픽</text>
  <text x="330" y="270" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">경제 토픽</text>
  <text x="225" y="135" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">스포츠</text>

  <!-- Plot points concentrated in the center -->
  <circle cx="225" cy="200" r="4" fill="#60a5fa"/>
  <circle cx="215" cy="195" r="3" fill="#60a5fa"/>
  <circle cx="235" cy="205" r="3" fill="#60a5fa"/>
  <circle cx="225" cy="185" r="4" fill="#60a5fa"/>
  <circle cx="220" cy="210" r="3" fill="#60a5fa"/>
  <circle cx="230" cy="190" r="3" fill="#60a5fa"/>
  <circle cx="215" cy="215" r="3" fill="#60a5fa"/>
  <circle cx="240" cy="200" r="3" fill="#60a5fa"/>
  
  <rect x="135" y="290" width="180" height="40" fill="#1e3a8a" rx="5"/>
  <text x="225" y="306" fill="#bfdbfe" font-family="sans-serif" font-size="10" text-anchor="middle">모든 문서가 33:33:33 으로 무색무취하게</text>
  <text x="225" y="320" fill="#bfdbfe" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">정중앙에 모여버린 짬뽕(박애) 기사 연출!</text>


  <!-- Alpha > 1 Arrow to alpha < 1 Arrow -->
  <path d="M 370 190 L 440 190" stroke="#fcd34d" stroke-width="4" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <text x="405" y="180" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">조작!</text>


  <!-- Right Triangle: Alpha < 1 (Extreme Corners) -->
  <path d="M 500 250 L 650 250 L 575 120 Z" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="575" y="100" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">극단적 편집증 (α = 0.1)</text>
  <text x="575" y="115" fill="#fca5a5" font-family="sans-serif" font-size="10" text-anchor="middle">Sparse 몰빵 편식</text>
  
  <text x="470" y="270" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">정치 토픽</text>
  <text x="680" y="270" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">경제 토픽</text>
  <text x="575" y="135" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">스포츠</text>

  <!-- Plot points pushed to the corners -->
  <circle cx="505" cy="245" r="4" fill="#fca5a5"/>
  <circle cx="515" cy="248" r="3" fill="#fca5a5"/>
  <circle cx="495" cy="245" r="3" fill="#fca5a5"/>
  
  <circle cx="645" cy="245" r="4" fill="#fca5a5"/>
  <circle cx="635" cy="248" r="3" fill="#fca5a5"/>
  <circle cx="640" cy="240" r="3" fill="#fca5a5"/>

  <circle cx="575" cy="125" r="4" fill="#fca5a5"/>
  <circle cx="570" cy="135" r="3" fill="#fca5a5"/>
  <circle cx="580" cy="130" r="3" fill="#fca5a5"/>

  <!-- Almost empty center -->
  <text x="575" y="210" fill="#94a3b8" font-family="sans-serif" font-size="12" font-style="italic" text-anchor="middle">텅빔!</text>
  
  <rect x="475" y="290" width="200" height="40" fill="#7f1d1d" rx="5"/>
  <text x="575" y="306" fill="#fef2f2" font-family="sans-serif" font-size="10" text-anchor="middle">"문서 하나는 무조건 토픽 1개에 올인해!!"</text>
  <text x="575" y="320" fill="#fef2f2" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">문서 혼합 파이가 삼각형 극단 꼭짓점 모서리로 몰빵</text>

</svg>
