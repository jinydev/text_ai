<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">디리클레 다항 확률 생성 함수: 하이퍼파라미터 알파(α) 밀도 제어에 따른 K차원 Simplex 통제망</text>

  <!-- Left Simplex: Alpha > 1 -->
  <rect x="50" y="70" width="330" height="250" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="215" y="100" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">밀도 집중/혼합형 ( α = 5.0 )</text>
  
  <polygon points="215,130 90,290 340,290" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <text x="215" y="120" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">토픽 K1</text>
  <text x="50" y="300" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">토픽 K2</text>
  <text x="380" y="300" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">토픽 K3</text>

  <!-- Heatmap density Center -->
  <circle cx="215" cy="220" r="40" fill="#3b82f6" opacity="0.6"/>
  <circle cx="215" cy="220" r="25" fill="#60a5fa" opacity="0.8"/>
  <circle cx="215" cy="220" r="10" fill="#bfdbfe"/>
  <text x="215" y="275" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">비율이 골고루 섞임 (33:33:33 비율 수렴)</text>


  <!-- Right Simplex: Alpha < 1 -->
  <rect x="420" y="70" width="330" height="250" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="585" y="100" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">극단 희소 코너 편향형 ( α = 0.1 )</text>

  <polygon points="585,130 460,290 710,290" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <text x="585" y="120" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">토픽 K1</text>
  <text x="420" y="300" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">토픽 K2</text>
  <text x="750" y="300" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">토픽 K3</text>

  <!-- Heatmap density Corners -->
  <circle cx="585" cy="130" r="25" fill="#ef4444" opacity="0.7"/>
  <circle cx="460" cy="290" r="25" fill="#ef4444" opacity="0.7"/>
  <circle cx="710" cy="290" r="25" fill="#ef4444" opacity="0.7"/>
  <circle cx="585" cy="130" r="10" fill="#fca5a5"/>
  <circle cx="460" cy="290" r="10" fill="#fca5a5"/>
  <circle cx="710" cy="290" r="10" fill="#fca5a5"/>
  
  <text x="585" y="220" fill="#fca5a5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">비율이 1개 토픽에 극한 100% 몰빵 쏠림 발생</text>


  <!-- Explanation Banner -->
  <rect x="50" y="340" width="700" height="80" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="365" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">LDA 모델의 필수 극한 셋팅값: 사전 확률 변수 (Hyperparameter Alpha)</text>
  <text x="400" y="385" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">위의 알파값이 크면 범용 다차원 혼합(박애주의 블렌딩) 문서가 대량 발생하고, 주로 쓰이는 극한의 작은 스케일 셋팅(0.1 미만)에서는</text>
  <text x="400" y="405" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">다중 할당을 억제하고 문서가 오직 1개의 특정 토픽만 강력하게 독립 편파 독점하게 되는 희소(Sparse) 특성 통제를 유도한다.</text>

</svg>
