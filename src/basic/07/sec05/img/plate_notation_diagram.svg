<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">조건부 분포 통계 의존망 구조도: 스무딩 베이지안 플레이트 표기법 (Plate Notation Architecture)</text>

  <!-- Big Plate M (Documents) -->
  <rect x="180" y="100" width="370" height="240" fill="none" stroke="#64748b" stroke-width="3" rx="8" stroke-dasharray="8,4"/>
  <rect x="500" y="310" width="40" height="25" fill="#1e293b"/>
  <text x="520" y="328" fill="#94a3b8" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">M 코퍼스(문서) Array 반복 루프</text>

  <!-- Small Plate N (Words) -->
  <rect x="300" y="130" width="230" height="150" fill="none" stroke="#94a3b8" stroke-width="2" rx="6" stroke-dasharray="4,2"/>
  <rect x="470" y="255" width="40" height="20" fill="#1e293b"/>
  <text x="490" y="270" fill="#cbd5e1" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">N 단어 Array 루프</text>

  <!-- Topic Plate K -->
  <rect x="580" y="130" width="130" height="210" fill="none" stroke="#f59e0b" stroke-width="2" rx="6" stroke-dasharray="4,2"/>
  <rect x="650" y="315" width="40" height="20" fill="#1e293b"/>
  <text x="670" y="330" fill="#fcd34d" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">K 토픽 Array</text>


  <!-- Nodes & Edges -->
  
  <!-- Alpha -->
  <circle cx="100" cy="220" r="18" fill="#334155" stroke="#fca5a5" stroke-width="2"/>
  <text x="100" y="225" fill="#fca5a5" font-family="serif" font-size="16" font-weight="bold" text-anchor="middle">α</text>

  <!-- Theta -->
  <circle cx="240" cy="220" r="22" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="225" fill="#93c5fd" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle">θ</text>

  <!-- Z -->
  <circle cx="360" cy="220" r="22" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="360" y="225" fill="#6ee7b7" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle">Z</text>

  <!-- W (Observed, filled) -->
  <circle cx="480" cy="220" r="22" fill="#64748b" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="225" fill="#0f172a" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle">W</text>

  <!-- Phi (Topic Word Distribution) -->
  <circle cx="640" cy="220" r="22" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="225" fill="#fcd34d" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle">ϕ</text>

  <!-- Beta (or Eta) -->
  <circle cx="750" cy="220" r="18" fill="#334155" stroke="#fca5a5" stroke-width="2"/>
  <text x="750" y="225" fill="#fca5a5" font-family="serif" font-size="16" font-weight="bold" text-anchor="middle">β</text>


  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <line x1="120" y1="220" x2="210" y2="220" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="265" y1="220" x2="330" y2="220" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="385" y1="220" x2="450" y2="220" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="220" x2="510" y2="220" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="730" y1="220" x2="665" y2="220" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Info Labels Bottom -->
  <rect x="50" y="370" width="700" height="65" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="400" y="395" fill="#a7f3d0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">관측 종착 증거물 (Observed Target $W$ 회색 원 노드) : 현실에서 유일하게 단어 스펠링 팩트로 눈에 보이는 데이터</text>
  <text x="400" y="415" fill="#6ee7b7" font-family="sans-serif" font-size="13" text-anchor="middle">나머지 투명 노드 구조망들은 오직 저 $W$ 궤적을 출발 근거로 증명 삼아, 통계 그래프를 역으로 파고 거슬러 올라가 미분 역추적해야 할 은닉 수식 파라미터 구조체</text>

</svg>
