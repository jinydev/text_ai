<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">LDA 모델의 아키텍처 위성 도면: 플레이트 표기법 (Plate Notation)</text>

  <text x="400" y="70" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">확률의 인과 관계와 M×N 무한 반복의 루프 박스를 기하학적으로 압축한 조물주의 설계도면</text>

  <!-- Big M Plate (Documents) -->
  <rect x="150" y="100" width="300" height="200" fill="#022c22" stroke="#10b981" stroke-width="2" rx="5" opacity="0.3"/>
  <text x="160" y="285" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold" text-anchor="start">M (문서 판)</text>
  <text x="320" y="285" fill="#34d399" font-family="sans-serif" font-size="12" text-anchor="start">M장 무한루프</text>

  <!-- Small N Plate (Words per doc) -->
  <rect x="250" y="120" width="180" height="130" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="5" opacity="0.4"/>
  <text x="260" y="240" fill="#3b82f6" font-family="monospace" font-size="16" font-weight="bold" text-anchor="start">N (단어 판)</text>
  <text x="350" y="240" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="start">N 스펠링 루프</text>


  <!-- K Plate (Topics) -->
  <rect x="480" y="100" width="150" height="200" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5" opacity="0.3"/>
  <text x="490" y="285" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="start">K (토픽 판)</text>
  <text x="560" y="285" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="start">K방 루프</text>

  
  <!-- Nodes & Arrows -->

  <!-- Alpha -->
  <circle cx="80" cy="180" r="20" fill="#1e293b" stroke="#cbd5e1" stroke-width="2"/>
  <text x="80" y="185" fill="#cbd5e1" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">α</text>
  <path d="M 100 180 L 170 180" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="80" y="215" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">평화/극단 조율기</text>

  <!-- Theta -->
  <circle cx="190" cy="180" r="20" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="190" y="185" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">θ</text>
  <path d="M 210 180 L 270 180" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="190" y="215" fill="#34d399" font-family="sans-serif" font-size="10" text-anchor="middle">문서당 룰렛 지분</text>

  <!-- Z -->
  <circle cx="290" cy="180" r="20" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="185" fill="#3b82f6" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">Z</text>
  <path d="M 310 180 L 370 180" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="290" y="215" fill="#60a5fa" font-family="sans-serif" font-size="10" text-anchor="middle">당첨된 딱 1개 토픽</text>

  <!-- W (Shaded: Observed) -->
  <circle cx="390" cy="180" r="20" fill="#94a3b8" stroke="#fcd34d" stroke-width="3"/>
  <text x="390" y="185" fill="#0f172a" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">W</text>
  <text x="390" y="215" fill="#fbbf24" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">유일한 관측 텍스트</text>

  <!-- Phi -->
  <circle cx="550" cy="180" r="20" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="550" y="185" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">Φ</text>
  <path d="M 530 180 L 410 180" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="550" y="215" fill="#fca5a5" font-family="sans-serif" font-size="10" text-anchor="middle">토픽당 단어 주머니</text>

  <!-- Beta -->
  <circle cx="680" cy="180" r="20" fill="#1e293b" stroke="#cbd5e1" stroke-width="2"/>
  <text x="680" y="185" fill="#cbd5e1" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">β</text>
  <path d="M 660 180 L 570 180" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="680" y="215" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">단어 편식 조율기</text>


  <!-- Flow arrow logic back -->
  <path d="M 390 150 C 390 80 190 80 190 150" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6,4" fill="none" marker-end="url(#reverse-arrow)"/>
  <text x="290" y="100" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">우리의 실제 임무 (W 에서부터 시간 역산해 가기)</text>

</svg>
