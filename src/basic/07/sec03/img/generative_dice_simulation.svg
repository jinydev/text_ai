<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">야생의 텍스트가 뽑기로 탄생하는 과정 (Generative Model Simulation)</text>

  <!-- Step 1: Ratio Setting -->
  <rect x="50" y="80" width="150" height="180" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="125" y="110" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Step 1</text>
  <text x="125" y="130" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">주사위 룰렛 세팅</text>
  
  <rect x="70" y="150" width="110" height="60" fill="#1e3a8a" rx="30"/> <!-- Representing a skewed roulette -->
  <path d="M 125 150 L 125 180 L 160 180" stroke="#fcd34d" stroke-width="2" fill="none"/>
  <text x="100" y="195" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">정치 70%</text>
  <text x="150" y="165" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">경제 30%</text>
  
  <text x="125" y="240" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">조물주의 컨셉 결정</text>


  <path d="M 210 170 L 260 170" stroke="#fcd34d" stroke-width="3" stroke-dasharray="2,2" fill="none" marker-end="url(#arrow)"/>


  <!-- Step 2: Roll the topic -->
  <rect x="280" y="80" width="150" height="180" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="355" y="110" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Step 2</text>
  <text x="355" y="130" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">룰렛 돌리기 당첨</text>
  
  <!-- Topic Ball -->
  <circle cx="355" cy="180" r="30" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2"/>
  <text x="355" y="185" fill="#fef2f2" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">정치 탑탑</text>
  
  <text x="355" y="240" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">단어 스펠링을 뽑기 앞서</text>
  <text x="355" y="255" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">토픽 성질 확률 먼저 픽!</text>


  <path d="M 440 170 L 490 170" stroke="#fcd34d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>


  <!-- Step 3: Draw the Word from Bag -->
  <rect x="510" y="80" width="240" height="180" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="630" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Step 3: 단어 주머니 손넣기</text>
  <text x="630" y="130" fill="#f87171" font-family="sans-serif" font-size="12" text-anchor="middle">(정치 전용 단어 확률 통)</text>
  
  <rect x="540" y="150" width="180" height="50" fill="#7f1d1d" rx="5"/> <!-- The bag -->
  <text x="570" y="180" fill="#fef2f2" font-family="sans-serif" font-size="12" text-anchor="middle">국회 40%</text>
  <text x="630" y="180" fill="#fca5a5" font-family="sans-serif" font-size="10" text-anchor="middle">사과 0%</text>
  <text x="690" y="180" fill="#fef2f2" font-family="sans-serif" font-size="12" text-anchor="middle">선거 20%</text>

  <rect x="580" y="220" width="100" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="3"/>
  <text x="630" y="238" fill="#7f1d1d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"국회" 당첨!</text>

  <!-- Step 4 Loop arrow -->
  <path d="M 630 270 C 630 320 355 350 355 270" stroke="#10b981" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <text x="492" y="320" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Step 4: 무수히 무한 반복 (가짜 문서 생성)</text>


</svg>
