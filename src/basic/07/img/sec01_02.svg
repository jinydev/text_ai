<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #ffffff; }
      .header-bg { fill: #1e3a8a; }
      .row-bg-even { fill: #f3f4f6; }
      .row-bg-odd { fill: #ffffff; }
      .border { stroke: #e5e7eb; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="8" />
  <rect x="20" y="20" width="760" height="260" rx="8" class="border" fill="none" />

  <!-- Header -->
  <path d="M 20 28 Q 20 20 28 20 L 772 20 Q 780 20 780 28 L 780 70 L 20 70 Z" class="header-bg" />
  
  <text x="110" y="45" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">구분</text>
  <text x="350" y="45" font-size="18" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">텍스트 분류</text>
  <text x="610" y="45" font-size="18" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">텍스트 주제 분석</text>

  <!-- Row 1 -->
  <rect x="20" y="70" width="760" height="60" class="row-bg-odd" />
  <text x="110" y="100" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle" dominant-baseline="middle">정답</text>
  <text x="350" y="100" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">사전에 정의된 레이블 존재</text>
  <text x="610" y="100" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">사전 레이블 없음</text>

  <!-- Row 2 -->
  <rect x="20" y="130" width="760" height="60" class="row-bg-even" />
  <text x="110" y="160" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle" dominant-baseline="middle">목표</text>
  <text x="350" y="160" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">올바른 카테고리 예측</text>
  <text x="610" y="160" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">텍스트 내부 구조 이해</text>

  <!-- Row 3 -->
  <rect x="20" y="190" width="760" height="90" class="row-bg-odd" />
  <text x="110" y="235" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle" dominant-baseline="middle">기계학습 관점</text>
  <text x="350" y="235" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">지도 학습 (Supervised) 관점</text>
  <text x="610" y="235" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">비지도 학습 (Unsupervised) 관점</text>

  <!-- Vertical Dividers -->
  <line x1="200" y1="20" x2="200" y2="280" class="border" />
  <line x1="500" y1="20" x2="500" y2="280" class="border" />
</svg>
