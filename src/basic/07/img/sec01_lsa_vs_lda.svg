<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #f8fafc; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />
  
  <!-- LSA Side -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="340" height="300" rx="12" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <text x="170" y="35" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">LSA (잠재 의미 분석)</text>
    <text x="170" y="60" font-size="14" fill="#64748b" text-anchor="middle">행렬 분해 기반 (Matrix Factorization)</text>
    
    <g transform="translate(30, 100)">
      <!-- Term-Document Matrix -->
      <rect x="0" y="0" width="60" height="100" fill="#cbd5e1" stroke="#64748b"/>
      <text x="30" y="55" font-size="12" fill="#334155" text-anchor="middle">단어-문서</text>
      
      <text x="80" y="55" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">≈</text>
      
      <!-- SVD -->
      <rect x="100" y="0" width="40" height="100" fill="#93c5fd" stroke="#2563eb"/>
      <text x="120" y="-10" font-size="12" fill="#2563eb" text-anchor="middle">단어-주제</text>
      
      <rect x="150" y="40" width="40" height="40" fill="#fca5a5" stroke="#dc2626"/>
      <text x="170" y="30" font-size="12" fill="#dc2626" text-anchor="middle">가중치</text>
      
      <rect x="200" y="40" width="80" height="40" fill="#86efac" stroke="#16a34a"/>
      <text x="240" y="30" font-size="12" fill="#16a34a" text-anchor="middle">주제-문서</text>
    </g>
    
    <text x="170" y="250" font-size="13" fill="#475569" text-anchor="middle">• 차원 축소로 잠재 의미 포착</text>
    <text x="170" y="270" font-size="13" fill="#475569" text-anchor="middle">• 새로운 문서 추가 시 계산 재수행 필요</text>
  </g>

  <!-- LDA Side -->
  <g transform="translate(420, 50)">
    <rect x="0" y="0" width="340" height="300" rx="12" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <text x="170" y="35" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">LDA (잠재 디리클레 할당)</text>
    <text x="170" y="60" font-size="14" fill="#64748b" text-anchor="middle">생성 모델 기반 (Generative Probabilistic Model)</text>
    
    <g transform="translate(25, 100)">
      <circle cx="40" cy="50" r="30" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
      <text x="40" y="55" font-size="12" font-weight="bold" fill="#854d0e" text-anchor="middle">토픽 분포</text>
      
      <path d="M 80 50 L 110 50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <circle cx="150" cy="50" r="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
      <text x="150" y="55" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">토픽</text>
      
      <path d="M 190 50 L 220 50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <circle cx="260" cy="50" r="30" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
      <text x="260" y="55" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle">단어</text>
      
      <!-- Plate notation box for Document -->
      <rect x="15" y="10" width="280" height="100" rx="8" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="250" y="100" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">문서</text>
    </g>

    <text x="170" y="250" font-size="13" fill="#475569" text-anchor="middle">• 통계적 추론으로 확률 분포 역산</text>
    <text x="170" y="270" font-size="13" fill="#475569" text-anchor="middle">• 직관적인 토픽 해석 가능</text>
  </g>
</svg>
