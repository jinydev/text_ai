<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">첫 번째 파라미터(Θ): Soft Clustering 지향 다중 토픽 혼합 문서(Mixture Document) 배분율</text>

  <!-- Left: Pure Document 1 -->
  <rect x="50" y="80" width="220" height="150" fill="#1e293b" stroke="#7f1d1d" stroke-width="2" rx="4"/>
  <text x="160" y="110" fill="#94a3b8" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Document 01</text>
  <text x="160" y="135" fill="#f8fafc" font-family="serif" font-size="14" text-anchor="middle">"사과랑 바나나 달콤해"</text>
  <!-- Bar chart for Doc 1 -->
  <text x="70" y="180" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold">과일(k1)</text>
  <rect x="130" y="170" width="120" height="12" fill="#ef4444" rx="2"/>
  <text x="260" y="180" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold">1.0</text>

  <text x="70" y="210" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.3">동물(k2)</text>
  <rect x="130" y="200" width="1" height="12" fill="#3b82f6" rx="1"/>
  <text x="260" y="210" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.3">0.0</text>


  <!-- Right: Pure Document 2 -->
  <rect x="530" y="80" width="220" height="150" fill="#1e293b" stroke="#1e3a8a" stroke-width="2" rx="4"/>
  <text x="640" y="110" fill="#94a3b8" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Document 02</text>
  <text x="640" y="135" fill="#f8fafc" font-family="serif" font-size="14" text-anchor="middle">"귀여운 강아지 꼬리침"</text>
  <!-- Bar chart for Doc 2 -->
  <text x="550" y="180" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.3">과일(k1)</text>
  <rect x="610" y="170" width="1" height="12" fill="#ef4444" rx="1"/>
  <text x="740" y="180" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.3">0.0</text>

  <text x="550" y="210" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold">동물(k2)</text>
  <rect x="610" y="200" width="120" height="12" fill="#3b82f6" rx="2"/>
  <text x="740" y="210" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold">1.0</text>


  <!-- Center: Mixed Document 3 -->
  <rect x="250" y="200" width="300" height="160" fill="#334155" stroke="#f59e0b" stroke-width="3" rx="8"/>
  <text x="400" y="230" fill="#fcd34d" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">Document 03 (🚨 LDA의 정수)</text>
  <text x="400" y="255" fill="#fde68a" font-family="serif" font-size="16" font-weight="bold" text-anchor="middle">"사육사가 강아지한테 바나나 먹임"</text>
  <!-- Bar chart for Doc 3 -->
  <text x="270" y="300" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold">과일(k1)</text>
  <rect x="340" y="287" width="90" height="16" fill="#ef4444" rx="2"/>
  <text x="440" y="300" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold">0.45</text>

  <text x="270" y="330" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold">동물(k2)</text>
  <rect x="340" y="317" width="110" height="16" fill="#3b82f6" rx="2"/>
  <text x="460" y="330" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold">0.55</text>

  <!-- Linking Arrows -->
  <path d="M 230 155 Q 400 155 400 200" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M 570 155 Q 400 155 400 200" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="395,195 400,205 405,195" fill="#64748b"/>

  <text x="400" y="385" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">단일 폴더 강제 할당(Hard Allocation)을 배제하고 토픽 복합 확률 분할 지분율을 인정하는 모델링 유연성</text>

</svg>
