<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">두 번째 파라미터(Φ) : 편향 독립적 조건부 단어 방출 밀도(Word Distribution per Topic)</text>

  <!-- Topic 1 Panel -->
  <rect x="50" y="80" width="330" height="280" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="215" y="115" fill="#fca5a5" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">과일(k1) 토픽 확률 밀도통 (Φ_1)</text>

  <!-- Prob Bar 1 -->
  <text x="70" y="160" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">바나나</text>
  <rect x="140" y="145" width="160" height="20" fill="#ef4444" rx="2"/>
  <text x="310" y="160" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold">0.40</text>

  <!-- Prob Bar 2 -->
  <text x="70" y="200" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">사과</text>
  <rect x="140" y="185" width="80" height="20" fill="#f87171" rx="2"/>
  <text x="230" y="200" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold">0.20</text>

  <!-- Prob Bar 3 -->
  <text x="70" y="240" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">달콤</text>
  <rect x="140" y="225" width="40" height="20" fill="#fca5a5" rx="2"/>
  <text x="190" y="240" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold">0.10</text>

  <line x1="70" y1="265" x2="360" y2="265" stroke="#475569" stroke-width="2" stroke-dasharray="2,2"/>

  <!-- Almost Zero Prob Word -->
  <text x="70" y="295" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.4">강아지</text>
  <rect x="140" y="280" width="2" height="20" fill="#64748b" rx="1"/>
  <text x="150" y="295" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.5">0.001</text>
  <text x="190" y="295" fill="#ef4444" font-family="sans-serif" font-size="11" font-weight="bold">(절대 표집 억제망)</text>

  <path d="M 380 220 L 420 220" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="4,4"/>


  <!-- Topic 2 Panel -->
  <rect x="420" y="80" width="330" height="280" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="585" y="115" fill="#93c5fd" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">동물(k2) 토픽 확률 밀도통 (Φ_2)</text>

  <!-- Prob Bar 1 -->
  <text x="440" y="160" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">강아지</text>
  <rect x="510" y="145" width="132" height="20" fill="#3b82f6" rx="2"/>
  <text x="652" y="160" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold">0.33</text>

  <!-- Prob Bar 2 -->
  <text x="440" y="200" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">귀여운</text>
  <rect x="510" y="185" width="132" height="20" fill="#60a5fa" rx="2"/>
  <text x="652" y="200" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold">0.33</text>

  <!-- Prob Bar 3 -->
  <text x="440" y="240" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">사자</text>
  <rect x="510" y="225" width="64" height="20" fill="#93c5fd" rx="2"/>
  <text x="584" y="240" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold">0.16</text>

  <line x1="440" y1="265" x2="730" y2="265" stroke="#475569" stroke-width="2" stroke-dasharray="2,2"/>

  <!-- Almost Zero Prob Word -->
  <text x="440" y="295" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.4">사과</text>
  <rect x="510" y="280" width="2" height="20" fill="#64748b" rx="1"/>
  <text x="520" y="295" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="bold" opacity="0.5">0.001</text>

  <!-- Concept Statement -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="4"/>
  <text x="400" y="410" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">각 토픽(Topic) 컴포넌트는 모든 단어에 대해 자신만의 편향된 방출 지배 확률 수열 표(Φ)를 소유한다.</text>

</svg>
