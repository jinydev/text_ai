<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">MCMC 깁스 샘플링 무한 루프 2가지 눈치 커닝 법칙 (Update Rule)</text>

  <!-- Center Target Word -->
  <rect x="350" y="140" width="100" height="50" fill="#450a0a" stroke="#ef4444" stroke-width="4" rx="5"/>
  <text x="400" y="165" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">단어 "사과"</text>
  <text x="400" y="180" fill="#f87171" font-family="sans-serif" font-size="10" text-anchor="middle">"내 스티커 바꿔줘!"</text>


  <!-- Left Side: Rule 1 (Local Document Siblings) -->
  <rect x="50" y="100" width="220" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="160" y="125" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">조건 1: 동거인 형제 잣대</text>
  <text x="160" y="140" fill="#60a5fa" font-family="sans-serif" font-size="10" text-anchor="middle">(같은 문서 안에 사는 다른 단어들)</text>

  <rect x="70" y="160" width="180" height="70" fill="#0f172a" rx="5"/>
  <text x="160" y="180" fill="#cbd5e1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">바나나 (과일), 포도 (과일)</text>
  <text x="160" y="200" fill="#cbd5e1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">달콤한 (과일)</text>

  <text x="160" y="220" fill="#3b82f6" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">"우리 방은 과일이 짱이야!"</text>

  <!-- Arrow from left -->
  <path d="M 270 165 L 340 165" stroke="#3b82f6" stroke-width="4" fill="none" marker-end="url(#arrow)"/>


  <!-- Right Side: Rule 2 (Global Corpus Twins) -->
  <rect x="530" y="100" width="220" height="150" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="640" y="125" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">조건 2: 도플갱어 유전자 잣대</text>
  <text x="640" y="140" fill="#34d399" font-family="sans-serif" font-size="10" text-anchor="middle">(우주 전체의 다른 "사과" 단어들)</text>

  <rect x="550" y="160" width="180" height="70" fill="#0f172a" rx="5"/>
  <text x="640" y="180" fill="#cbd5e1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">문서 9번 '사과'(과일)</text>
  <text x="640" y="200" fill="#cbd5e1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">문서 50번 '사과'(과일)</text>

  <text x="640" y="220" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">"사과 유전자는 항상 과일이었음!"</text>

  <!-- Arrow from right -->
  <path d="M 530 165 L 460 165" stroke="#10b981" stroke-width="4" fill="none" marker-end="url(#arrow)"/>


  <!-- Result Equation Box -->
  <rect x="200" y="280" width="400" height="50" fill="#1e3a8a" rx="5"/>
  <text x="400" y="305" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">P(새 토픽) = (내 문서 속성 지분) × (글로벌 스펠링 정체성 지분)</text>
  <text x="400" y="320" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">결론: "난 오늘부터 100% 과일 토픽 스티커로 갈아탄다!"</text>


</svg>
