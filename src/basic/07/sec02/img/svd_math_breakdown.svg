<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">특이값 분해 (SVD) 와 거대 K-절단 (Truncation) 마법</text>

  <!-- Original Matrix A -->
  <rect x="50" y="100" width="120" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="3"/>
  <text x="110" y="140" fill="#93c5fd" font-family="monospace" font-size="30" font-weight="bold" text-anchor="middle">A</text>
  <text x="110" y="170" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">1000만 문서</text>
  <text x="110" y="185" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">×</text>
  <text x="110" y="200" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">10만 수퍼단어장</text>

  <text x="210" y="180" fill="#fcd34d" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">≈</text>


  <!-- U Matrix -->
  <!-- We show the full matrix in faint, and the truncated in solid -->
  <rect x="250" y="100" width="120" height="150" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="250" y="100" width="40" height="150" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="3"/>
  <text x="270" y="180" fill="#fca5a5" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">U</text>
  
  <text x="390" y="180" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">×</text>


  <!-- Sigma Matrix -->
  <rect x="420" y="100" width="120" height="150" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="420" y="100" width="40" height="50" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="3"/>
  <text x="440" y="135" fill="#6ee7b7" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">Σ</text>

  <text x="560" y="180" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">×</text>


  <!-- V Transpose Matrix -->
  <rect x="590" y="100" width="150" height="120" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="590" y="100" width="150" height="40" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="3"/>
  <text x="665" y="130" fill="#93c5fd" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">V^T</text>

  
  <!-- Scissors and cut line -->
  <path d="M 300 70 L 300 300" stroke="#f59e0b" stroke-width="2" stroke-dasharray="10,5"/>
  <path d="M 470 70 L 470 300" stroke="#f59e0b" stroke-width="2" stroke-dasharray="10,5"/>
  <path d="M 550 150 L 780 150" stroke="#f59e0b" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="290" y="80" fill="#fbbf24" font-family="sans-serif" font-size="24" text-anchor="middle">✂️</text>
  <text x="460" y="80" fill="#fbbf24" font-family="sans-serif" font-size="24" text-anchor="middle">✂️</text>
  <text x="760" y="140" fill="#fbbf24" font-family="sans-serif" font-size="24" text-anchor="middle">✂️</text>


  <!-- Labels -->
  <rect x="400" y="270" width="220" height="50" fill="#7f1d1d" rx="5"/>
  <text x="510" y="295" fill="#fef2f2" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">K차원 자르기 (Truncation)</text>
  <text x="510" y="310" fill="#fca5a5" font-family="sans-serif" font-size="10" text-anchor="middle">영향력 쓰레기 벡터(관사/노이즈) 전부 절제 수술!</text>
  
  <text x="510" y="335" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">살아남은 K=3 소수의 차원 축이 결국 '숨겨진 핵심 라텐트 토픽'이 된다.</text>

</svg>
