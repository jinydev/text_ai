<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #f8fafc; }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />
  
  <text x="400" y="40" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">문서 생성 절차 (Document Generative Process)</text>
  <text x="400" y="65" font-size="14" fill="#64748b" text-anchor="middle">확률 분포로부터 문서를 생성하는 관점</text>

  <!-- Step 1: Topic Distribution -->
  <g transform="translate(140, 150)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#3730a3" text-anchor="middle">1. 토픽 분포 선택</text>
    <text x="0" y="10" font-size="12" fill="#4f46e5" text-anchor="middle">(Distribution over topics)</text>
    
    <!-- Pie chart representation -->
    <path d="M -30 60 L -30 40 A 20 20 0 0 1 -10 60 Z" fill="#ef4444" />
    <path d="M -30 60 L -10 60 A 20 20 0 0 1 -30 80 Z" fill="#3b82f6" />
    <path d="M -30 60 L -30 80 A 20 20 0 0 1 -50 60 Z" fill="#10b981" />
    <path d="M -30 60 L -50 60 A 20 20 0 0 1 -30 40 Z" fill="#f59e0b" />
  </g>

  <line x1="240" y1="150" x2="310" y2="150" stroke="#94a3b8" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Select a Topic -->
  <g transform="translate(420, 150)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">2. 토픽 선택</text>
    <text x="0" y="15" font-size="12" fill="#15803d" text-anchor="middle">토픽 분포로부터 하나의 토픽 선택</text>
    <circle cx="0" cy="55" r="15" fill="#3b82f6" />
    <text x="0" y="60" font-size="12" fill="white" font-weight="bold" text-anchor="middle">T1</text>
  </g>

  <line x1="520" y1="150" x2="590" y2="150" stroke="#94a3b8" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Select a Word -->
  <g transform="translate(680, 150)">
    <rect x="-70" y="-50" width="140" height="100" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#854d0e" text-anchor="middle">3. 단어 선택</text>
    <text x="0" y="15" font-size="12" fill="#a16207" text-anchor="middle">선택된 토픽으로부터 단어 추출</text>
    <rect x="-40" y="40" width="80" height="30" rx="6" fill="#fde047" stroke="#ca8a04"/>
    <text x="0" y="60" font-size="14" font-weight="bold" fill="#713f12" text-anchor="middle">"Money"</text>
  </g>
  
  <rect x="150" y="270" width="500" height="100" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="8,8"/>
  <text x="400" y="310" font-size="16" font-weight="bold" fill="#475569" text-anchor="middle">이 과정을 반복하여 문서를 생성함</text>
  <text x="400" y="340" font-size="14" fill="#64748b" text-anchor="middle">토픽 모델링은 이를 '역으로' 추론하여 문서에서 토픽을 발견하는 것</text>

</svg>
