<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">세계관 대조: 지도학습 (Classification) vs 비지도학습 (Topic Clustering)</text>

  <line x1="400" y1="70" x2="400" y2="380" stroke="#475569" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Left: Supervised Classification -->
  <text x="200" y="80" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">텍스트 분류 (지도 학습)</text>
  
  <rect x="50" y="110" width="120" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="110" y="135" fill="#f8fafc" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">새로운 입력 벡터 $X$</text>
  
  <path d="M 110 155 L 110 185" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="105,180 110,190 115,180" fill="#3b82f6"/>

  <rect x="50" y="190" width="120" height="40" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="4"/>
  <text x="110" y="215" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">사전 분할망 Model</text>

  <path d="M 175 210 L 225 210" stroke="#fcd34d" stroke-width="3"/>
  <polygon points="220,205 230,210 220,215" fill="#fcd34d"/>

  <rect x="235" y="130" width="130" height="150" fill="#0f172a" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="300" y="150" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">사전 목표 클래스 (Y)</text>

  <rect x="250" y="170" width="100" height="30" fill="#064e3b" rx="4"/>
  <text x="300" y="190" fill="#6ee7b7" font-family="sans-serif" font-size="12" text-anchor="middle">정치 방 (Class 0)</text>

  <rect x="250" y="210" width="100" height="30" fill="#7f1d1d" rx="4"/>
  <text x="300" y="230" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">스팸 방 (Class 1)</text>
  
  <!-- Right: Unsupervised Topic Clustering -->
  <text x="600" y="80" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">토픽 군집화 (비지도 학습)</text>

  <rect x="450" y="110" width="300" height="100" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="600" y="135" fill="#f8fafc" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">정답(Label Y) 없는 대규모 코퍼스 (Raw X)</text>
  
  <circle cx="500" cy="170" r="10" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="530" cy="160" r="10" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="520" cy="185" r="10" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="680" cy="170" r="10" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="650" cy="180" r="10" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="600" cy="160" r="10" fill="#cbd5e1" opacity="0.6"/>

  <path d="M 600 215 L 600 245" stroke="#ef4444" stroke-width="3"/>
  <polygon points="595,240 600,250 605,240" fill="#ef4444"/>

  <rect x="450" y="250" width="300" height="100" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" rx="4"/>
  <text x="600" y="270" fill="#ddd6fe" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">기계 자율 인퍼런스 : 패턴 유사성 군집 도출</text>

  <circle cx="520" cy="310" r="30" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="2" stroke-dasharray="2,2"/>
  <circle cx="510" cy="300" r="6" fill="#10b981"/>
  <circle cx="530" cy="320" r="6" fill="#10b981"/>
  <text x="520" y="310" fill="#a7f3d0" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">K=1</text>

  <circle cx="650" cy="310" r="30" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2" stroke-dasharray="2,2"/>
  <circle cx="640" cy="305" r="6" fill="#3b82f6"/>
  <circle cx="660" cy="315" r="6" fill="#3b82f6"/>
  <text x="650" y="310" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">K=2</text>
  
  <text x="600" y="310" fill="#fcd34d" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">거리(연관) 분할</text>

</svg>
