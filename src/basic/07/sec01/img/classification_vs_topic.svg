<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">지도학습 분류 (Classification) vs 비지도학습 토픽 모델링 (Clustering)</text>

  <!-- Left Side: Classification (Supervised) -->
  <text x="200" y="80" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">텍스트 분류 (정답이 있는 지도학습)</text>
  
  <rect x="50" y="100" width="300" height="200" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="200" y="130" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">이미 사장님이 시킨 정답 폴더 박스가 있음</text>

  <!-- Boxes -->
  <rect x="80" y="150" width="100" height="50" fill="#7f1d1d" rx="3"/>
  <text x="130" y="180" fill="#fef2f2" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">정치 방</text>
  
  <rect x="220" y="150" width="100" height="50" fill="#064e3b" rx="3"/>
  <text x="270" y="180" fill="#ecfdf5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">스포츠 방</text>

  <!-- Documents flowing in -->
  <rect x="150" y="240" width="30" height="40" fill="#cbd5e1" rx="2"/>
  <text x="165" y="255" fill="#0f172a" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">?</text>
  <path d="M 165 240 L 130 205" stroke="#fcd34d" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 165 240 L 270 205" stroke="#fcd34d" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  
  <text x="200" y="260" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="start">"너 어디로 갈래? 둘중 하나 골라!"</text>


  <!-- Middle Divider -->
  <line x1="400" y1="70" x2="400" y2="330" stroke="#475569" stroke-width="2" stroke-dasharray="5,5"/>


  <!-- Right Side: Topic Modeling (Unsupervised) -->
  <text x="600" y="80" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">토픽 분석 (라벨 없는 비지도학습)</text>
  
  <rect x="450" y="100" width="300" height="200" fill="#022c22" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="600" y="130" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">정답 박스 없음. 텍스트 무리들이 알아서 친목질함</text>

  <!-- Cluster 1 -->
  <circle cx="530" cy="180" r="30" fill="#1e3a8a" opacity="0.6"/>
  <rect x="520" y="160" width="10" height="15" fill="#bfdbfe"/>
  <rect x="535" y="165" width="10" height="15" fill="#bfdbfe"/>
  <rect x="515" y="180" width="10" height="15" fill="#bfdbfe"/>
  <rect x="540" y="185" width="10" height="15" fill="#bfdbfe"/>
  <text x="530" y="230" fill="#60a5fa" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">은밀한 파벌 A?</text>

  <!-- Cluster 2 -->
  <circle cx="660" cy="220" r="40" fill="#7f1d1d" opacity="0.6"/>
  <rect x="640" y="200" width="10" height="15" fill="#fca5a5"/>
  <rect x="655" y="195" width="10" height="15" fill="#fca5a5"/>
  <rect x="670" y="210" width="10" height="15" fill="#fca5a5"/>
  <rect x="645" y="230" width="10" height="15" fill="#fca5a5"/>
  <rect x="665" y="240" width="10" height="15" fill="#fca5a5"/>
  <text x="660" y="280" fill="#f87171" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">은밀한 파벌 B?</text>

  <path d="M 600 200 C 620 170 570 150 550 160" stroke="#fcd34d" stroke-width="2" stroke-dasharray="2,2" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="160" fill="#fbbf24" font-family="sans-serif" font-size="10" text-anchor="start">비슷한 언어 패턴 감지! 뭉쳐라!</text>

</svg>
