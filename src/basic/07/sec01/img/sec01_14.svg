<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@1,400;1,700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .kor { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  
  <line x1="50" y1="200" x2="750" y2="200" stroke="#cbd5e1" stroke-dasharray="4,4" />

  <!-- LSA Section (Top) -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="100" height="60" rx="30" fill="#e2e8f0" />
    <text x="50" y="36" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">LSA</text>

    <!-- M Matrix -->
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="80" height="80" fill="#fbcfe8" />
      <text x="40" y="45" class="math" font-size="24" font-weight="bold" text-anchor="middle">M</text>
      <text x="40" y="95" font-size="12" fill="#64748b" text-anchor="middle">words × docs</text>
    </g>

    <text x="235" y="45" font-size="20" fill="#94a3b8">=</text>

    <!-- U Matrix -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="50" height="80" fill="#f5d0fe" />
      <text x="25" y="45" class="math" font-size="20" font-weight="bold" text-anchor="middle">U</text>
      <text x="25" y="95" font-size="12" fill="#64748b" text-anchor="middle">words × dims</text>
    </g>

    <text x="325" y="45" font-size="16" fill="#94a3b8">×</text>

    <!-- Sigma Matrix -->
    <g transform="translate(350, 20)">
      <rect x="0" y="0" width="40" height="40" fill="#f5d0fe" />
      <text x="20" y="27" font-family="Times New Roman" font-size="24" text-anchor="middle">Σ</text>
      <text x="20" y="55" font-size="11" fill="#64748b" text-anchor="middle">dims × dims</text>
    </g>

    <text x="405" y="45" font-size="16" fill="#94a3b8">×</text>

    <!-- V_T Matrix -->
    <g transform="translate(420, 20)">
      <rect x="0" y="0" width="80" height="40" fill="#f5d0fe" />
      <text x="40" y="27" class="math" font-size="24" font-weight="bold" text-anchor="middle">V<tspan font-size="16" dy="-10">T</tspan></text>
      <text x="40" y="55" font-size="12" fill="#64748b" text-anchor="middle">dims × docs</text>
    </g>

    <!-- Description -->
    <circle cx="140" cy="120" r="3" fill="#1e293b" />
    <text x="150" y="125" font-size="18" fill="#334155" class="kor">차원 축소 및 단어와 문서 간의 잠재적인 의미적 관계를 포착</text>
  </g>

  <!-- LDA Section (Bottom) -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="100" height="60" rx="30" fill="#e2e8f0" />
    <text x="50" y="36" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">LDA</text>

    <!-- M Matrix -->
    <g transform="translate(140, -10)">
      <rect x="0" y="0" width="80" height="80" fill="#fbcfe8" />
      <text x="40" y="45" class="math" font-size="24" font-weight="bold" text-anchor="middle">M</text>
      <text x="40" y="95" font-size="12" fill="#64748b" text-anchor="middle">words × docs</text>
      
      <text x="40" y="115" font-size="10" fill="#64748b" text-anchor="middle">normalized</text>
      <text x="40" y="130" font-size="10" fill="#64748b" text-anchor="middle">co-occurrence matrix</text>
    </g>

    <text x="235" y="35" font-size="20" fill="#94a3b8">=</text>

    <!-- Phi Matrix -->
    <g transform="translate(260, -10)">
      <rect x="0" y="0" width="50" height="80" fill="#f5d0fe" />
      <text x="25" y="45" font-family="Times New Roman" font-style="italic" font-size="24" font-weight="bold" text-anchor="middle">Φ</text>
      <text x="25" y="95" font-size="12" fill="#64748b" text-anchor="middle">words × topics</text>

      <text x="25" y="115" font-size="10" fill="#64748b" text-anchor="middle">mixture</text>
      <text x="25" y="130" font-size="10" fill="#64748b" text-anchor="middle">component</text>
    </g>

    <text x="325" y="35" font-size="16" fill="#94a3b8">×</text>

    <!-- Theta Matrix -->
    <g transform="translate(350, 0)">
      <rect x="0" y="0" width="80" height="50" fill="#f5d0fe" />
      <text x="40" y="35" font-family="Times New Roman" font-style="italic" font-size="24" font-weight="bold" text-anchor="middle">Θ</text>
      <text x="40" y="65" font-size="12" fill="#64748b" text-anchor="middle">topics × docs</text>

      <text x="40" y="85" font-size="10" fill="#64748b" text-anchor="middle">mixture</text>
      <text x="40" y="100" font-size="10" fill="#64748b" text-anchor="middle">weights</text>
    </g>

    <!-- Description -->
    <circle cx="140" cy="140" r="3" fill="#1e293b" />
    <text x="150" y="145" font-size="18" fill="#334155" class="kor">문서 집합 내에서 잠재적인 토픽을 발견</text>
  </g>
</svg>
