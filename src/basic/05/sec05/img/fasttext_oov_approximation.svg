<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">OOV(Out-Of-Vocabulary) 에러 회피 및 부분 집합 합산을 통한 희소 단어 복원 과정</text>

  <!-- Unknown Word Arrival -->
  <rect x="50" y="80" width="160" height="50" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="130" y="105" fill="#fca5a5" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">"apples"</text>
  <text x="130" y="125" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">미등록 미지 단어 등장(OOV)</text>

  <path d="M 220 105 L 290 105" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="280,100 295,105 280,110" fill="#ef4444"/>

  <!-- Word2Vec Comparison -->
  <rect x="310" y="65" width="220" height="40" fill="#1e293b" stroke="#64748b" stroke-width="1" rx="4"/>
  <text x="420" y="90" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Word2Vec : 사전에 없음, 계산 에러 포기</text>

  <!-- FastText Chopping Start -->
  <text x="250" y="150" fill="#f8fafc" font-family="sans-serif" font-size="14" text-anchor="middle">FastText 모델 투입 및 단어 분해 검사</text>
  
  <rect x="80" y="170" width="550" height="120" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="8"/>
  
  <text x="350" y="195" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">DB 내 기학습 파편 벡터의 유사도 발견 및 조회</text>
  
  <!-- Matching Vectors -->
  <rect x="100" y="210" width="50" height="30" fill="#10b981" rx="4"/>
  <text x="125" y="230" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">&lt;ap</text>
  <text x="125" y="255" fill="#6ee7b7" font-family="sans-serif" font-size="10" text-anchor="middle">from apple</text>

  <rect x="160" y="210" width="50" height="30" fill="#10b981" rx="4"/>
  <text x="185" y="230" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">app</text>
  <text x="185" y="255" fill="#6ee7b7" font-family="sans-serif" font-size="10" text-anchor="middle">from apple</text>

  <rect x="220" y="210" width="50" height="30" fill="#10b981" rx="4"/>
  <text x="245" y="230" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">ppl</text>
  <text x="245" y="255" fill="#6ee7b7" font-family="sans-serif" font-size="10" text-anchor="middle">from apple</text>

  <rect x="280" y="210" width="50" height="30" fill="#10b981" rx="4"/>
  <text x="305" y="230" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">ple</text>
  <text x="305" y="255" fill="#6ee7b7" font-family="sans-serif" font-size="10" text-anchor="middle">from ple..</text>

  <rect x="340" y="210" width="50" height="30" fill="#f59e0b" rx="4"/>
  <text x="365" y="230" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">les</text>
  <text x="365" y="255" fill="#fde68a" font-family="sans-serif" font-size="10" text-anchor="middle">from less</text>

  <rect x="400" y="210" width="50" height="30" fill="#f59e0b" rx="4"/>
  <text x="425" y="230" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">es&gt;</text>
  <text x="425" y="255" fill="#fde68a" font-family="sans-serif" font-size="10" text-anchor="middle">from yes</text>
  
  <text x="540" y="230" fill="#f8fafc" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">= Σ 합산</text>
  <text x="540" y="260" fill="#a7f3d0" font-family="monospace" font-size="12" text-anchor="middle">선형 결합 (Linear Sum)</text>

  <!-- Arrow down to result -->
  <path d="M 350 290 L 350 330" stroke="#10b981" stroke-width="4"/>
  <polygon points="340,320 350,335 360,320" fill="#10b981"/>

  <!-- Recovered Result Vector Box -->
  <rect x="250" y="340" width="200" height="60" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="350" y="365" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">결과 : 복원된 단어 위치 벡터 유추</text>
  <text x="350" y="385" fill="#93c5fd" font-family="monospace" font-size="14" text-anchor="middle">Vector(apples)</text>
  
  <rect x="470" y="350" width="240" height="40" fill="#0f172a" stroke="#64748b" stroke-width="1" rx="4"/>
  <text x="590" y="375" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">기하학적 공간에 'apple' 주변 반경으로 근사 매핑 성공</text>

</svg>
