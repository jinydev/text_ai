<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">SGNS 네거티브 샘플링 : 확률 이진 분류(Binary) 다운사이징 치환 모델</text>

  <!-- Left: Target Input -->
  <rect x="50" y="180" width="120" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="110" y="205" fill="#93c5fd" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">입력 중심 단어</text>
  <text x="110" y="225" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">(Cat)</text>
  
  <path d="M 180 210 L 250 210" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="245,205 255,210 245,215" fill="#3b82f6"/>

  <!-- Right: The Exam Paper Box -->
  <rect x="270" y="80" width="240" height="300" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="390" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">이진 크로스 엔트로피 미니 시험계</text>

  <!-- Postive Sample -->
  <rect x="290" y="130" width="200" height="40" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="350" y="155" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">실제 문맥 O (Mat)</text>
  <rect x="440" y="135" width="40" height="30" fill="#1e293b" rx="2"/>
  <text x="460" y="155" fill="#10b981" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[1]</text>

  <!-- Divider Line -->
  <line x1="280" y1="185" x2="490" y2="185" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Negative Samples (Noise) -->
  <rect x="290" y="200" width="200" height="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="350" y="220" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">노이즈 추출 1 (Apple)</text>
  <rect x="440" y="205" width="40" height="20" fill="#1e293b" rx="2"/>
  <text x="460" y="220" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">[0]</text>

  <rect x="290" y="240" width="200" height="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="350" y="260" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">노이즈 추출 2 (Car)</text>
  <rect x="440" y="245" width="40" height="20" fill="#1e293b" rx="2"/>
  <text x="460" y="260" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">[0]</text>

  <rect x="290" y="280" width="200" height="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="350" y="300" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">노이즈 추출 3 (The)</text>
  <rect x="440" y="285" width="40" height="20" fill="#1e293b" rx="2"/>
  <text x="460" y="300" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">[0]</text>

  <text x="390" y="335" fill="#fca5a5" font-family="sans-serif" font-size="12" font-style="italic" text-anchor="middle">총 K개의 거짓 노이즈 추출 유도...</text>
  <text x="390" y="360" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Negative Random Noise (오답 샘플군)</text>

  <!-- Far Right Exaplanation Box -->
  <rect x="540" y="150" width="230" height="120" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="655" y="180" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">연산 최적화 승리(1/16000 단축)</text>
  <text x="655" y="210" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">다중 클래스(10만 지선다) 수수께끼를</text>
  <text x="655" y="230" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">극단적인 참/거짓 (K+1 개 쌍) O/X 판별</text>
  <text x="655" y="250" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">이진 논리 회귀 수학망으로 완전 축소 치환</text>

</svg>
