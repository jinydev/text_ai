<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">초기 Softmax 편미분 출력 계층의 다중 클래스(Multi-class) 연산 병목 에러 현상</text>

  <!-- Input -->
  <rect x="50" y="200" width="100" height="40" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="100" y="225" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Target W_t</text>

  <path d="M 160 220 L 220 220" stroke="#10b981" stroke-width="3"/>
  <polygon points="215,215 225,220 215,225" fill="#10b981"/>

  <!-- Output Layer Container -->
  <rect x="230" y="80" width="180" height="280" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="320" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">기존 Softmax 연산망</text>

  <!-- Node List -->
  <rect x="250" y="130" width="140" height="30" fill="#334155" rx="2"/>
  <text x="320" y="150" fill="#94a3b8" font-family="monospace" font-size="12" text-anchor="middle">Apple [Loss 갱신]</text>
  
  <rect x="250" y="170" width="140" height="30" fill="#3b82f6" stroke="#93c5fd" stroke-width="2" rx="2"/>
  <text x="320" y="190" fill="#eff6ff" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Mat [정답 갱신]</text>

  <rect x="250" y="210" width="140" height="30" fill="#334155" rx="2"/>
  <text x="320" y="230" fill="#94a3b8" font-family="monospace" font-size="12" text-anchor="middle">Boy [Loss 갱신]</text>

  <rect x="250" y="250" width="140" height="30" fill="#334155" rx="2"/>
  <text x="320" y="270" fill="#94a3b8" font-family="monospace" font-size="12" text-anchor="middle">Zebra [Loss 갱신]</text>

  <text x="320" y="310" fill="#ef4444" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">... X 전 세계 10만 단어</text>
  
  <!-- Fire / Explosion Area -->
  <path d="M 440 200 Q 480 150 550 200 T 700 150" stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="6,6"/>
  <text x="560" y="180" fill="#fca5a5" font-family="sans-serif" font-size="24" text-anchor="middle">💣</text>
  <text x="560" y="140" fill="#fca5a5" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">역전파 계산량 대폭발</text>
  
  <rect x="440" y="220" width="300" height="100" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="590" y="250" fill="#fecaca" font-family="monospace" font-size="12" text-anchor="middle">Softmax 분모 = Σ exp(v' * v_c)</text>
  <text x="590" y="275" fill="#f8fafc" font-family="sans-serif" font-size="14" text-anchor="middle">1문제를 풀기 위해 오답 노드 99,999 개의</text>
  <text x="590" y="295" fill="#f8fafc" font-family="sans-serif" font-size="14" text-anchor="middle">모든 가중치 미분(∇W)을 강제로 전수조사 연산</text>
  
</svg>
