<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Skip-gram 역발상: 하나의 독고다이 추론기가 주변을 지배하다</text>

  <!-- Center Target Word -->
  <rect x="50" y="130" width="140" height="80" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="120" y="170" fill="#fca5a5" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">"cat"</text>
  <text x="120" y="195" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">가운데 중심 던져주기</text>


  <!-- Projection Splitting (NO MEAN AVERAGE) -->
  <rect x="250" y="120" width="120" height="100" fill="#422006" stroke="#f59e0b" stroke-width="3" rx="10"/>
  <text x="310" y="160" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">강벽 복사</text>
  <text x="310" y="180" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">(No Mean)</text>

  <text x="310" y="240" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">평균 합산 그딴 거 없음!</text>

  <path d="M 190 170 L 250 170" stroke="#f87171" stroke-width="3" fill="none" marker-end="url(#arrow)"/>


  <!-- Predicting Context Multiple Flanks -->
  <path d="M 380 150 L 510 100" stroke="#10b981" stroke-width="3" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 380 160 L 510 150" stroke="#10b981" stroke-width="3" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 380 180 L 510 200" stroke="#10b981" stroke-width="3" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 380 190 L 510 250" stroke="#10b981" stroke-width="3" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow)"/>

  <!-- Output Detectives -->
  <rect x="530" y="80" width="100" height="35" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="580" y="103" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"The"</text>
  
  <rect x="530" y="130" width="100" height="35" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="580" y="153" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"fat"</text>

  <rect x="530" y="180" width="100" height="35" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="580" y="203" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"sat"</text>

  <rect x="530" y="230" width="100" height="35" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="580" y="253" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"on"</text>

  <text x="680" y="165" fill="#60a5fa" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">주변 예측 값들 확산</text>


</svg>
