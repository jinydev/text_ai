<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">CBOW 추론 방식: 주변 들러리의 진술을 평균(Mean) 내다</text>

  <!-- Context Words (Detectives/Bodyguards) -->
  <rect x="50" y="80" width="100" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="100" y="105" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"The"</text>
  
  <rect x="50" y="130" width="100" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="100" y="155" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"fat"</text>

  <rect x="50" y="180" width="100" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="100" y="205" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"sat"</text>

  <rect x="50" y="230" width="100" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="100" y="255" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"on"</text>

  <text x="100" y="65" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">주변 단어 목격자들 (Window=2)</text>


  <!-- Projection Sum & Mean -->
  <path d="M 160 100 L 260 140" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 160 150 L 260 160" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 160 200 L 260 180" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 160 250 L 260 200" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="280" y="120" width="150" height="100" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="10"/>
  <text x="355" y="160" fill="#6ee7b7" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">평균 합산</text>
  <text x="355" y="180" fill="#34d399" font-family="sans-serif" font-size="12" text-anchor="middle">(Mean & Sum Projection)</text>

  <text x="355" y="240" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">모든 목격자의 단서를 버무림</text>

  <!-- Output Prediction -->
  <path d="M 440 170 L 520 170" stroke="#f59e0b" stroke-width="4" stroke-dasharray="10,5" fill="none" marker-end="url(#arrow)"/>

  <rect x="540" y="130" width="140" height="80" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="610" y="170" fill="#fca5a5" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">"cat"</text>
  <text x="610" y="195" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">가운데 타겟 단어</text>

  <text x="610" y="110" fill="#f87171" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">정답 도출 (Softmax 확률)</text>
</svg>
