<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">투사층 곱셈의 천재적인 속임수: 룩업 테이블 (Lookup Table)</text>

  <!-- Dense Matrix W (Lookup Table) -->
  <rect x="400" y="80" width="300" height="150" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="550" y="105" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">가중치(W) 실수 행렬 (100,000 x 256)</text>
  
  <text x="440" y="130" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">R1: [0.3, ... -1.1]</text>
  <text x="440" y="150" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">R2: [0.1, ... 2.8]</text>
  
  <!-- Highlighted Row -->
  <rect x="410" y="160" width="280" height="25" fill="#064e3b" stroke="#34d399" stroke-width="2" rx="3"/>
  <text x="440" y="178" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">R3: [0.9, ... 0.5]</text>
  
  <text x="440" y="205" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">R4: [-1.4, ... 0.1]</text>

  <!-- One-hot Input -->
  <rect x="50" y="90" width="100" height="130" fill="#0f0f1a" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="100" y="115" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">원-핫 변환식</text>
  <text x="100" y="135" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle">0</text>
  <text x="100" y="155" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle">0</text>
  <rect x="70" y="162" width="60" height="20" fill="#3b82f6" rx="3"/>
  <text x="100" y="177" fill="#eff6ff" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1 (I=3)</text>
  <text x="100" y="200" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle">0</text>

  <!-- Multiplication X sign crossed out -->
  <text x="210" y="165" fill="#ef4444" font-family="sans-serif" font-size="30" font-weight="bold" text-anchor="middle">✖</text>
  <path d="M 180 140 L 240 180" stroke="#ef4444" stroke-width="4"/>
  <path d="M 240 140 L 180 180" stroke="#ef4444" stroke-width="4"/>

  <!-- Lookup Arrow -->
  <path d="M 140 172 C 260 172 260 172 380 172" stroke="#fcd34d" stroke-width="4" stroke-dasharray="10,5" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="150" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">미친 GPU 곱하기 대신</text>
  <rect x="200" y="180" width="140" height="25" fill="#422006" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="270" y="197" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">단순 색인(Index) 복사 붙여넣기!</text>

  <!-- Subtext -->
  <text x="400" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">1이 켜진 10만 칸 행렬을 전부 다 진짜로 곱셈 계산하는 멍청한 짓은 안 합니다. 그저 테이블에서 3번째 행(Row) 숫자를 복사(Copy) 해올 뿐입니다!</text>

</svg>
