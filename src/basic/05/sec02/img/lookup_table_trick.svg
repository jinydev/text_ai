<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="35" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">룩업 테이블(Lookup Table) 매핑 최적화 알고리즘: 연산량 혁신</text>

  <!-- The Equation Model -->
  <text x="400" y="80" fill="#94a3b8" font-family="sans-serif" font-size="16" font-style="italic" text-anchor="middle">전통 수학적 관점: 입력 원-핫 벡터 × 거대 가중치 행렬 $W$ 곱셈 연산 시뮬레이션</text>
  
  <!-- One-hot Vector Display -->
  <rect x="60" y="140" width="40" height="120" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="80" y="160" fill="#64748b" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">0</text>
  <text x="80" y="180" fill="#64748b" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">0</text>
  <rect x="60" y="190" width="40" height="20" fill="#7f1d1d"/>
  <text x="80" y="205" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">1</text>
  <text x="80" y="225" fill="#64748b" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">0</text>
  <text x="80" y="245" fill="#64748b" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">0</text>
  <text x="80" y="275" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">X (Index 2)</text>

  <text x="135" y="205" fill="#f8fafc" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">×</text>

  <!-- Weight Matrix -->
  <rect x="170" y="140" width="160" height="120" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="170" y="190" width="160" height="20" fill="#1e3a8a"/>
  
  <text x="210" y="160" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">0.44</text>
  <text x="270" y="160" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">... 1.93</text>

  <!-- Row 3 highlights -->
  <text x="210" y="205" fill="#93c5fd" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">-1.2</text>
  <text x="270" y="205" fill="#93c5fd" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">... 3.14</text>
  
  <text x="210" y="245" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">5.02</text>
  <text x="270" y="245" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle">... 0.11</text>
  <text x="250" y="275" fill="#93c5fd" font-family="sans-serif" font-size="14" text-anchor="middle">가중치 매트릭스 W</text>

  <text x="365" y="205" fill="#f8fafc" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">=</text>

  <!-- Result Output -->
  <rect x="400" y="190" width="160" height="20" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="440" y="205" fill="#6ee7b7" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">-1.2</text>
  <text x="500" y="205" fill="#6ee7b7" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">... 3.14</text>

  <!-- Direct Mapper Line -->
  <path d="M 330 200 Q 360 170 400 200" stroke="#fcd34d" stroke-width="3" stroke-dasharray="4,4" fill="none"/>
  <polygon points="395,200 405,200 400,205" fill="#fcd34d"/>
  
  <!-- Comment Board Down -->
  <rect x="450" y="235" width="280" height="80" fill="#334155" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="590" y="260" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">알고리즘 연산 최적화의 증명</text>
  <text x="590" y="280" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">0에 곱해지는 항은 연산 낭비 없이 스킵.</text>
  <text x="590" y="295" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">1이 점등된 W 행렬의 Row(색인 2번 줄)만</text>
  <text x="590" y="310" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">단독 복사(Copy) 해오는 메모리 MAPPING 채택</text>

</svg>
