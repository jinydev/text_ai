<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">피드포워드 신경망 언어 모델 (NNLM) 의 4단계 계층 구조도</text>

  <!-- Level 1: Input -->
  <rect x="50" y="400" width="700" height="70" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="400" y="420" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1. 입력층 (Input Layer): 희소 공간 원-핫 인코딩 수렴대</text>
  <text x="400" y="445" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">X_(t-2), X_(t-1) ... [0,0,1,0...0] 단어 벡터 투입</text>

  <!-- Up Arrows -->
  <path d="M 250 395 L 250 365" stroke="#475569" stroke-width="3"/>
  <polygon points="245,370 250,360 255,370" fill="#475569"/>
  <path d="M 550 395 L 550 365" stroke="#475569" stroke-width="3"/>
  <polygon points="545,370 550,360 555,370" fill="#475569"/>

  <!-- Level 2: Projection -->
  <rect x="50" y="290" width="700" height="70" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="400" y="310" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2. 투사층 (Projection Layer): 비선형 함수가 배제된 완전 선형 껍데기 공간</text>
  <text x="400" y="335" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">룩업 테이블(W) 연동 밀집도 압축 변환 (Embedding Matrix Mapping)</text>
  <text x="700" y="335" fill="#f59e0b" font-family="monospace" font-size="12" font-style="italic" text-anchor="middle">가중 결합 집중</text>

  <!-- Up Arrows -->
  <path d="M 400 285 L 400 245" stroke="#475569" stroke-width="3"/>
  <polygon points="395,250 400,240 405,250" fill="#475569"/>

  <!-- Level 3: Hidden -->
  <rect x="150" y="170" width="500" height="70" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="400" y="190" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">3. 은닉층 (Hidden Layer): 심층 신경망 가중 추론망</text>
  <text x="400" y="215" fill="#f8fafc" font-family="sans-serif" font-size="14" text-anchor="middle">비선형 활성화 함수 (Tanh) 적용, 은닉 가중치 최적화 (막대한 연산 병목 구역)</text>
  <circle cx="200" cy="205" r="5" fill="#10b981"/> <circle cx="220" cy="205" r="5" fill="#10b981"/>
  <circle cx="580" cy="205" r="5" fill="#10b981"/> <circle cx="600" cy="205" r="5" fill="#10b981"/>

  <!-- Up Arrows -->
  <path d="M 400 165 L 400 125" stroke="#475569" stroke-width="3"/>
  <polygon points="395,130 400,120 405,130" fill="#475569"/>

  <!-- Level 4: Output -->
  <rect x="250" y="50" width="300" height="70" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="400" y="70" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">4. 출력층 (Output Layer)</text>
  <text x="400" y="95" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">Softmax 적용, 다음 P(W_t) 정답 산출</text>

  <!-- Title Indicator -->
  <rect x="70" y="180" width="50" height="50" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="95" y="210" fill="#ef4444" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">💣</text>
  <text x="95" y="245" fill="#ef4444" font-family="sans-serif" font-size="10" text-anchor="middle">병목 한계선</text>

</svg>
