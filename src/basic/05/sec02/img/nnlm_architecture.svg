<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">피드포워드 신경망 언어 모델 (NNLM) 의 뇌 구조 아키텍처</text>

  <!-- Input Layer -->
  <rect x="50" y="80" width="120" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="110" y="110" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">입력층(Input)</text>
  
  <rect x="65" y="130" width="90" height="30" fill="#1e3a8a" rx="3"/>
  <text x="110" y="150" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">원-핫 "소년은" (t-2)</text>
  
  <rect x="65" y="180" width="90" height="30" fill="#1e3a8a" rx="3"/>
  <text x="110" y="200" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">원-핫 "참" (t-1)</text>

  <text x="110" y="250" fill="#475569" font-family="sans-serif" font-size="12" text-anchor="middle">과거 N개 타겟팅</text>

  <!-- Projection Layer -->
  <path d="M 180 145 C 220 145 220 125 260 125" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 180 195 C 220 195 220 175 260 175" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="270" y="80" width="120" height="200" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="330" y="110" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">투사층(Proj)</text>

  <rect x="285" y="130" width="90" height="60" fill="#047857" rx="3"/>
  <text x="330" y="155" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">차원 역압축</text>
  <text x="330" y="175" fill="#a7f3d0" font-family="sans-serif" font-size="10" text-anchor="middle">(선형 묶음 조립)</text>

  <text x="330" y="250" fill="#475569" font-family="sans-serif" font-size="12" text-anchor="middle">활성 함수 없음!</text>

  <!-- Hidden Layer -->
  <path d="M 400 160 L 450 160" stroke="#fcd34d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="460" y="80" width="120" height="200" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="520" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">은닉층(Hidden)</text>

  <rect x="475" y="130" width="90" height="80" fill="#7f1d1d" rx="3"/>
  <circle cx="500" cy="150" r="6" fill="#fca5a5"/>
  <circle cx="540" cy="150" r="6" fill="#fca5a5"/>
  <circle cx="520" cy="170" r="6" fill="#fca5a5"/>
  <circle cx="500" cy="190" r="6" fill="#fca5a5"/>
  <circle cx="540" cy="190" r="6" fill="#fca5a5"/>

  <text x="520" y="250" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">가중치(W) 병목</text>


  <!-- Output Layer -->
  <path d="M 590 160 L 640 160" stroke="#fcd34d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="650" y="80" width="120" height="200" fill="#422006" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="710" y="110" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">출력층(Output)</text>
  <rect x="665" y="140" width="90" height="50" fill="#fbbf24" rx="5"/>
  <text x="710" y="165" fill="#78350f" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Softmax</text>
  <text x="710" y="240" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">? 예측 응답</text>

  <!-- Subtext -->
  <text x="400" y="320" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">통계 분수를 찢어버리고, 수학적 가중치(W)가 겹겹이 쌓인 은닉(Hidden) 뇌세포 추론 구조를 최초로 도입했습니다.</text>
</svg>
