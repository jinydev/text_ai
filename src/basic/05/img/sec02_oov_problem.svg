<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 4; ry: 4; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .word { font-family: 'Roboto', sans-serif; font-size: 20px; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">Word2Vec의 치명적 한계: OOV (Out-Of-Vocabulary)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">학습 단어장(Vocabulary)에 존재하지 않는 낯선 단어나 변형된 단어는 벡터값을 뽑아낼 수 없습니다.</text>

  <g transform="translate(150, 90)">
    
    <!-- Word 1: tensor -->
    <text x="50" y="25" class="word" fill="#4ade80">tensor</text>
    <rect x="120" y="10" width="100" height="30" class="box" />
    <text x="170" y="25" font-size="14" fill="#64748b" font-weight="bold">Word2Vec</text>
    <path d="M 230 25 L 260 25" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Vector result -->
    <rect x="270" y="10" width="60" height="30" fill="white" stroke="#4ade80" stroke-width="2" />
    
    <!-- Word 2: flow -->
    <text x="50" y="85" class="word" fill="#60a5fa">flow</text>
    <rect x="120" y="70" width="100" height="30" class="box" />
    <text x="170" y="85" font-size="14" fill="#64748b" font-weight="bold">Word2Vec</text>
    <path d="M 230 85 L 260 85" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Vector result -->
    <rect x="270" y="70" width="60" height="30" fill="white" stroke="#60a5fa" stroke-width="2" />

    <!-- Word 3: tensorflow (Fail) -->
    <text x="50" y="145" class="word" fill="#16a34a">tensorflow</text>
    <rect x="120" y="130" width="100" height="30" class="box" />
    <text x="170" y="145" font-size="14" fill="#64748b" font-weight="bold">Word2Vec</text>
    <path d="M 230 145 L 260 145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Vector result -->
    <text x="300" y="145" font-size="40" font-weight="bold" fill="#ef4444" font-family="Roboto">✘</text>
    <text x="360" y="145" font-size="14" font-weight="bold" fill="#ef4444">Error (학습한 적 없음!)</text>

  </g>

</svg>
