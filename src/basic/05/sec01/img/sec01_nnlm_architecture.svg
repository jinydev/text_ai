<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .node { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .layer-title { font-size: 16px; font-weight: bold; fill: #0f172a; }
      .edge { stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" font-size="20" font-weight="bold" fill="#0f172a">뉴럴네트워크 언어모델 (NNLM) 아키텍처</text>
  <text x="400" y="55" font-size="14" fill="#64748b">이전 단어들의 One-hot 벡터를 '투사층(Projection Layer)'을 통해 압축하고, 인공신경망으로 다음 단어를 예측</text>

  <!-- Input Layer -->
  <g transform="translate(100, 120)">
    <rect x="-40" y="-30" width="120" height="260" class="box" fill="#fdf2f8" stroke="#fbcfe8" />
    <text x="20" y="-10" class="layer-title" fill="#be185d">Input Layer</text>
    <text x="20" y="10" font-size="12" fill="#be185d">(One-hot Vectors)</text>

    <!-- Word 1 -->
    <rect x="0" y="40" width="40" height="40" rx="4" fill="#fbcfe8" />
    <text x="20" y="60" font-weight="bold" fill="#9f1239">w_t-2</text>

    <!-- Word 2 -->
    <rect x="0" y="140" width="40" height="40" rx="4" fill="#fbcfe8" />
    <text x="20" y="160" font-weight="bold" fill="#9f1239">w_t-1</text>
  </g>

  <!-- Projection Layer -->
  <g transform="translate(300, 150)">
    <rect x="-30" y="-60" width="140" height="200" class="box" fill="#eff6ff" stroke="#bfdbfe" />
    <text x="40" y="-40" class="layer-title" fill="#1d4ed8">Projection Layer</text>
    <text x="40" y="-20" font-size="12" fill="#1d4ed8">(Lookup Table)</text>

    <rect x="0" y="10" width="80" height="80" rx="4" fill="#bfdbfe" />
    <text x="40" y="50" font-size="14" font-weight="bold" fill="#1e3a8a">임베딩 룩업 테이블 묶음 (Matrix W)</text>

    <text x="40" y="115" font-size="12" fill="#1e40af">Bias 항, 활성함수 없음</text>
  </g>

  <!-- Hidden Layer -->
  <g transform="translate(520, 140)">
    <rect x="-30" y="-50" width="100" height="150" class="box" fill="#f0fdf4" stroke="#bbf7d0" />
    <text x="20" y="-30" class="layer-title" fill="#15803d">Hidden</text>
    <text x="20" y="-10" class="layer-title" fill="#15803d">Layer</text>

    <circle cx="20" cy="30" r="15" class="node" />
    <circle cx="20" cy="70" r="15" class="node" />
    <circle cx="20" cy="110" r="15" class="node" />
  </g>

  <!-- Output Layer -->
  <g transform="translate(700, 160)">
    <rect x="-30" y="-70" width="80" height="100" class="box" fill="#fffbeb" stroke="#fde68a" />
    <text x="10" y="-50" class="layer-title" fill="#b45309">Output</text>
    
    <rect x="0" y="-20" width="20" height="40" rx="4" fill="#fde68a" />
    <text x="10" y="-35" font-size="12" fill="#b45309">Softmax</text>
    <text x="10" y="35" font-weight="bold" fill="#d97706">w_t</text>
  </g>

  <!-- Connectors -->
  <!-- Input to Projection -->
  <path d="M 160 180 L 270 200" class="edge" marker-end="url(#arrow)" />
  <path d="M 160 280 L 270 200" class="edge" marker-end="url(#arrow)" />

  <!-- Projection to Hidden -->
  <path d="M 400 200 L 470 200" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Hidden to Output -->
  <path d="M 570 170 L 670 160" class="edge" marker-end="url(#arrow)" />
  <path d="M 570 210 L 670 160" class="edge" marker-end="url(#arrow)" />
  <path d="M 570 250 L 670 160" class="edge" marker-end="url(#arrow)" />

  <!-- Bottom Notes -->
  <rect x="100" y="400" width="600" height="30" fill="#fdf2f8" stroke="#fbcfe8" rx="8" />
  <text x="400" y="415" font-size="14" font-weight="bold" fill="#be185d">NNLM의 임베딩 룩업 테이블(투사층 계층) 개념이 최신 대형언어모델(LLM)에도 그대로 적용됨</text>

</svg>
