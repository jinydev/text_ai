<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .layer-title { font-size: 18px; font-weight: bold; fill: white; }
      .item { font-size: 14px; font-weight: bold; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">텍스트의 3가지 추상화 표현 단계</text>
  <text x="400" y="55" font-size="14" fill="#64748b">단순한 글자 인식부터 사람과 같은 의미망 이해까지 계층적으로 구성됩니다.</text>

  <!-- 1. Lexical -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="200" height="200" class="box" fill="#f8fafc" stroke="#3b82f6" />
    <rect x="0" y="0" width="200" height="40" fill="#3b82f6" rx="8" />
    <path d="M 0 30 L 200 30 L 200 40 L 0 40 Z" fill="#3b82f6" />
    <text x="100" y="20" class="layer-title">1. 어휘 표현 (Lexical)</text>
    
    <text x="100" y="70" class="item" fill="#1e40af">가장 기초적인 형태</text>
    <path d="M 40 90 L 160 90" stroke="#cbd5e1" stroke-width="2" />
    
    <text x="100" y="110" font-size="13" fill="#334155">• 문자(Character)</text>
    <text x="100" y="130" font-size="13" fill="#334155">• 단어(Word) 토큰</text>
    <text x="100" y="150" font-size="13" fill="#334155">• 형태소 / 불용어 추출</text>
    <text x="100" y="170" font-size="13" fill="#334155">• 품사 태깅 (POS)</text>
  </g>

  <text x="290" y="190" font-size="20">▶</text>

  <!-- 2. Syntactic -->
  <g transform="translate(320, 90)">
    <rect x="0" y="0" width="200" height="200" class="box" fill="#f0fdf4" stroke="#10b981" />
    <rect x="0" y="0" width="200" height="40" fill="#10b981" rx="8" />
    <path d="M 0 30 L 200 30 L 200 40 L 0 40 Z" fill="#10b981" />
    <text x="100" y="20" class="layer-title">2. 구문 표현 (Syntactic)</text>
    
    <text x="100" y="70" class="item" fill="#047857">구조와 문맥 파악</text>
    <path d="M 40 90 L 160 90" stroke="#cbd5e1" stroke-width="2" />
    
    <text x="100" y="110" font-size="13" fill="#334155">• 단어 기반 N-gram</text>
    <text x="100" y="130" font-size="13" fill="#334155">• Chunking (단위화)</text>
    <text x="100" y="150" font-size="13" fill="#334155">• 구문 분석 트리</text>
  </g>

  <text x="550" y="190" font-size="20">▶</text>

  <!-- 3. Semantic -->
  <g transform="translate(580, 90)">
    <rect x="0" y="0" width="180" height="200" class="box" fill="#fdf4ff" stroke="#a855f7" />
    <rect x="0" y="0" width="180" height="40" fill="#a855f7" rx="8" />
    <path d="M 0 30 L 180 30 L 180 40 L 0 40 Z" fill="#a855f7" />
    <text x="90" y="20" class="layer-title">3. 의미 (Semantic)</text>
    
    <text x="90" y="70" class="item" fill="#6b21a8">사물과 개념의 관계</text>
    <path d="M 20 90 L 160 90" stroke="#cbd5e1" stroke-width="2" />
    
    <text x="90" y="110" font-size="13" fill="#334155">• 온톨로지 (Ontology)</text>
    <text x="90" y="130" font-size="13" fill="#334155">• Frames</text>
    <text x="90" y="150" font-size="13" fill="#334155">• 대중 집단 지성 태깅</text>
  </g>

</svg>
