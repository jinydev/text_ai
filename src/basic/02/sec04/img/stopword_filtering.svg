<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">5단계. 불용어 제거(Stopwords Removal): 노이즈 타겟 행렬 배제 필터망</text>

  <!-- Array with Stopwords -->
  <rect x="50" y="80" width="700" height="80" fill="#1e293b" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <text x="400" y="110" fill="#f8fafc" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">토큰 컴파일 리스트 Array (불용어 노이즈 스칼라 스태킹 상태)</text>
  
  <!-- Tokens -->
  <rect x="70" y="125" width="80" height="25" fill="#ef4444" rx="2"/>
  <text x="110" y="142" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사과</text>

  <rect x="160" y="125" width="40" height="25" fill="#64748b" rx="2"/>
  <text x="180" y="142" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">는</text>

  <rect x="210" y="125" width="80" height="25" fill="#ef4444" rx="2"/>
  <text x="250" y="142" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">신경망</text>

  <rect x="300" y="125" width="50" height="25" fill="#64748b" rx="2"/>
  <text x="325" y="142" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">에서</text>

  <rect x="360" y="125" width="80" height="25" fill="#ef4444" rx="2"/>
  <text x="400" y="142" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">수학</text>

  <rect x="450" y="125" width="40" height="25" fill="#64748b" rx="2"/>
  <text x="470" y="142" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">의</text>

  <rect x="500" y="125" width="100" height="25" fill="#ef4444" rx="2"/>
  <text x="550" y="142" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">컴파일러</text>

  <rect x="610" y="125" width="40" height="25" fill="#64748b" rx="2"/>
  <text x="630" y="142" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">를</text>

  <rect x="660" y="125" width="60" height="25" fill="#ef4444" rx="2"/>
  <text x="690" y="142" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">만듬</text>


  <!-- Stopword Filter Layer -->
  <path d="M 400 170 L 400 200" stroke="#fcd34d" stroke-width="3"/>
  <polygon points="395,195 400,205 405,195" fill="#fcd34d"/>

  <rect x="150" y="210" width="500" height="60" fill="#451a03" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="400" y="235" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">NLTK Blacklist Stopwords Filter [는, 에서, 의, 를, 가, 은...]</text>
  <text x="400" y="255" fill="#f59e0b" font-family="sans-serif" font-size="12" text-anchor="middle">"문맥 의미 지분율은 0% 이면서 빈도수만 높아 자원을 터뜨리는 관사/조사 Drop 동작"</text>

  <!-- Output Array -->
  <path d="M 400 280 L 400 310" stroke="#10b981" stroke-width="3"/>
  <polygon points="395,305 400,315 405,305" fill="#10b981"/>

  <rect x="50" y="320" width="700" height="60" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  
  <rect x="180" y="337" width="80" height="25" fill="#1e3a8a" rx="2"/>
  <text x="220" y="354" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사과</text>

  <rect x="280" y="337" width="80" height="25" fill="#1e3a8a" rx="2"/>
  <text x="320" y="354" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">신경망</text>

  <rect x="380" y="337" width="80" height="25" fill="#1e3a8a" rx="2"/>
  <text x="420" y="354" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">수학</text>

  <rect x="480" y="337" width="100" height="25" fill="#1e3a8a" rx="2"/>
  <text x="530" y="354" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">컴파일러</text>

  <rect x="600" y="337" width="60" height="25" fill="#1e3a8a" rx="2"/>
  <text x="630" y="354" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">만듬</text>

  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="395" width="700" height="40" fill="#334155" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="400" y="420" fill="#a7f3d0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">불용어 필터링: 문맥 연산 스코어에 무가치한 파라미터를 블랙리스트로 걸러내어 RAM 연산 코스트 극한으로 최소화 달성</text>

</svg>
