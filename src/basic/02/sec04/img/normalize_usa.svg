<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">3단계. 정규화(Normalization): 동치 표기법 통합을 통한 희소행렬(Sparsity Matrix) 극복망</text>

  <!-- Non-Normalized Input Sparsity -->
  <rect x="50" y="80" width="700" height="150" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="105" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">정규화 이전: 형태가 다르면 완전히 분리된 다른 독립 차원으로 배열 자원을 분산 식별함 (차원 폭발)</text>

  <!-- Voca Memory Layout -->
  <rect x="80" y="130" width="640" height="70" fill="#0f172a" stroke="#64748b" rx="4"/>
  
  <rect x="100" y="145" width="130" height="40" fill="#7f1d1d" rx="4"/>
  <text x="165" y="170" fill="#fecaca" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Vector[USA]</text>

  <rect x="250" y="145" width="130" height="40" fill="#7f1d1d" rx="4"/>
  <text x="315" y="170" fill="#fecaca" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Vector[U.S.A.]</text>

  <rect x="400" y="145" width="130" height="40" fill="#7f1d1d" rx="4"/>
  <text x="465" y="170" fill="#fecaca" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Vector[US]</text>

  <rect x="550" y="145" width="160" height="40" fill="#7f1d1d" rx="4"/>
  <text x="630" y="170" fill="#fecaca" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Vector[United States]</text>

  <!-- Normalization Function -->
  <path d="M 400 240 L 400 270" stroke="#fcd34d" stroke-width="3"/>
  <polygon points="395,265 400,275 405,265" fill="#fcd34d"/>
  <rect x="300" y="245" width="200" height="20" fill="#0f172a"/>
  <text x="400" y="260" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Normalization Mapping 통일 병합</text>


  <!-- Normalized Output Density -->
  <rect x="50" y="280" width="700" height="100" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="400" y="305" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">정규화 이후: 다형성(Polymorphism) 스펠링을 단일 기저 차원 코드로 강제 압착 수렴 (Dense 구조)</text>
  
  <rect x="320" y="325" width="160" height="40" fill="#1e3a8a" stroke="#3b82f6" rx="4"/>
  <text x="400" y="350" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">Target[usa]</text>
  
  <!-- Map arrows -->
  <path d="M 165 210 Q 165 220 310 330" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="2,2"/>
  <path d="M 315 210 Q 315 220 350 325" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="2,2"/>
  <path d="M 465 210 Q 465 220 450 325" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="2,2"/>
  <path d="M 630 210 Q 630 220 490 330" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="2,2"/>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="390" width="700" height="40" fill="#334155" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="400" y="415" fill="#bfdbfe" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">정규화의 파라미터 최적화: 대/소문자 통일, 이음동의어들을 단일 해시 주소로 맵핑하여 RAM 낭비를 막고 빈도 통계 밀도를 집중시킴</text>

</svg>
