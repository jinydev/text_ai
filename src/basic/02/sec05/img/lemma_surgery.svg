<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">표제어 추출 (Lemmatization): 품위 있는 어원 복원 수술</text>

  <!-- Input Words -->
  <rect x="100" y="100" width="80" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="140" y="125" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">am</text>

  <rect x="100" y="160" width="80" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="140" y="185" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">are</text>

  <rect x="100" y="220" width="80" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="140" y="245" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">is</text>

  <rect x="500" y="100" width="80" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="540" y="125" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">has</text>

  <rect x="500" y="160" width="80" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="540" y="185" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">had</text>

  <!-- Surgery Arrow -->
  <path d="M 210 120 C 230 120 230 180 250 180" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <path d="M 210 180 L 250 180" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 210 240 C 230 240 230 180 250 180" stroke="#3b82f6" stroke-width="3" fill="none"/>

  <path d="M 610 120 C 630 120 630 150 650 150" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <path d="M 610 180 C 630 180 630 150 650 150" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <polygon points="640,145 650,150 640,155" fill="#3b82f6"/>

  <!-- Output Lemma -->
  <rect x="270" y="150" width="100" height="60" fill="#1e3a8a" stroke="#60a5fa" stroke-width="3" rx="10"/>
  <text x="320" y="185" fill="#bfdbfe" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">be</text>

  <rect x="670" y="120" width="100" height="60" fill="#1e3a8a" stroke="#60a5fa" stroke-width="3" rx="10"/>
  <text x="720" y="155" fill="#bfdbfe" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">have</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">스펠링 껍데기는 제각기 다르지만, 인공지능이 무거운 언어사전 DB를 뒤져 하나의 공통된 뿌리(표제어 뿌리)로 호적 통일합니다.</text>
</svg>
