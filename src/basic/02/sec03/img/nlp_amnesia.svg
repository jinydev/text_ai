<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">고전 NLP의 치매 증상: 1단어(Uni-gram)로 잘랐을 때의 대참사</text>

  <!-- Flow -->
  <text x="400" y="90" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"이 영화는 정말 재미없다"</text>

  <path d="M 400 110 L 400 130" stroke="#f43f5e" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <rect x="360" y="115" width="80" height="10" fill="#ef4444"/> <!-- Chop mark -->

  <!-- Bins -->
  <rect x="150" y="150" width="100" height="60" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
  <text x="200" y="185" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">이</text>

  <rect x="280" y="150" width="100" height="60" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
  <text x="330" y="185" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">영화는</text>

  <rect x="410" y="150" width="100" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="3" rx="5"/>
  <text x="460" y="185" fill="#60a5fa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">정말</text>

  <rect x="540" y="150" width="100" height="60" fill="#1e293b" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="590" y="185" fill="#f87171" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">재미없다</text>

  <!-- Warning text -->
  <path d="M 500 130 Q 500 100 550 130" stroke="#f43f5e" stroke-width="2" fill="none"/>
  <text x="500" y="85" fill="#fecdd3" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">연결고리 붕괴!</text>
  
  <text x="400" y="250" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">단어를 수학적 확률 바구니에 독립적으로 던져넣으면서 "정말" 과 "재미없다" 가 앞뒤로 붙어있었다는 시계열 기억이 소멸합니다.</text>
  <text x="400" y="270" fill="#f87171" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"이건 무슨 리뷰지? 재밌다는 뜻인가?"</text>

</svg>
