<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">알파벳 비밀 암호: B-I-O 태깅으로 의미 덩어리 묶기</text>

  <rect x="50" y="80" width="700" height="60" fill="#1e293b" stroke="#475569" stroke-width="2" rx="5"/>
  <text x="120" y="120" fill="#f8fafc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">스티브</text>
  <text x="240" y="120" fill="#f8fafc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">잡스는</text>
  <text x="380" y="120" fill="#f8fafc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">어제</text>
  <text x="500" y="120" fill="#f8fafc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">애플을</text>
  <text x="640" y="120" fill="#f8fafc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">창립했다</text>

  <!-- B-I-O Tags -->
  <rect x="80" y="150" width="80" height="30" fill="#ef4444" rx="3"/>
  <text x="120" y="170" fill="#fef2f2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">B-PER</text>
  
  <rect x="200" y="150" width="80" height="30" fill="#f87171" rx="3"/>
  <text x="240" y="170" fill="#fef2f2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">I-PER</text>

  <rect x="340" y="150" width="80" height="30" fill="#64748b" rx="3"/>
  <text x="380" y="170" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">O</text>

  <rect x="460" y="150" width="80" height="30" fill="#3b82f6" rx="3"/>
  <text x="500" y="170" fill="#eff6ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">B-ORG</text>
  
  <rect x="600" y="150" width="80" height="30" fill="#64748b" rx="3"/>
  <text x="640" y="170" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">O</text>

  <!-- Bracket for Chunk -->
  <path d="M 80 190 L 80 210 L 280 210 L 280 190" stroke="#fca5a5" stroke-width="3" fill="none"/>
  <text x="180" y="235" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">사람(Person) 청크 덩어리</text>

  <path d="M 460 190 L 460 210 L 540 210 L 540 190" stroke="#93c5fd" stroke-width="3" fill="none"/>
  <text x="500" y="235" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">조직(Org)</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Begin(시작) 과 Inside(종속) 태그를 이용해, 어디부터 어디까지가 하나의 개체(Entity) 단어 묶음인지 컴퓨터에게 지시합니다.</text>
</svg>
