<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">N-gram (엔그램): 단어 매듭 쇠사슬 묶기</text>

  <!-- 1-gram -->
  <rect x="50" y="80" width="100" height="180" fill="#1e293b" stroke="#475569" stroke-width="2" rx="5"/>
  <text x="100" y="110" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Uni-gram (1)</text>
  <rect x="60" y="130" width="80" height="25" fill="#334155" rx="3"/><text x="100" y="147" fill="#cbd5e1" font-size="12" text-anchor="middle">[이]</text>
  <rect x="60" y="160" width="80" height="25" fill="#334155" rx="3"/><text x="100" y="177" fill="#cbd5e1" font-size="12" text-anchor="middle">[영화는]</text>
  <rect x="60" y="190" width="80" height="25" fill="#334155" rx="3"/><text x="100" y="207" fill="#cbd5e1" font-size="12" text-anchor="middle">[정말]</text>
  <rect x="60" y="220" width="80" height="25" fill="#334155" rx="3"/><text x="100" y="237" fill="#cbd5e1" font-size="12" text-anchor="middle">[맛없다]</text>

  <!-- 2-gram -->
  <rect x="250" y="80" width="200" height="180" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="350" y="110" fill="#60a5fa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Bi-gram (2)</text>
  <rect x="270" y="130" width="160" height="25" fill="#1e3a8a" rx="3"/><text x="350" y="147" fill="#bfdbfe" font-size="12" text-anchor="middle">[이 영화는]</text>
  <rect x="270" y="160" width="160" height="25" fill="#1e3a8a" rx="3"/><text x="350" y="177" fill="#bfdbfe" font-size="12" text-anchor="middle">[영화는 정말]</text>
  <rect x="270" y="190" width="160" height="35" fill="#1e3a8a" rx="3" stroke="#fcd34d" stroke-width="2"/><text x="350" y="213" fill="#fef3c7" font-weight="bold" font-size="14" text-anchor="middle">[정말 맛없다]</text>

  <!-- 3-gram -->
  <rect x="500" y="80" width="250" height="180" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="625" y="110" fill="#34d399" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Tri-gram (3)</text>
  <rect x="520" y="130" width="210" height="25" fill="#064e3b" rx="3"/><text x="625" y="147" fill="#a7f3d0" font-size="12" text-anchor="middle">[이 영화는 정말]</text>
  <rect x="520" y="160" width="210" height="40" fill="#064e3b" rx="3" stroke="#fcd34d" stroke-width="2"/><text x="625" y="185" fill="#fef3c7" font-weight="bold" font-size="14" text-anchor="middle">[영화는 정말 맛없다]</text>

  <path d="M 160 170 C 200 170 200 170 240 170" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 170 C 480 170 480 170 490 170" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>

</svg>
