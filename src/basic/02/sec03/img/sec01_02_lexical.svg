<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="600" height="300" fill="#f8f9fa"/>
  
  <g transform="translate(100, 50)">
    <!-- Root -->
    <rect x="100" y="0" width="200" height="50" rx="10" fill="#e3fafc" stroke="#1098ad" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#0b7285" text-anchor="middle">초석: 어휘 표현 (Lexical)</text>
    
    <path d="M 200 50 L 200 80" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 50 80 L 350 80" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 50 80 L 50 110" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 150 80 L 150 110" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 250 80 L 250 110" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 350 80 L 350 110" stroke="#adb5bd" stroke-width="2"/>

    <!-- Leaves -->
    <rect x="0" y="110" width="100" height="40" rx="8" fill="#fff" stroke="#adb5bd"/>
    <text x="50" y="135" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">문자(Char)</text>
    
    <rect x="100" y="110" width="100" height="40" rx="8" fill="#fff" stroke="#adb5bd"/>
    <text x="150" y="135" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">단어(Word)</text>

    <rect x="200" y="110" width="100" height="40" rx="8" fill="#fff" stroke="#adb5bd"/>
    <text x="250" y="135" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">구(Phrase)</text>
    
    <rect x="300" y="110" width="100" height="40" rx="8" fill="#fff" stroke="#adb5bd"/>
    <text x="350" y="135" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">품사 태그</text>
  </g>
</svg>
