<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">최종 보스: 의미 표현 (Semantic) - 맥락의 정복</text>

  <!-- Box 1 -->
  <rect x="100" y="90" width="250" height="80" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="225" y="125" fill="#34d399" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"사과를 맛있게 먹었다"</text>
  
  <path d="M 225 170 L 225 190" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
  <circle cx="225" cy="230" r="30" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="225" y="235" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">과일</text>

  <!-- Box 2 -->
  <rect x="450" y="90" width="250" height="80" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="575" y="125" fill="#fb7185" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"진심어린 사과를 드립니다"</text>
  
  <path d="M 575 170 L 575 190" stroke="#f43f5e" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="525" y="200" width="100" height="60" fill="#881337" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="575" y="235" fill="#fda4af" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">미안함 표현</text>

  <!-- Connective highlight -->
  <text x="400" y="180" fill="#fde047" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">똑같은 글자 "사과" 지만?</text>
  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">주변 단어의 뉘앙스를 스캔(Contextual Attention)하여 다의어의 진짜 뜻을 간파해 내는 현대 AI의 코어 지능입니다.</text>

</svg>
