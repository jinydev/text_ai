<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">중간 물: 구문 표현 (Syntactic) - 문장 뼈대 그리기</text>

  <!-- Tree Root -->
  <rect x="350" y="70" width="100" height="30" fill="#3b82f6" rx="5"/>
  <text x="400" y="90" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">S (문장)</text>

  <!-- Level 2 -->
  <path d="M 400 100 L 250 140" stroke="#60a5fa" stroke-width="2"/>
  <path d="M 400 100 L 550 140" stroke="#60a5fa" stroke-width="2"/>

  <rect x="200" y="140" width="100" height="30" fill="#2563eb" rx="5"/>
  <text x="250" y="160" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">NP (명사구)</text>
  
  <rect x="500" y="140" width="100" height="30" fill="#2563eb" rx="5"/>
  <text x="550" y="160" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">VP (동사구)</text>

  <!-- Level 3 -->
  <path d="M 250 170 L 200 210" stroke="#93c5fd" stroke-width="2"/>
  <path d="M 250 170 L 300 210" stroke="#93c5fd" stroke-width="2"/>
  <path d="M 550 170 L 500 210" stroke="#93c5fd" stroke-width="2"/>
  <path d="M 550 170 L 600 210" stroke="#93c5fd" stroke-width="2"/>

  <!-- Leaves -->
  <text x="200" y="230" fill="#fde047" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">키가 큰</text>
  <text x="300" y="230" fill="#fde047" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">소년이</text>
  <text x="500" y="230" fill="#fde047" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">빠르게</text>
  <text x="600" y="230" fill="#fde047" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">달린다</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">단어들을 문법 규칙(주어와 동사 호응 등)에 맞게 레고처럼 잘 조립하여 에러가 없는지 검증합니다.</text>
</svg>
