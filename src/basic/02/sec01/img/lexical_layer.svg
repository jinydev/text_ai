<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">가장 얕은 물: 어휘 표현 (Lexical) - 껍데기만 암기</text>

  <rect x="200" y="100" width="400" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="3" rx="5"/>
  <text x="400" y="140" fill="#f59e0b" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">"Cats are running"</text>
  
  <path d="M 400 150 L 400 170" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="190" width="100" height="40" fill="#334155" rx="5"/>
  <text x="280" y="215" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Cat (명사)</text>

  <rect x="350" y="190" width="100" height="40" fill="#334155" rx="5"/>
  <text x="400" y="215" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">be (동사)</text>

  <rect x="470" y="190" width="100" height="40" fill="#334155" rx="5"/>
  <text x="520" y="215" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">run (동사)</text>

  <text x="400" y="275" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">문맥이나 순서는 관심 없이, 각 낱말 카드의 뿌리(Stem)와 품사 정보만 발라냅니다.</text>
</svg>
