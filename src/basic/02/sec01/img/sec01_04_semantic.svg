<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="600" height="300" fill="#f8f9fa"/>
  
  <g transform="translate(50, 20)">
    <!-- Root -->
    <rect x="150" y="0" width="200" height="50" rx="10" fill="#fff0f6" stroke="#f06595" stroke-width="2" filter="url(#shadow)"/>
    <text x="250" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#a61e4d" text-anchor="middle">열매: 의미 표현 (Semantic)</text>
    
    <path d="M 250 50 L 250 80" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 100 80 L 400 80" stroke="#adb5bd" stroke-width="2"/>
    
    <path d="M 100 80 L 100 110" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 250 80 L 250 110" stroke="#adb5bd" stroke-width="2"/>
    <path d="M 400 80 L 400 110" stroke="#adb5bd" stroke-width="2"/>

    <!-- Leaves -->
    <g transform="translate(0, 110)">
      <rect width="200" height="80" rx="8" fill="#fff" stroke="#adb5bd"/>
      <text x="100" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">온톨로지 (Ontology)</text>
      <text x="100" y="55" font-family="'Inter', sans-serif" font-size="12" fill="#868e96" text-anchor="middle">단어 간의 개념적 관계 정의</text>
    </g>
    <g transform="translate(230, 110)">
      <rect width="240" height="80" rx="8" fill="#fff" stroke="#adb5bd"/>
      <text x="120" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">협업 태깅 (Collaborative)</text>
      <text x="120" y="55" font-family="'Inter', sans-serif" font-size="12" fill="#868e96" text-anchor="middle">대중 집단 지성으로 의미(Tag) 부여</text>
    </g>

  </g>
</svg>
