<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">토큰화: 글자 덩어리를 기계의 입천장 규격에 맞게 써는 작업</text>

  <!-- Big text block -->
  <rect x="50" y="100" width="200" height="150" fill="#1e293b" stroke="#f43f5e" stroke-width="3" rx="5"/>
  <text x="150" y="150" fill="#fb7185" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">"안녕하세요 선생님"</text>
  <text x="150" y="180" fill="#fda4af" font-family="sans-serif" font-size="14" text-anchor="middle">(통째로 먹기엔 너무 큼)</text>

  <path d="M 270 150 L 370 150" stroke="#f59e0b" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="320" y="100" width="8" height="100" fill="#e2e8f0"/> <!-- Knife blade -->
  <rect x="315" y="80" width="18" height="20" fill="#64748b" rx="2"/> <!-- Knife handle -->

  <!-- Small text block pieces -->
  <rect x="420" y="120" width="80" height="80" fill="#1e293b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="460" y="165" fill="#34d399" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"안녕"</text>

  <rect x="520" y="120" width="80" height="80" fill="#1e293b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="560" y="165" fill="#34d399" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"하세요"</text>

  <rect x="620" y="120" width="80" height="80" fill="#1e293b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="660" y="165" fill="#34d399" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"선생"</text>
  
  <rect x="720" y="120" width="50" height="80" fill="#1e293b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="745" y="165" fill="#34d399" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"님"</text>

  <text x="580" y="240" fill="#6ee7b7" font-family="sans-serif" font-size="14" text-anchor="middle">조립하기 좋은 최소 부품(토큰) 조각들</text>
</svg>
