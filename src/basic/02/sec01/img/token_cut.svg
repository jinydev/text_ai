<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">비정형 Raw Sequence의 선형대수학 진입 장벽: 입력 텐서의 분절화 (Tokenization)</text>

  <!-- Big Raw String -->
  <rect x="50" y="90" width="700" height="70" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="120" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">단일 거대 문자열 덤프 (Raw Continuous String) - 모델 로딩 파단 OOM</text>
  <text x="400" y="145" fill="#f8fafc" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">"안녕하세요자연어처리전략최고다"</text>

  <!-- Big Error Arrow Down -->
  <path d="M 400 170 L 400 200" stroke="#fca5a5" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="395,195 400,205 405,195" fill="#fca5a5"/>
  <text x="400" y="225" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">GPU OOM 한계: 이 거대한 단일 블록은 딕셔너리 차원에 영구적으로 맵핑 불가능</text>

  <line x1="150" y1="240" x2="650" y2="240" stroke="#cbd5e1" stroke-width="2"/>


  <!-- Tokenizer Node -->
  <rect x="320" y="260" width="160" height="40" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="400" y="285" fill="#bfdbfe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Tokenizer 절단 컴파일</text>

  <path d="M 400 310 L 400 340" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="395,335 400,345 405,335" fill="#3b82f6"/>

  <!-- Array out -->
  <rect x="130" y="350" width="80" height="40" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="170" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">안녕</text>

  <rect x="230" y="350" width="80" height="40" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="270" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">하세요</text>

  <rect x="330" y="350" width="100" height="40" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="380" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">자연어처리</text>

  <rect x="450" y="350" width="60" height="40" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="480" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">전략</text>

  <rect x="530" y="350" width="60" height="40" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="560" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">최고</text>

  <rect x="610" y="350" width="60" height="40" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="640" y="375" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">다</text>

  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="400" width="700" height="40" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="425" fill="#fde68a" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">신경망 버스(Bus) 최소 전송 단위: Voca Index에 맵핑(Mapping) 가능한 이산 단위(Token Array)로의 텐서 슬라이싱 파이프라인</text>

</svg>
