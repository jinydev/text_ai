<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>
  
  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">토큰화의 칼질: 영어의 축복과 한국어의 절망</text>

  <!-- English -->
  <rect x="50" y="100" width="300" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="200" y="140" fill="#60a5fa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">영어 (고립어)</text>

  <rect x="80" y="170" width="60" height="40" fill="#2563eb" rx="5"/>
  <text x="110" y="195" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">I</text>

  <rect x="150" y="170" width="60" height="40" fill="#2563eb" rx="5"/>
  <text x="180" y="195" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">am</text>

  <rect x="220" y="170" width="60" height="40" fill="#2563eb" rx="5"/>
  <text x="250" y="195" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">a</text>

  <rect x="290" y="170" width="40" height="40" fill="#2563eb" rx="5"/>
  <text x="310" y="195" fill="#eff6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">boy</text>

  <text x="200" y="235" fill="#93c5fd" font-family="sans-serif" font-size="14" text-anchor="middle">공백으로 잘라도 토큰 독립 완벽!</text>

  <!-- Korean -->
  <rect x="450" y="100" width="300" height="150" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="600" y="140" fill="#fb7185" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">한국어 (교착어)</text>

  <rect x="520" y="170" width="80" height="40" fill="#e11d48" rx="5"/>
  <text x="560" y="195" fill="#ffe4e6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">나는</text>
  
  <rect x="610" y="170" width="100" height="40" fill="#e11d48" rx="5"/>
  <text x="660" y="195" fill="#ffe4e6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">소년이다</text>

  <!-- Glue and scissors -->
  <path d="M 560 170 C 560 150 540 150 540 170" stroke="#fcd34d" stroke-width="3" fill="none"/>
  <text x="550" y="145" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">껌딱지 조사</text>
  <text x="540" y="195" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold">나+는</text>

  <text x="600" y="235" fill="#fda4af" font-family="sans-serif" font-size="14" text-anchor="middle">명사와 조사가 엉켜 통계 카운트 붕괴!</text>
</svg>
