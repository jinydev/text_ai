<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">고전 Word-level 모델의 치명적 인퍼런스 붕괴: OOV (Out-of-Vocabulary) 결함 스페이스</text>

  <!-- Big Input Vector -->
  <rect x="50" y="80" width="700" height="50" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="400" y="110" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">유저 입력 시퀀스 텐서: "오늘 킹받네 완전 오픈런 달린다"</text>

  <path d="M 400 140 L 400 180" stroke="#fcd34d" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="395,175 400,185 405,175" fill="#fcd34d"/>


  <rect x="150" y="195" width="500" height="130" fill="#0f172a" stroke="#cbd5e1" stroke-width="2" rx="6"/>
  <text x="400" y="220" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">고정 사이즈 단어 사전 (Static Vocabulary Dictionary / Size: 100,000)</text>

  <!-- Token Flow -->
  <rect x="50" y="240" width="80" height="30" fill="#064e3b" rx="4"/>
  <text x="90" y="260" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">오늘</text>

  <rect x="230" y="240" width="120" height="30" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="290" y="260" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">킹받네</text>

  <rect x="420" y="240" width="80" height="30" fill="#064e3b" rx="4"/>
  <text x="460" y="260" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">완전</text>

  <rect x="540" y="240" width="100" height="30" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="590" y="260" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">오픈런</text>


  <!-- Mapping Result -->
  <path d="M 90 280 L 90 310" stroke="#10b981" stroke-width="2"/>
  <polygon points="85,305 90,315 95,305" fill="#10b981"/>
  
  <path d="M 290 280 L 290 310" stroke="#ef4444" stroke-width="2"/>
  <polygon points="285,305 290,315 295,305" fill="#ef4444"/>

  <path d="M 460 280 L 460 310" stroke="#10b981" stroke-width="2"/>
  <polygon points="455,305 460,315 465,305" fill="#10b981"/>

  <path d="M 590 280 L 590 310" stroke="#ef4444" stroke-width="2"/>
  <polygon points="585,305 590,315 595,305" fill="#ef4444"/>


  <rect x="60" y="320" width="60" height="30" fill="#1e3a8a" rx="4"/>
  <text x="90" y="340" fill="#bfdbfe" font-family="monospace" font-size="14" format="bold" text-anchor="middle">ID:142</text>
  
  <rect x="250" y="320" width="80" height="30" fill="#7f1d1d" rx="4"/>
  <text x="290" y="340" fill="#fecaca" font-family="monospace" font-size="14" format="bold" text-anchor="middle">&lt;UNK&gt;</text>

  <rect x="430" y="320" width="60" height="30" fill="#1e3a8a" rx="4"/>
  <text x="460" y="340" fill="#bfdbfe" font-family="monospace" font-size="14" format="bold" text-anchor="middle">ID:899</text>

  <rect x="550" y="320" width="80" height="30" fill="#7f1d1d" rx="4"/>
  <text x="590" y="340" fill="#fecaca" font-family="monospace" font-size="14" format="bold" text-anchor="middle">&lt;UNK&gt;</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="405" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">미등록 어휘 에러(OOV 에러): 시스템 기반 딕셔너리에 매핑이 안 된 노이즈 변형 신조어, 오타가 유입되면 기계 연산이</text>
  <text x="400" y="420" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">인퍼런스를 완전히 포기하고 까막눈 시그널인 UNK(Unknown) 토큰으로 로스 덮어씌워버리는 과거 모델의 치명적 결함.</text>

</svg>
