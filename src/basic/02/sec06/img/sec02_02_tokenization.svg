<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#fff" rx="10"/>

  <g transform="translate(50, 40)">
    <rect width="300" height="150" fill="#212529" stroke="#343a40" stroke-width="2" rx="10" filter="url(#shadow)"/>
    <text x="20" y="30" font-family="'Consolas', monospace" font-size="20" fill="#fcc419">"Starting a home..."</text>
    <text x="20" y="80" font-family="'Consolas', monospace" font-size="14" fill="#69db7c"># 파이썬 NLTK 토크나이저 통과</text>
    <path d="M 20 120 L 280 120" stroke="#495057" stroke-width="2" stroke-dasharray="5,5"/>
  </g>

  <!-- Arrow -->
  <path d="M 370 115 L 420 115" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="395" y="95" font-family="'Inter', sans-serif" font-size="24" text-anchor="middle">✂️</text>

  <g transform="translate(450, 40)">
    <rect width="320" height="150" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2" rx="10" filter="url(#shadow)"/>
    <text x="20" y="30" font-family="'Consolas', monospace" font-size="18" fill="#c92a2a">['Starting',</text>
    <text x="20" y="55" font-family="'Consolas', monospace" font-size="18" fill="#c92a2a"> 'a',</text>
    <text x="20" y="80" font-family="'Consolas', monospace" font-size="18" fill="#c92a2a"> 'home-based',</text>
    <text x="20" y="105" font-family="'Consolas', monospace" font-size="18" fill="#c92a2a"> 'restaurant', ...]</text>
    <text x="160" y="135" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">Python List 형태의 토큰 뭉치들</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
    </marker>
  </defs>
</svg>
