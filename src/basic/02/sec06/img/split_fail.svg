<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">고전 모델의 메모리 차원 폭발: 띄어쓰기(Split) 분할로 인한 Sparsity 결함</text>

  <!-- Split Fail Logic -->
  <rect x="50" y="80" width="700" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="400" y="115" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">교착어 띄어쓰기(Split) 파편화 배열 코퍼스 유입: "집에", "집에서", "집으로"</text>


  <!-- Model Dimensional Memory Mapping -->
  <path d="M 400 150 L 400 180" stroke="#fcd34d" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="395,175 400,185 405,175" fill="#fcd34d"/>


  <rect x="50" y="195" width="700" height="150" fill="#0f172a" stroke="#cbd5e1" stroke-width="2" rx="6"/>
  <text x="400" y="220" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">기하학적 메모리 독립 차원 스페이스 할당 (Sparsity Dimension Mapping Memory)</text>

  <rect x="150" y="240" width="120" height="40" fill="#450a0a" stroke="#ef4444" rx="4"/>
  <text x="210" y="265" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Index: 720</text>
  <rect x="110" y="290" width="200" height="25" fill="#1e293b"/>
  <text x="210" y="308" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Word Array = "집에"</text>

  <rect x="340" y="240" width="120" height="40" fill="#450a0a" stroke="#ef4444" rx="4"/>
  <text x="400" y="265" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Index: 835</text>
  <rect x="300" y="290" width="200" height="25" fill="#1e293b"/>
  <text x="400" y="308" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Word Array = "집에서"</text>


  <rect x="530" y="240" width="120" height="40" fill="#450a0a" stroke="#ef4444" rx="4"/>
  <text x="590" y="265" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Index: 902</text>
  <rect x="490" y="290" width="200" height="25" fill="#1e293b"/>
  <text x="590" y="308" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Word Array = "집으로"</text>


  <line x1="150" y1="330" x2="650" y2="330" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="400" y="340" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">컴파일러 스칼라 파단: 셋 다 같은 Root '집' 임에도 인덱스 차원망이 생판 다르게 기형적으로 완전 스플릿 됨</text>

  
  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="405" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">희소성 에러(Sparsity Explosion): 의미의 근본 뿌리인 '집(Home)' 이 스펠링 단어 변형 규칙에 의해</text>
  <text x="400" y="420" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">독립적이고 상관없는 완전히 무관한 차원 공간망으로 기하급수적 파편화되어 메모리를 누수 낭비하는 치명적 맹점.</text>

</svg>
