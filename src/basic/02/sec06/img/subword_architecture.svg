<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">서브워드 아키텍처망(Subword Architecture): OOV 타겟 유추 스플릿</text>

  <!-- OOV Input -->
  <rect x="300" y="70" width="200" height="50" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="100" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">OOV Input: "Birthplace"</text>


  <!-- Model Vocabulary Space -->
  <rect x="50" y="150" width="220" height="150" fill="#0f172a" stroke="#cbd5e1" stroke-width="2" rx="6"/>
  <text x="160" y="180" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">기계 사전 (Dictionary)</text>
  <rect x="70" y="200" width="180" height="25" fill="#1e293b"/>
  <text x="160" y="217" fill="#ef4444" font-family="monospace" font-size="12" text-decoration="line-through" text-anchor="middle">Birthplace (없음 OOV)</text>
  
  <rect x="70" y="235" width="80" height="25" fill="#1e3a8a" rx="2"/>
  <text x="110" y="252" fill="#bfdbfe" font-family="monospace" font-size="12" text-anchor="middle">Birth</text>

  <rect x="160" y="235" width="80" height="25" fill="#1e3a8a" rx="2"/>
  <text x="200" y="252" fill="#bfdbfe" font-family="monospace" font-size="12" text-anchor="middle">place</text>

  <rect x="70" y="270" width="60" height="25" fill="#1e3a8a" rx="2"/>
  <text x="100" y="287" fill="#bfdbfe" font-family="monospace" font-size="12" text-anchor="middle">ing</text>

  <rect x="140" y="270" width="60" height="25" fill="#1e3a8a" rx="2"/>
  <text x="170" y="287" fill="#bfdbfe" font-family="monospace" font-size="12" text-anchor="middle">ed</text>


  <!-- Parsing Function -->
  <path d="M 350 125 L 180 145" stroke="#fcd34d" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 450 125 L 450 160" stroke="#fcd34d" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Subword Split Logic -->
  <rect x="340" y="165" width="220" height="40" fill="#064e3b" stroke="#10b981" rx="4"/>
  <text x="450" y="190" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Subword Parsing Module (절단)</text>
  
  <path d="M 450 210 L 450 240" stroke="#10b981" stroke-width="3"/>
  <polygon points="445,235 450,245 455,235" fill="#10b981"/>

  <!-- Output Inference Vector -->
  <rect x="330" y="245" width="240" height="80" fill="#0f172a" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="450" y="270" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Inference Array (의미망 유추)</text>
  
  <rect x="360" y="285" width="80" height="30" fill="#1e3a8a" rx="4"/>
  <text x="400" y="305" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">"Birth"</text>
  <text x="450" y="305" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">+</text>
  <rect x="470" y="285" width="80" height="30" fill="#1e3a8a" rx="4"/>
  <text x="510" y="305" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">"place"</text>

  <path d="M 575 285 L 630 285" stroke="#10b981" stroke-width="3"/>
  <polygon points="620,280 630,285 620,290" fill="#10b981"/>


  <!-- Machine Inference Idea -->
  <rect x="640" y="245" width="120" height="80" fill="#064e3b" stroke="#34d399" stroke-width="2" rx="6"/>
  <text x="700" y="270" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">의미 조립 성공</text>
  <text x="700" y="295" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">100%</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="360" width="700" height="60" fill="#334155" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="400" y="385" fill="#6ee7b7" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Subword Tokenization: 사전에 통째로 외우지 못한 OOV 미지 단어(Birthplace)가 들어와도 에러를</text>
  <text x="400" y="405" fill="#6ee7b7" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">던지지 않고, 사전에 이미 있는 하위 블록 레고 구조(Birth + place) 로 쪼개어 타겟 의미망을 추론하는 기법.</text>

</svg>
