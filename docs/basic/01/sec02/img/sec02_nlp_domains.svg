<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .col-title { font-size: 18px; font-weight: bold; fill: white; }
      .item { font-size: 14px; font-weight: bold; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">자연어 처리(NLP)가 관여하는 텍스트 마이닝의 영역</text>
  <text x="400" y="55" font-size="14" fill="#64748b">전체 텍스트 마이닝 파이프라인 중에서 NLP 기술이 직접적으로 수행하는 핵심 과업들입니다.</text>

  <!-- Process Columns -->
  <!-- 1. 수집 -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="#64748b" />
    <text x="80" y="20" class="col-title">1. 데이터 수집</text>
    
    <rect x="0" y="50" width="160" height="35" class="box" />
    <text x="80" y="68" class="item">웹 크롤링</text>
    <rect x="0" y="95" width="160" height="35" class="box" />
    <text x="80" y="113" class="item">API 연동</text>
  </g>

  <path d="M 210 110 L 225 110" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" />

  <!-- 2. 전처리 (NLP Boundary Starts) -->
  <rect x="235" y="80" width="345" height="240" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="8" rx="8" />
  <text x="407" y="310" font-weight="bold" fill="#ef4444">NLP (자연어 처리) 핵심 기술 영역</text>

  <g transform="translate(245, 90)">
    <rect x="0" y="0" width="150" height="40" rx="4" fill="#3b82f6" />
    <text x="75" y="20" class="col-title">2. 텍스트 전처리</text>
    
    <rect x="0" y="50" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="68" class="item">형태소 분석</text>
    <rect x="0" y="95" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="113" class="item">워드 임베딩</text>
    <rect x="0" y="140" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="158" class="item">불용어 제거</text>
  </g>

  <path d="M 405 110 L 415 110" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" />

  <!-- 3. 분석 -->
  <g transform="translate(420, 90)">
    <rect x="0" y="0" width="150" height="40" rx="4" fill="#3b82f6" />
    <text x="75" y="20" class="col-title">3. 텍스트 분석</text>
    
    <rect x="0" y="50" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="68" class="item">감성 분석</text>
    <rect x="0" y="95" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="113" class="item">문서 분류/요약</text>
    <rect x="0" y="140" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="158" class="item">토픽 모델링</text>
    <rect x="0" y="185" width="150" height="35" class="box" fill="#eff6ff" />
    <text x="75" y="203" class="item">기계 번역 / 분류</text>
  </g>

  <path d="M 590 110 L 605 110" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" />

  <!-- 4. 시각화 -->
  <g transform="translate(615, 90)">
    <rect x="0" y="0" width="145" height="40" rx="4" fill="#64748b" />
    <text x="72" y="20" class="col-title">4. 시각화</text>
    
    <rect x="0" y="50" width="145" height="35" class="box" />
    <text x="72" y="68" class="item">워드 클라우드</text>
    <rect x="0" y="95" width="145" height="35" class="box" />
    <text x="72" y="113" class="item">트리맵</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

</svg>
