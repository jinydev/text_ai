<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <rect width="600" height="400" fill="#fffaf0"/>

  <!-- The Bag -->
  <path d="M 200 300 Q 300 400 400 300 L 450 150 Q 300 180 150 150 Z" fill="#fcd34d" filter="url(#shadow)"/>
  <path d="M 250 150 C 250 100, 350 100, 350 150" fill="none" stroke="#d97706" stroke-width="8"/>

  <!-- Words in the bag (ignoring grammar) -->
  <g font-family="'Inter', sans-serif" font-weight="bold">
    <text x="280" y="220" font-size="24" fill="#1e3a8a" transform="rotate(-15 280 220)">사랑(3)</text>
    <text x="350" y="250" font-size="18" fill="#c2410c" transform="rotate(20 350 250)">이별(1)</text>
    <text x="230" y="280" font-size="20" fill="#047857" transform="rotate(-5 230 280)">눈물(5)</text>
    <text x="310" y="300" font-size="28" fill="#b91c1c" transform="rotate(10 310 300)">슬픔(2)</text>
  </g>

  <!-- Title -->
  <text x="300" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#343a40" text-anchor="middle">Bag of Words (BoW)</text>
  <text x="300" y="80" font-family="'Inter', sans-serif" font-size="16" fill="#495057" text-anchor="middle">문법과 어순을 무시하고, 가방 안의 단어 개수만 셉니다.</text>
</svg>
