<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#f8f9fa"/>

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#343a40" text-anchor="middle">사진 + 텍스트의 결합 (VQA)</text>

  <!-- Left: Image Input -->
  <g transform="translate(100, 80)" filter="url(#shadow)">
    <rect width="180" height="120" fill="#ffc9c9" rx="10"/>
    <text x="90" y="55" font-family="'Inter', sans-serif" font-size="40" text-anchor="middle">🖼️</text>
    <text x="90" y="90" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#a61e4d" text-anchor="middle">[사진 입력]</text>
  </g>

  <!-- Middle: Question -->
  <g transform="translate(310, 115)">
    <rect width="180" height="50" fill="#d0ebff" rx="25"/>
    <text x="90" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#1864ab" text-anchor="middle">"이 사진에 몇 명이 있어?"</text>
  </g>

  <!-- Arrow -->
  <path d="M 500 140 L 560 140" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Right: Answer -->
  <g transform="translate(580, 100)" filter="url(#shadow)">
    <rect width="120" height="80" fill="#d3f9d8" rx="10" stroke="#2b8a3e" stroke-width="2"/>
    <text x="60" y="45" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#2b8a3e" text-anchor="middle">"3명입니다."</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
    </marker>
  </defs>
</svg>
