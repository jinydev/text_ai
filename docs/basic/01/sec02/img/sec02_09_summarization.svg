<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fa709a"/>
      <stop offset="100%" stop-color="#fee140"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="250" fill="#f8f9fa"/>

  <!-- Left: Big Document -->
  <g transform="translate(100, 50)" filter="url(#shadow)">
    <rect width="200" height="150" fill="#fff" stroke="#dee2e6" stroke-width="2"/>
    <path d="M 20 20 L 180 20 M 20 40 L 180 40 M 20 60 L 180 60 M 20 80 L 180 80 M 20 100 L 180 100 M 20 120 L 120 120" stroke="#ced4da" stroke-width="5"/>
    <text x="100" y="-15" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#495057" text-anchor="middle">30장짜리 회의록 (입력)</text>
  </g>

  <!-- Middle: Squeezer / AI -->
  <path d="M 320 125 L 480 125" stroke="url(#g)" stroke-width="15" stroke-dasharray="15,10" marker-end="url(#arrow)"/>
  <text x="400" y="100" font-family="'Inter', sans-serif" font-size="30" text-anchor="middle">🗜️</text>

  <!-- Right: 3 lines -->
  <g transform="translate(500, 90)" filter="url(#shadow)">
    <rect width="200" height="70" fill="#fff3bf" stroke="#fcc419" stroke-width="2"/>
    <path d="M 20 20 L 180 20 M 20 35 L 180 35 M 20 50 L 120 50" stroke="#d9480f" stroke-width="4"/>
    <text x="100" y="-15" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#d9480f" text-anchor="middle">3줄 요약본 (출력)</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fee140" />
    </marker>
  </defs>
</svg>
