<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .col-title { font-size: 18px; font-weight: bold; fill: #1e3a8a; }
      .desc { font-size: 14px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">고전적(통계기반) 텍스트 마이닝이 갖는 불멸의 가치</text>
  <text x="400" y="55" font-size="14" fill="#64748b">비전(이미지) 처리의 픽셀과 달리 문자(텍스트)는 그 자체로 뜻이 담긴 특수한 데이터이기 때문입니다.</text>

  <!-- Image Pixels -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="300" height="200" class="box" fill="#f8fafc" />
    <text x="150" y="30" class="col-title">이미지 분야 (픽셀 데이터)</text>

    <!-- Pixel Grid -->
    <rect x="110" y="50" width="20" height="20" fill="#94a3b8" />
    <rect x="130" y="50" width="20" height="20" fill="#64748b" />
    <rect x="150" y="50" width="20" height="20" fill="#cbd5e1" />
    <rect x="170" y="50" width="20" height="20" fill="#475569" />

    <text x="150" y="100" font-weight="bold" fill="#64748b">픽셀 값: [142, 201, 55, ...]</text>
    
    <text x="150" y="140" class="desc" font-weight="bold" fill="#b91c1c">"단순한 수치일 뿐, 픽셀 한 조각이</text>
    <text x="150" y="160" class="desc" font-weight="bold" fill="#b91c1c">눈인지 코인지 의미를 알 수 없음"</text>
    <text x="150" y="185" font-size="12" fill="#64748b">→ 복잡한 딥러닝 망이 반드시 필요</text>
  </g>

  <!-- Text Words -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="300" height="200" class="box" fill="#f0fdf4" stroke="#4ade80" />
    <text x="150" y="30" class="col-title" fill="#047857">텍스트 분야 (단어 데이터)</text>

    <!-- Word Grid -->
    <rect x="70" y="50" width="70" height="20" rx="4" fill="#6ee7b7" />
    <text x="105" y="60" font-weight="bold" fill="#064e3b">사랑</text>

    <rect x="150" y="50" width="70" height="20" rx="4" fill="#6ee7b7" />
    <text x="185" y="60" font-weight="bold" fill="#064e3b">행복</text>

    <text x="150" y="100" font-weight="bold" fill="#047857">단어 목록: ["사랑", "행복"]</text>

    <text x="150" y="140" class="desc" font-weight="bold" fill="#15803d">"글자 그 자체에 고유한 의미가</text>
    <text x="150" y="160" class="desc" font-weight="bold" fill="#15803d">스스로 명확하게 내포되어 있음"</text>
    <text x="150" y="185" font-size="12" fill="#166534">→ 단순 빈도(통계)만으로도 직관적 설명 가능!</text>
  </g>

</svg>
