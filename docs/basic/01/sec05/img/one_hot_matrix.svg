<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">배타적 이산 계층: One-hot Encoding의 수직 직교(Orthogonal) 공간 독립 벡터 텐서 구조</text>

  <!-- Left Dimension Setup -->
  <rect x="50" y="90" width="300" height="230" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="200" y="125" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">고유 단어 사전(Vocabulary, N=4)</text>

  <!-- Voca table -->
  <rect x="80" y="140" width="240" height="150" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="140" y="165" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Index 0 : "나는"</text>
  <text x="140" y="195" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Index 1 : "너를"</text>
  <text x="140" y="225" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Index 2 : "사랑"</text>
  <text x="140" y="255" fill="#cbd5e1" font-family="monospace" font-size="14" text-anchor="middle">Index 3 : "증오"</text>

  <!-- Vector Output Representation -->
  <rect x="380" y="90" width="370" height="230" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="565" y="125" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">One-hot 행렬 맵핑 공간 단위 (Identity Base)</text>

  <rect x="410" y="140" width="310" height="150" fill="#0f172a" stroke="#7f1d1d" stroke-width="1" rx="4"/>
  <text x="440" y="165" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">v_0 = [ 1, 0, 0, 0 ]</text>
  <text x="590" y="165" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle"><- 타겟 인덱스 독점</text>
  
  <text x="440" y="195" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">v_1 = [ 0, 1, 0, 0 ]</text>
  <text x="440" y="225" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">v_2 = [ 0, 0, 1, 0 ]</text>
  <text x="440" y="255" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">v_3 = [ 0, 0, 0, 1 ]</text>

  <!-- Orthogonal Warning -->
  <rect x="450" y="280" width="220" height="25" fill="#450a0a" rx="4"/>
  <text x="560" y="297" fill="#fecaca" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">v_2(사랑) • v_3(증오) 역산 내적 = 0</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="350" width="700" height="60" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="375" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">치명적 매핑 버그(단어 의미의 파괴): 기하학적 직교(Orthogonal)</text>
  <text x="400" y="395" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">자신 외 나머지 배열 차원은 모조리 0 으로 죽여버리므로, 단어 간 밀도(유사성 코사인 내적)가 1%도 일치할 수 없는 단절 결함</text>

</svg>
