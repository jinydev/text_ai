<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">비정형 인퍼런스 데이터 파이프라인: 텍스트 텐서 정규 스케일링 전처리 3단계</text>

  <!-- Step 1: Cleaning -->
  <rect x="50" y="100" width="200" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="150" y="130" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1. 치환 정규화 (Cleaning)</text>
  <text x="150" y="150" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">엔티티 노이즈 및 편향 소거</text>

  <rect x="70" y="170" width="160" height="40" fill="#0f172a" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="150" y="195" fill="#fca5a5" font-family="monospace" font-size="11" text-anchor="middle">&lt;p&gt;사과🍎 진짜 맛남ㅋㅋ&lt;/P&gt;</text>

  <path d="M 150 215 L 150 235" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="145,230 150,240 155,230" fill="#cbd5e1"/>

  <rect x="70" y="245" width="160" height="30" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="150" y="265" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">사과 진짜 맛남</text>

  <!-- Arrow -->
  <path d="M 260 200 L 290 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="285,195 295,200 285,205" fill="#cbd5e1"/>

  <!-- Step 2: Tokenization -->
  <rect x="300" y="100" width="200" height="200" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="400" y="130" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">2. 토큰 분절 (Tokenization)</text>
  <text x="400" y="150" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">의미 최소 단위 시퀀스 차원 분리</text>

  <rect x="320" y="170" width="160" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="400" y="195" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">사과 진짜 맛남</text>

  <path d="M 400 215 L 400 235" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="395,230 400,240 405,230" fill="#cbd5e1"/>

  <!-- Array display -->
  <rect x="320" y="245" width="160" height="30" fill="#450a0a" stroke="#fca5a5" stroke-width="1" rx="4" stroke-dasharray="2,2"/>
  <text x="400" y="265" fill="#fecaca" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">['사과', '진짜', '맛남']</text>

  <!-- Arrow -->
  <path d="M 510 200 L 540 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="535,195 545,200 535,205" fill="#cbd5e1"/>

  <!-- Step 3: Vectorization -->
  <rect x="550" y="100" width="200" height="200" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="650" y="130" fill="#d8b4fe" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">3. 텐서 벡터화 (Vectorization)</text>
  <text x="650" y="150" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">행렬 연산용 Continuous 숫자 맵핑</text>

  <rect x="570" y="170" width="160" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="650" y="195" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">['사과', '진짜', '맛남']</text>

  <path d="M 650 215 L 650 235" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="645,230 650,240 655,230" fill="#cbd5e1"/>

  <!-- Matrix output -->
  <rect x="570" y="245" width="160" height="40" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1" rx="4"/>
  <text x="650" y="263" fill="#bfdbfe" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">[[ 1 0 0 ]</text>
  <text x="650" y="278" fill="#bfdbfe" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle"> [ 0 1 0 ] ...]</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="340" width="700" height="60" fill="#334155" stroke="#a7f3d0" stroke-width="2" rx="6"/>
  <text x="400" y="365" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">기호 인지 모형을 행렬 연산 매트릭스로 치환하는 데이터 전처리 파이프라인 과정</text>
  <text x="400" y="385" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">수학망을 돌리기 위한 텍스트 오차 스무딩 $\to$ 시퀀스 단위 분해 $\to$ 인덱스 타겟에 따른 벡터 차원 맵핑</text>

</svg>
