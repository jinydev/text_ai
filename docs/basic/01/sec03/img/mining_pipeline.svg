<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">비정형 텍스트 마이닝 파이프라인: 수집에서 지식 추출까지의 4단계 아키텍처</text>

  <!-- Step 1 Collection -->
  <rect x="40" y="100" width="160" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="120" y="130" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">STEP 1. 수집</text>
  <text x="120" y="150" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">(Data Collection)</text>
  
  <rect x="60" y="170" width="120" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="120" y="195" fill="#f8fafc" font-family="monospace" font-size="11" text-anchor="middle">&lt;div&gt;더럽다ㅋㅋ&lt;/div&gt;</text>
  <text x="120" y="240" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">크롤러 API 스크래핑</text>
  <text x="120" y="260" fill="#fca5a5" font-family="sans-serif" font-size="11" text-anchor="middle">HTML, 태그, 노이즈 등</text>
  <text x="120" y="275" fill="#fca5a5" font-family="sans-serif" font-size="11" text-anchor="middle">비정형 Raw 코퍼스 유입</text>

  <!-- Flow Arrow -->
  <path d="M 210 200 L 230 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="225,195 235,200 225,205" fill="#cbd5e1"/>

  <!-- Step 2 Preprocessing -->
  <rect x="240" y="100" width="160" height="200" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="320" y="130" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">STEP 2. 전처리</text>
  <text x="320" y="150" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">(Preprocessing)</text>
  
  <rect x="250" y="170" width="60" height="30" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="280" y="190" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">[더럽]</text>
  <rect x="330" y="170" width="60" height="30" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="360" y="190" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">[다]</text>
  
  <text x="320" y="235" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">형태소 분석 &amp; 토큰화</text>
  <text x="320" y="255" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">정규화(Regex) 필터링</text>
  <text x="320" y="275" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">불용어(Stopword) 소거</text>

  <!-- Flow Arrow -->
  <path d="M 410 200 L 430 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="425,195 435,200 425,205" fill="#cbd5e1"/>


  <!-- Step 3 Modeling -->
  <rect x="440" y="100" width="160" height="200" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="520" y="130" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">STEP 3. 모델링</text>
  <text x="520" y="150" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">(Modeling &amp; Analysis)</text>

  <rect x="460" y="170" width="120" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4" stroke-dasharray="2,2"/>
  <text x="520" y="195" fill="#f8fafc" font-family="monospace" font-size="12" text-anchor="middle">Y = [0.01, 0.98, ...]</text>
  
  <text x="520" y="240" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">임베딩 행렬 수식 연산</text>
  <text x="520" y="260" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">머신러닝 극성 판별</text>
  <text x="520" y="275" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">벡터 공간 군집 클러스터링</text>

  <!-- Flow Arrow -->
  <path d="M 610 200 L 630 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="625,195 635,200 625,205" fill="#cbd5e1"/>


  <!-- Step 4 Visualization -->
  <rect x="640" y="100" width="120" height="200" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="700" y="130" fill="#d8b4fe" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">STEP 4. 시각화</text>
  <text x="700" y="150" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">(Visualization)</text>

  <!-- Small chart -->
  <rect x="660" y="170" width="20" height="30" fill="#ef4444"/>
  <rect x="685" y="180" width="20" height="20" fill="#3b82f6"/>
  <rect x="710" y="160" width="20" height="40" fill="#10b981"/>
  <line x1="650" y1="200" x2="740" y2="200" stroke="#f8fafc" stroke-width="2"/>

  <text x="700" y="240" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">차트 지표 도출</text>
  <text x="700" y="260" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">워드 클라우드</text>
  <text x="700" y="275" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">의사 결정 지원</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="340" width="710" height="60" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="405" y="365" fill="#fde68a" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">데이터 엔지니어링의 정수: 자연어 차원을 인공지능이 해석 가능한 '계량화 매트릭스 숫자(Vector Matrix)'로 전환하는</text>
  <text x="405" y="385" fill="#fde68a" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">정규 파이프라인. 전체 머신러닝 분석가의 연산 공수 비용 중 80% 이상이 STEP 2의 노이즈 정제 작업에 극도로 집중된다.</text>

</svg>
