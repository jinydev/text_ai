<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">고차원 텍스트 벡터의 절망적 한계점: 차원의 저주와 차원 희소성(Curse of Sparsity) 현상</text>

  <!-- Big Database Space -->
  <rect x="50" y="80" width="700" height="280" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  
  <text x="400" y="115" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">고전 One-Hot 벡터 인코딩 방식 메모리 할당 매트릭스</text>
  <text x="400" y="140" fill="#94a3b8" font-family="sans-serif" font-size="13" text-anchor="middle">(국어사전 총 Voca 토큰 = V차원 500,000만 개 등록 가정)</text>

  <!-- Long vector strip representing 500,000 array -->
  <rect x="80" y="170" width="640" height="60" fill="#0f172a" stroke="#475569" stroke-width="2" rx="4"/>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#334155" stroke-width="1"/>
  
  <line x1="130" y1="170" x2="130" y2="230" stroke="#475569" stroke-width="2"/>
  <line x1="180" y1="170" x2="180" y2="230" stroke="#475569" stroke-width="2"/>
  <line x1="330" y1="170" x2="330" y2="230" stroke="#475569" stroke-width="2"/>
  <line x1="380" y1="170" x2="380" y2="230" stroke="#fca5a5" stroke-width="3"/>
  <line x1="430" y1="170" x2="430" y2="230" stroke="#fca5a5" stroke-width="3"/>
  <line x1="580" y1="170" x2="580" y2="230" stroke="#475569" stroke-width="2"/>
  <line x1="630" y1="170" x2="630" y2="230" stroke="#475569" stroke-width="2"/>

  <!-- Zeros everywhere -->
  <text x="105" y="220" fill="#64748b" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="155" y="220" fill="#64748b" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  
  <text x="255" y="215" fill="#64748b" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">· · · 수십만 개의 0 노이즈 차원 낭비 · · ·</text>

  <text x="355" y="220" fill="#64748b" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  
  <!-- Highlighted 1 -->
  <rect x="385" y="175" width="40" height="50" fill="#7f1d1d" rx="2"/>
  <text x="405" y="220" fill="#fca5a5" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">1</text>
  <text x="405" y="160" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Index [사과]</text>

  <text x="455" y="220" fill="#64748b" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  
  <text x="505" y="215" fill="#64748b" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">· · ·</text>

  <text x="605" y="220" fill="#64748b" font-family="monospace" font-size="16" text-anchor="middle">0</text>
  <text x="675" y="220" fill="#64748b" font-family="monospace" font-size="16" text-anchor="middle">0</text>

  <!-- Explanation texts below vector -->
  <text x="400" y="280" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">메모리 오버헤드 희소성 오류 붕괴</text>
  <text x="400" y="305" fill="#fecaca" font-family="sans-serif" font-size="13" text-anchor="middle">문서 내 단 하나의 단어 '사과' 를 표현하고 지표하기 위해 50만 개의 차원 텐서를 가동시키고 서버 RAM에 로딩해야 함</text>
  <text x="400" y="325" fill="#fecaca" font-family="sans-serif" font-size="13" text-anchor="middle">행렬 내부에 99.999% 의 공간이 쓸모없는 Zero '0' 차원으로 통계 채워지는 희소 극대화 벡터 연산 지수 폭발 발생</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="410" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">단어 빈도 차원의 저주(Curse of Dimensionality): 밀집 차원 임베딩(Dense Vector) 축소 아키텍처망이 필수적인 수학적 이유</text>

</svg>
