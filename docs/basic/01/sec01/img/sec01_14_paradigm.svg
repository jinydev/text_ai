<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <linearGradient id="g-cv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="g-nlp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fa709a"/>
      <stop offset="100%" stop-color="#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="350" fill="#212529" rx="10"/>

  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">인공지능 패러다임의 극적인 변화 (통계 → 스스로 공부)</text>

  <g transform="translate(50, 100)">
    <rect width="320" height="200" rx="15" fill="#343a40" stroke="url(#g-cv)" stroke-width="3" filter="url(#shadow)"/>
    <text x="160" y="40" font-family="'Inter', sans-serif" font-size="22" font-weight="bold" fill="url(#g-cv)" text-anchor="middle">과거 (인간의 수작업)</text>
    <path d="M 40 60 L 280 60" stroke="#495057" stroke-width="2"/>
    <text x="30" y="100" font-family="'Inter', sans-serif" font-size="16" fill="#f8f9fa">[이미지]</text>
    <text x="100" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#ced4da">"이 선이 얼굴 윤곽이야" (SIFT)</text>

    <text x="30" y="150" font-family="'Inter', sans-serif" font-size="16" fill="#f8f9fa">[텍스트]</text>
    <text x="100" y="150" font-family="'Inter', sans-serif" font-size="14" fill="#ced4da">"멍멍이는 개랑 같은 말이야" (규칙)</text>
  </g>

  <path d="M 380 200 L 420 200" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="375" y="160" width="50" height="25" fill="#e03131" rx="5"/>
  <text x="400" y="177" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">딥러닝</text>

  <g transform="translate(430, 100)">
    <rect width="320" height="200" rx="15" fill="#343a40" stroke="url(#g-nlp)" stroke-width="3" filter="url(#shadow)"/>
    <text x="160" y="40" font-family="'Inter', sans-serif" font-size="22" font-weight="bold" fill="url(#g-nlp)" text-anchor="middle">현대 (AI의 자기주도학습)</text>
    <path d="M 40 60 L 280 60" stroke="#495057" stroke-width="2"/>
    <text x="30" y="100" font-family="'Inter', sans-serif" font-size="16" fill="#f8f9fa">[이미지]</text>
    <text x="100" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#ced4da">사진 수억 개 시청 → "아하 고양이!"</text>

    <text x="30" y="150" font-family="'Inter', sans-serif" font-size="16" fill="#f8f9fa">[텍스트]</text>
    <text x="100" y="150" font-family="'Inter', sans-serif" font-size="14" fill="#ced4da">인터넷 글 통독 → 문장 규칙 완벽 이해</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
    </marker>
  </defs>
</svg>
