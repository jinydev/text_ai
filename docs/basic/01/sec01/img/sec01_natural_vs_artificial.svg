<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .card-title { font-size: 18px; font-weight: bold; fill: white; }
      .desc { font-size: 14px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">자연언어(Natural Language) vs 인공언어(Artificial Language)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">사람이 일상적으로 쓰는 모호한 언어와, 기계를 위해 엄격히 설계된 언어의 차이</text>

  <!-- Natural Language -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="300" height="230" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <rect x="0" y="0" width="300" height="40" fill="#3b82f6" rx="8" />
    <path d="M 0 30 L 300 30 L 300 40 L 0 40 Z" fill="#3b82f6" />
    <text x="150" y="20" class="card-title">자연언어 (사람의 언어)</text>

    <!-- Examples -->
    <rect x="30" y="60" width="240" height="40" rx="8" fill="#dbeafe" />
    <text x="150" y="80" font-weight="bold" fill="#1e3a8a">"너 밥 먹었어?"</text>

    <rect x="30" y="110" width="240" height="40" rx="8" fill="#dbeafe" />
    <text x="150" y="130" font-weight="bold" fill="#1e3a8a">"It's raining cats and dogs."</text>

    <text x="150" y="180" class="desc" font-weight="bold">특징: 모호성, 함축성, 비정형성</text>
    <text x="150" y="200" font-size="13" fill="#64748b">문맥에 따라 해석이 무한히 달라질 수 있음</text>
  </g>

  <!-- Artificial Language -->
  <g transform="translate(420, 90)">
    <rect x="0" y="0" width="300" height="230" class="box" fill="#f0fdf4" stroke="#10b981" />
    <rect x="0" y="0" width="300" height="40" fill="#10b981" rx="8" />
    <path d="M 0 30 L 300 30 L 300 40 L 0 40 Z" fill="#10b981" />
    <text x="150" y="20" class="card-title">인공언어 (기계의 언어)</text>

    <!-- Examples -->
    <rect x="30" y="60" width="240" height="40" rx="8" fill="#d1fae5" />
    <text x="150" y="80" font-family="Roboto" font-weight="bold" fill="#064e3b">if (a == b) { return c; }</text>

    <rect x="30" y="110" width="240" height="40" rx="8" fill="#d1fae5" />
    <text x="150" y="130" font-family="Roboto" font-weight="bold" fill="#064e3b">E = mc²</text>

    <text x="150" y="180" class="desc" font-weight="bold">특징: 명확성, 규칙성, 정형성</text>
    <text x="150" y="200" font-size="13" fill="#64748b">어느 상황에서도 단 한 가지의 의미만 가짐</text>
  </g>

</svg>
