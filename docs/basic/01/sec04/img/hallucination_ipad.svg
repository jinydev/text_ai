<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">LLM 확률 편향 치명적 모델 오류: 할루시네이션(Hallucination 환각) 메커니즘</text>

  <!-- Query Box -->
  <rect x="180" y="80" width="440" height="50" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <text x="400" y="110" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">User Query: "조선시대 세종대왕의 맥북 던짐 사건에 대해 알려줘"</text>

  <path d="M 400 130 L 400 160" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="395,155 400,165 405,155" fill="#cbd5e1"/>

  <!-- Model Brain Breakdown -->
  <rect x="50" y="170" width="700" height="150" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="200" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LLM 확률망 내부 프로세스 (팩트 검증 기능 결여)</text>

  <rect x="100" y="220" width="180" height="60" fill="#0f172a" stroke="#64748b" stroke-width="1" rx="4"/>
  <text x="190" y="245" fill="#94a3b8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">키워드 [세종대왕] 확률 보간</text>
  <text x="190" y="265" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">-> 조선왕조실록, 훈민정음 톤 매핑</text>

  <text x="310" y="255" fill="#ef4444" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">+</text>

  <rect x="340" y="220" width="180" height="60" fill="#0f172a" stroke="#64748b" stroke-width="1" rx="4"/>
  <text x="430" y="245" fill="#94a3b8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">키워드 [맥북 던짐] 확률 보간</text>
  <text x="430" y="265" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">-> Apple, 화남, 파손, 박살 톤 매핑</text>

  <text x="550" y="255" fill="#ef4444" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">→</text>

  <rect x="580" y="220" width="140" height="60" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2" rx="4"/>
  <text x="650" y="245" fill="#fecaca" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">팩트 기반 단절 없이</text>
  <text x="650" y="265" fill="#fecaca" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">두 가중치를 매끄럽게 융합</text>


  <path d="M 400 320 L 400 350" stroke="#ef4444" stroke-width="2"/>
  <polygon points="395,345 400,355 405,345" fill="#ef4444"/>

  <!-- Output Error Box -->
  <rect x="100" y="360" width="600" height="50" fill="#450a0a" stroke="#fca5a5" stroke-width="2" rx="4"/>
  <text x="400" y="390" fill="#fca5a5" font-family="serif" font-size="15" font-weight="bold" text-anchor="middle">"네! 조선왕조실록에 따르면, 최만리의 상소에 노하신 세종대왕께서 애플 맥북을 집어던져..."</text>

  <!-- Warning Badge -->
  <circle cx="90" cy="360" r="20" fill="#ef4444"/>
  <text x="90" y="365" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">!</text>

  <text x="400" y="430" fill="#ef4444" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">확률의 파단(Hallucination): 기계 모델은 '진위 여부 판별망(Ground Truth Check)' 기능 없이 단순히 가장 미분값이 부드러운 단어만 이어붙임</text>

</svg>
