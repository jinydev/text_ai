<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">자기 회귀(Autoregressive) 생성 모델의 본질: 다음 토큰 추론 확률망 (Next Token Prediction)</text>

  <!-- Left Input Context -->
  <rect x="50" y="100" width="300" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="200" y="130" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">누적 문맥 텐서 (Context Array)</text>
  <text x="200" y="150" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">Input: P(w_t | w1, w2, ... , w_t-1)</text>

  <!-- Tokens inside context -->
  <rect x="70" y="180" width="60" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="100" y="205" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사과</text>

  <rect x="140" y="180" width="60" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="170" y="205" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">는</text>

  <rect x="210" y="180" width="110" height="40" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="265" y="205" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">맛있는</text>


  <!-- Arrow entering LLM Base -->
  <path d="M 350 200 L 400 200" stroke="#fcd34d" stroke-width="3"/>
  <polygon points="395,195 405,200 395,205" fill="#fcd34d"/>


  <!-- Center LLM Engine -->
  <rect x="420" y="100" width="90" height="200" fill="#451a03" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="465" y="160" fill="#fde68a" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">LLM</text>
  <text x="465" y="185" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">가중치</text>
  <text x="465" y="205" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">미적분</text>
  <text x="465" y="225" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">곱셈</text>


  <!-- Arrow Out LLM -->
  <path d="M 510 200 L 560 200" stroke="#fcd34d" stroke-width="3"/>
  <polygon points="555,195 565,200 555,205" fill="#fcd34d"/>


  <!-- Right Output Softmax Distribution -->
  <rect x="580" y="100" width="170" height="200" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="665" y="130" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Softmax 타겟 분포</text>
  <text x="665" y="150" fill="#64748b" font-family="sans-serif" font-size="11" text-anchor="middle">Next Token 방사 확률</text>

  <rect x="600" y="170" width="130" height="25" fill="#064e3b" rx="2"/>
  <text x="630" y="187" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">과일이다</text>
  <text x="705" y="187" fill="#6ee7b7" font-family="monospace" font-size="12" text-anchor="middle">91.2%</text>

  <rect x="600" y="205" width="40" height="20" fill="#334155" rx="2"/>
  <text x="620" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">동물</text>
  <text x="705" y="220" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">3.4%</text>

  <rect x="600" y="235" width="20" height="20" fill="#334155" rx="2"/>
  <text x="610" y="250" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">차</text>
  <text x="705" y="250" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">1.1%</text>

  <!-- Output loop arrow returning to input -->
  <path d="M 665 300 L 665 330 L 210 330 L 210 300" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" fill="none"/>
  <polygon points="205,310 210,300 215,310" fill="#3b82f6"/>
  <text x="440" y="320" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">출력된 토큰 1개가 다시 과거 문맥 텐서로 즉각 회귀 (Autoregressive Loop)</text>

  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="370" width="700" height="50" fill="#334155" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="400" y="400" fill="#d8b4fe" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">LLM의 본질: 의미론적(Semantic) 지능이 아닌 사전 학습 코퍼스의 통계 밀집도에 비례한 다음 단어(Token) 최우도 추산기</text>

</svg>
