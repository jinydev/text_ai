<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="400" y="50" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">2차원 평면에서의 L2 (Euclidean) 거리 도출</text>

  <!-- Triangle -->
  <path d="M 250 250 L 550 250 L 550 100 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  
  <path d="M 250 250 L 550 250" stroke="#3b82f6" stroke-width="4"/>
  <text x="400" y="275" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">| q1 - p1 | (X축 빈도 차이)</text>

  <path d="M 550 250 L 550 100" stroke="#10b981" stroke-width="4"/>
  <text x="565" y="180" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold">| q2 - p2 |</text>
  <text x="565" y="200" fill="#34d399" font-family="sans-serif" font-size="14">(Y축 차이)</text>

  <!-- Hypotenuse -->
  <path d="M 250 250 L 550 100" stroke="#ef4444" stroke-width="5"/>
  <text x="350" y="150" fill="#f87171" font-family="sans-serif" font-size="18" font-weight="bold" transform="rotate(-26.56, 350, 150)">가장 가까운 직선 경로 (L2 거리)</text>

  <circle cx="250" cy="250" r="8" fill="#cbd5e1" />
  <text x="160" y="260" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold">점 P (문서 1)</text>

  <circle cx="550" cy="100" r="8" fill="#cbd5e1" />
  <text x="560" y="80" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold">점 Q (문서 2)</text>

  <!-- Rect indicator -->
  <rect x="530" y="230" width="20" height="20" fill="none" stroke="#64748b" stroke-width="2"/>

  <text x="400" y="360" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">피타고라스 정리에 의해 밑변과 높이의 제곱합의 제곱근(루트)이 최단 비행 직선거리가 됩니다.</text>
</svg>
