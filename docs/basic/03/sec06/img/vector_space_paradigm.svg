<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <!-- 3D Axes -->
  <g stroke="#475569" stroke-width="2">
    <!-- Y axis (Word A) -->
    <line x1="400" y1="250" x2="400" y2="50" marker-end="url(#arrow)"/>
    <text x="390" y="40" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="end">단어 A (사과 축)</text>
    
    <!-- X axis (Word B) -->
    <line x1="400" y1="250" x2="700" y2="250" marker-end="url(#arrow)"/>
    <text x="710" y="255" fill="#94a3b8" font-family="sans-serif" font-size="14">단어 B (게임 축)</text>
    
    <!-- Z axis (Word C) -->
    <line x1="400" y1="250" x2="200" y2="350" marker-end="url(#arrow)"/>
    <text x="180" y="365" fill="#94a3b8" font-family="sans-serif" font-size="14">단어 C (의학 축)</text>
  </g>

  <!-- Docs mapping -->
  <circle cx="500" cy="150" r="8" fill="#3b82f6" />
  <text x="515" y="155" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="bold">문서 1 (Doc 1)</text>
  <path d="M 400 250 L 500 150" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4"/>

  <circle cx="600" cy="200" r="8" fill="#10b981" />
  <text x="615" y="205" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold">문서 2 (Doc 2)</text>
  <path d="M 400 250 L 600 200" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>

  <text x="400" y="380" fill="#cbd5e1" font-family="sans-serif" font-size="16" text-anchor="middle">모든 텍스트 문서는 수만 차원의 단어 우주(Vector Space) 상의 하나의 별(좌표)로 매핑됩니다.</text>
</svg>
