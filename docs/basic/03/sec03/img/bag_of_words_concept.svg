<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <!-- Original sentence -->
  <rect x="50" y="50" width="250" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="175" y="90" fill="#3b82f6" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">원래 문장</text>
  <text x="175" y="130" fill="#cbd5e1" font-family="sans-serif" font-size="16" text-anchor="middle">"나는 사과가 너무 달아서 싫다"</text>
  <text x="175" y="160" fill="#64748b" font-family="sans-serif" font-size="14" text-anchor="middle">(문법과 맥락 질서가 완벽히 보존됨)</text>

  <!-- Arrow -->
  <path d="M 320 125 L 420 125" stroke="#f59e0b" stroke-width="4" stroke-dasharray="10,5"/>
  <polygon points="410,115 430,125 410,135" fill="#f59e0b"/>
  
  <!-- The Bag -->
  <path d="M 460 50 Q 480 250 560 250 Q 640 250 660 50 Z" fill="#475569" stroke="#94a3b8" stroke-width="4"/>
  <text x="560" y="270" fill="#fbbf24" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">단어 가방 (Bag) 안에서 마구잡이로 섞임</text>

  <!-- Mixed words inside bag -->
  <text x="530" y="120" fill="#ef4444" font-family="sans-serif" font-size="18" font-weight="bold" transform="rotate(-15, 530, 120)">사과(1)</text>
  <text x="610" y="150" fill="#10b981" font-family="sans-serif" font-size="16" font-weight="bold" transform="rotate(25, 610, 150)">달아서(1)</text>
  <text x="550" y="180" fill="#3b82f6" font-family="sans-serif" font-size="14" font-weight="bold" transform="rotate(-40, 550, 180)">나는(1)</text>
  <text x="610" y="210" fill="#f59e0b" font-family="sans-serif" font-size="20" font-weight="bold" transform="rotate(10, 610, 210)">너무(1)</text>
  <text x="500" y="200" fill="#8b5cf6" font-family="sans-serif" font-size="16" font-weight="bold" transform="rotate(-5, 500, 200)">싫다(1)</text>

  <text x="400" y="30" fill="#cbd5e1" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold">문법 붕괴: Bag-of-Words (BoW) 타격 원리</text>
</svg>
