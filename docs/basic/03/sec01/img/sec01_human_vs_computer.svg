<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .subtitle { font-size: 16px; font-weight: bold; fill: #1e3a8a; }
      .text-content { font-size: 14px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">글을 이해하는 방식의 차이: 사람 vs 컴퓨터(통계 기반)</text>

  <!-- Human -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="320" height="220" class="box" fill="#eff6ff" />
    <text x="160" y="30" class="subtitle">👨‍🏫 사람의 방식 (순차적/문맥적)</text>
    <path d="M 20 50 L 300 50" stroke="#bfdbfe" stroke-width="2" />
    
    <text x="160" y="80" class="text-content">앞에서부터 순서대로 단어들을 읽어가며</text>
    <text x="160" y="100" class="text-content">문맥의 흐름과 숨겨진 의미를 파악합니다.</text>
    
    <!-- Visual Representation -->
    <text x="160" y="160" font-family="Roboto" font-weight="bold" fill="#0f172a">"I" → "LOVE" → "YOU"</text>
    <path d="M 100 180 L 220 180" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)" />
    <polygon points="220,175 230,180 220,185" fill="#3b82f6" />
  </g>

  <!-- Computer -->
  <g transform="translate(430, 80)">
    <rect x="0" y="0" width="320" height="220" class="box" fill="#fdf4ff" />
    <text x="160" y="30" class="subtitle" fill="#7e22ce">💻 컴퓨터의 방식 (통계적/벡터 매핑)</text>
    <path d="M 20 50 L 300 50" stroke="#e9d5ff" stroke-width="2" />
    
    <text x="160" y="80" class="text-content">주어진 문서 안에 어떤 단어가</text>
    <text x="160" y="100" class="text-content">몇 번 등장했는지(빈도)를 통계 내어 이해합니다.</text>

    <!-- Visual Representation -->
    <rect x="80" y="130" width="160" height="70" class="box" fill="white" stroke="#d8b4fe" />
    <text x="160" y="150" font-family="Roboto" font-weight="bold" fill="#7e22ce">{'I': 1,</text>
    <text x="160" y="170" font-family="Roboto" font-weight="bold" fill="#7e22ce"> 'LOVE': 1,</text>
    <text x="160" y="190" font-family="Roboto" font-weight="bold" fill="#7e22ce"> 'YOU': 1}</text>
  </g>

</svg>
