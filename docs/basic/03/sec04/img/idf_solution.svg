<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">해결책: 범용 스팸 단어를 모두 발라내는 역문서 빈도 (IDF) 필터링 예고</text>
  
  <rect x="200" y="100" width="400" height="80" fill="#1e293b" stroke="#10b981" stroke-width="3" rx="10"/>
  <text x="400" y="145" fill="#34d399" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">TF-IDF: 세상 모든 책에 개근하는</text>
  <text x="400" y="170" fill="#34d399" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">흔한 단어는 무자비하게 벌점(-)</text>

  <path d="M 400 180 L 400 230" stroke="#ef4444" stroke-width="4"/>
  <circle cx="400" cy="250" r="15" fill="#ef4444"/>
  <text x="460" y="255" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold">The, A, Is (쓰레기통 직행)</text>

</svg>
