<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <!-- Axes -->
  <g stroke="#475569" stroke-width="2">
    <line x1="100" y1="350" x2="750" y2="350" /> <!-- Rank -->
    <line x1="100" y1="350" x2="100" y2="50" />  <!-- Freq -->
  </g>
  <text x="730" y="380" fill="#94a3b8" font-family="sans-serif" font-size="14">단어 빈도 순위 (Rank 하위권으로 갈수록 마이너 단어)</text>
  <text x="80" y="40" fill="#94a3b8" font-family="sans-serif" font-size="14">출현 빈도 (Freq)</text>

  <!-- Curve (y = 1/x style) -->
  <path d="M 100 50 Q 150 330 750 340" stroke="#f43f5e" stroke-width="4" fill="none" />
  
  <rect x="105" y="80" width="30" height="270" fill="#f43f5e" opacity="0.6"/>
  <rect x="140" y="150" width="30" height="200" fill="#fbbf24" opacity="0.6"/>
  <rect x="175" y="280" width="30" height="70" fill="#10b981" opacity="0.6"/>

  <text x="120" y="70" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">the</text>
  <text x="155" y="140" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">of</text>
  <text x="190" y="270" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">a</text>

  <!-- Long Tail arrow -->
  <path d="M 300 310 L 600 330" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="450" y="300" fill="#38bdf8" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">지프의 기나긴 꼬리 (Long Tail)</text>
  <text x="450" y="365" fill="#bae6fd" font-family="sans-serif" font-size="12" text-anchor="middle">진짜 핵심 주제 단어들(레어템)은 이 꼬리 끝자락에 먼지처럼 조용하게 깔려 있습니다.</text>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">지프의 법칙 (Zipf's Law) - 극소수 1%의 단어가 99% 텍스트를 점령한다</text>
</svg>
