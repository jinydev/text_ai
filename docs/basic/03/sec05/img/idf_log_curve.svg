<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="1" stroke-dasharray="4,4">
    <line x1="100" y1="300" x2="700" y2="300" />
    <line x1="100" y1="200" x2="700" y2="200" />
    <line x1="100" y1="100" x2="700" y2="100" />
  </g>

  <!-- Axes -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="100" y1="350" x2="720" y2="350" /> <!-- X-axis -->
    <line x1="100" y1="350" x2="100" y2="50" />  <!-- Y-axis -->
  </g>

  <!-- Labels -->
  <text x="400" y="380" fill="#cbd5e1" font-family="sans-serif" font-size="16" text-anchor="middle">분모 성장의 폭발 (1/df)</text>
  <text x="60" y="200" fill="#cbd5e1" font-family="sans-serif" font-size="16" text-anchor="middle" transform="rotate(-90 60 200)">IDF 가중치 (Score)</text>
  
  <text x="80" y="305" fill="#64748b" font-family="sans-serif" font-size="12">10</text>
  <text x="80" y="205" fill="#64748b" font-family="sans-serif" font-size="12">100</text>
  <text x="80" y="105" fill="#64748b" font-family="sans-serif" font-size="12">1000</text>

  <!-- Linear Line (No Log) -->
  <path d="M 100 350 Q 300 330 650 50" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,5" />
  <circle cx="650" cy="50" r="5" fill="#ef4444" />
  <text x="660" y="60" fill="#ef4444" font-family="sans-serif" font-size="16" font-weight="bold">단순 분수 (로그 미적용)</text>
  <text x="660" y="80" fill="#fca5a5" font-family="sans-serif" font-size="14">값이 수억단위로 폭주함 (에러)</text>

  <!-- Logarithmic Curve -->
  <path d="M 100 350 Q 200 180 700 150" fill="none" stroke="#10b981" stroke-width="4" />
  <circle cx="700" cy="150" r="5" fill="#10b981" />
  <text x="560" y="140" fill="#10b981" font-family="sans-serif" font-size="16" font-weight="bold">Log(로그) 변환 적용</text>
  <text x="560" y="160" fill="#6ee7b7" font-family="sans-serif" font-size="14">곡선이 부드럽게 눕혀짐 (안전)</text>

  <!-- Smoothing highlight -->
  <circle cx="100" cy="350" r="8" fill="#3b82f6" />
  <text x="120" y="345" fill="#3b82f6" font-family="sans-serif" font-size="14" font-weight="bold">+1 스무딩 (Smoothing)</text>
  <text x="120" y="365" fill="#93c5fd" font-family="sans-serif" font-size="12">분모가 0이 되어 통계가 터지는 것을 방어함</text>
  
</svg>
