<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  <!-- Document Shape -->
  <rect x="100" y="80" width="300" height="250" fill="#1e293b" stroke="#3b82f6" stroke-width="3" rx="10"/>
  <text x="250" y="120" fill="#3b82f6" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">특정 문서 (Document)</text>
  
  <text x="130" y="150" fill="#cbd5e1" font-family="sans-serif" font-size="14">... 오늘은 인공지능에 대해...</text>
  <text x="130" y="180" fill="#cbd5e1" font-family="sans-serif" font-size="14">최고의 인공지능 기술은...</text>
  <text x="130" y="210" fill="#cbd5e1" font-family="sans-serif" font-size="14">바로 인공지능입니다...</text>
  <text x="130" y="240" fill="#cbd5e1" font-family="sans-serif" font-size="14">인공지능 발전...</text>
  <text x="130" y="270" fill="#cbd5e1" font-family="sans-serif" font-size="14">인공지능 연구...</text>

  <!-- Bar chart rising from the text -->
  <rect x="500" y="100" width="80" height="200" fill="#fbbf24" rx="5"/>
  <text x="540" y="90" fill="#fbbf24" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">TF = 5</text>
  <text x="540" y="330" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">인공지능</text>

  <rect x="620" y="250" width="80" height="50" fill="#94a3b8" rx="5"/>
  <text x="660" y="240" fill="#94a3b8" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">TF = 1</text>
  <text x="660" y="330" fill="#94a3b8" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">최고의</text>

  <text x="250" y="360" fill="#60a5fa" font-family="sans-serif" font-size="16" text-anchor="middle">빈도수 카운트 스캔</text>
</svg>
