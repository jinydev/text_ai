<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="140" y="50" fill="#fff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">단어 빈도 (TF)</text>
  <!-- TF Matrix -->
  <rect x="40" y="80" width="200" height="150" fill="#1e293b" stroke="#334155" stroke-width="2" rx="5"/>
  <text x="60" y="110" fill="#94a3b8" font-family="sans-serif" font-size="14">Doc 1: 사과(3) 인공지능(0)</text>
  <text x="60" y="140" fill="#ffffff" font-family="sans-serif" font-size="14">Doc 2: 사과(1) 인공지능(5)</text>
  <text x="60" y="170" fill="#94a3b8" font-family="sans-serif" font-size="14">Doc 3: 사과(2) 게임(3)</text>
  
  <text x="270" y="160" fill="#fff" font-family="sans-serif" font-size="30" font-weight="bold">×</text>

  <text x="380" y="50" fill="#fff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">역문서 빈도 (IDF)</text>
  <!-- IDF Vector -->
  <rect x="310" y="80" width="140" height="150" fill="#1e293b" stroke="#F59E0B" stroke-width="2" rx="5"/>
  <text x="330" y="110" fill="#F59E0B" font-family="sans-serif" font-size="14" font-weight="bold">사과: 0.1 (흔함)</text>
  <text x="330" y="140" fill="#10B981" font-family="sans-serif" font-size="14" font-weight="bold">인공지능: 2.1 (레어)</text>
  <text x="330" y="170" fill="#3B82F6" font-family="sans-serif" font-size="14" font-weight="bold">게임: 1.5</text>

  <text x="480" y="160" fill="#fff" font-family="sans-serif" font-size="30" font-weight="bold">=</text>

  <text x="630" y="50" fill="#fff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">TF-IDF 결정 행렬</text>
  <!-- Result Matrix -->
  <rect x="520" y="80" width="240" height="150" fill="url(#grad1)" rx="5"/>
  <text x="540" y="110" fill="#e2e8f0" font-family="sans-serif" font-size="14">Doc 1: 사과(0.3) <tspan fill="#ef4444">▼ (저평가)</tspan></text>
  <text x="540" y="140" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">Doc 2: 인공지능(10.5) <tspan fill="#10b981">▲ (핵심!)</tspan></text>
  <text x="540" y="170" fill="#e2e8f0" font-family="sans-serif" font-size="14">Doc 3: 게임(4.5) <tspan fill="#10b981">▲</tspan></text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle" font-style="italic">흔한 단어는 가중치가 깎이고, 특정 문서에만 등장하는 희귀한 키워드는 강력한 중요도(Score) 보너스를 얻게 됩니다.</text>
</svg>
