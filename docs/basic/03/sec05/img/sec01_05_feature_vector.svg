<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#f8f9fa" rx="10"/>

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#343a40" text-anchor="middle">특성 기하학적 백터 변환 (Feature Vector)</text>

  <!-- Dictionary Box -->
  <g transform="translate(200, 70)" filter="url(#shadow)">
    <rect width="400" height="150" rx="10" fill="#212529" stroke="#343a40" stroke-width="2"/>
    <text x="20" y="30" font-family="'Consolas', monospace" font-size="16" fill="#fcc419">{</text>
    <text x="40" y="60" font-family="'Consolas', monospace" font-size="16" fill="#a5d8ff">'사과': <tspan fill="#ff8787">2</tspan>,</text>
    <text x="40" y="90" font-family="'Consolas', monospace" font-size="16" fill="#a5d8ff">'바나나': <tspan fill="#ff8787">0</tspan>,</text>
    <text x="40" y="120" font-family="'Consolas', monospace" font-size="16" fill="#a5d8ff">'포도': <tspan fill="#ff8787">1</tspan></text>
    <text x="20" y="140" font-family="'Consolas', monospace" font-size="16" fill="#fcc419">}</text>

    <!-- Visual mapping indicator -->
    <path d="M 200 70 L 250 70" stroke="#fcc419" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <text x="320" y="75" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#ffc9c9" text-anchor="middle">v = [2, 0, 1]</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcc419" />
    </marker>
  </defs>
</svg>
