<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">파이썬 단어 사전(Dict)에서 원-핫 벡터 배열(Array) 생성 과정도</text>

  <!-- Python Dictionary Box -->
  <rect x="50" y="80" width="300" height="240" fill="#1e293b" stroke="#475569" stroke-width="2" rx="8"/>
  <text x="80" y="110" fill="#94a3b8" font-family="monospace" font-size="16">vocab_dict = {</text>
  <text x="110" y="140" fill="#cbd5e1" font-family="monospace" font-size="16">'나': <tspan fill="#f59e0b">0</tspan>,</text>
  <text x="110" y="170" fill="#cbd5e1" font-family="monospace" font-size="16">'는': <tspan fill="#f59e0b">1</tspan>,</text>
  <text x="110" y="200" fill="#10b981" font-family="monospace" font-size="18" font-weight="bold">'자연언어': <tspan fill="#f59e0b">2</tspan>,</text>
  <text x="240" y="200" fill="#6ee7b7" font-family="sans-serif" font-size="14">← 타겟(Target)</text>
  <text x="110" y="230" fill="#cbd5e1" font-family="monospace" font-size="16">'처리': <tspan fill="#f59e0b">3</tspan>,</text>
  <text x="110" y="260" fill="#cbd5e1" font-family="monospace" font-size="16">'를': <tspan fill="#f59e0b">4</tspan>,</text>
  <text x="110" y="290" fill="#cbd5e1" font-family="monospace" font-size="16">'배운다': <tspan fill="#f59e0b">5</tspan></text>
  <text x="80" y="310" fill="#94a3b8" font-family="monospace" font-size="16">}</text>

  <!-- Connection Arrows -->
  <path d="M 330 195 L 430 195 L 430 185 C 430 180 500 185 530 185" stroke="#10b981" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  <polygon points="520,180 535,185 520,190" fill="#10b981"/>

  <!-- Target Array Setup -->
  <text x="560" y="110" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">생성된 원-핫 벡터 공간 (길이 6의 빈 배열 준비)</text>
  
  <rect x="380" y="140" width="380" height="80" fill="#0f172a" stroke="#334155" stroke-width="2" rx="5"/>
  
  <text x="410" y="165" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="middle">[0]</text>
  <text x="470" y="165" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="middle">[1]</text>
  <text x="530" y="165" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">[2]</text>
  <text x="590" y="165" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="middle">[3]</text>
  <text x="650" y="165" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="middle">[4]</text>
  <text x="710" y="165" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="middle">[5]</text>

  <!-- Values -->
  <text x="410" y="200" fill="#64748b" font-family="monospace" font-size="24" text-anchor="middle">0</text>
  <text x="470" y="200" fill="#64748b" font-family="monospace" font-size="24" text-anchor="middle">0</text>
  <text x="530" y="200" fill="#10b981" font-family="monospace" font-size="32" font-weight="bold" text-anchor="middle">1</text>
  <text x="590" y="200" fill="#64748b" font-family="monospace" font-size="24" text-anchor="middle">0</text>
  <text x="650" y="200" fill="#64748b" font-family="monospace" font-size="24" text-anchor="middle">0</text>
  <text x="710" y="200" fill="#64748b" font-family="monospace" font-size="24" text-anchor="middle">0</text>

  <rect x="500" y="145" width="60" height="70" fill="none" stroke="#10b981" stroke-width="4" rx="5"/>

  <!-- Info text -->
  <text x="575" y="260" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">1. 전체 단어 종류의 개수(6)만큼 메모리 길이 할당</text>
  <text x="575" y="285" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">2. 오직 자신과 넘버가 매칭되는 인덱스의 값만 1로 ON</text>
</svg>
