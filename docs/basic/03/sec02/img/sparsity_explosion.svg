  <text x="700" y="170" fill="#475569" font-family="monospace" font-size="24" font-weight="bold">0</text>

  <rect x="360" y="70" width="360" height="40" fill="#ef4444" rx="5"/>
  <text x="540" y="95" fill="#fee2e2" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">사용 안함 (999,999칸의 잉여 RAM 메모리 낭비)</text>

