<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@1,400;1,700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .bg { fill: #f8fafc; }
      .box { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 4,4; }
      .node { fill: white; stroke: #334155; stroke-width: 2; }
      .node-observed { fill: #cbd5e1; stroke: #334155; stroke-width: 2; }
      .label { fill: #64748b; font-size: 14px; font-weight: bold; }
      .kor-label { fill: #334155; font-size: 12px; }
      .kor-desc { fill: #1e293b; font-size: 12px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <!-- D Plate (Documents) -->
  <rect class="box" x="150" y="50" width="350" height="260" rx="8" />
  <text x="475" y="295" class="math label" font-size="20">D</text>

  <!-- N Plate (Words) -->
  <rect class="box" x="280" y="80" width="180" height="200" rx="8" />
  <text x="440" y="265" class="math label" font-size="20">N</text>

  <!-- K Plate (Topics) -->
  <rect class="box" x="520" y="130" width="180" height="150" rx="8" />
  <text x="680" y="265" class="math label" font-size="20">K</text>

  <!-- Nodes -->
  
  <!-- Alpha -->
  <circle cx="80" cy="180" r="25" class="node" />
  <text x="80" y="185" class="math" font-weight="bold" font-size="20" text-anchor="middle">α</text>
  <text x="80" y="225" class="kor-label" text-anchor="middle">디리클레</text>
  <text x="80" y="240" class="kor-label" text-anchor="middle">분포 파라미터</text>

  <!-- Theta_d -->
  <circle cx="210" cy="180" r="25" class="node" />
  <text x="210" y="185" class="math" font-weight="bold" font-size="20" text-anchor="middle">θ<tspan font-size="14" dy="5">d</tspan></text>
  <text x="210" y="225" class="kor-label" text-anchor="middle">문서별</text>
  <text x="210" y="240" class="kor-label" text-anchor="middle">토픽 분포</text>

  <!-- Z_d,n -->
  <circle cx="330" cy="180" r="25" class="node" />
  <text x="330" y="185" class="math" font-weight="bold" font-size="20" text-anchor="middle">z<tspan font-size="14" dy="5">d,n</tspan></text>
  <text x="330" y="135" class="kor-label" text-anchor="middle">단어에</text>
  <text x="330" y="150" class="kor-label" text-anchor="middle">토픽 할당</text>

  <!-- W_d,n (Observed) -->
  <circle cx="410" cy="180" r="25" class="node-observed" />
  <text x="410" y="185" class="math" font-weight="bold" font-size="20" text-anchor="middle">w<tspan font-size="14" dy="5">d,n</tspan></text>
  <text x="410" y="225" class="kor-label" text-anchor="middle">단어 위치에</text>
  <text x="410" y="240" class="kor-label" text-anchor="middle">특정 단어 할당</text>

  <!-- Phi_k -->
  <circle cx="580" cy="180" r="25" class="node" />
  <text x="580" y="185" class="math" font-weight="bold" font-size="20" text-anchor="middle">φ<tspan font-size="14" dy="5">k</tspan></text>
  <text x="580" y="225" class="kor-label" text-anchor="middle">토픽별</text>
  <text x="580" y="240" class="kor-label" text-anchor="middle">단어 분포</text>

  <!-- Beta -->
  <circle cx="750" cy="180" r="25" class="node" />
  <text x="750" y="185" class="math" font-weight="bold" font-size="20" text-anchor="middle">β</text>
  <text x="750" y="225" class="kor-label" text-anchor="middle">디리클레</text>
  <text x="750" y="240" class="kor-label" text-anchor="middle">분포 파라미터</text>

  <!-- Edges -->
  <line x1="105" y1="180" x2="175" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="235" y1="180" x2="295" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="355" y1="180" x2="375" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="555" y1="180" x2="445" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="725" y1="180" x2="615" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <text x="400" y="30" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">LDA의 확률 모형 (그래프 모델)</text>
</svg>
