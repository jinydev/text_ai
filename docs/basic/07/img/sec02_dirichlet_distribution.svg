<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .math { font-family: 'Roboto', sans-serif; }
      .bg { fill: #f8fafc; }
      .triangle { fill: white; stroke: #1e293b; stroke-width: 3; }
      .label { fill: #10b981; font-size: 14px; font-weight: bold; }
      .label-top { fill: #c026d3; font-size: 14px; font-weight: bold; }
      .label-left { fill: #0ea5e9; font-size: 14px; font-weight: bold; }
      .dot { fill: #facc15; stroke: #eab308; stroke-width: 1; }
      .title { font-size: 18px; font-weight: bold; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">디리클레 분포 (Dirichlet Distribution)</text>
  <text x="400" y="65" font-size="14" fill="#64748b" text-anchor="middle">하이퍼파라미터 α에 따른 토픽 분포의 밀도 변화</text>

  <!-- Left Triangle (alpha = 1) -->
  <g transform="translate(150, 120)">
    <polygon points="120,0 0,200 240,200" class="triangle" />
    <text x="120" y="-10" class="label-top" text-anchor="middle">Physics</text>
    <text x="-10" y="215" class="label-left" text-anchor="middle">Computer science</text>
    <text x="250" y="215" class="label" text-anchor="middle">Biology</text>
    
    <!-- Dots for alpha = 1 (Spread evenly centered) -->
    <circle cx="120" cy="80" r="8" class="dot"/>
    <circle cx="90" cy="120" r="8" class="dot"/>
    <circle cx="150" cy="110" r="8" class="dot"/>
    <circle cx="60" cy="160" r="8" class="dot"/>
    <circle cx="110" cy="170" r="8" class="dot"/>
    <circle cx="190" cy="150" r="8" class="dot"/>
    
    <text x="120" y="250" class="math title" text-anchor="middle">α = 1</text>
    <text x="120" y="275" font-size="13" fill="#475569" text-anchor="middle">골고루 섞인 다양한 주제를 포함</text>
  </g>

  <!-- Right Triangle (alpha < 1) -->
  <g transform="translate(450, 120)">
    <polygon points="120,0 0,200 240,200" class="triangle" />
    <text x="120" y="-10" class="label-top" text-anchor="middle">Physics</text>
    <text x="-10" y="215" class="label-left" text-anchor="middle">Computer science</text>
    <text x="250" y="215" class="label" text-anchor="middle">Biology</text>
    
    <!-- Dots for alpha < 1 (Concentrated at corners) -->
    <circle cx="120" cy="150" r="8" class="dot"/>
    <circle cx="135" cy="145" r="8" class="dot"/>
    <circle cx="105" cy="160" r="8" class="dot"/>
    <circle cx="150" cy="155" r="8" class="dot"/>
    <circle cx="115" cy="135" r="8" class="dot"/>
    <circle cx="140" cy="130" r="8" class="dot"/>
    <circle cx="90" cy="150" r="8" class="dot"/>
    
    <text x="120" y="250" class="math title" text-anchor="middle">α &lt; 1</text>
    <text x="120" y="275" font-size="13" fill="#475569" text-anchor="middle">소수의 특정 주제에 극단적으로 집중</text>
  </g>

</svg>
