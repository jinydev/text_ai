<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Week 07 지식 아키텍처: 비지도 학습 토픽 모델링 패러다임의 양대 산맥 (LSA vs LDA)</text>

  <!-- Left Side: LSA (Linear Algebra) -->
  <rect x="50" y="80" width="330" height="260" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="215" y="115" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LSA (잠재 의미 분석)</text>
  <text x="215" y="135" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">유클리드 선형 대수학 (Linear Algebra) 패러다임</text>

  <rect x="165" y="150" width="100" height="100" fill="#0f172a" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <text x="215" y="180" fill="#bfdbfe" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">DTM</text>
  <text x="215" y="210" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">초거대 희소 행렬</text>
  <text x="215" y="235" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">A = U Σ V_T</text>
  
  <path d="M 215 260 L 215 310" stroke="#fcd34d" stroke-width="4"/>
  <polygon points="205,300 215,315 225,300" fill="#fcd34d"/>
  
  <text x="130" y="290" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Truncated</text>
  <text x="130" y="305" fill="#fde68a" font-family="sans-serif" font-size="12" text-anchor="middle">차원 대절단</text>

  <!-- Right Side: LDA (Bayesian Statistics) -->
  <rect x="420" y="80" width="330" height="260" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="585" y="115" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LDA (잠재 디리클레 할당)</text>
  <text x="585" y="135" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">생성 확률론 / 베이즈 통계 (Bayesian Probabilistic) 패러다임</text>

  <rect x="520" y="150" width="130" height="100" fill="#0f172a" stroke="#34d399" stroke-width="2" rx="4" stroke-dasharray="4,2"/>
  <text x="585" y="180" fill="#d1fae5" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">Dir(α) → Θ</text>
  <text x="585" y="210" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">보이지 않는 기저 확률망 조작</text>
  <text x="585" y="235" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">P(W, Z, Θ, Φ | α, β)</text>

  <path d="M 585 310 L 585 260" stroke="#fca5a5" stroke-width="4" stroke-dasharray="6,4"/>
  <polygon points="575,270 585,255 595,270" fill="#fca5a5"/>
  
  <text x="690" y="290" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Gibbs Sampling</text>
  <text x="690" y="305" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">관측 변수를 통한 역추론</text>


  <!-- Bottom Explanation Banner -->
  <rect x="50" y="360" width="700" height="70" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="385" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">비지도 학습 관점의 혁명적 진화 도표</text>
  <text x="400" y="410" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">수치적 강제 행렬 압축(SVD)에만 의존하던 고전적 공간 단절 LSA 텍스트 마이닝 체계에서,</text>
  <text x="400" y="430" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">실시간 확률 모델 업데이트가 가능한 유연한 베이즈 스무딩 기반 생성 모델(LDA) 추론 철학망으로의 전면 맵핑 전환 달성!</text>

</svg>
