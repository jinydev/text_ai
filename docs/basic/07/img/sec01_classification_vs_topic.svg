<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #f8fafc; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />
  
  <!-- Left Panel: Text Classification -->
  <g transform="translate(0, 0)">
    <text x="200" y="40" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">텍스트 분류 (Text Classification)</text>
    <text x="200" y="65" font-size="14" fill="#64748b" text-anchor="middle">정답(Label)이 주어진 상태</text>
    
    <g transform="translate(50, 150)">
      <rect x="0" y="0" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
      <rect x="15" y="-30" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
      <rect x="30" y="20" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
      <rect x="45" y="-10" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    </g>
    
    <path d="M 160 160 L 220 160" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <g transform="translate(250, 100)">
      <g>
        <rect x="0" y="0" width="80" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
        <text x="40" y="25" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle">스포츠</text>
      </g>
      <rect x="20" y="50" width="30" height="40" rx="4" fill="#bfdbfe" />
      <rect x="30" y="55" width="30" height="40" rx="4" fill="#bfdbfe" />
      
      <g transform="translate(0, 100)">
        <rect x="0" y="0" width="80" height="40" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
        <text x="40" y="25" font-size="14" font-weight="bold" fill="#be185d" text-anchor="middle">스팸</text>
      </g>
      <rect x="20" y="150" width="30" height="40" rx="4" fill="#fbcfe8" />
      <rect x="30" y="155" width="30" height="40" rx="4" fill="#fbcfe8" />
    </g>
  </g>

  <line x1="400" y1="20" x2="400" y2="380" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Right Panel: Topic Analysis -->
  <g transform="translate(400, 0)">
    <text x="200" y="40" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">텍스트 주제 분석 (Topic Analysis)</text>
    <text x="200" y="65" font-size="14" fill="#64748b" text-anchor="middle">정답(Label) 없이 내부 구조 이해</text>
    
    <g transform="translate(50, 150)">
      <rect x="0" y="0" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
      <rect x="15" y="-30" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
      <rect x="30" y="20" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
      <rect x="45" y="-10" width="40" height="50" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
    </g>
    
    <path d="M 160 160 L 220 160" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <g transform="translate(250, 90)">
      <circle cx="60" cy="50" r="50" fill="#dcfce7" fill-opacity="0.5" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4"/>
      <text x="60" y="20" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">주제 A (예: 정치)</text>
      <rect x="30" y="30" width="30" height="40" rx="4" fill="#bbf7d0" />
      <rect x="60" y="40" width="30" height="40" rx="4" fill="#bbf7d0" />
      
      <circle cx="60" cy="170" r="50" fill="#fef08a" fill-opacity="0.5" stroke="#eab308" stroke-width="2" stroke-dasharray="4,4"/>
      <text x="60" y="140" font-size="12" font-weight="bold" fill="#854d0e" text-anchor="middle">주제 B (예: 경제)</text>
      <rect x="30" y="150" width="30" height="40" rx="4" fill="#fde047" />
      <rect x="60" y="160" width="30" height="40" rx="4" fill="#fde047" />
    </g>
  </g>
</svg>
