<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #ffffff; }
      .cell { fill: #ffffff; stroke: #1e293b; stroke-width: 1; }
      .header { fill: #bfdbfe; font-weight: bold; }
      .highlight { fill: #fce7f3; stroke: #be185d; stroke-width: 3; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .text-center { text-anchor: middle; dominant-baseline: middle; font-size: 15px; }
      .text-bold { font-weight: bold; }
      .arrow { stroke: #e11d48; stroke-width: 3; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">토픽별 단어 확률 분포 행렬 (<tspan class="math">φ</tspan>)</text>
  <text x="400" y="65" font-size="14" fill="#64748b" text-anchor="middle">각 열(Topic)의 확률 합은 1.0이 됨</text>

  <g transform="translate(150, 100)">
    <!-- Headers -->
    <rect x="0" y="0" width="120" height="35" class="cell header" />
    <rect x="120" y="0" width="120" height="35" class="cell header" />
    <rect x="240" y="0" width="120" height="35" class="cell header" />
    <rect x="360" y="0" width="120" height="35" class="cell header" />
    
    <text x="60" y="17" class="text-center text-bold">Terms</text>
    <text x="180" y="17" class="text-center text-bold">Topic 1</text>
    <text x="300" y="17" class="text-center text-bold">Topic 2</text>
    <text x="420" y="17" class="text-center text-bold">Topic 3</text>

    <!-- Highlighted Column -->
    <rect x="240" y="35" width="120" height="240" class="highlight" />

    <!-- Rows Data -->
    <g transform="translate(0, 35)">
      <rect x="0" y="0" width="120" height="30" class="cell" />
      <rect x="120" y="0" width="120" height="30" class="cell" />
      <rect x="360" y="0" width="120" height="30" class="cell" />
      <text x="60" y="15" class="text-center">Baseball</text>
      <text x="180" y="15" class="text-center">0.000</text>
      <text x="300" y="15" class="text-center text-bold">0.000</text>
      <text x="420" y="15" class="text-center">0.200</text>
    </g>

    <g transform="translate(0, 65)">
      <rect x="0" y="0" width="120" height="30" class="cell" />
      <rect x="120" y="0" width="120" height="30" class="cell" />
      <rect x="360" y="0" width="120" height="30" class="cell" />
      <text x="60" y="15" class="text-center">Basketball</text>
      <text x="180" y="15" class="text-center">0.000</text>
      <text x="300" y="15" class="text-center text-bold">0.000</text>
      <text x="420" y="15" class="text-center">0.267</text>
    </g>

    <g transform="translate(0, 95)">
      <rect x="0" y="0" width="120" height="30" class="cell" />
      <rect x="120" y="0" width="120" height="30" class="cell" />
      <rect x="360" y="0" width="120" height="30" class="cell" />
      <text x="60" y="15" class="text-center">Boxing</text>
      <text x="180" y="15" class="text-center">0.000</text>
      <text x="300" y="15" class="text-center text-bold">0.000</text>
      <text x="420" y="15" class="text-center">0.133</text>
    </g>

    <g transform="translate(0, 125)">
      <rect x="0" y="0" width="120" height="30" class="cell" />
      <rect x="120" y="0" width="120" height="30" class="cell" />
      <rect x="360" y="0" width="120" height="30" class="cell" />
      <text x="60" y="15" class="text-center">Money</text>
      <text x="180" y="15" class="text-center">0.231</text>
      <text x="300" y="15" class="text-center text-bold">0.313</text>
      <text x="420" y="15" class="text-center">0.400</text>
    </g>

    <g transform="translate(0, 155)">
      <rect x="0" y="0" width="120" height="30" class="cell" />
      <rect x="120" y="0" width="120" height="30" class="cell" />
      <rect x="360" y="0" width="120" height="30" class="cell" />
      <text x="60" y="15" class="text-center">Interest</text>
      <text x="180" y="15" class="text-center">0.000</text>
      <text x="300" y="15" class="text-center text-bold">0.312</text>
      <text x="420" y="15" class="text-center">0.000</text>
    </g>

    <!-- Ellipsis for the rest of rows -->
    <g transform="translate(0, 185)">
      <rect x="0" y="0" width="120" height="30" class="cell" />
      <rect x="120" y="0" width="120" height="30" class="cell" />
      <rect x="360" y="0" width="120" height="30" class="cell" />
      <text x="60" y="15" class="text-center">Rate</text>
      <text x="180" y="15" class="text-center">0.000</text>
      <text x="300" y="15" class="text-center text-bold">0.312</text>
      <text x="420" y="15" class="text-center">0.000</text>
    </g>
    
    <g transform="translate(0, 215)">
      <rect x="0" y="0" width="480" height="30" class="cell" fill="#f8fafc" />
      <text x="240" y="15" class="text-center">...</text>
    </g>

    <!-- Arrow and Label -->
    <text x="300" y="-15" font-size="20" font-weight="bold" fill="#be185d" class="math">합: 1.0</text>
    <line x1="300" y1="-5" x2="300" y2="30" class="arrow" marker-end="url(#arrowhead)"/>
  </g>
</svg>
