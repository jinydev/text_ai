<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@1,400;1,700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .bg { fill: #f8fafc; }
      .card { fill: white; stroke: #cbd5e1; stroke-width: 2; }
      .kor-title { font-size: 16px; font-weight: bold; fill: #1e293b; }
      .kor-desc { font-size: 14px; fill: #475569; }
      .highlight { fill: #e11d48; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">LDA의 토픽 갱신: Gibbs Sampling 직관</text>
  
  <text x="400" y="70" class="kor-desc" text-anchor="middle">각 단어 w에 대해 현재 할당된 토픽을 백지화하고 2가지 기준에 따라 새로운 토픽을 확률적으로 재할당합니다.</text>

  <!-- Left Card: p(t|d) -->
  <g transform="translate(60, 110)">
    <rect class="card" x="0" y="0" width="300" height="200" rx="8" />
    <circle cx="150" cy="50" r="30" fill="#e0e7ff" />
    <text x="150" y="55" class="math" font-size="20" font-weight="bold" fill="#3730a3" text-anchor="middle">p(t|d)</text>
    
    <text x="150" y="105" class="kor-title" text-anchor="middle">문서 내 토픽 비율</text>
    <text x="150" y="130" class="kor-desc" text-anchor="middle">"이 문서(Doc)는</text>
    <text x="150" y="150" class="kor-desc" text-anchor="middle">어떤 토픽(t)을 주로 다루는가?"</text>

    <!-- Visual cue -->
    <path d="M 120 170 L 180 170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <path d="M 120 170 L 150 170" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="400" y="180" font-size="40" font-weight="bold" fill="#94a3b8" text-anchor="middle">×</text>

  <!-- Right Card: p(w|t) -->
  <g transform="translate(440, 110)">
    <rect class="card" x="0" y="0" width="300" height="200" rx="8" />
    <circle cx="150" cy="50" r="30" fill="#fce7f3" />
    <text x="150" y="55" class="math" font-size="20" font-weight="bold" fill="#be185d" text-anchor="middle">p(w|t)</text>
    
    <text x="150" y="105" class="kor-title" text-anchor="middle">토픽 내 단어 확률</text>
    <text x="150" y="130" class="kor-desc" text-anchor="middle">"이 토픽(t)에서 이 단어(w)가</text>
    <text x="150" y="150" class="kor-desc" text-anchor="middle">얼마나 자주 등장하는가?"</text>

    <!-- Visual cue -->
    <rect x="110" y="165" width="20" height="15" fill="#f472b6" />
    <rect x="140" y="160" width="20" height="20" fill="#ec4899" />
    <rect x="170" y="170" width="20" height="10" fill="#fbcfe8" />
  </g>
</svg>
