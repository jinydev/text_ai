<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">물리적 군집화 K-means의 절망적 한계점</text>

  <!-- Left: The Plane -->
  <rect x="50" y="80" width="400" height="200" fill="#1e293b" stroke="#475569" stroke-width="2" rx="5"/>
  <text x="250" y="110" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2차원 벡터 공간의 냉혹한 올가미 (독점의 저주)</text>

  <!-- Cluster 1 (Politics) -->
  <circle cx="150" cy="180" r="60" fill="#7f1d1d" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <text x="150" y="150" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">정치 방</text>
  <circle cx="130" cy="180" r="5" fill="#fca5a5"/>
  <circle cx="160" cy="190" r="5" fill="#fca5a5"/>
  <circle cx="140" cy="210" r="5" fill="#fca5a5"/>

  <!-- Cluster 2 (Economics) -->
  <circle cx="350" cy="180" r="60" fill="#064e3b" opacity="0.3" stroke="#10b981" stroke-width="2"/>
  <text x="350" y="150" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">경제 방</text>
  <circle cx="340" cy="180" r="5" fill="#6ee7b7"/>
  <circle cx="370" cy="190" r="5" fill="#6ee7b7"/>
  <circle cx="350" cy="210" r="5" fill="#6ee7b7"/>

  <!-- Dilemma Point: The Hybrid Document -->
  <circle cx="250" cy="180" r="8" fill="#fcd34d" stroke="#f59e0b" stroke-width="3"/>
  <path d="M 250 170 L 250 140" stroke="#fcd34d" stroke-width="2" stroke-dasharray="2,2" fill="none"/>
  <path d="M 250 190 L 250 240" stroke="#fcd34d" stroke-width="2" stroke-dasharray="2,2" fill="none"/>
  
  <text x="250" y="130" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">"안녕? 난 '국회 예산 기금' 뉴스야!"</text>
  <text x="250" y="255" fill="#fbbf24" font-family="sans-serif" font-size="12" text-anchor="middle">(정치 50% + 경제 50%)</text>


  <!-- The Conflict Arrow -->
  <path d="M 460 180 L 520 180" stroke="#ef4444" stroke-width="4" fill="none" marker-end="url(#arrow)"/>


  <!-- Explanation Box -->
  <rect x="540" y="100" width="230" height="140" fill="#450a0a" stroke="#f87171" stroke-width="2" rx="5"/>
  <text x="655" y="135" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">K-means 의 멍청한 판단</text>
  
  <rect x="550" y="150" width="210" height="80" fill="#7f1d1d" rx="3"/>
  <text x="655" y="175" fill="#fef2f2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">"반반 치킨 교집합은 허용 안해!</text>
  <text x="655" y="195" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">거리 자로 재보니까 왼쪽이 1mm 가깝네!</text>
  <text x="655" y="215" fill="#f87171" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">넌 그냥 100% 왼쪽(정치)이야 억까!"</text>

  <text x="655" y="260" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">물리적 군집은 비율 다중성을 인정하지 못합니다.</text>

</svg>
