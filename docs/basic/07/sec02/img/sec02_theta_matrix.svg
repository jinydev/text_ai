<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #ffffff; }
      .cell { fill: #ffffff; stroke: #1e293b; stroke-width: 1; }
      .header { fill: #bfdbfe; font-weight: bold; }
      .highlight { fill: #fce7f3; stroke: #be185d; stroke-width: 3; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
      .text-center { text-anchor: middle; dominant-baseline: middle; font-size: 16px; }
      .text-bold { font-weight: bold; }
      .arrow { stroke: #e11d48; stroke-width: 3; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">문서별 토픽 확률 분포 행렬 (<tspan class="math">θ</tspan>)</text>
  <text x="400" y="65" font-size="14" fill="#64748b" text-anchor="middle">각 행(Document)의 확률 합은 1.0이 됨</text>

  <g transform="translate(150, 100)">
    <!-- Headers -->
    <rect x="0" y="0" width="120" height="40" class="cell header" />
    <rect x="120" y="0" width="120" height="40" class="cell header" />
    <rect x="240" y="0" width="120" height="40" class="cell header" />
    <rect x="360" y="0" width="120" height="40" class="cell header" />
    
    <text x="60" y="20" class="text-center text-bold">Docs</text>
    <text x="180" y="20" class="text-center text-bold">Topic 1</text>
    <text x="300" y="20" class="text-center text-bold">Topic 2</text>
    <text x="420" y="20" class="text-center text-bold">Topic 3</text>

    <!-- Row 1 -->
    <rect x="0" y="40" width="120" height="35" class="cell" />
    <rect x="120" y="40" width="120" height="35" class="cell" />
    <rect x="240" y="40" width="120" height="35" class="cell" />
    <rect x="360" y="40" width="120" height="35" class="cell" />
    <text x="60" y="57" class="text-center">Doc 1</text>
    <text x="180" y="57" class="text-center">0.400</text>
    <text x="300" y="57" class="text-center">0.000</text>
    <text x="420" y="57" class="text-center">0.600</text>

    <!-- Row 2 (Highlighted) -->
    <rect x="0" y="75" width="480" height="35" class="highlight" />
    <text x="60" y="92" class="text-center text-bold">Doc 2</text>
    <text x="180" y="92" class="text-center text-bold">0.000</text>
    <text x="300" y="92" class="text-center text-bold">0.600</text>
    <text x="420" y="92" class="text-center text-bold">0.400</text>

    <!-- Row 3 -->
    <rect x="0" y="110" width="120" height="35" class="cell" />
    <rect x="120" y="110" width="120" height="35" class="cell" />
    <rect x="240" y="110" width="120" height="35" class="cell" />
    <rect x="360" y="110" width="120" height="35" class="cell" />
    <text x="60" y="127" class="text-center">Doc 3</text>
    <text x="180" y="127" class="text-center">0.375</text>
    <text x="300" y="127" class="text-center">0.625</text>
    <text x="420" y="127" class="text-center">0.000</text>

    <!-- Row 4 -->
    <rect x="0" y="145" width="120" height="35" class="cell" />
    <rect x="120" y="145" width="120" height="35" class="cell" />
    <rect x="240" y="145" width="120" height="35" class="cell" />
    <rect x="360" y="145" width="120" height="35" class="cell" />
    <text x="60" y="162" class="text-center">Doc 4</text>
    <text x="180" y="162" class="text-center">0.000</text>
    <text x="300" y="162" class="text-center">0.375</text>
    <text x="420" y="162" class="text-center">0.625</text>

    <!-- Arrow and Label -->
    <text x="550" y="92" font-size="20" font-weight="bold" fill="#be185d" class="math">합: 1.0</text>
    <line x1="490" y1="92" x2="520" y2="92" class="arrow" marker-end="url(#arrowhead)"/>
  </g>
</svg>
