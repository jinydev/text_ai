<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">초거대 특이값 분해 LSA 아키텍처망의 정적 런타임 업데이트 불가 모순 한계 결함</text>

  <!-- Left: The Existing Completed SVD -->
  <rect x="40" y="80" width="300" height="160" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="190" y="110" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">기존 1,000만 건 DTM 학습 완료망</text>

  <rect x="70" y="130" width="80" height="80" fill="#1e3a8a" rx="2"/>
  <text x="110" y="175" fill="#bfdbfe" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">A</text>

  <text x="170" y="175" fill="#f8fafc" font-family="sans-serif" font-size="20" text-anchor="middle">=</text>

  <rect x="190" y="130" width="120" height="80" fill="#064e3b" rx="2"/>
  <text x="250" y="175" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">U × Σ × V^T</text>
  <text x="250" y="195" fill="#6ee7b7" font-family="sans-serif" font-size="10" text-anchor="middle">분해 압축 인덱스 완료</text>

  <!-- Middle: Single New Input Crash -->
  <rect x="360" y="80" width="80" height="160" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="4" stroke-dasharray="4,2"/>
  <text x="400" y="110" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">신규 유입</text>
  <rect x="375" y="140" width="50" height="30" fill="#b45309" rx="2"/>
  <text x="400" y="160" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">+1 통</text>
  <path d="M 345 155 L 370 155" stroke="#ef4444" stroke-width="3" stroke-dasharray="2,2"/>
  <polygon points="365,150 375,155 365,160" fill="#ef4444"/>


  <!-- Right: Total Re-computation -->
  <rect x="460" y="80" width="300" height="160" fill="#3f3f46" stroke="#fcd34d" stroke-width="2" rx="4"/>
  <text x="610" y="110" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">기존 텐서 파이프라인 치명적 연쇄 파단 폭발</text>
  
  <rect x="490" y="130" width="80" height="90" fill="#52525b" stroke="#ef4444" stroke-width="2" rx="2" stroke-dasharray="2,2"/>
  <text x="530" y="170" fill="#fca5a5" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">A_new</text>
  <text x="530" y="190" fill="#fef2f2" font-family="monospace" font-size="10" text-anchor="middle">1000만 + 1</text>
  
  
  <text x="590" y="175" fill="#f8fafc" font-family="sans-serif" font-size="20" text-anchor="middle">=</text>

  <rect x="610" y="130" width="120" height="90" fill="#18181b" stroke="#ef4f4f" stroke-width="2" rx="2"/>
  <line x1="610" y1="130" x2="730" y2="220" stroke="#ef4444" stroke-width="4"/>
  <line x1="610" y1="220" x2="730" y2="130" stroke="#ef4444" stroke-width="4"/>
  <text x="670" y="175" fill="#71717a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">전면 무산 휴지조각</text>

  <!-- Big Red Arrow downwards -->
  <path d="M 610 245 L 610 275" stroke="#ef4444" stroke-width="4"/>
  <polygon points="600,270 610,285 620,270" fill="#ef4444"/>

  <!-- Failure explanation block -->
  <rect x="50" y="300" width="700" height="110" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="330" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">대수 분해 아키텍처의 비가역적 재전개 모델 폭파 한계 (Re-computation Curse)</text>
  <text x="400" y="360" fill="#fecaca" font-family="sans-serif" font-size="13" text-anchor="middle">특이값 SVD 분할 공식 성질상 하위 행렬 매트릭스 전체 차원은 단 한 개의 신규 문서 코퍼스 배열망만</text>
  <text x="400" y="380" fill="#fecaca" font-family="sans-serif" font-size="13" text-anchor="middle">들어와 덧붙여져 추가 오버랩되어 교집합 매핑 배열이 틀어지면, 이전의 $U, \Sigma, V^T$ 값 전체 파라미터가 성립이</text>
  <text x="400" y="400" fill="#ef4444" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">일괄 모순 폐기되어 완전히 시스템을 불태우고 O(N^3) 연산 분할 파이프라인부터 재부팅 초기화되어야 하는 재앙 발동!</text>

</svg>
