<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Truncated SVD (절단된 특이값 분해) : 차원 축소에 의한 잠재 의미(Latent Topic) 근사 복원</text>

  <!-- Original Matrix A -->
  <rect x="50" y="100" width="120" height="180" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="110" y="195" fill="#93c5fd" font-family="serif" font-size="32" font-weight="bold" text-anchor="middle">A</text>
  <text x="110" y="240" fill="#cbd5e1" font-family="monospace" font-size="12" text-anchor="middle">문서(M) × 단어(N)</text>
  <text x="110" y="260" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">거대 희소 원본 행렬</text>

  <text x="210" y="195" fill="#f8fafc" font-family="serif" font-size="30" font-weight="bold" text-anchor="middle">≈</text>

  <!-- Truncated U -->
  <rect x="260" y="100" width="60" height="180" fill="#1e3a8a" stroke="#818cf8" stroke-width="2" rx="2" stroke-dasharray="4,2"/>
  <text x="290" y="190" fill="#a5b4fc" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">Uk</text>
  <text x="290" y="240" fill="#e0e7ff" font-family="monospace" font-size="11" text-anchor="middle">M × k</text>
  <text x="290" y="260" fill="#a5b4fc" font-family="monospace" font-size="10" text-anchor="middle">문서-토픽 축</text>

  <text x="350" y="195" fill="#f8fafc" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">×</text>

  <!-- Truncated Sigma -->
  <rect x="380" y="140" width="60" height="60" fill="#064e3b" stroke="#34d399" stroke-width="2" rx="2"/>
  <line x1="380" y1="140" x2="440" y2="200" stroke="#a7f3d0" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="410" y="175" fill="#6ee7b7" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">Σk</text>
  <text x="410" y="240" fill="#d1fae5" font-family="monospace" font-size="11" text-anchor="middle">k × k</text>
  <text x="410" y="260" fill="#6ee7b7" font-family="monospace" font-size="10" text-anchor="middle">토픽 가중치력</text>
  <!-- Cut indication -->
  <path d="M 430 200 L 440 220" stroke="#ef4444" stroke-width="2"/>
  <path d="M 440 180 L 450 200" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="215" fill="#fca5a5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="start">하위 (N-k)차원 삭제/절단</text>

  <text x="500" y="195" fill="#f8fafc" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">×</text>

  <!-- Truncated V^T -->
  <rect x="530" y="160" width="120" height="40" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2" rx="2" stroke-dasharray="4,2"/>
  <text x="590" y="185" fill="#fecaca" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">Vk^T</text>
  <text x="590" y="240" fill="#fee2e2" font-family="monospace" font-size="11" text-anchor="middle">k × N</text>
  <text x="590" y="260" fill="#fca5a5" font-family="monospace" font-size="10" text-anchor="middle">토픽-어휘 축</text>


  <!-- Bottom Explanation Box -->
  <rect x="50" y="320" width="700" height="90" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="345" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">차원 K 압축(Truncation)의 LSA 데이터 공학적 의의</text>
  <text x="400" y="365" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">정보 기여도(Sigma Value)가 거대한 최상위 K개의 대각 성분 특이값만 남기고 하위 데이터를 절삭(Cut)하여 제거</text>
  <text x="400" y="385" fill="#f8fafc" font-family="sans-serif" font-size="13" text-anchor="middle">-> 무의미한 불용어 노이즈는 일괄 폭파 삭제 소실되고, 문서 코퍼스 배열의 가장 굵직한</text>
  <text x="400" y="403" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">잠재 의미 단위 군집(Latent Topic Cluster) 에센스만 살아남아 맵핑 압축되는 기하학적 정규화 결합 기적</text>

</svg>
