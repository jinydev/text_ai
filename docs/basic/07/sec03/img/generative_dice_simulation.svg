<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Generative Story : 확률망 모델 기반 자동 문서 생성 시퀀스 파이프라인 도식화</text>

  <!-- Step 1: Document Topic Proportion -->
  <rect x="50" y="80" width="160" height="260" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="130" y="110" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">STEP 1. 문서 토픽 비율</text>
  <text x="130" y="130" fill="#cbd5e1" font-family="monospace" font-size="12" text-anchor="middle">(θ_d 샘플링 세팅)</text>

  <!-- Pie chart simulation -->
  <circle cx="130" cy="220" r="50" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <path d="M 130 220 L 130 170 A 50 50 0 1 1 85 240 Z" fill="#ef4444" opacity="0.8"/> <!-- 70% Red -->
  <path d="M 130 220 L 85 240 A 50 50 0 0 1 130 170 Z" fill="#10b981" opacity="0.8"/> <!-- 30% Green -->
  
  <text x="145" y="210" fill="#fee2e2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">정치 70%</text>
  <text x="105" y="225" fill="#ecfdf5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">경제 30%</text>
  
  <text x="130" y="320" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">"이 문서는 7:3 짜리다!"</text>


  <!-- Step 2: Choose Topic for specific word -->
  <path d="M 230 220 L 270 220" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="4,2"/>
  <polygon points="265,215 275,220 265,225" fill="#cbd5e1"/>

  <rect x="290" y="80" width="160" height="260" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="370" y="110" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">STEP 2. 단어별 토픽 픽</text>
  <text x="370" y="130" fill="#cbd5e1" font-family="monospace" font-size="12" text-anchor="middle">(Z_dn 동전 굴리기 룰렛)</text>

  <rect x="330" y="180" width="80" height="80" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="370" y="225" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">정치 당첨!</text>
  <text x="370" y="280" fill="#fcd34d" font-family="sans-serif" font-size="11" text-anchor="middle">70% 주사위를 굴려 뽑음</text>


  <!-- Step 3: Draw Word from Topic Distribution -->
  <path d="M 470 220 L 510 220" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="4,2"/>
  <polygon points="505,215 515,220 505,225" fill="#cbd5e1"/>

  <rect x="530" y="80" width="220" height="260" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="640" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">STEP 3. 토픽별 어휘 상자 표집</text>
  <text x="640" y="130" fill="#cbd5e1" font-family="monospace" font-size="12" text-anchor="middle">(Ф_k 기반 단어 방출 W_dn)</text>

  <!-- Word Bucket Red -->
  <path d="M 570 160 L 710 160 L 690 280 L 590 280 Z" fill="#7f1d1d" opacity="0.6" stroke="#ef4444" stroke-width="2"/>
  <text x="640" y="150" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[ 정치 단어 전용 통계통 ]</text>
  
  <!-- Words inside bucket with varying sizes -->
  <text x="640" y="210" fill="#f8fafc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">국회 (20%)</text>
  <text x="610" y="240" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">선거</text>
  <text x="670" y="250" fill="#cbd5e1" font-family="sans-serif" font-size="14" text-anchor="middle">의원</text>
  <text x="640" y="265" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">세금</text>

  <rect x="580" y="300" width="120" height="30" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="640" y="320" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">출력단어: 국회</text>

  <path d="M 550 315 L 210 315 L 210 220 L 290 220" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" fill="none"/>
  <polygon points="280,215 290,220 280,225" fill="#3b82f6"/>
  <text x="380" y="305" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">무한 Loop 순회(N번 단어 생성)</text>

  <!-- Concept text down at the bottom -->
  <text x="400" y="380" fill="#94a3b8" font-family="sans-serif" font-size="13" text-anchor="middle">"문서는 특정 비율(Θ)로 통제된 확률 분포에서 은닉 변수(Z) 파라미터를 거쳐 무작위 방출(W)된 단어들의 집합체이다!"</text>
</svg>
