<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">베이즈 확률의 역주행 (Reverse Engineering) : 표면 단어에서 깁스 샘플링을 통한 은닉 파라미터 복원</text>

  <!-- Top part: The observable reality -->
  <rect x="50" y="90" width="700" height="80" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="90" y="115" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="start">STEP 1. 관측된 현실 결과 (입력 객체)</text>
  <text x="90" y="145" fill="#f8fafc" font-family="serif" font-size="18" font-weight="bold" text-anchor="start">"국회에서 펀드 비자금을 세금과 이자로 막아..."</text>
  <rect x="580" y="125" width="150" height="30" fill="#1e293b" rx="2"/>
  <text x="655" y="145" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">표면 단어 배열 (Observed W)</text>

  <!-- Arrow pointing down representing inference -->
  <rect x="360" y="195" width="80" height="50" fill="#b45309" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="400" y="225" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">역연산</text>
  
  <line x1="400" y1="170" x2="400" y2="195" stroke="#fcd34d" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="400" y1="245" x2="400" y2="280" stroke="#fcd34d" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="395,275 400,285 405,275" fill="#fcd34d"/>

  <path d="M 460 220 L 520 220" stroke="#475569" stroke-width="2"/>
  <text x="590" y="215" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">베이즈 마르코프 체인 역추론 미분</text>
  <text x="590" y="235" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">(Gibbs Sampling &amp; VI 엔진 가동)</text>

  <!-- Bottom part: Extracted Hidden parameters -->
  <rect x="50" y="290" width="700" height="100" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="90" y="320" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="start">STEP 2. 은닉 데이터 생성 파라미터 복구 모델링 (Hidden Latent Extraction)</text>
  
  <!-- Recovered results boxes -->
  <rect x="90" y="340" width="300" height="40" fill="#1e293b" rx="4"/>
  <text x="240" y="365" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">=> "이 문서는 [정치 60% : 경제 40%] 구나!"</text>

  <rect x="420" y="340" width="300" height="40" fill="#1e293b" rx="4"/>
  <text x="570" y="365" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">문서 잠재축 모수 파티션 비율(Θ) 정답 추출</text>

  <text x="400" y="425" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">수학의 목적 함수: 눈에 보이는 결과를 통해 과거의 주사위 세팅 값을 수학적/통계적으로 모델링 역추적(Backtracking)하는 행위</text>

</svg>
