<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 4; ry: 4; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .subtitle { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; }
      .str { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1d4ed8; }
      .token { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">토큰화 (Tokenization) 단위에 따른 차이</text>
  <text x="400" y="55" font-size="14" fill="#64748b">원본 텍스트 문자열을 목적에 맞는 덩어리(Token)로 쪼개는 분석의 첫 단계입니다.</text>

  <!-- Original -->
  <rect x="50" y="80" width="700" height="40" class="box" fill="#f8fafc" />
  <text x="80" y="100" class="subtitle" fill="#475569">원본:</text>
  <text x="420" y="100" class="str">"Hello everyone. It’s good to see you."</text>

  <!-- 1. Sentence Tokenization -->
  <rect x="50" y="140" width="700" height="70" class="box" fill="#f4f4f5" />
  <text x="130" y="175" class="subtitle" fill="#ea580c">문장 단위 (Sentence)</text>
  
  <rect x="230" y="155" width="160" height="40" rx="20" fill="#f97316" />
  <text x="310" y="175" class="token">"Hello everyone."</text>
  
  <rect x="400" y="155" width="240" height="40" rx="20" fill="#f97316" />
  <text x="520" y="175" class="token">"It's good to see you."</text>

  <!-- 2. Word Tokenization -->
  <rect x="50" y="230" width="700" height="90" class="box" fill="#eff6ff" />
  <text x="130" y="275" class="subtitle" fill="#2563eb">단어 단위 (Word)</text>

  <path d="M 240 250 L 720 250" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4" />
  
  <!-- Row 1 -->
  <rect x="240" y="240" width="50" height="30" rx="4" fill="#3b82f6" />
  <text x="265" y="255" class="token">Hello</text>
  
  <rect x="300" y="240" width="80" height="30" rx="4" fill="#3b82f6" />
  <text x="340" y="255" class="token">everyone</text>
  
  <rect x="390" y="240" width="20" height="30" rx="4" fill="#ef4444" />
  <text x="400" y="255" class="token">.</text>
  
  <rect x="420" y="240" width="20" height="30" rx="4" fill="#3b82f6" />
  <text x="430" y="255" class="token">It</text>

  <rect x="450" y="240" width="20" height="30" rx="4" fill="#64748b" />
  <text x="460" y="255" class="token">'</text>
  
  <rect x="480" y="240" width="20" height="30" rx="4" fill="#3b82f6" />
  <text x="490" y="255" class="token">s</text>

  <!-- Row 2 -->
  <rect x="240" y="280" width="50" height="30" rx="4" fill="#3b82f6" />
  <text x="265" y="295" class="token">good</text>
  
  <rect x="300" y="280" width="30" height="30" rx="4" fill="#3b82f6" />
  <text x="315" y="295" class="token">to</text>
  
  <rect x="340" y="280" width="40" height="30" rx="4" fill="#3b82f6" />
  <text x="360" y="295" class="token">see</text>

  <rect x="390" y="280" width="40" height="30" rx="4" fill="#3b82f6" />
  <text x="410" y="295" class="token">you</text>
  
  <rect x="440" y="280" width="20" height="30" rx="4" fill="#ef4444" />
  <text x="450" y="295" class="token">.</text>
  
  <text x="580" y="275" font-size="12" fill="#ef4444" font-weight="bold">구두점, 따옴표도</text>
  <text x="580" y="290" font-size="12" fill="#ef4444" font-weight="bold">독립적인 토큰으로 취급</text>

</svg>
