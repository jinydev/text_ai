<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Semantic 3D 맥락 투영: 다의어(Polysemy) 충돌을 돌파하는 어텐션(Attention) 역산</text>

  <!-- Sentence 1 -->
  <rect x="50" y="80" width="700" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="80" y="115" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">Doc 1: "아침에 맛있는 사과를 먹었다"</text>

  <rect x="360" y="95" width="60" height="30" fill="#ef4444" rx="4"/>
  <text x="390" y="115" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사과</text>

  <path d="M 360 110 Q 280 140 200 110" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4,4"/>
  <path d="M 420 110 Q 520 140 600 110" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4,4"/>
  
  <text x="280" y="145" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Weight +0.8 (아침)</text>
  <text x="510" y="145" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Weight +0.9 (먹었다)</text>

  <rect x="630" y="95" width="100" height="30" fill="#064e3b" rx="4"/>
  <text x="680" y="115" fill="#a7f3d0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Vector: Fruit</text>

  <!-- Sentence 2 -->
  <rect x="50" y="200" width="700" height="60" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="4"/>
  <text x="80" y="235" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold">Doc 2: "진심 어린 사과를 부탁한다"</text>

  <rect x="250" y="215" width="60" height="30" fill="#ef4444" rx="4"/>
  <text x="280" y="235" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사과</text>

  <path d="M 250 230 Q 180 260 120 230" fill="none" stroke="#a855f7" stroke-width="3" stroke-dasharray="4,4"/>
  <path d="M 310 230 Q 400 260 500 230" fill="none" stroke="#a855f7" stroke-width="3" stroke-dasharray="4,4"/>
  
  <text x="180" y="265" fill="#d8b4fe" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Weight +0.9 (진심)</text>
  <text x="400" y="265" fill="#d8b4fe" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Weight +0.8 (부탁)</text>

  <rect x="630" y="215" width="100" height="30" fill="#4c1d95" rx="4"/>
  <text x="680" y="235" fill="#e9d5ff" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Vector: Apology</text>


  <!-- Model Mind Map Error vs Success -->
  <rect x="50" y="300" width="340" height="60" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="220" y="325" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">고전 BoW/Lexical 의 동치 에러 한계</text>
  <text x="220" y="345" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">"두 토큰은 동일 유니코드 스펠링이므로 파라미터는 같다"</text>

  <text x="400" y="335" fill="#cbd5e1" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">VS</text>

  <rect x="410" y="300" width="340" height="60" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="580" y="325" fill="#6ee7b7" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">LLM Attention 망의 Semantic 역산 도출</text>
  <text x="580" y="345" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">"주변 시퀀스 토큰 어텐션 분포 비례로 동음이의어 분리"</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="380" width="700" height="40" fill="#334155" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="400" y="405" fill="#e9d5ff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">시맨틱(의미론) 그라운딩의 본질: 고립 벡터의 껍데기가 아닌, Sequence Context 인과 관계로 진짜 기하 스페이스 차원을 분리해냄</text>

</svg>
