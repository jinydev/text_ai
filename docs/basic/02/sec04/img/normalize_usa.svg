<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">3단계. 정규화 (Normalization): 호적 통일의 미학</text>

  <!-- Chaos names -->
  <rect x="100" y="80" width="120" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="160" y="105" fill="#fb7185" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">USA</text>

  <rect x="100" y="130" width="120" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="160" y="155" fill="#fb7185" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">U.S.A.</text>

  <rect x="100" y="180" width="120" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="160" y="205" fill="#fb7185" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">United States</text>

  <rect x="100" y="230" width="120" height="40" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="5"/>
  <text x="160" y="255" fill="#fb7185" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">us</text>

  <!-- Logic Funnel -->
  <path d="M 240 170 C 350 170 350 170 420 170" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="330" y="160" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">강제통일 필터!</text>

  <!-- Unified Output -->
  <rect x="450" y="130" width="200" height="80" fill="#1e293b" stroke="#3b82f6" stroke-width="3" rx="10"/>
  <text x="550" y="180" fill="#60a5fa" font-family="sans-serif" font-size="40" font-weight="bold" text-anchor="middle">usa</text>

  <!-- Explanation -->
  <text x="650" y="100" fill="#94a3b8" font-family="sans-serif" font-size="14">AI가 4단어를 각각 다른</text>
  <text x="650" y="125" fill="#94a3b8" font-family="sans-serif" font-size="14">외계어로 오해하여</text>
  <text x="650" y="150" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold">메모리를 4칸 낭비</text>
  <text x="650" y="175" fill="#94a3b8" font-family="sans-serif" font-size="14">하는 대참사를 막기 위해,</text>
  <text x="650" y="200" fill="#60a5fa" font-family="sans-serif" font-size="14" font-weight="bold">엑셀 1칸으로 모아버리기!</text>

</svg>
