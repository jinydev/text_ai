<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#f1f3f5" rx="10"/>

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#343a40" text-anchor="middle">서브워드 토크나이징 (BPE: Byte Pair Encoding)</text>

  <g transform="translate(50, 80)">
    <rect width="200" height="100" rx="10" fill="#fff" stroke="#fa5252" stroke-width="3" filter="url(#shadow)"/>
    <text x="100" y="45" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#c92a2a" text-anchor="middle">"킹왕짱존맛탱"</text>
    <text x="100" y="75" font-family="'Inter', sans-serif" font-size="14" fill="#fa5252" text-anchor="middle">사전에 없는 외계어 등장!</text>
    <text x="100" y="95" font-family="'Inter', sans-serif" font-size="12" fill="#fa5252" text-anchor="middle">(OOV 발생 확률 99%)</text>
  </g>

  <!-- Arrow with Hammer -->
  <path d="M 270 130 L 400 130" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="335" y="110" font-family="'Inter', sans-serif" font-size="30" text-anchor="middle">🔨</text>
  <text x="335" y="150" font-family="'Inter', sans-serif" font-size="12" fill="#495057" text-anchor="middle">레고 블록 모드</text>

  <g transform="translate(430, 60)">
    <rect width="320" height="140" rx="10" fill="#fff" stroke="#339af0" stroke-width="3" filter="url(#shadow)"/>
    <text x="160" y="40" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#1864ab" text-anchor="middle">글자나 실라블 단위로 강제 파괴!</text>
    
    <g transform="translate(10, 60)">
      <rect x="0" y="0" width="45" height="40" rx="5" fill="#e7f5ff" stroke="#339af0"/>
      <text x="22" y="25" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0b7285" text-anchor="middle">킹</text>

      <rect x="55" y="0" width="45" height="40" rx="5" fill="#e7f5ff" stroke="#339af0"/>
      <text x="77" y="25" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0b7285" text-anchor="middle">왕</text>

      <rect x="110" y="0" width="45" height="40" rx="5" fill="#e7f5ff" stroke="#339af0"/>
      <text x="132" y="25" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0b7285" text-anchor="middle">짱</text>

      <rect x="165" y="0" width="55" height="40" rx="5" fill="#e7f5ff" stroke="#339af0"/>
      <text x="192" y="25" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0b7285" text-anchor="middle">존맛</text>
      
      <rect x="230" y="0" width="45" height="40" rx="5" fill="#e7f5ff" stroke="#339af0"/>
      <text x="252" y="25" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0b7285" text-anchor="middle">탱</text>
    </g>
    <text x="160" y="125" font-family="'Inter', sans-serif" font-size="12" fill="#1864ab" text-anchor="middle">에러(OOV)를 내지 않고 억지로라도 조합해냄</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
    </marker>
  </defs>
</svg>
