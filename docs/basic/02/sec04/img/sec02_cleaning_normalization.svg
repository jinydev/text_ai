<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .card-title { font-size: 18px; font-weight: bold; fill: white; }
      .word { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; }
      .desc { font-size: 13px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">정제(Cleaning)와 정규화(Normalization)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">불필요한 데이터를 지워내고, 비슷한 의미의 다른 표기들을 통일하여 컴퓨터의 혼란을 줄입니다.</text>

  <!-- Cleaning -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="320" height="230" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <rect x="0" y="0" width="320" height="40" fill="#3b82f6" rx="8" />
    <path d="M 0 30 L 320 30 L 320 40 L 0 40 Z" fill="#3b82f6" />
    <text x="160" y="20" class="card-title">정제 (Cleaning)</text>
    
    <text x="160" y="70" class="desc" font-weight="bold">노이즈 및 불용어 완전 제거</text>

    <rect x="40" y="90" width="240" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="100" y="110" class="word" fill="#ef4444" text-decoration="line-through">the</text>
    <text x="140" y="110" class="word" fill="#ef4444" text-decoration="line-through">a</text>
    <text x="210" y="110" class="word" fill="#15803d">computer</text>

    <rect x="40" y="140" width="240" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="80" y="160" class="word" fill="#ef4444" text-decoration="line-through">&lt;br&gt;</text>
    <text x="160" y="160" class="word" fill="#15803d">AI Learning</text>

    <text x="160" y="205" font-size="12" fill="#1d4ed8">영어의 관사, HTML 태그 등</text>
  </g>

  <!-- Normalization -->
  <g transform="translate(420, 90)">
    <rect x="0" y="0" width="320" height="230" class="box" fill="#fdf4ff" stroke="#a855f7" />
    <rect x="0" y="0" width="320" height="40" fill="#a855f7" rx="8" />
    <path d="M 0 30 L 320 30 L 320 40 L 0 40 Z" fill="#a855f7" />
    <text x="160" y="20" class="card-title">정규화 (Normalization)</text>
    
    <text x="160" y="70" class="desc" font-weight="bold">표현의 다름을 하나의 기준안으로 통일</text>

    <!-- Case 1 -->
    <rect x="20" y="90" width="120" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="40" y="100" class="word" font-size="12">USA</text>
    <text x="100" y="100" class="word" font-size="12">U.S.A</text>
    <text x="40" y="120" class="word" font-size="12">US</text>
    
    <text x="160" y="110" font-size="20">→</text>
    
    <rect x="180" y="90" width="120" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="240" y="110" class="word" fill="#7e22ce" font-size="20">US</text>

    <!-- Case 2 -->
    <rect x="20" y="150" width="120" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="80" y="160" class="word" font-size="14">Windows</text>
    <text x="80" y="175" class="word" font-size="14">WINDOWS</text>

    <text x="160" y="170" font-size="20">→</text>

    <rect x="180" y="150" width="120" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="240" y="170" class="word" fill="#7e22ce" font-size="16">windows</text>

    <text x="160" y="210" font-size="12" fill="#6b21a8">(소문자로 일괄 치환 등)</text>
  </g>

</svg>
