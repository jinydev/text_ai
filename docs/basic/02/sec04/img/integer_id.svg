<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">6단계. 정수 인코딩 (Integer Encoding): 단어에 신분증 번호 발급</text>

  <!-- String Array -->
  <rect x="100" y="80" width="250" height="50" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="225" y="112" fill="#93c5fd" font-family="monospace" font-size="18" text-anchor="middle">['사과', '배', '사과']</text>

  <rect x="100" y="150" width="250" height="50" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="225" y="182" fill="#93c5fd" font-family="monospace" font-size="18" text-anchor="middle">['강아지', '사과']</text>

  <!-- Magic Transform -->
  <path d="M 380 150 L 480 150" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="430" y="140" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">고유 ID 번호 부여</text>

  <!-- Integer Array -->
  <rect x="520" y="80" width="180" height="50" fill="#0f172a" stroke="#10b981" stroke-width="3" rx="5" stroke-dasharray="8,4"/>
  <text x="610" y="115" fill="#34d399" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">[7, 10, 7]</text>

  <rect x="520" y="150" width="180" height="50" fill="#0f172a" stroke="#10b981" stroke-width="3" rx="5" stroke-dasharray="8,4"/>
  <text x="610" y="185" fill="#34d399" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">[24, 7]</text>


  <!-- Legend -->
  <text x="400" y="250" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">AI는 글자를 싫어합니다. 텍스트를 기계 엔진에 최종 삽입하기 직전, 모든 문자열을</text>
  <text x="400" y="275" fill="#60a5fa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사전 인덱스(Dictionary Index) 매핑표를 참고하여 100% 정수 숫자로 환전시켜 버립니다.</text>

</svg>
