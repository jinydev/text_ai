<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">1단계. 코퍼스 수집(Corpus Ingestion) 및 비정형 Raw 데이터의 노이즈 밀도량</text>

  <!-- Data Sources -->
  <!-- Web HTML -->
  <rect x="50" y="100" width="180" height="180" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="140" y="130" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Crawling Web Data</text>
  <rect x="60" y="145" width="160" height="120" fill="#0f172a" rx="4"/>
  <text x="140" y="170" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">&lt;div class="content"&gt;</text>
  <text x="140" y="190" fill="#93c5fd" font-family="monospace" font-size="11" text-anchor="middle">뉴스: 애플 주식 급상승!</text>
  <text x="140" y="210" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">&lt;/div&gt;&lt;script&gt;var = 1&lt;/div&gt;</text>
  <text x="140" y="235" fill="#fca5a5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Markup Noise 70%</text>


  <!-- SNS -->
  <rect x="250" y="100" width="180" height="180" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="340" y="130" fill="#e9d5ff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">SNS/API Data Log</text>
  <rect x="260" y="145" width="160" height="120" fill="#0f172a" rx="4"/>
  <text x="340" y="170" fill="#a855f7" font-family="sans-serif" font-size="11" text-anchor="middle">@user 헐 ㅋㅋ 존잼이자나👍👍</text>
  <text x="340" y="190" fill="#a855f7" font-family="sans-serif" font-size="11" text-anchor="middle">#머신러닝 #공부하기싫다ㅠㅠ</text>
  <text x="340" y="210" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">HTTP 200 OK Json</text>
  <text x="340" y="235" fill="#fca5a5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Slang/Emoji Noise 80%</text>


  <!-- PDF Dump -->
  <rect x="450" y="100" width="180" height="180" fill="#1e293b" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="540" y="130" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Enterprise PDF Doc</text>
  <rect x="460" y="145" width="160" height="120" fill="#0f172a" rx="4"/>
  <text x="540" y="170" fill="#fde68a" font-family="monospace" font-size="10" text-anchor="middle">Page 12 \n \t \t [표 1]</text>
  <text x="540" y="190" fill="#fde68a" font-family="monospace" font-size="10" text-anchor="middle">총 매출액은 \n 1,200 억 이다.</text>
  <text x="540" y="210" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">[x01][xAA] 바이너리 헤더</text>
  <text x="540" y="235" fill="#fca5a5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Format Missing Noise 50%</text>


  <!-- Aggregate Bucket -->
  <rect x="660" y="140" width="100" height="80" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="710" y="175" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Raw</text>
  <text x="710" y="195" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Corpus</text>

  <!-- Arrows -->
  <path d="M 230 190 L 660 190" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <path d="M 430 190 L 660 190" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <path d="M 630 190 L 660 190" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4,4" fill="none"/>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="320" width="700" height="80" fill="#0f172a" stroke="#ef4444" stroke-width="1" rx="6"/>
  <text x="400" y="345" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">날것의 코퍼스(Raw Corpus) = 논리 문자열(40%) + 컴퓨터 시스템 쓰레기 특수기호 노이즈(60%)</text>
  <line x1="100" y1="365" x2="700" y2="365" stroke="#334155" stroke-width="2"/>
  <text x="400" y="385" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">데이터 마이닝 수집망에서 방금 건져 올린 HTML 태그, 이모지, 제어 문자 등이 뒤섞인 거대한 무정형의 카오스 상태.</text>

</svg>
