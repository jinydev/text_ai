<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#fff" rx="10"/>

  <g transform="translate(50, 50)" filter="url(#shadow)">
    <rect width="300" height="150" rx="10" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/>
    <text x="150" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#495057" text-anchor="middle">너무 큰 덩어리 (과도한 문맥)</text>
    
    <text x="20" y="60" font-family="'Inter', sans-serif" font-size="12" fill="#868e96">1. 역세권 청년 주택 모집 공고...</text>
    <text x="20" y="80" font-family="'Inter', sans-serif" font-size="12" fill="#868e96">2. 임차보증금 무이자 지원 사업...</text>
    <text x="20" y="100" font-family="'Inter', sans-serif" font-size="12" fill="#868e96">3. 청년 저축 계좌 금리 안내...</text>
    <text x="20" y="120" font-family="'Inter', sans-serif" font-size="12" fill="#868e96">4. 중소기업 취업 소득세 감면...</text>
  </g>

  <!-- Arrow -->
  <path d="M 370 125 L 420 125" stroke="#fa5252" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="395" y="100" font-family="'Inter', sans-serif" font-size="30" text-anchor="middle">❌</text>

  <g transform="translate(450, 50)">
    <rect width="300" height="150" rx="10" fill="#fff5f5" stroke="#fa5252" stroke-width="3"/>
    <text x="150" y="50" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#c92a2a" text-anchor="middle">"부동산 정책이 뭐야?" 질문 시</text>
    <text x="150" y="80" font-family="'Inter', sans-serif" font-size="14" fill="#c92a2a" text-anchor="middle">금리, 소득세 내용까지 모두 섞여</text>
    <text x="150" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#c92a2a" text-anchor="middle">LLM이 오인하여 헛소리할 확률 증가</text>
  </g>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
    </marker>
  </defs>
</svg>
