<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">최강 난이도의 교착어 분해: KoNLPy 한국어 전처리 체계</text>

  <!-- Korean Sentence -->
  <rect x="50" y="100" width="200" height="60" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="150" y="135" fill="#fca5a5" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">"아버지가방에"</text>
  <text x="150" y="180" fill="#ef4444" font-family="sans-serif" font-size="14" text-anchor="middle">띄어쓰기 붕괴 대참사 상태</text>

  <path d="M 270 130 L 370 130" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="320" y="120" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">KoNLPy</text>

  <!-- Mecab Output -->
  <rect x="400" y="80" width="350" height="150" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="5"/>
  
  <rect x="420" y="100" width="80" height="40" fill="#34d399" rx="3"/>
  <text x="460" y="125" fill="#064e3b" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">아버지 (N)</text>

  <rect x="510" y="100" width="60" height="40" fill="#fbbf24" rx="3"/>
  <text x="540" y="125" fill="#78350f" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">가 (J)</text>

  <rect x="580" y="100" width="60" height="40" fill="#34d399" rx="3"/>
  <text x="610" y="125" fill="#064e3b" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">방 (N)</text>

  <rect x="650" y="100" width="80" height="40" fill="#fbbf24" rx="3"/>
  <text x="690" y="125" fill="#78350f" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">에 (J)</text>

  <text x="575" y="170" fill="#6ee7b7" font-family="sans-serif" font-size="14" text-anchor="middle">은전한닢(Mecab) 엔진 등을 동원하여</text>
  <text x="575" y="195" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">국어 형태소 단위(명사, 조사)로 수학적 강제 분절 결행</text>

  <text x="400" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">영어보다 압도적으로 분석이 까다로운 한국어의 특수성 때문에 파이썬에서는 별도의 패키지가 필수적입니다.</text>
</svg>
