<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">정규표현식 (Regular Expression): 단 1줄의 우아한 마법 파괴 코드</text>

  <!-- Chaos Input -->
  <rect x="50" y="100" width="300" height="150" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
  <text x="200" y="140" fill="#fca5a5" font-family="monospace" font-size="18" text-anchor="middle">"전화번호: 010-1234-5678!"</text>
  <text x="200" y="170" fill="#fca5a5" font-family="monospace" font-size="18" text-anchor="middle">"Email은 admin@test.com"</text>
  <text x="200" y="200" fill="#fca5a5" font-family="monospace" font-size="18" text-anchor="middle">"한글만 남기고 싶어 ㅋㅋㅋ"</text>
  <text x="200" y="235" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">복잡하게 꼬인 원본 문자열</text>

  <!-- Regex Magician -->
  <path d="M 370 160 L 450 160" stroke="#f59e0b" stroke-width="6" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <rect x="360" y="100" width="100" height="40" fill="#b45309" rx="5"/>
  <text x="410" y="125" fill="#fef3c7" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">[^가-힣]</text>
  <text x="410" y="195" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">"한글 빼고 다</text>
  <text x="410" y="210" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">지워버려!"</text>

  <!-- Output -->
  <rect x="470" y="100" width="280" height="150" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="610" y="160" fill="#6ee7b7" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">"전화번호</text>
  <text x="610" y="190" fill="#6ee7b7" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">은</text>
  <text x="610" y="220" fill="#6ee7b7" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">한글만 남기고 싶어"</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">내가 원하는 문양(Pattern) 규칙만 코딩하여 아주 빠른 속도로 쓰레기 노이즈 문자를 도려내 발라냅니다.</text>

</svg>
