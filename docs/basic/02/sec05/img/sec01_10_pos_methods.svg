<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#fff" rx="10"/>

  <g transform="translate(50, 40)">
    <rect width="300" height="150" fill="#fff5f5" stroke="#ff8787" stroke-width="2" rx="10" filter="url(#shadow)"/>
    <text x="150" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#c92a2a" text-anchor="middle">규칙 기반 (Rule-based)</text>
    
    <rect x="20" y="50" width="260" height="80" fill="#fff" stroke="#ffc9c9" rx="5"/>
    <text x="150" y="75" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">고정된 문법 사전표를 사용</text>
    <text x="150" y="100" font-family="'Inter', sans-serif" font-size="24" text-anchor="middle">📖 ➡️ 🏷️</text>
  </g>

  <text x="400" y="125" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#ced4da" text-anchor="middle">VS</text>

  <g transform="translate(450, 40)">
    <rect width="300" height="150" fill="#e3fafc" stroke="#3bc9db" stroke-width="2" rx="10" filter="url(#shadow)"/>
    <text x="150" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#0b7285" text-anchor="middle">확률 기반 (Probabilistic)</text>
    
    <rect x="20" y="50" width="260" height="80" fill="#fff" stroke="#99e9f2" rx="5"/>
    <text x="150" y="75" font-family="'Inter', sans-serif" font-size="14" fill="#495057" text-anchor="middle">대규모 데이터에서 경험적 확률 추론</text>
    <text x="150" y="100" font-family="'Inter', sans-serif" font-size="24" text-anchor="middle">🎲 ➡️ 🏷️</text>
  </g>

</svg>
