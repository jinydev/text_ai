<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="600" height="300" fill="#f8f9fa"/>
  
  <g transform="translate(100, 50)">
    <!-- Root -->
    <rect x="100" y="0" width="200" height="50" rx="10" fill="#ebfbee" stroke="#37b24d" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#2b8a3e" text-anchor="middle">줄기: 구문 표현 (Syntactic)</text>
    
    <!-- Code block to represent Vector / Tree -->
    <rect x="50" y="80" width="300" height="120" rx="10" fill="#212529" filter="url(#shadow)"/>
    <text x="70" y="110" font-family="monospace" font-size="14" fill="#fcc419">[[ NP ]]</text>
    <text x="90" y="130" font-family="monospace" font-size="14" fill="#a5d8ff">├── [DET] The</text>
    <text x="90" y="150" font-family="monospace" font-size="14" fill="#a5d8ff">└── [NOUN] dog</text>
    <text x="70" y="170" font-family="monospace" font-size="14" fill="#fcc419">[[ VP ]]</text>
  </g>
</svg>
