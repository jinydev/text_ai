<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">띄어쓰기의 배신: 단어 단위 토큰화가 낳은 메모리 자원 낭비</text>

  <rect x="50" y="100" width="100" height="40" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="100" y="125" fill="#fcd34d" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">집에</text>

  <rect x="50" y="150" width="100" height="40" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="100" y="175" fill="#fcd34d" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">집에서</text>

  <rect x="50" y="200" width="100" height="40" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="100" y="225" fill="#fcd34d" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">집으로</text>

  <path d="M 160 170 C 200 170 200 170 260 170" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>
  
  <rect x="280" y="80" width="150" height="150" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="355" y="115" fill="#fca5a5" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">사전 DB</text>
  <text x="355" y="150" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">메모리 인덱스 3칸</text>
  <text x="355" y="170" fill="#ef4444" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">강제 영구 낭비!</text>
  <text x="355" y="210" fill="#f87171" font-family="sans-serif" font-size="12" text-anchor="middle">"모두 생판 다른 단어군!"</text>


  <!-- Vector comparison -->
  <path d="M 450 170 C 490 170 490 170 540 170" stroke="#10b981" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="495" y="155" fill="#34d399" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">관계성 0점 처리</text>

  <!-- Vector Math -->
  <text x="660" y="125" fill="#6ee7b7" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">[1, 0, 0] (집에)</text>
  <text x="660" y="165" fill="#6ee7b7" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">[0, 1, 0] (집에서)</text>
  <text x="660" y="205" fill="#6ee7b7" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">[0, 0, 1] (집으로)</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">사람에겐 셋 다 똑같은 고향집(Home)이지만, 스펠링이 다르면 구형 AI는 메모리를 각기 따로 사분오열 파먹어버립니다.</text>

</svg>
