<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 4; ry: 4; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .subtitle { font-size: 16px; font-weight: bold; fill: white; }
      .desc { font-size: 13px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">검색 증강 생성(RAG)을 위한 청킹(Chunking) 길이 비교</text>
  <text x="400" y="55" font-size="14" fill="#64748b">LLM이 외부 문서를 정확히 참조하기 위해 어느 정도 길이의 문맥 덩어리로 잘라야 하는지 결정합니다.</text>

  <!-- Left: Long Chunking -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="300" height="200" class="box" fill="#fef2f2" stroke="#fca5a5" />
    <rect x="0" y="0" width="300" height="40" fill="#ef4444" rx="4" />
    <path d="M 0 30 L 300 30 L 300 40 L 0 40 Z" fill="#ef4444" />
    <text x="150" y="20" class="subtitle">긴 청킹 (Long Chunk)</text>

    <!-- Content Blocks -->
    <rect x="20" y="60" width="260" height="120" class="box" fill="white" />
    <text x="150" y="80" class="desc" fill="#b91c1c">[신혼부부] 주거 지원 + 소득 요건</text>
    <text x="150" y="100" class="desc" fill="#1d4ed8">[청년통장] 이자 혜택 + 저축 요건</text>
    <text x="150" y="120" class="desc" fill="#047857">[역세권 주택] 교통 호재 + 청약 요건</text>
    
    <text x="150" y="150" font-weight="bold" fill="#0f172a">"문맥은 길지만 너무 짬뽕되어 있음"</text>
    <text x="150" y="170" font-size="12" font-weight="bold" fill="#ef4444">→ LLM이 무슨 제도가 핵심인지 혼동함</text>
  </g>

  <!-- Right: Fit Chunking -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="300" height="200" class="box" fill="#f0fdf4" stroke="#86efac" />
    <rect x="0" y="0" width="300" height="40" fill="#22c55e" rx="4" />
    <path d="M 0 30 L 300 30 L 300 40 L 0 40 Z" fill="#22c55e" />
    <text x="150" y="20" class="subtitle">적정 청킹 (Optimal Chunk)</text>

    <!-- Segment 1 -->
    <rect x="20" y="55" width="260" height="35" class="box" fill="white" stroke="#fca5a5" />
    <text x="150" y="73" class="desc" font-weight="bold" fill="#b91c1c">Chunk 1: 신혼부부 주거 지원 정책 상세</text>

    <!-- Segment 2 -->
    <rect x="20" y="100" width="260" height="35" class="box" fill="white" stroke="#93c5fd" />
    <text x="150" y="118" class="desc" font-weight="bold" fill="#1d4ed8">Chunk 2: 희망두배 청년통장 특징</text>

    <!-- Segment 3 -->
    <rect x="20" y="145" width="260" height="35" class="box" fill="white" stroke="#6ee7b7" />
    <text x="150" y="163" class="desc" font-weight="bold" fill="#047857">Chunk 3: 역세권 청년주택 요건</text>

    <text x="150" y="195" font-size="12" font-weight="bold" fill="#15803d">→ 주제별로 깔끔하게 검색 및 참조 가능!</text>
  </g>

</svg>
