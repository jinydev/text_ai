<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">품사 태깅(Part-of-Speech, POS Tagging): 1차원 모호성 다중 매핑 인퍼런스 병목</text>

  <!-- The Vector Issue -->
  <rect x="150" y="80" width="500" height="90" fill="#1e293b" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="115" fill="#fde68a" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">동일한 ID 인덱스를 가진 모호성 토큰 벡터 등장</text>

  <rect x="350" y="130" width="100" height="30" fill="#0f172a" stroke="#cbd5e1" rx="4"/>
  <text x="400" y="150" fill="#f8fafc" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">[book]</text>

  <path d="M 400 170 L 400 200" stroke="#cbd5e1" stroke-width="3"/>
  <polygon points="395,195 400,205 405,195" fill="#cbd5e1"/>

  <!-- Decision Branches -->
  <rect x="50" y="210" width="700" height="150" fill="#0f172a" stroke="#475569" stroke-width="2" rx="6"/>
  <text x="400" y="240" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">컴파일러 파서(Parser)의 이산 확률 논리 구조 모델 분기망</text>

  <!-- Branch 1 -->
  <rect x="100" y="260" width="250" height="70" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <text x="225" y="285" fill="#bfdbfe" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">확률 분기 1: Noun (명사 객체)</text>
  <text x="225" y="310" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">의미 벡터 치환 -> "종이 책 스페이스"</text>

  <text x="400" y="295" fill="#ef4444" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">?</text>

  <!-- Branch 2 -->
  <rect x="450" y="260" width="250" height="70" fill="#4c1d95" stroke="#a855f7" stroke-width="2" rx="4"/>
  <text x="575" y="285" fill="#e9d5ff" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">확률 분기 2: Verb (동사 시퀀스)</text>
  <text x="575" y="310" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">의미 벡터 치환 -> "예약하다 액션망"</text>

  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="380" width="700" height="50" fill="#334155" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="400" y="405" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">명찰 부착 모델(POS Labeling): 단순히 사전 단어장(Voca)을 1:1로 배열 탐색 매핑하는 것으로는,</text>
  <text x="400" y="420" fill="#fca5a5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">이러한 동형 다의어 파라미터를 절대 분류 필터링 해낼 수 없는 선형대수학적 기계 한계 병목</text>

</svg>
