<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">시퀀스 품사 파라미터 추론 계보: Static Rule-based 파서 VS 은닉 마르코프 베이즈(HMM) 확률</text>

  <!-- Left: Rule based HMM -->
  <rect x="40" y="80" width="340" height="250" fill="#1e293b" stroke="#7f1d1d" stroke-width="2" rx="6"/>
  <text x="210" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1. 고전 논리 규칙 기반 (Rule-based 코딩)</text>
  <text x="210" y="130" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">정적 사전 딕셔너리 하드 벡터 1:1 매핑 스캔</text>

  <rect x="80" y="150" width="260" height="80" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="210" y="175" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">If Word == "개이득":</text>
  <text x="210" y="195" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">  return Dict["개이득"].pos</text>

  <path d="M 210 230 L 210 245" stroke="#ef4444" stroke-width="2"/>
  <polygon points="205,240 210,250 215,240" fill="#ef4444"/>

  <rect x="110" y="250" width="200" height="60" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="210" y="275" fill="#fecaca" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">[시스템 붕괴 Error!]</text>
  <text x="210" y="295" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">OOV: 사전에 아예 없는 신조어 치명타 파단</text>


  <!-- Right: Prob HMM -->
  <rect x="420" y="80" width="340" height="250" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="590" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">2. 마르코프 통계 전이 확률 (HMM Model 예측)</text>
  <text x="590" y="130" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">주변 조건부 확률망 가중치(Context P) 분할 베팅</text>

  <rect x="440" y="150" width="300" height="80" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="590" y="175" fill="#f8fafc" font-family="monospace" font-size="12" text-anchor="middle">P(POS | Context) 최우도 역산 스캔 탐색</text>
  <text x="590" y="195" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">"앞 시퀀스가 형용사 [맛있는] 배열이야? 통계 전이 확률상"</text>
  <text x="590" y="215" fill="#a7f3d0" font-family="sans-serif" font-size="11" text-anchor="middle">"형용사 뒤 98%는 명사가 타겟 매핑이지!"</text>

  <path d="M 590 230 L 590 245" stroke="#10b981" stroke-width="2"/>
  <polygon points="585,240 590,250 595,240" fill="#10b981"/>

  <rect x="490" y="250" width="200" height="60" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="590" y="275" fill="#a7f3d0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">[스무딩 생존 Success!]</text>
  <text x="590" y="295" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">비록 모르는 OOV 일지라도 주변 확률망 추론</text>


  <!-- Bottom Conclusion Banner -->
  <rect x="50" y="350" width="700" height="70" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="375" fill="#fde68a" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">파라미터 추론 패러다임의 위대한 도약: '1:1 스태틱 딕셔너리 사전 암기 매핑 (절대주의)' 에서</text>
  <text x="400" y="395" fill="#fde68a" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">'직접 인과 시퀀스 노드 간의 상태 갱신 전이 확률 방정식(Markov Transition Matrix)' 으로 진화 고도화.</text>

</svg>
