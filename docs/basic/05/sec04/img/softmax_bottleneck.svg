<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Softmax 분모 편미분의 저주: 10만 개의 오목 돋보기 채점의 병목</text>

  <!-- Output Layer Nodes -->
  <rect x="50" y="80" width="100" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="100" y="110" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">은닉 상태</text>
  <text x="100" y="150" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">(128 차원)</text>
  <circle cx="100" cy="180" r="10" fill="#3b82f6"/>
  <circle cx="100" cy="205" r="10" fill="#3b82f6"/>


  <!-- Softmax Blast -->
  <path d="M 170 150 L 370 150" stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="380" y="60" width="200" height="200" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="480" y="90" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Softmax 정육점</text>
  <text x="480" y="110" fill="#ef4444" font-family="sans-serif" font-size="24" text-anchor="middle">🔥</text>
  
  <text x="480" y="140" fill="#f87171" font-family="sans-serif" font-size="12" text-anchor="middle">갱신할 타겟 O/X</text>
  <text x="480" y="160" fill="#f87171" font-family="sans-serif" font-size="12" text-anchor="middle">1. Apple (0점) 갱신</text>
  <text x="480" y="180" fill="#f87171" font-family="sans-serif" font-size="12" text-anchor="middle">2. Banana (0점) 갱신</text>
  <text x="480" y="200" fill="#fef2f2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">... 99,999번 반복 ...</text>
  <text x="480" y="220" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">100,000. Mat (정답) 갱신!</text>
  
  <text x="480" y="245" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">가중치 10만 개 All 편미분</text>


  <!-- GPU Explodes -->
  <path d="M 600 150 L 680 150" stroke="#ef4444" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <circle cx="730" cy="150" r="40" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2"/>
  <text x="730" y="155" fill="#fef2f2" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">GPU 사망</text>
  <text x="730" y="110" fill="#ef4444" font-family="sans-serif" font-size="24" text-anchor="middle">💥</text>


  <text x="400" y="285" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">정답(Mat) 딱 1개를 띄우기 위해, 10만 개의 오답 단어 가중치 통계 지표를 전부 다 무식하게 갱신(Update 미분)하는 재앙입니다.</text>

</svg>
