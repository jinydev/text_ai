<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">O/X 이진 거짓말 분류 게임: 네거티브 샘플링 (SGNS)</text>

  <!-- Old Way Cross -->
  <rect x="50" y="80" width="180" height="150" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="140" y="110" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">과거 (10만 지선다)</text>
  <text x="140" y="140" fill="#f87171" font-family="sans-serif" font-size="12" text-anchor="middle">타겟 = "Mat"</text>
  <text x="140" y="160" fill="#fef2f2" font-family="sans-serif" font-size="12" text-anchor="middle">"100,000번 수식 비교"</text>
  <text x="140" y="195" fill="#ef4444" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">❌ 폐기</text>


  <!-- SGNS Revolution Matrix -->
  <rect x="280" y="80" width="500" height="160" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="10"/>
  <text x="530" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">SGNS 마법의 6칸 채점 테이블</text>
  
  <rect x="300" y="120" width="460" height="30" fill="#1e293b" rx="2"/>
  <text x="420" y="140" fill="#60a5fa" font-family="monospace" font-size="14" text-anchor="middle">1. 중앙단어(cat) + (진짜 앞 경호원 : mat)</text>
  <text x="680" y="140" fill="#3b82f6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">➔ 정답(1) True</text>
  
  <rect x="300" y="152" width="460" height="15" fill="#7f1d1d" rx="2"/>
  <text x="420" y="163" fill="#fca5a5" font-family="monospace" font-size="10" text-anchor="middle">2. 무작위 룰렛 오답지 ➔ 중앙(cat) + Apple</text>
  <text x="680" y="163" fill="#fca5a5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">➔ 오답(0) False</text>

  <rect x="300" y="168" width="460" height="15" fill="#7f1d1d" rx="2"/>
  <text x="420" y="179" fill="#fca5a5" font-family="monospace" font-size="10" text-anchor="middle">3. 무작위 룰렛 오답지 ➔ 중앙(cat) + Paper</text>
  <text x="680" y="179" fill="#fca5a5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">➔ 오답(0) False</text>

  <rect x="300" y="184" width="460" height="15" fill="#7f1d1d" rx="2"/>
  <text x="420" y="195" fill="#fca5a5" font-family="monospace" font-size="10" text-anchor="middle">4. 무작위 룰렛 오답지 ➔ 중앙(cat) + The</text>
  <text x="680" y="195" fill="#fca5a5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">➔ 오답(0) False</text>
  
  <rect x="300" y="200" width="460" height="15" fill="#7f1d1d" rx="2"/>
  <text x="420" y="211" fill="#fca5a5" font-family="monospace" font-size="10" text-anchor="middle">5. 무작위 룰렛 오답지 ➔ 중앙(cat) + Is</text>
  <text x="680" y="211" fill="#fca5a5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">➔ 오답(0) False</text>
  
  <rect x="300" y="216" width="460" height="15" fill="#7f1d1d" rx="2"/>
  <text x="420" y="227" fill="#fca5a5" font-family="monospace" font-size="10" text-anchor="middle">6. 무작위 룰렛 오답지 ➔ 중앙(cat) + Desk</text>
  <text x="680" y="227" fill="#fca5a5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">➔ 오답(0) False</text>

  <!-- Explanation -->
  <text x="400" y="275" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">모든 10만 단어를 안 돌리고, '양수 진리(1개)'와 아무거나 가져온 '음수 찌꺼기(5개)' 딱 6세트만 OX 평가하여 99% 의 계산 다이어트를 완성합니다!</text>

</svg>
