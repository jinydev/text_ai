<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .desc { font-size: 14px; fill: #475569; }
      .word { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: white; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">Word2Vec의 두 가지 구조: CBOW vs Skip-gram</text>

  <!-- CBOW -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="330" height="230" class="box" fill="#eff6ff" />
    <text x="165" y="30" class="title" fill="#1e3a8a">CBOW</text>
    <text x="165" y="55" class="desc" fill="#3b82f6">주변 단어 → 중심 단어 예측</text>

    <!-- Context Words -->
    <rect x="30" y="90" width="80" height="30" rx="4" fill="#60a5fa" />
    <text x="70" y="105" class="word">The</text>
    
    <rect x="30" y="140" width="80" height="30" rx="4" fill="#60a5fa" />
    <text x="70" y="155" class="word">fat</text>
    
    <rect x="30" y="190" width="80" height="30" rx="4" fill="#60a5fa" />
    <text x="70" y="205" class="word">sat</text>

    <text x="70" y="80" font-size="12" fill="#1e3a8a" font-weight="bold">주변 단어</text>

    <!-- Center Word -->
    <rect x="220" y="140" width="80" height="30" rx="4" fill="#fbbf24" />
    <text x="260" y="155" class="word" fill="#78350f">cat</text>

    <text x="260" y="130" font-size="12" fill="#b45309" font-weight="bold">중심 단어</text>

    <!-- Arrows -->
    <path d="M 120 105 L 210 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 120 155 L 210 155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 120 205 L 210 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  </g>

  <!-- Skip-gram -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="330" height="230" class="box" fill="#fef2f2" />
    <text x="165" y="30" class="title" fill="#991b1b">Skip-gram</text>
    <text x="165" y="55" class="desc" fill="#ef4444">중심 단어 → 주변 단어 예측</text>

    <!-- Center Word -->
    <rect x="30" y="140" width="80" height="30" rx="4" fill="#fbbf24" />
    <text x="70" y="155" class="word" fill="#78350f">cat</text>
    
    <text x="70" y="130" font-size="12" fill="#b45309" font-weight="bold">중심 단어</text>

    <!-- Context Words -->
    <rect x="220" y="90" width="80" height="30" rx="4" fill="#60a5fa" />
    <text x="260" y="105" class="word">The</text>
    
    <rect x="220" y="140" width="80" height="30" rx="4" fill="#60a5fa" />
    <text x="260" y="155" class="word">fat</text>
    
    <rect x="220" y="190" width="80" height="30" rx="4" fill="#60a5fa" />
    <text x="260" y="205" class="word">sat</text>

    <text x="260" y="80" font-size="12" fill="#1e3a8a" font-weight="bold">주변 단어</text>

    <!-- Arrows -->
    <path d="M 120 150 L 210 105" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 120 155 L 210 155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 120 160 L 210 205" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  </g>

</svg>
