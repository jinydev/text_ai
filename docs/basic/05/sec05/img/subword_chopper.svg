<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">도마 위 글자 쪼개기 작전: Subword N-gram Chopper</text>

  <!-- Base Word -->
  <rect x="50" y="120" width="160" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="130" y="155" fill="#93c5fd" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">&#60;apple&#62;</text>
  <text x="130" y="105" fill="#60a5fa" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">원래 목표 단어</text>
  <text x="130" y="200" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">&#60; &#62; 경계 표시 부착</text>


  <!-- Chopping Process -->
  <path d="M 230 150 L 300 150" stroke="#fcd34d" stroke-width="4" stroke-dasharray="10,5" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="250" y="110" width="30" height="80" fill="#f59e0b" rx="2" transform="rotate(30 265 150)"/>
  <text x="265" y="130" fill="#78350f" font-family="sans-serif" font-size="24" text-anchor="middle" transform="rotate(30 265 150)">🔪</text>

  <text x="265" y="220" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">N=3 등분 칼질</text>


  <!-- Subword Output Blocks -->
  <rect x="330" y="80" width="400" height="150" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="10"/>
  
  <!-- Chunks -->
  <rect x="360" y="110" width="70" height="35" fill="#047857" stroke="#34d399" stroke-width="2" rx="5"/>
  <text x="395" y="133" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">&#60;ap</text>

  <text x="445" y="133" fill="#a7f3d0" font-family="sans-serif" font-size="20" text-anchor="middle">+</text>

  <rect x="460" y="110" width="70" height="35" fill="#047857" stroke="#34d399" stroke-width="2" rx="5"/>
  <text x="495" y="133" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">app</text>

  <text x="545" y="133" fill="#a7f3d0" font-family="sans-serif" font-size="20" text-anchor="middle">+</text>

  <rect x="560" y="110" width="70" height="35" fill="#047857" stroke="#34d399" stroke-width="2" rx="5"/>
  <text x="595" y="133" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">ppl</text>

  <text x="645" y="133" fill="#a7f3d0" font-family="sans-serif" font-size="20" text-anchor="middle">+</text>

  <rect x="660" y="110" width="50" height="35" fill="#047857" stroke="#34d399" stroke-width="2" rx="5"/>
  <text x="685" y="133" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">...</text>

  <!-- Word Total Component -->
  <rect x="480" y="170" width="120" height="35" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="5"/>
  <text x="540" y="193" fill="#bfdbfe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">통째 &#60;apple&#62; 합산</text>


  <!-- Conclusion Vector -->
  <path d="M 530 230 L 530 260" stroke="#fca5a5" stroke-width="3" fill="none"/>
  <text x="530" y="280" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">이 무수한 잔해 파편 벡터 좌표들을 합산(Sum)하여 최종 위치 도출!</text>

</svg>
