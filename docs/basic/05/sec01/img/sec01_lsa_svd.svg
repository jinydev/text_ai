<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box-sparse { fill: #fef2f2; stroke: #fca5a5; stroke-width: 2; rx: 4; ry: 4; }
      .box-dense { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 4; ry: 4; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #475569; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">잠재 의미 분석(LSA) - 절단된 특이값 분해(Truncated SVD)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">비슷한 단어들로 구성된 거대한 0의 희소행렬을 수학적 선형변환을 통해 "잠재된 의미" 축으로 압축합니다.</text>

  <!-- Large Sparse Matrix -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="250" height="180" class="box-sparse" />
    <text x="125" y="-15" font-size="16" font-weight="bold" fill="#b91c1c">원래의 단어-문서 행렬 (BoW / TF-IDF)</text>
    <text x="-20" y="90" font-size="14" font-weight="bold" fill="#b91c1c" transform="rotate(-90, -20, 90)">2000 차원 (단어)</text>

    <!-- Matrix text -->
    <text x="125" y="30" class="math">0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0</text>
    <text x="125" y="60" class="math">0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0</text>
    <text x="125" y="90" class="math">0&nbsp;&nbsp;1&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0</text>
    <text x="125" y="120" class="math">...&nbsp;&nbsp;...&nbsp;&nbsp;...&nbsp;&nbsp;...&nbsp;&nbsp;...</text>
    <text x="125" y="150" class="math" fill="#0f172a">0&nbsp;&nbsp;0&nbsp;&nbsp;<tspan fill="#b91c1c">3</tspan>&nbsp;&nbsp;0&nbsp;&nbsp;<tspan fill="#b91c1c">1</tspan>&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0&nbsp;&nbsp;0</text>
  </g>

  <!-- Arrow -->
  <path d="M 370 210 L 440 210" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow)" />
  <text x="405" y="180" font-size="14" font-weight="bold" fill="#3b82f6">Truncated</text>
  <text x="405" y="240" font-size="14" font-weight="bold" fill="#3b82f6">SVD 변환</text>

  <!-- Small Dense Matrix -->
  <g transform="translate(480, 160)">
    <rect x="0" y="0" width="250" height="100" class="box-dense" />
    <text x="125" y="-15" font-size="16" font-weight="bold" fill="#1d4ed8">학습된 잠재 의미 공간</text>
    <text x="125" y="-35" font-size="14" fill="#3b82f6">(실수형 Dense Vector)</text>
    <text x="280" y="50" font-size="14" font-weight="bold" fill="#1d4ed8">10 차원 (잠재축)</text>

    <!-- Matrix text -->
    <text x="125" y="30" class="math" fill="#1d4ed8">1.1&nbsp;&nbsp;0.2&nbsp;&nbsp;1.2&nbsp;&nbsp;1.0&nbsp;&nbsp;0.1</text>
    <text x="125" y="70" class="math" fill="#1d4ed8">0.7&nbsp;&nbsp;0.1&nbsp;&nbsp;1.0&nbsp;&nbsp;0.2&nbsp;&nbsp;1.0</text>
  </g>

</svg>
