<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="35" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">워드 임베딩 공간의 의미론적 기하 연산 (Semantic Arithmetic)</text>

  <!-- 3D Space Background -->
  <line x1="100" y1="300" x2="300" y2="300" stroke="#475569" stroke-width="2" stroke-dasharray="2,2"/> <!-- X -->
  <line x1="100" y1="300" x2="100" y2="100" stroke="#475569" stroke-width="2" stroke-dasharray="2,2"/> <!-- Y -->
  <line x1="100" y1="300" x2="200" y2="200" stroke="#475569" stroke-width="2" stroke-dasharray="2,2"/> <!-- Z -->
  <text x="210" y="195" fill="#64748b" font-family="sans-serif" font-size="12">Dense 256D Space</text>

  <!-- Points and Vectors -->
  <!-- King -->
  <circle cx="200" cy="80" r="8" fill="#3b82f6"/>
  <rect x="200" y="55" width="45" height="20" fill="#1e293b" rx="2"/>
  <text x="222" y="70" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">King</text>

  <!-- Man to King Relationship Arrow for scale reference -->
  <circle cx="100" cy="220" r="8" fill="#94a3b8"/>
  <text x="80" y="215" fill="#cbd5e1" font-family="sans-serif" font-size="14" text-anchor="end">Man</text>
  <path d="M 105 215 L 195 85" stroke="#475569" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  
  <!-- Minus Man Vector Path -->
  <path d="M 200 80 L 120 180" stroke="#ef4444" stroke-width="3" fill="none"/>
  <polygon points="125,170 120,180 135,175" fill="#ef4444"/>
  <text x="130" y="130" fill="#fca5a5" font-family="monospace" font-size="16" font-weight="bold">- v(Man)</text>
  <text x="110" y="195" fill="#ef4444" font-family="sans-serif" font-size="12">[순수 권력 속성]</text>

  <!-- Plus Woman Vector Path -->
  <circle cx="450" cy="220" r="8" fill="#94a3b8"/>
  <text x="470" y="215" fill="#cbd5e1" font-family="sans-serif" font-size="14" text-anchor="start">Woman</text>
  <path d="M 120 180 L 520 80" stroke="#10b981" stroke-width="3" fill="none"/>
  <polygon points="505,80 520,80 515,90" fill="#10b981"/>
  <text x="320" y="115" fill="#6ee7b7" font-family="monospace" font-size="16" font-weight="bold">+ v(Woman)</text>

  <!-- Queen Destination -->
  <circle cx="520" cy="80" r="10" fill="#f59e0b"/>
  <circle cx="520" cy="80" r="16" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2,2"/>
  <rect x="520" y="45" width="60" height="25" fill="#1e293b" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="550" y="62" fill="#fcd34d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Queen</text>

  <!-- Equation Board -->
  <rect x="350" y="230" width="400" height="80" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="8"/>
  <text x="550" y="260" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">v(King) - v(Man) + v(Woman) ≈ v(Queen)</text>
  <text x="550" y="290" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">성별 차이 벡터가 왕(King)의 좌표를 여왕(Queen)의 위치로 완벽히 정밀 전송</text>

</svg>
