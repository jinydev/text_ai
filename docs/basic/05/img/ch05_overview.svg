<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Chapter 05. 워드 임베딩(Word Embedding) 기술 진화 로드맵</text>

  <!-- Flow Boxes -->
  
  <!-- Step 1 -->
  <rect x="50" y="80" width="160" height="70" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="130" y="110" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">과거 이산 통계 모형</text>
  <text x="130" y="130" fill="#fecaca" font-family="monospace" font-size="12" text-anchor="middle">Sparse (차원의 저주)</text>
  
  <path d="M 130 150 L 130 180" stroke="#64748b" stroke-width="3"/>
  <polygon points="125,175 130,185 135,175" fill="#64748b"/>

  <!-- Step 2 -->
  <rect x="50" y="190" width="160" height="70" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="130" y="220" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">최초의 신경망 NNLM</text>
  <text x="130" y="240" fill="#a7f3d0" font-family="monospace" font-size="12" text-anchor="middle">Dense Vector (투사 매핑)</text>
  
  <path d="M 210 225 L 260 225" stroke="#10b981" stroke-width="3"/>
  <polygon points="255,220 265,225 255,230" fill="#10b981"/>

  <!-- Step 3 (Center) -->
  <rect x="270" y="155" width="220" height="140" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="380" y="185" fill="#93c5fd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Word2Vec 제국 (Google)</text>
  <text x="380" y="210" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">은닉층 연산 스택 전면 제거 최적화</text>
  <text x="380" y="240" fill="#93c5fd" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">CBOW vs Skip-gram</text>
  <rect x="330" y="255" width="100" height="25" fill="#0f172a" rx="4"/>
  <text x="380" y="272" fill="#ef4444" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">SGNS 네거티브 샘플링</text>

  <!-- Branch Up (FastText) -->
  <path d="M 490 190 Q 520 120 570 120" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <polygon points="565,115 575,120 565,125" fill="#f59e0b"/>
  
  <rect x="580" y="90" width="180" height="60" fill="#b45309" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="670" y="115" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FastText (Meta AI)</text>
  <text x="670" y="135" fill="#fde68a" font-family="sans-serif" font-size="11" text-anchor="middle">Subword N-gram (OOV 근사 방어)</text>

  <!-- Branch Down (GloVe) -->
  <path d="M 490 260 Q 520 290 570 290" stroke="#8b5cf6" stroke-width="3" fill="none"/>
  <polygon points="565,285 575,290 565,295" fill="#8b5cf6"/>

  <rect x="580" y="260" width="180" height="60" fill="#4c1d95" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="670" y="285" fill="#c4b5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">GloVe (Stanford)</text>
  <text x="670" y="305" fill="#ddd6fe" font-family="sans-serif" font-size="11" text-anchor="middle">전역 동시 발생 통계 + 임베딩 융합</text>

</svg>
