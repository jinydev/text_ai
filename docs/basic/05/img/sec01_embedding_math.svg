<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #3b82f6; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-size: 24px; font-weight: bold; fill: #1e3a8a; }
      .vector { font-family: 'Roboto', sans-serif; font-size: 20px; fill: #0f172a; }
      .operator { font-family: 'Roboto', sans-serif; font-size: 32px; font-weight: bold; fill: #ef4444; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">벡터 연산을 통한 단어 의미(Semantic) 추론</text>
  <text x="400" y="65" font-size="14" fill="#64748b">내부 의미가 실수값으로 정교하게 매핑되면 대수학적 계산을 통해 관계를 도출할 수 있습니다.</text>

  <rect x="50" y="100" width="700" height="150" class="box" fill="#eff6ff" />

  <!-- The Equation Words -->
  <text x="140" y="140" class="math">King</text>
  <text x="250" y="140" class="operator">-</text>
  <text x="360" y="140" class="math">Man</text>
  <text x="470" y="140" class="operator">+</text>
  <text x="580" y="140" class="math">Woman</text>
  <text x="690" y="140" class="operator" fill="#10b981">=</text>

  <text x="690" y="210" class="math" fill="#10b981">Queen</text>

  <!-- The Equation Vectors -->
  <text x="140" y="210" class="vector">( 0, 1, 1 )</text>
  <text x="250" y="210" class="operator">-</text>
  <text x="360" y="210" class="vector">( 0, 1, 0 )</text>
  <text x="470" y="210" class="operator">+</text>
  <text x="580" y="210" class="vector">( 1, 1, 0 )</text>
  <line x1="640" y1="180" x2="740" y2="180" stroke="#cbd5e1" stroke-width="2" />
  
  <text x="690" y="240" font-size="20" class="vector" font-weight="bold" fill="#059669">= ( 1, 1, 1 )</text>

</svg>
