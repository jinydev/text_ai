<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .header-bg { fill: #1e3a8a; }
      .header-text { font-size: 18px; font-weight: bold; fill: white; }
      .cell { fill: white; stroke: #cbd5e1; stroke-width: 1; }
      .cell-text { font-size: 16px; font-weight: bold; fill: #0f172a; }
      .cell-sub { font-size: 14px; fill: #475569; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">N-gram 언어 모델과 NNLM 비교</text>

  <!-- Table -->
  <g transform="translate(50, 70)">
    
    <!-- Header Row -->
    <rect x="0" y="0" width="150" height="50" class="header-bg" />
    <rect x="150" y="0" width="275" height="50" class="header-bg" />
    <rect x="425" y="0" width="275" height="50" class="header-bg" />

    <text x="75" y="25" class="header-text">구분</text>
    <text x="287" y="25" class="header-text">n-gram</text>
    <text x="562" y="25" class="header-text">NNLM</text>

    <path d="M 150 0 L 150 250 M 425 0 L 425 250" stroke="#cbd5e1" stroke-width="2" />
    <path d="M 0 100 L 700 100 M 0 170 L 700 170 M 0 250 L 700 250" stroke="#cbd5e1" stroke-width="2" />
    <rect x="0" y="0" width="700" height="250" fill="none" stroke="#64748b" stroke-width="2" />

    <!-- Row 1: 접근 -->
    <rect x="0" y="50" width="150" height="50" class="cell" fill="#f1f5f9" />
    <text x="75" y="75" class="cell-text">접 근</text>
    <text x="287" y="75" class="cell-text">빈도 기반 확률 저장</text>
    <text x="562" y="75" class="cell-text">매개 변수화된 확률 함수</text>

    <!-- Row 2: 확률모델 -->
    <rect x="0" y="100" width="150" height="70" class="cell" fill="#f1f5f9" />
    <text x="75" y="135" class="cell-text">확률모델</text>
    <text x="287" y="135" class="cell-text" font-family="'Roboto', sans-serif">P(w|h) = count(h,w) / count(h)</text>
    <text x="562" y="135" class="cell-text" font-family="'Roboto', sans-serif">P(w|h) = softmax( W f(e(h)) )</text>

    <!-- Row 3: 특징 -->
    <rect x="0" y="170" width="150" height="80" class="cell" fill="#f1f5f9" />
    <text x="75" y="210" class="cell-text">특 징</text>
    
    <text x="287" y="195" class="cell-text">이산적 통계, 독립 추정</text>
    <text x="287" y="225" class="cell-sub">(경우의 수 조합을 통째로 외움)</text>

    <text x="562" y="195" class="cell-text">연속적 표현, 파라미터 공유</text>
    <text x="562" y="225" class="cell-sub" fill="#d97706" font-weight="bold">(유사도 기반 일반화 가능)</text>
  </g>

</svg>
