<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 1; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .matrix-cell { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; }
      .header { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e3a8a; }
      .header-bg { fill: #dbeafe; stroke: #bfdbfe; stroke-width: 1; }
      .highlight { fill: #fef08a; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">GloVe: 윈도우 기반 동시 등장 행렬 (Co-occurrence Matrix)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">특정 윈도우 크기 내에서 단어 쌍이 코퍼스 전체에서 몇 번이나 같이 등장하는지 통계적 횟수를 카운트한 행렬</text>

  <!-- Document Sources -->
  <g transform="translate(50, 100)">
    <text x="100" y="0" font-size="16" font-weight="bold" fill="#0f172a">문서 코퍼스 (Corpus)</text>
    <rect x="0" y="20" width="200" height="150" class="box" fill="#f8fafc" />
    <text x="100" y="50" font-family="Roboto" font-weight="bold" fill="#334155">1. I like deep learning.</text>
    <text x="100" y="90" font-family="Roboto" font-weight="bold" fill="#334155">2. I like NLP.</text>
    <text x="100" y="130" font-family="Roboto" font-weight="bold" fill="#334155">3. I enjoy flying.</text>
  </g>

  <!-- Arrow -->
  <path d="M 260 170 L 300 170" stroke="#94a3b8" stroke-width="3" />
  <polygon points="300,165 310,170 300,175" fill="#94a3b8" />

  <!-- Matrix -->
  <g transform="translate(330, 100)">
    
    <!-- Column Headers -->
    <rect x="50" y="0" width="50" height="30" class="header-bg" />
    <rect x="100" y="0" width="50" height="30" class="header-bg" />
    <rect x="150" y="0" width="50" height="30" class="header-bg" />
    <rect x="200" y="0" width="60" height="30" class="header-bg" />
    <text x="75" y="15" class="header">I</text>
    <text x="125" y="15" class="header">like</text>
    <text x="175" y="15" class="header">nlp</text>
    <text x="230" y="15" class="header">deep</text>

    <!-- Row Headers -->
    <rect x="0" y="30" width="50" height="30" class="header-bg" />
    <rect x="0" y="60" width="50" height="30" class="header-bg" />
    <rect x="0" y="90" width="50" height="30" class="header-bg" />
    <rect x="0" y="120" width="50" height="30" class="header-bg" />
    <text x="25" y="45" class="header">I</text>
    <text x="25" y="75" class="header">like</text>
    <text x="25" y="105" class="header">nlp</text>
    <text x="25" y="135" class="header">deep</text>

    <!-- Matrix Cells (Simplification) -->
    <!-- Row 1: I -->
    <rect x="50" y="30" width="50" height="30" class="box" />
    <rect x="100" y="30" width="50" height="30" class="box highlight" />
    <rect x="150" y="30" width="50" height="30" class="box" />
    <rect x="200" y="30" width="60" height="30" class="box" />
    <text x="75" y="45" class="matrix-cell">0</text>
    <text x="125" y="45" class="matrix-cell">2</text>
    <text x="175" y="45" class="matrix-cell">0</text>
    <text x="230" y="45" class="matrix-cell">0</text>
    
    <!-- Row 2: like -->
    <rect x="50" y="60" width="50" height="30" class="box highlight" />
    <rect x="100" y="60" width="50" height="30" class="box" />
    <rect x="150" y="60" width="50" height="30" class="box highlight" />
    <rect x="200" y="60" width="60" height="30" class="box highlight" />
    <text x="75" y="75" class="matrix-cell">2</text>
    <text x="125" y="75" class="matrix-cell">0</text>
    <text x="175" y="75" class="matrix-cell">1</text>
    <text x="230" y="75" class="matrix-cell">1</text>

    <!-- Row 3: nlp -->
    <rect x="50" y="90" width="50" height="30" class="box" />
    <rect x="100" y="90" width="50" height="30" class="box highlight" />
    <rect x="150" y="90" width="50" height="30" class="box" />
    <rect x="200" y="90" width="60" height="30" class="box" />
    <text x="75" y="105" class="matrix-cell">0</text>
    <text x="125" y="105" class="matrix-cell">1</text>
    <text x="175" y="105" class="matrix-cell">0</text>
    <text x="230" y="105" class="matrix-cell">0</text>

    <!-- Row 4: deep -->
    <rect x="50" y="120" width="50" height="30" class="box" />
    <rect x="100" y="120" width="50" height="30" class="box highlight" />
    <rect x="150" y="120" width="50" height="30" class="box" />
    <rect x="200" y="120" width="60" height="30" class="box" />
    <text x="75" y="135" class="matrix-cell">0</text>
    <text x="125" y="135" class="matrix-cell">1</text>
    <text x="175" y="135" class="matrix-cell">0</text>
    <text x="230" y="135" class="matrix-cell">0</text>
  </g>

  <rect x="100" y="280" width="600" height="40" fill="#fef08a" stroke="#ca8a04" rx="8" />
  <text x="400" y="300" font-size="14" font-weight="bold" fill="#854d0e">글로브(GloVe)는 이 동시 등장 행렬 칸 안의 확률값을 내적(Dot product)의 목표 정답으로 삼고 훈련합니다.</text>

</svg>
