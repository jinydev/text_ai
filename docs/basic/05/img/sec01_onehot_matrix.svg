<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 4; ry: 4; }
      .word { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: bold; fill: #1e293b; }
      .val-0 { fill: #e2e8f0; }
      .val-1 { fill: #0f172a; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">원-핫 인코딩 행렬 구조 (One-Hot Encoding Matrix)</text>
  <text x="400" y="65" font-size="14" fill="#64748b">단어 마다 오직 한 자리(자신의 고유한 위치 인덱스)에만 1이 찍히는 구조</text>

  <g transform="translate(100, 100)">
    <rect x="-20" y="0" width="640" height="250" class="box" />
    <text x="-40" y="100" class="word" transform="rotate(-90, -40, 100)">One-hot Vectors (차원)</text>

    <!-- Grid columns Generation -->
    <g transform="translate(20, 0)">
      <!-- Col 1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="20" width="15" height="15" class="val-0" />
        <rect x="0" y="40" width="15" height="15" class="val-0" />
        <rect x="0" y="60" width="15" height="15" class="val-0" />
        <rect x="0" y="80" width="15" height="15" class="val-0" />
        <rect x="0" y="100" width="15" height="15" class="val-0" />
        <rect x="0" y="120" width="15" height="15" class="val-0" />
        <rect x="0" y="140" width="15" height="15" class="val-0" />
        <rect x="0" y="160" width="15" height="15" class="val-0" />
        <rect x="0" y="180" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">this</text>
      </g>
      <!-- Col 2 -->
      <g transform="translate(40, 0)">
        <rect x="0" y="20" width="15" height="15" class="val-0" />
        <rect x="0" y="40" width="15" height="15" class="val-0" />
        <rect x="0" y="60" width="15" height="15" class="val-0" />
        <rect x="0" y="80" width="15" height="15" class="val-0" />
        <rect x="0" y="100" width="15" height="15" class="val-0" />
        <rect x="0" y="120" width="15" height="15" class="val-0" />
        <rect x="0" y="140" width="15" height="15" class="val-0" />
        <rect x="0" y="160" width="15" height="15" class="val-0" />
        <rect x="0" y="180" width="15" height="15" class="val-0" />
        <rect x="0" y="200" width="15" height="15" class="val-1" />
        <text x="7" y="240" class="word" transform="rotate(-90, 7, 240)">is</text>
      </g>
      <!-- Col 3 -->
      <g transform="translate(80, 0)">
        <rect x="0" y="20" width="15" height="15" class="val-1" />
        <rect x="0" y="40" width="15" height="15" class="val-0" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">one</text>
      </g>
      <!-- Col 4 -->
      <g transform="translate(120, 0)">
        <rect x="0" y="80" width="15" height="15" class="val-0" />
        <rect x="0" y="100" width="15" height="15" class="val-0" />
        <rect x="0" y="180" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">of</text>
      </g>
      <!-- Col 5 -->
      <g transform="translate(160, 0)">
        <rect x="0" y="40" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">the</text>
      </g>
      <!-- Col 6 -->
      <g transform="translate(200, 0)">
        <rect x="0" y="80" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">best</text>
      </g>
      <!-- Col 7 -->
      <g transform="translate(240, 0)">
        <rect x="0" y="160" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">films</text>
      </g>
      <!-- Col 8 -->
      <g transform="translate(280, 0)">
        <rect x="0" y="140" width="15" height="15" class="val-1" />
        <text x="7" y="235" class="word" transform="rotate(-90, 7, 235)">actually</text>
      </g>
      <!-- Col 9 -->
      <g transform="translate(320, 0)">
        <rect x="0" y="40" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">the</text>
      </g>
      <!-- Col 10 -->
      <g transform="translate(360, 0)">
        <rect x="0" y="80" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">best</text>
      </g>
      <!-- Col 11 -->
      <g transform="translate(400, 0)">
        <rect x="0" y="100" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">I</text>
      </g>
      <!-- Col 12 -->
      <g transform="translate(440, 0)">
        <rect x="0" y="120" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">have</text>
      </g>
      <!-- Col 13 -->
      <g transform="translate(480, 0)">
        <rect x="0" y="60" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">ever</text>
      </g>
      <!-- Col 14 -->
      <g transform="translate(520, 0)">
        <rect x="0" y="140" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">seen</text>
      </g>
      <!-- Col 15 -->
      <g transform="translate(560, 0)">
        <rect x="0" y="20" width="15" height="15" class="val-1" />
        <text x="7" y="220" class="word" transform="rotate(-90, 7, 220)">day</text>
      </g>
      <!-- Draw gray baseline columns behind everything for missing blocks -->
      <path d="M 7 20 L 7 200 M 47 20 L 47 200 M 87 20 L 87 200 M 127 20 L 127 200 M 167 20 L 167 200 M 207 20 L 207 200 M 247 20 L 247 200 M 287 20 L 287 200 M 327 20 L 327 200 M 367 20 L 367 200 M 407 20 L 407 200 M 447 20 L 447 200 M 487 20 L 487 200 M 527 20 L 527 200 M 567 20 L 567 200" stroke="#e2e8f0" stroke-width="15" stroke-dasharray="15 5" class="val-0" style="opacity: 0.5" />
      
    </g>
  </g>

</svg>
