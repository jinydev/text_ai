<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .word { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; }
      .highlight { fill: #ef4444; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">N-gram 언어 모델 관점의 치명적 한계</text>
  <text x="400" y="65" font-size="14" fill="#64748b">학습 코퍼스(Corpus)에 등장하지 않은 텍스트 시퀀스는 확률이 영원히 '0'이 되는 희소성(Sparsity) 문제</text>

  <!-- Training Data Set -->
  <rect x="50" y="100" width="300" height="150" class="box" fill="#f0fdf4" stroke="#4ade80" />
  <text x="200" y="130" font-size="18" font-weight="bold" fill="#166534">학습에 사용된 데이터</text>
  <text x="200" y="170" class="word" fill="#15803d">- "the cat sleeps"</text>
  <text x="200" y="210" class="word" fill="#15803d">- "the dog runs"</text>

  <!-- Probabilities Box -->
  <rect x="420" y="100" width="330" height="200" class="box" fill="#fffbeb" stroke="#f59e0b" />
  <text x="585" y="130" font-size="18" font-weight="bold" fill="#b45309">Tri-gram (n=3) 확률 모델</text>
  
  <text x="585" y="170" class="word">P( <tspan fill="#ea580c">sleeps</tspan> | the cat ) &gt; 0</text>
  <text x="585" y="210" class="word">P( <tspan fill="#ea580c">runs</tspan> | the dog ) &gt; 0</text>

  <!-- Failed condition -->
  <text x="585" y="260" class="word highlight">P( runs | the cat ) = 0</text>
  <text x="585" y="280" font-size="12" fill="#ef4444">고양이가 뛴다는 건 상식적이지만,</text>
  <text x="585" y="295" font-size="12" fill="#ef4444">기존 학습 데이터에 없었으므로 생성 불가!</text>

  <!-- Connection -->
  <path d="M 350 175 L 420 175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

</svg>
