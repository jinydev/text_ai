<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">혼동 행렬 메트릭 (Confusion Matrix) 다차원 교차 분할 매핑 구조도</text>

  <!-- Axes Labels -->
  <text x="38" y="250" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" transform="rotate(-90, 38, 250)" text-anchor="middle">실제 현실 정답 (Real Class : Y)</text>
  <text x="450" y="75" fill="#cbd5e1" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">AI 모델의 출력 예측 (Predicted Class : Y^)</text>

  <!-- Grid Framework -->
  <rect x="250" y="100" width="400" height="300" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="250" y1="250" x2="650" y2="250" stroke="#64748b" stroke-width="2"/>
  <line x1="450" y1="100" x2="450" y2="400" stroke="#64748b" stroke-width="2"/>

  <!-- Left Inner Labels -->
  <rect x="80" y="100" width="160" height="150" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="160" y="170" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">실제 타겟 (양성/스팸)</text>
  <text x="160" y="195" fill="#fca5a5" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">True (P)</text>

  <rect x="80" y="250" width="160" height="150" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="160" y="320" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">실제 정상 (음성/일반)</text>
  <text x="160" y="345" fill="#a7f3d0" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">False (N)</text>

  <!-- Top Inner Labels -->
  <rect x="250" y="60" width="200" height="40" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="350" y="85" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">예측 맵핑 Positive (P)</text>

  <rect x="450" y="60" width="200" height="40" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="550" y="85" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">예측 회피 Negative (N)</text>


  <!-- Quadrants -->
  <!-- TP -->
  <rect x="250" y="100" width="200" height="150" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="350" y="140" fill="#6ee7b7" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">T P</text>
  <text x="350" y="165" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">True Positive (정타)</text>
  <text x="350" y="190" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">진짜 타겟 악성(스팸)을</text>
  <text x="350" y="210" fill="#a7f3d0" font-family="sans-serif" font-size="12" text-anchor="middle">정확히 파악해 검거 성공함!</text>

  <!-- FN -->
  <rect x="450" y="100" width="200" height="150" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="550" y="140" fill="#fca5a5" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">F N</text>
  <text x="550" y="165" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">False Negative (제2종 오류)</text>
  <rect x="460" y="175" width="180" height="60" fill="#0f172a" fill-opacity="0.5" rx="4"/>
  <text x="550" y="195" fill="#fecaca" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">지독한 테러범(랜섬웨어)을</text>
  <text x="550" y="215" fill="#fecaca" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">정상이라 속고 무사통과 방관</text>
  <text x="550" y="230" fill="#ef4444" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">-> 보안 시스템 치명타 붕괴 파탄</text>

  <!-- FP -->
  <rect x="250" y="250" width="200" height="150" fill="#b45309" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="290" fill="#fcd34d" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">F P</text>
  <text x="350" y="315" fill="#fcd34d" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">False Positive (제1종 오류)</text>
  <rect x="260" y="325" width="180" height="60" fill="#0f172a" fill-opacity="0.5" rx="4"/>
  <text x="350" y="345" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">무고한 정상 시민(중요 메일)을</text>
  <text x="350" y="365" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">스팸 타겟으로 과잉 진압 영창행</text>
  <text x="350" y="380" fill="#f59e0b" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">-> 기회 비용 막대 손실 억울함 부작용</text>

  <!-- TN -->
  <rect x="450" y="250" width="200" height="150" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="550" y="290" fill="#93c5fd" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">T N</text>
  <text x="550" y="315" fill="#bfdbfe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">True Negative (가드)</text>
  <text x="550" y="340" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">안전한 정상 데이터 유입을</text>
  <text x="550" y="360" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">올바르게 인식하고 얌전히</text>
  <text x="550" y="380" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">정상 패스시킴 (기본 성공)</text>

  <!-- Summary text -->
  <text x="400" y="430" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">AI 혼동 행렬 지대: 단순 1차원 배율 점수를 벗어나 1종 기회 손실(FP)과 2종 치명 오류 부작용(FN)의 발생 빈도 양상을 다면적으로 감시 해부함</text>

</svg>
