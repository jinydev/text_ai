<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .desc { font-size: 14px; fill: #64748b; }
      .math { font-family: 'Roboto', sans-serif; font-style: italic; }
    </style>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a">분류 회귀 모델 비교</text>

  <!-- Logistic Regression -->
  <g transform="translate(100, 90)">
    <rect x="0" y="0" width="250" height="250" class="box" />
    <text x="125" y="30" class="title" fill="#059669">로지스틱 회귀</text>
    <text x="125" y="55" class="desc">(Logistic Regression)</text>

    <text x="125" y="100" font-size="16" font-weight="bold" fill="#1e293b">이진 분류 (Binary)</text>
    <text x="125" y="125" class="desc">정상 메일(0) vs 스팸 메일(1)</text>
    <text x="125" y="145" class="desc">긍정(0) vs 부정(1)</text>

    <!-- Simple Diagram -->
    <circle cx="125" cy="190" r="15" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
    <text x="125" y="190" fill="#ef4444" font-weight="bold" font-size="14">W</text>

    <line x1="145" y1="190" x2="190" y2="190" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)" />
    <text x="210" y="190" font-size="20" font-weight="bold" fill="#10b981">P</text>
    <text x="170" y="210" font-size="12" fill="#64748b">Sigmoid</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="120" x2="400" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6" />

  <!-- Softmax Regression -->
  <g transform="translate(450, 90)">
    <rect x="0" y="0" width="250" height="250" class="box" />
    <text x="125" y="30" class="title" fill="#7e22ce">소프트맥스 회귀</text>
    <text x="125" y="55" class="desc">(Softmax Regression)</text>

    <text x="125" y="100" font-size="16" font-weight="bold" fill="#1e293b">다중 분류 (Multi-class)</text>
    <text x="125" y="125" class="desc">스포츠(A), 정치(B), 경제(C)</text>
    <text x="125" y="145" class="desc">뉴스 그룹 분류 등</text>

    <!-- Simple Diagram -->
    <circle cx="125" cy="190" r="15" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
    <text x="125" y="190" fill="#ef4444" font-weight="bold" font-size="14">W</text>

    <line x1="145" y1="180" x2="190" y2="170" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" />
    <line x1="145" y1="190" x2="190" y2="190" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" />
    <line x1="145" y1="200" x2="190" y2="210" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" />
    
    <text x="210" y="170" font-size="14" font-weight="bold" fill="#a855f7">P1</text>
    <text x="210" y="190" font-size="14" font-weight="bold" fill="#a855f7">P2</text>
    <text x="210" y="210" font-size="14" font-weight="bold" fill="#a855f7">P3</text>
    
    <text x="170" y="215" font-size="12" fill="#64748b" transform="translate(0, 15)">Softmax</text>

  </g>

</svg>
