<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .bg { fill: #ffffff; }
      .cell { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; }
      .header { fill: #f1f5f9; font-weight: bold; font-size: 14px; text-anchor: middle; dominant-baseline: middle; fill: #1e293b; }
      .text-col { font-weight: bold; font-size: 14px; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .text-val { font-size: 14px; fill: #64748b; text-anchor: middle; dominant-baseline: middle; }
      .text-val-bold { font-size: 14px; font-weight: bold; fill: #0ea5e9; text-anchor: middle; dominant-baseline: middle; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
      .desc { font-size: 14px; fill: #64748b; text-anchor: middle; }
      .highlight-row { fill: #e0f2fe; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">TF-IDF 행렬 (가중치 적용 예시)</text>
  <text x="400" y="65" class="desc">각 단어의 단순 빈도(TF)에 역 문서 빈도(IDF)를 곱하여 핵심 키워드의 점수를 높입니다.</text>

  <g transform="translate(40, 120)">
    <!-- Headers -->
    <rect x="0" y="0" width="80" height="40" class="cell header" />
    <rect x="80" y="0" width="80" height="40" class="cell header" />
    <rect x="160" y="0" width="80" height="40" class="cell header" />
    <rect x="240" y="0" width="80" height="40" class="cell header" />
    <rect x="320" y="0" width="80" height="40" class="cell header" />
    <rect x="400" y="0" width="80" height="40" class="cell header" />
    <rect x="480" y="0" width="80" height="40" class="cell header" />
    <rect x="560" y="0" width="80" height="40" class="cell header" />
    <rect x="640" y="0" width="80" height="40" class="cell header" />
    
    <text x="40" y="20" class="header"></text>
    <text x="120" y="20" class="header">과일이</text>
    <text x="200" y="20" class="header">길고</text>
    <text x="280" y="20" class="header">노란</text>
    <text x="360" y="20" class="header">먹고</text>
    <text x="440" y="20" class="header">바나나</text>
    <text x="520" y="20" class="header">사과</text>
    <text x="600" y="20" class="header">좋아요</text>
    <text x="680" y="20" class="header">...</text>

    <!-- Row 1 -->
    <rect x="0" y="40" width="80" height="40" class="cell" />
    <rect x="80" y="40" width="80" height="40" class="cell" />
    <rect x="160" y="40" width="80" height="40" class="cell" />
    <rect x="240" y="40" width="80" height="40" class="cell" />
    <rect x="320" y="40" width="80" height="40" class="cell" />
    <rect x="400" y="40" width="80" height="40" class="cell" />
    <rect x="480" y="40" width="80" height="40" class="cell" />
    <rect x="560" y="40" width="80" height="40" class="cell" />
    <rect x="640" y="40" width="80" height="40" class="cell" />

    <text x="40" y="60" class="text-col">문서1</text>
    <text x="120" y="60" class="text-val">0</text>
    <text x="200" y="60" class="text-val">0</text>
    <text x="280" y="60" class="text-val">0</text>
    <text x="360" y="60" class="text-val-bold">0.288</text>
    <text x="440" y="60" class="text-val">0</text>
    <text x="520" y="60" class="text-val-bold">0.693</text>
    <text x="600" y="60" class="text-val">0</text>
    <text x="680" y="60" class="text-val">...</text>

    <!-- Row 2 -->
    <rect x="0" y="80" width="80" height="40" class="cell" />
    <rect x="80" y="80" width="80" height="40" class="cell" />
    <rect x="160" y="80" width="80" height="40" class="cell" />
    <rect x="240" y="80" width="80" height="40" class="cell" />
    <rect x="320" y="80" width="80" height="40" class="cell" />
    <rect x="400" y="80" width="80" height="40" class="cell" />
    <rect x="480" y="80" width="80" height="40" class="cell" />
    <rect x="560" y="80" width="80" height="40" class="cell" />
    <rect x="640" y="80" width="80" height="40" class="cell" />

    <text x="40" y="100" class="text-col">문서2</text>
    <text x="120" y="100" class="text-val">0</text>
    <text x="200" y="100" class="text-val">0</text>
    <text x="280" y="100" class="text-val">0</text>
    <text x="360" y="100" class="text-val-bold">0.288</text>
    <text x="440" y="100" class="text-val">0</text>
    <text x="520" y="100" class="text-val-bold">0.288</text>
    <text x="600" y="100" class="text-val">0</text>
    <text x="680" y="100" class="text-val">...</text>

    <!-- Row 3 (Highlighted) -->
    <rect x="0" y="120" width="720" height="40" class="highlight-row" />
    <text x="40" y="140" class="text-col" fill="#0284c7">새 문서</text>
    <text x="120" y="140" class="text-val-bold">0.693</text>
    <text x="200" y="140" class="text-val-bold">0.693</text>
    <text x="280" y="140" class="text-val-bold">0.693</text>
    <text x="360" y="140" class="text-val">0</text>
    <text x="440" y="140" class="text-val-bold">0.575</text>
    <text x="520" y="140" class="text-val">0</text>
    <text x="600" y="140" class="text-val-bold">0.693</text>
    <text x="680" y="140" class="text-val">...</text>
  </g>

  <text x="400" y="320" font-size="16" fill="#1e293b" font-weight="bold" text-anchor="middle">"저는 길고 노란 바나나 과일이 좋아요"</text>
  <text x="400" y="340" font-size="13" fill="#64748b" text-anchor="middle">(희귀하게 등장하는 단어일수록, 문서 내의 특징을 강력하게 대변하는 높은 값이 부여됨)</text>

</svg>
