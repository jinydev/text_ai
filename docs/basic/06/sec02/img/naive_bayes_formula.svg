<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">토마스 베이즈 확률 이론: 역추적 주사위 공식의 예술</text>

  <!-- Giant Formula Box -->
  <rect x="50" y="80" width="700" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>

  <text x="140" y="165" fill="#60a5fa" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle">P(c|d) =</text>

  <!-- Numerator & Denominator -->
  <line x1="260" y1="160" x2="650" y2="160" stroke="#fcd34d" stroke-width="4"/>

  <!-- Numerator -->
  <rect x="280" y="95" width="160" height="50" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
  <text x="360" y="125" fill="#fca5a5" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">P(d|c)</text>
  <text x="360" y="140" fill="#f87171" font-family="sans-serif" font-size="10" text-anchor="middle">Likelihood: (스팸일 때 이 단어 확률)</text>


  <text x="465" y="130" fill="#cbd5e1" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">×</text>

  <rect x="490" y="95" width="130" height="50" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="555" y="125" fill="#6ee7b7" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">P(c)</text>
  <text x="555" y="140" fill="#34d399" font-family="sans-serif" font-size="10" text-anchor="middle">Prior: (스팸통 태생 비율)</text>


  <!-- Denominator -->
  <rect x="390" y="170" width="130" height="50" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" rx="5"/>
  <text x="455" y="200" fill="#bfdbfe" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">P(d)</text>
  <text x="455" y="215" fill="#93c5fd" font-family="sans-serif" font-size="10" text-anchor="middle">Evidence: 문서 빈도 (상수)</text>


  <!-- Explanation Tags -->
  <path d="M 140 180 L 140 220" stroke="#60a5fa" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <text x="140" y="240" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">최종 결과 (사후 확률값):</text>
  <text x="140" y="260" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle">"단어 d가 떨어졌을때, 방금 이게 스팸 c 였을 종합 확률은?"</text>

  <!-- Right side text -->
  <text x="455" y="250" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">분모 P(d)는 모든 긍/부정 비교방식에서 어차피 똑같이 무식하게 나누어지는 상수 값이므로,</text>
  <text x="455" y="265" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">컴퓨터 연산 가속을 위해 쿨하게 생략! (분자 곱하기 점수끼리만 룰렛 비교합니다)</text>

</svg>
