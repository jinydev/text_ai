<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">나이브 베이즈 분류기의 조건부 확률 결합 방정식 (Bayes' Theorem)</text>

  <!-- Big Equation -->
  <rect x="50" y="80" width="700" height="100" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="8"/>
  
  <text x="130" y="145" fill="#fca5a5" font-family="serif" font-size="40" font-weight="bold" text-anchor="middle">P( c | d )</text>
  <text x="220" y="145" fill="#f8fafc" font-family="serif" font-size="40" font-weight="bold" text-anchor="middle">=</text>
  
  <text x="500" y="125" fill="#93c5fd" font-family="serif" font-size="32" font-weight="bold" text-anchor="middle">P( d | c ) × P( c )</text>
  <line x1="280" y1="140" x2="720" y2="140" stroke="#f8fafc" stroke-width="3"/>
  <text x="500" y="170" fill="#cbd5e1" font-family="serif" font-size="32" font-weight="bold" text-anchor="middle">P( d )</text>

  <!-- Labels -->
  <!-- Posterior -->
  <rect x="50" y="200" width="160" height="50" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="130" y="220" fill="#fecaca" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사후 확률 (Posterior)</text>
  <text x="130" y="240" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">이 문서가 스팸일 최종 확률!</text>

  <path d="M 130 190 L 130 170" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="125,180 130,170 135,180" fill="#ef4444"/>

  <!-- Likelihood -->
  <rect x="250" y="200" width="180" height="50" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="340" y="220" fill="#bfdbfe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">우도/가능도 (Likelihood)</text>
  <text x="340" y="240" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">스팸방에서 이 단어들이 나왔던 빈도</text>

  <path d="M 400 190 Q 400 150 430 120" stroke="#3b82f6" stroke-width="3" fill="none" stroke-dasharray="4,4"/>
  <polygon points="425,125 430,120 420,120" fill="#3b82f6"/>

  <!-- Prior -->
  <rect x="460" y="200" width="160" height="50" fill="#064e3b" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="540" y="220" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">사전 확률 (Prior)</text>
  <text x="540" y="240" fill="#6ee7b7" font-family="sans-serif" font-size="12" text-anchor="middle">평소 스팸 메일이 발생할 기본 베이스 비율</text>

  <path d="M 540 190 Q 540 150 580 120" stroke="#10b981" stroke-width="3" fill="none" stroke-dasharray="4,4"/>
  <polygon points="575,125 580,120 570,120" fill="#10b981"/>

  <!-- Evidence Dismissal -->
  <rect x="630" y="200" width="130" height="70" fill="#475569" stroke="#94a3b8" stroke-width="2" rx="4"/>
  <text x="695" y="220" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">증거 (Evidence)</text>
  <text x="695" y="240" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">스팸/정상 양쪽 분모에</text>
  <text x="695" y="260" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">공통이므로 삭제 무시</text>

  <path d="M 690 190 L 690 180" stroke="#94a3b8" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="685,185 690,175 695,185" fill="#94a3b8"/>
  <path d="M 430 180 L 590 160" stroke="#ef4444" stroke-width="4"/> <!-- Cross out fraction bar bottom -->
  
  <text x="400" y="325" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">텍스트 분류의 목표식: 사후 확률 P(C|d) 을 최대화하는 클래스 C 구하기식 유도. 분모 치환 삭제 기술 사용.</text>

</svg>
