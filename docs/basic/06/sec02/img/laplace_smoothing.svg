<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">라플라스 스무딩 (Laplace Smoothing) 보험금 방어막의 기적</text>

  <!-- The Zero Explosion Danger -->
  <rect x="50" y="80" width="300" height="150" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="200" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">스무딩이 없을 때의 대참사 (에러)</text>
  
  <text x="200" y="145" fill="#f87171" font-family="monospace" font-size="18" text-anchor="middle">P(love) × P(신조어 영끌족!)</text>

  <rect x="200" y="165" width="100" height="30" fill="#7f1d1d" rx="3"/>
  <text x="250" y="185" fill="#fef2f2" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">0/1000 = 0</text>

  <path d="M 200 200 L 200 215" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="235" fill="#ef4444" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">결과: `0` (확률 전체 파괴)</text>


  <!-- Alpha Rescue -->
  <path d="M 370 155 L 430 155" stroke="#fcd34d" stroke-width="4" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow)"/>


  <!-- Laplace Protected System -->
  <rect x="450" y="80" width="300" height="150" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="600" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">억지 산소 호흡기 가동 (+ Alpha)</text>

  <!-- Fraction Formula -->
  <text x="590" y="145" fill="#a7f3d0" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">N(신조어)</text>
  <text x="675" y="145" fill="#fbbf24" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">+ 1</text>
  
  <line x1="510" y1="160" x2="690" y2="160" stroke="#34d399" stroke-width="2"/>

  <text x="570" y="185" fill="#a7f3d0" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">총 단어 수 N</text>
  <text x="675" y="185" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">+ V</text>
  

  <!-- Final outcome-->
  <path d="M 600 200 L 600 215" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="235" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">결과: `1 / (1000 + V) ` > 극미량의 소수점 생존!</text>


  <text x="400" y="275" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">처음 보는 신조어 등장 분자가 무조건 카운트 0이 되어 수학 분수가 연쇄 붕괴하는 폭탄 현상을 막으러,</text>
  <text x="400" y="295" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">분자식 끝에 무조건 보험금 +1 을 우겨넣어 미약하게라도 아주 얇은 생명의 실낱 확률을 보장해 줍니다.</text>

</svg>
