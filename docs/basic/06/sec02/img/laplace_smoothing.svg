<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">제로 확률 파괴 현상(Zero-Frequency) 방어: 라플라스 스무딩(Laplace Smoothing)</text>

  <!-- Left Side: Problem -->
  <rect x="40" y="80" width="340" height="260" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="210" y="110" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">❌ 스무딩 미적용: OOV 등장 시 치명적 파괴 붕괴</text>

  <text x="210" y="140" fill="#f8fafc" font-family="monospace" font-size="14" text-anchor="middle">P("영끌족" | 스팸) = 0 / 10,000</text>
  <text x="210" y="165" fill="#fecaca" font-family="sans-serif" font-size="12" text-anchor="middle">관측 이력이 없는 신조어 등장 분자 = 0</text>

  <rect x="60" y="180" width="300" height="80" fill="#7f1d1d" rx="6"/>
  <text x="210" y="210" fill="#fecaca" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">P(C) × P(W1=0.2) × P(W2=0.4)</text>
  <text x="210" y="240" fill="#ef4444" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">× [ 0 ] × 0.8 = 0 !!</text>

  <text x="210" y="295" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">단어 단 한 개의 0 곱셈으로 인해</text>
  <text x="210" y="315" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">전체 확률이 0%로 연쇄 붕괴하는 대참사 에러</text>


  <!-- Right Side: Solution -->
  <rect x="420" y="80" width="340" height="260" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="590" y="110" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">✅ 라플라스 스무딩: 가상 보정 상수 α (Alpha) 투입</text>

  <!-- Eq -->
  <text x="590" y="140" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">0 + α</text>
  <line x1="530" y1="150" x2="650" y2="150" stroke="#f8fafc" stroke-width="2"/>
  <text x="590" y="170" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">N + α|V|</text>

  <text x="490" y="138" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">분자 +1 :</text>
  <text x="490" y="168" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">분모 스케일업 :</text>

  <rect x="440" y="190" width="300" height="80" fill="#064e3b" rx="6"/>
  <text x="590" y="220" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">P(C) × P(W1=0.2) × P(W2=0.4)</text>
  <text x="590" y="250" fill="#10b981" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">× [ 0.00001 ] × 0.8 > 0</text>

  <text x="590" y="295" fill="#6ee7b7" font-family="sans-serif" font-size="14" text-anchor="middle">모든 단어 빈도에 기본값(1)을 깔아주어</text>
  <text x="590" y="315" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">최소 미세 확률 보전 및 모델의 강건성(Robust) 확보</text>

  <!-- Down Summary Box -->
  <rect x="150" y="370" width="500" height="50" fill="#334155" stroke="#fcd34d" stroke-width="2" rx="6"/>
  <text x="400" y="400" fill="#fde68a" font-family="sans-serif" font-size="14" text-anchor="middle">나이브 베이즈가 희소행렬의 빈 공간 파편에서도 셧다운되지 않고 끈질기게 생존하도록 모델링하는 절대 안전장치 매커니즘</text>

</svg>
