<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">분류 모델의 이중 심장 구조: 학습(Train) 과 예측(Predict)</text>

  <!-- Split Line -->
  <line x1="400" y1="70" x2="400" y2="280" stroke="#475569" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Left: Train Phase -->
  <text x="200" y="80" fill="#fcd34d" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">1. 고통의 학습 (Train) 모터</text>

  <rect x="30" y="110" width="100" height="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="3"/>
  <text x="80" y="135" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle">과거 메일 100만건</text>
  <text x="80" y="155" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Data (X)</text>

  <rect x="30" y="180" width="100" height="60" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="3"/>
  <text x="80" y="205" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">사람이 표시한 정답</text>
  <text x="80" y="225" fill="#fca5a5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Label (Y)</text>

  <path d="M 140 180 L 190 180" stroke="#fcd34d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="165" y="170" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">주입</text>

  <!-- Brain Training -->
  <circle cx="260" cy="180" r="50" fill="#064e3b" stroke="#10b981" stroke-width="4"/>
  <text x="260" y="175" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">오차 미분</text>
  <text x="260" y="195" fill="#34d399" font-family="sans-serif" font-size="14" text-anchor="middle">적응 중...</text>


  <!-- Right: Predict Phase -->
  <text x="600" y="80" fill="#fcd34d" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">2. 실전 분류 예측 (Predict) 모터</text>

  <rect x="420" y="140" width="110" height="80" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="3"/>
  <text x="475" y="170" fill="#bfdbfe" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">오늘 갓 도착한</text>
  <text x="475" y="190" fill="#60a5fa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">모르는 메일</text>
  <text x="475" y="210" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">New Data (X')</text>


  <path d="M 540 180 L 580 180" stroke="#fcd34d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Brain Trained -->
  <circle cx="630" cy="180" r="40" fill="#1e3a8a" stroke="#60a5fa" stroke-width="4"/>
  <text x="630" y="185" fill="#eff6ff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">졸업생</text>

  <path d="M 680 180 L 710 180" stroke="#fcd34d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="720" y="150" width="70" height="60" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2" rx="5"/>
  <text x="755" y="175" fill="#fef2f2" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">스팸!</text>
  <text x="755" y="195" fill="#fca5a5" font-family="sans-serif" font-size="12" text-anchor="middle">(Y' 예측)</text>

</svg>
