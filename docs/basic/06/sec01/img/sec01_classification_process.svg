<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; rx: 8; ry: 8; }
      .box-alt { fill: #ffffff; stroke: #f59e0b; stroke-width: 2; rx: 8; ry: 8; }
      .box-label { fill: #0f172a; font-weight: bold; font-size: 16px; }
      .phase-title { fill: #1e293b; font-weight: bold; font-size: 20px; text-anchor: start; }
      .desc { fill: #64748b; font-size: 14px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" font-size="24" font-weight="bold" fill="#0f172a">텍스트 분류 과정 (Text Classification Process)</text>

  <!-- 1. Training Phase -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="700" height="130" fill="#f1f5f9" rx="10" />
    <text x="20" y="25" class="phase-title">1. 학습 과정 (Training Phase)</text>

    <!-- Inputs -->
    <rect x="20" y="60" width="80" height="40" class="box" stroke="#94a3b8" />
    <text x="60" y="80" class="box-label">데이터(Input)</text>
    
    <rect x="420" y="20" width="80" height="30" class="box" stroke="#ef4444" />
    <text x="460" y="35" class="box-label" fill="#ef4444">정답(Label)</text>

    <!-- Flow -->
    <line x1="100" y1="80" x2="160" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    
    <rect x="160" y="55" width="120" height="50" class="box" />
    <text x="220" y="70" class="box-label">특성 추출</text>
    <text x="220" y="90" class="desc">(Feature Extractor)</text>

    <line x1="280" y1="80" x2="340" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="310" y="65" class="desc">Features</text>

    <rect x="340" y="55" width="160" height="50" class="box-alt" />
    <text x="420" y="70" class="box-label">머신러닝 알고리즘</text>
    <text x="420" y="90" class="desc">(ML Algorithm)</text>

    <line x1="460" y1="50" x2="460" y2="55" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)" />

    <line x1="500" y1="80" x2="560" y2="80" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)" />

    <rect x="560" y="55" width="120" height="50" fill="#3b82f6" rx="8" ry="8" />
    <text x="620" y="80" font-size="18" font-weight="bold" fill="white">학습된 모델</text>
  </g>

  <!-- 2. Prediction Phase -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="700" height="130" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4" />
    <text x="20" y="25" class="phase-title">2. 예측 과정 (Prediction Phase)</text>

    <!-- Inputs -->
    <rect x="20" y="60" width="80" height="40" class="box" stroke="#94a3b8" />
    <text x="60" y="80" class="box-label">새 문서(Input)</text>

    <!-- Flow -->
    <line x1="100" y1="80" x2="160" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    
    <rect x="160" y="55" width="120" height="50" class="box" />
    <text x="220" y="70" class="box-label">특성 추출</text>
    <text x="220" y="90" class="desc">(동일 규칙 적용)</text>

    <line x1="280" y1="80" x2="340" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="310" y="65" class="desc">Features</text>

    <rect x="340" y="55" width="160" height="50" fill="#3b82f6" rx="8" ry="8" />
    <text x="420" y="80" font-size="18" font-weight="bold" fill="white">모델 (Classifier)</text>

    <line x1="500" y1="80" x2="560" y2="80" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)" />

    <rect x="560" y="60" width="120" height="40" class="box" stroke="#ef4444" />
    <text x="620" y="80" class="box-label" fill="#ef4444">예측 결과 (Label)</text>
  </g>

</svg>
