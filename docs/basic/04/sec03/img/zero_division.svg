<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">차원의 저주: 분모 완전 소멸(Zero Division)에 의한 시스템 크래시</text>

  <!-- Formula Area -->
  <rect x="50" y="80" width="450" height="150" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="8"/>
  
  <text x="140" y="150" fill="#cbd5e1" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">P ( is |</text>
  <text x="210" y="150" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">희귀한 창작 주어</text>
  <text x="280" y="150" fill="#cbd5e1" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">)</text>
  
  <text x="320" y="150" fill="#f8fafc" font-family="monospace" font-size="24" text-anchor="middle">=</text>

  <text x="410" y="125" fill="#f8fafc" font-family="monospace" font-size="18" text-anchor="middle">Count (교집합)</text>
  <line x1="350" y1="140" x2="470" y2="140" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Denominator 0 Alert -->
  <rect x="380" y="155" width="60" height="40" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="410" y="180" fill="#fca5a5" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">0</text>
  <text x="410" y="210" fill="#ef4444" font-family="sans-serif" font-size="12" text-anchor="middle">Not Found in DB</text>

  <!-- Arrow -->
  <path d="M 520 150 L 560 150" stroke="#ef4444" stroke-width="4" stroke-dasharray="6,6"/>
  <polygon points="555,143 565,150 555,157" fill="#ef4444"/>

  <!-- Error Terminal Result -->
  <rect x="580" y="80" width="180" height="150" fill="#7f1d1d" rx="8"/>
  <text x="670" y="115" fill="#fecaca" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">System Error</text>
  <text x="670" y="155" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">ZeroDivisionError:</text>
  <text x="670" y="175" fill="#fca5a5" font-family="monospace" font-size="14" text-anchor="middle">float division</text>
  <text x="670" y="195" fill="#fca5a5" font-family="monospace" font-size="14" text-anchor="middle">by zero</text>

  <!-- Subtitle -->
  <text x="400" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">세상에 단 한 번도 존재하지 않았던 문맥 발화 시, 확률 계산식 연쇄 곱셈의 심장이 영구 정지됨</text>

</svg>
