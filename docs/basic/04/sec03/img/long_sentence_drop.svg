<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="35" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">N-gram 길이에 따른 관측 불능 한계 곡선 (희소성의 폭발)</text>

  <!-- Y Axis Label -->
  <text x="40" y="180" fill="#94a3b8" font-family="sans-serif" font-size="14" transform="rotate(-90 40,180)" text-anchor="middle">데이터베이스 출현 관측 빈도 (Count)</text>

  <!-- X Axis Label -->
  <text x="400" y="330" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">탐색하려는 선행 조건 문맥의 길이 (Word Sequence Length)</text>

  <!-- Graph Area -->
  <line x1="80" y1="300" x2="750" y2="300" stroke="#64748b" stroke-width="2"/> <!-- X Axis -->
  <line x1="80" y1="70" x2="80" y2="300" stroke="#64748b" stroke-width="2"/> <!-- Y Axis -->
  
  <text x="70" y="80" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">1,000,000</text>
  <text x="70" y="160" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">5,000</text>
  <text x="70" y="240" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">10</text>
  <text x="70" y="300" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">0</text>

  <!-- Decay Curve -->
  <path d="M 150 80 C 250 80, 250 290, 650 295" stroke="#3b82f6" stroke-width="3" fill="none"/>

  <!-- Point 1 (2-gram) -->
  <circle cx="150" cy="80" r="6" fill="#10b981"/>
  <text x="150" y="315" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">단어 2개 수준</text>
  <text x="150" y="65" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">풍부한 빈도</text>

  <!-- Point 2 (3-gram) -->
  <circle cx="300" cy="220" r="6" fill="#f59e0b"/>
  <text x="300" y="315" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">단어 4개 조합</text>
  <text x="300" y="205" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">급격한 감소</text>

  <!-- Point 3 (Long-gram) -->
  <circle cx="650" cy="295" r="6" fill="#ef4444"/>
  <text x="650" y="315" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">단어 7개 이상 결합</text>
  <text x="650" y="275" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Sparsity Wall (0 도달)</text>

  <!-- Dotted lines to threshold -->
  <line x1="80" y1="295" x2="750" y2="295" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>
  
  <rect x="520" y="100" width="220" height="40" fill="#1e293b" stroke="#334155" stroke-width="1" rx="4"/>
  <text x="630" y="125" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">문장이 길어질수록 일치 확률은 0에 수렴</text>

</svg>
