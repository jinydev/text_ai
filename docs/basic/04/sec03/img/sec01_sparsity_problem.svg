<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #fca5a5; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: bold; fill: #7f1d1d; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">통계적 기반(Count-based) 언어 모델의 치명적 단점: 희소 문제 (Sparsity)</text>
  <text x="400" y="55" font-size="14" fill="#64748b">아무리 방대한 말뭉치(Corpus)라도, 내가 찾고자 하는 특정 문장 시퀀스가 단 한 번도 없었다면 확률은 0이 됩니다.</text>

  <rect x="100" y="90" width="600" height="150" class="box" fill="#fef2f2" />

  <text x="400" y="130" class="math">P( is | An adorable little boy )</text>
  <text x="400" y="160" class="math" font-size="24">=</text>
  
  <text x="400" y="185" class="math">Count ( An adorable little boy is )</text>
  <line x1="220" y1="200" x2="580" y2="200" stroke="#7f1d1d" stroke-width="2" />
  <text x="400" y="220" class="math">Count ( An adorable little boy )</text>

  <!-- Explanation arrows -->
  <path d="M 585 215 L 630 215" stroke="#ef4444" stroke-width="2" />
  <text x="690" y="215" font-size="16" font-weight="bold" fill="#ef4444">만약 관측된 적이</text>
  <text x="690" y="235" font-size="16" font-weight="bold" fill="#ef4444">없다면 무조건 0</text>

  <!-- Bottom Message -->
  <rect x="50" y="270" width="700" height="40" fill="#fee2e2" stroke="#ef4444" rx="8" />
  <text x="400" y="290" font-size="14" font-weight="bold" fill="#b91c1c">문장이 길어질수록, 정확히 그 순서대로 등장했을 확률은 기하급수적으로 0에 수렴합니다.</text>

</svg>
