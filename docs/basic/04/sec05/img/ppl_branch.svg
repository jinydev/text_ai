<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Perplexity (PPL) 의 철학: 갈림길 (Branching Factor) 수치</text>

  <!-- Left: PPL 1 -->
  <rect x="50" y="80" width="300" height="150" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="10"/>
  <text x="200" y="115" fill="#6ee7b7" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">PPL = 1 (Perfect)</text>

  <rect x="80" y="150" width="40" height="40" fill="#10b981" rx="5"/>
  <text x="100" y="175" fill="#064e3b" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">AI</text>

  <path d="M 140 170 L 260 170" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="280" y="150" width="40" height="40" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="300" y="175" fill="#78350f" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">정답</text>

  <text x="200" y="215" fill="#34d399" font-family="sans-serif" font-size="14" text-anchor="middle">"방황 제로! 갈림길이 오직 1개뿐"</text>


  <!-- Right: PPL 100 -->
  <rect x="450" y="80" width="300" height="150" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="10"/>
  <text x="600" y="115" fill="#fca5a5" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">PPL = 100 (Confused)</text>

  <rect x="480" y="150" width="40" height="40" fill="#ef4444" rx="5"/>
  <text x="500" y="175" fill="#450a0a" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">AI</text>

  <path d="M 540 170 L 660 130" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 540 170 L 660 150" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 540 170 L 660 170" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrow)"/> <!-- The right path -->
  <path d="M 540 170 L 660 190" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 540 170 L 660 210" stroke="#7f1d1d" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="680" y="125" width="20" height="15" fill="#fbbf24" rx="2"/>
  <rect x="680" y="145" width="20" height="15" fill="#fbbf24" rx="2"/>
  <rect x="680" y="165" width="30" height="20" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="2"/>
  <text x="695" y="180" fill="#78350f" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">정답</text>
  <rect x="680" y="190" width="20" height="15" fill="#fbbf24" rx="2"/>
  <rect x="680" y="210" width="20" height="15" fill="#fbbf24" rx="2"/>

  <text x="520" y="135" fill="#fca5a5" font-family="sans-serif" font-size="20" text-anchor="middle">💦</text>
  <text x="600" y="250" fill="#ef4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"100개의 방 중 어디로 가지? (식은땀)"</text>

  <!-- Conclusion -->
  <text x="400" y="275" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">루트와 분수가 섞인 복잡한 공식이지만, 결국 AI 머릿속의 '보기 카드의 개수 방황 지수'일 뿐입니다.</text>

</svg>
