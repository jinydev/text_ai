<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#0f172a" rx="10"/>

  <text x="400" y="35" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">N-gram 차원 확장에 따른 PPL(혼란도) 지수 하락 곡선</text>

  <!-- Y Axis Label -->
  <text x="40" y="180" fill="#94a3b8" font-family="sans-serif" font-size="14" transform="rotate(-90 40,180)" text-anchor="middle">Perplexity (PPL 혼란도 지수)</text>

  <!-- X Axis Label -->
  <text x="400" y="330" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">참고하는 과거 시계열 문맥의 폭 (N-gram Window)</text>

  <!-- Graph Layout -->
  <line x1="80" y1="300" x2="750" y2="300" stroke="#64748b" stroke-width="2"/> <!-- X Axis -->
  <line x1="80" y1="70" x2="80" y2="300" stroke="#64748b" stroke-width="2"/> <!-- Y Axis -->
  
  <text x="70" y="80" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">1000</text>
  <text x="70" y="150" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">500</text>
  <text x="70" y="240" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">100</text>
  <text x="70" y="300" fill="#64748b" font-family="monospace" font-size="12" text-anchor="end">0</text>

  <!-- Curve -->
  <path d="M 180 90 Q 250 250 400 250 T 620 260" stroke="#10b981" stroke-width="3" fill="none"/>

  <!-- Unigram Point -->
  <circle cx="180" cy="90" r="6" fill="#ef4444"/>
  <rect x="195" y="75" width="45" height="25" fill="#1e293b" fill-opacity="0.8" rx="4"/>
  <text x="217" y="92" fill="#fca5a5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">962</text>
  <text x="180" y="315" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">N = 1 (Unigram)</text>

  <!-- Bigram Point -->
  <circle cx="400" cy="250" r="6" fill="#f59e0b"/>
  <rect x="415" y="235" width="45" height="25" fill="#1e293b" fill-opacity="0.8" rx="4"/>
  <text x="437" y="252" fill="#fcd34d" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">170</text>
  <text x="400" y="315" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">N = 2 (Bigram)</text>

  <!-- Trigram Point -->
  <circle cx="620" cy="260" r="6" fill="#3b82f6"/>
  <rect x="635" y="245" width="45" height="25" fill="#1e293b" fill-opacity="0.8" rx="4"/>
  <text x="657" y="262" fill="#93c5fd" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">109</text>
  <text x="620" y="315" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">N = 3 (Trigram)</text>

  <!-- Annotation -->
  <line x1="280" y1="120" x2="350" y2="170" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="345,160 353,172 340,166" fill="#cbd5e1"/>
  
  <rect x="230" y="180" width="220" height="40" fill="#1e293b" stroke="#64748b" stroke-width="1" rx="4"/>
  <text x="340" y="205" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">과거 모수를 많이 참고할수록 혼란도 급감</text>

</svg>
