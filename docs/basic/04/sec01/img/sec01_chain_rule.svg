<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #1e3a8a; }
      .op { font-family: 'Roboto', sans-serif; font-size: 20px; font-weight: bold; fill: #ef4444; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="40" class="title">통계적 언어 모델: 조건부 확률의 연쇄 법칙 (Chain Rule)</text>
  <text x="400" y="65" font-size="14" fill="#64748b">전체 문장이 발생할 확률은 "이전 단어들이 주어졌을 때, 그 다음 단어가 등장할 조건부 확률"들의 연속적인 곱셈입니다.</text>

  <text x="400" y="120" font-family="Roboto" font-size="20" font-weight="bold" fill="#b91c1c">P(w₁, w₂, ..., wₙ) = ∏ P(wₖ | w₁, ..., wₖ₋₁)</text>

  <rect x="50" y="150" width="700" height="60" class="box" fill="#eff6ff" />
  
  <text x="400" y="180" class="math">P(An adorable little boy is spreading smiles)</text>

  <text x="400" y="240" class="op">=</text>
  
  <text x="400" y="275" class="math" fill="#0f172a">
    P(An) <tspan fill="#ef4444">×</tspan> P(adorable | An) <tspan fill="#ef4444">×</tspan> P(little | An adorable) <tspan fill="#ef4444">×</tspan> P(...)
  </text>
  <text x="400" y="305" class="math" fill="#0f172a">
    ... <tspan fill="#ef4444">×</tspan> P(smiles | An adorable little boy is spreading)
  </text>
  
</svg>
