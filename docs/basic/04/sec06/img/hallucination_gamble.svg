<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">PPL의 수학적 맹점과 환각(Hallucination): "문법만 맞으면 그만!"</text>

  <!-- Query input -->
  <rect x="50" y="100" width="180" height="80" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="140" y="125" fill="#93c5fd" font-family="sans-serif" font-size="14" text-anchor="middle">"1990년 월드컵 우승국</text>
  <text x="140" y="145" fill="#93c5fd" font-family="sans-serif" font-size="14" text-anchor="middle">대한민국 축구팀</text>
  <text x="140" y="165" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">감독은 누구야?"</text>

  <path d="M 230 140 L 290 140" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="260" y="130" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">AI 확률</text>

  <!-- LLM Generation Result -->
  <rect x="300" y="100" width="220" height="80" fill="#450a0a" stroke="#ef4444" stroke-width="3" rx="5"/>
  <text x="410" y="145" fill="#fca5a5" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">"거스 히딩크"</text>

  <text x="410" y="170" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(한국-축구-감독 단어 빈도 1위)</text>

  <!-- PPL Grading Scanner -->
  <path d="M 520 140 L 590 140" stroke="#10b981" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="600" y="80" width="150" height="110" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="10"/>
  <text x="675" y="115" fill="#6ee7b7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">PPL 채점관</text>
  
  <text x="675" y="145" fill="#34d399" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">PPL: 1점!</text>
  <text x="675" y="170" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(문법 완벽 확률 100%)</text>


  <!-- Warning logic -->
  <rect x="150" y="210" width="500" height="40" fill="#020617" stroke="#ef4444" stroke-width="2" rx="10"/>
  <text x="400" y="235" fill="#fca5a5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PPL은 "역사적 팩트"를 심사하지 못합니다! (허위 소설의 정당화 버그)</text>

  <text x="400" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">환각을 빚어내는 AI의 비극입니다. 틀린 내용이라 하더라도 단어의 확률 연결이 '한국어 문법 통계'에 너무나 완벽히 들어맞아 기계는 PPL 1등급 만점을 찍습니다.</text>

</svg>
