<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 1; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .header-bg { fill: #dbeafe; stroke: #bfdbfe; }
      .header { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: bold; fill: #1e3a8a; }
      .cell { font-family: 'Roboto', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .highlight { font-size: 24px; font-weight: bold; fill: #059669; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">N-gram 언어 모델의 PPL 테스트 예시</text>
  <text x="400" y="55" font-size="14" fill="#64748b">월스트리트 저널 3,800만 단어 토큰 학습, 1,500만 테스트 데이터 기준</text>

  <g transform="translate(150, 100)">
    
    <!-- Header -->
    <rect x="0" y="0" width="150" height="40" class="header-bg" />
    <rect x="150" y="0" width="150" height="40" class="header-bg" />
    <rect x="300" y="0" width="200" height="40" class="header-bg" fill="#bbf7d0" stroke="#86efac" />
    
    <text x="75" y="20" class="header">Uni-gram</text>
    <text x="225" y="20" class="header">Bi-gram</text>
    <text x="400" y="20" class="header" fill="#166534">Tri-gram (Best)</text>

    <!-- Row 1 -->
    <rect x="-150" y="40" width="150" height="60" class="box" fill="#f1f5f9" />
    <text x="-75" y="70" class="header" fill="#0f172a">Perplexity (PPL)</text>

    <!-- Cells -->
    <rect x="0" y="40" width="150" height="60" class="box" />
    <text x="75" y="70" class="cell">962</text>
    
    <rect x="150" y="40" width="150" height="60" class="box" />
    <text x="225" y="70" class="cell">170</text>
    
    <rect x="300" y="40" width="200" height="60" class="box" fill="#f0fdf4" stroke="#4ade80" stroke-width="3" />
    <text x="400" y="70" class="highlight">109</text>

  </g>

  <rect x="100" y="230" width="600" height="40" fill="#fef2f2" stroke="#ef4444" rx="8" />
  <text x="400" y="250" font-size="14" font-weight="bold" fill="#b91c1c">참고 문맥(n)의 크기가 커질수록 다음 예측 단어에 대한 확신이 커지므로 PPL 수치가 감소합니다.</text>

</svg>
