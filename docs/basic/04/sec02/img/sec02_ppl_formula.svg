<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;font-style=italic&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; dominant-baseline: middle; text-anchor: middle;}
      .bg { fill: #f8fafc; }
      .box { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 8; ry: 8; }
      .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
      .math { font-family: 'Roboto', sans-serif; font-size: 24px; font-weight: bold; fill: #1e3a8a; }
      .desc { font-size: 14px; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="12" />

  <text x="400" y="30" class="title">Perplexity (PPL): 언어 모델의 당혹도(혼란도)</text>
  <text x="400" y="55" class="desc">문장의 확률의 역수를 정규화한 값으로, 수치가 '낮을수록' 모델이 문장을 잘 예측함을 의미합니다.</text>

  <!-- PPL Formula 1 -->
  <rect x="50" y="90" width="700" height="90" class="box" fill="#eff6ff" />
  <text x="200" y="135" class="math" fill="#0f172a">PPL(W) =</text>
  <text x="450" y="135" class="math" font-style="italic">P( w₁, w₂, w₃, ..., wₙ ) <tspan font-size="18" dy="-15" fill="#ef4444">- 1/N</tspan></text>

  <!-- PPL Formula 2 -->
  <rect x="50" y="200" width="700" height="110" class="box" fill="#f8fafc" />
  <text x="200" y="255" class="math" fill="#0f172a">PPL(W) =</text>
  
  <text x="320" y="255" class="math">exp (</text>
  <text x="400" y="255" class="math" font-size="36" fill="#1d4ed8">∑</text>
  <text x="365" y="255" class="math" fill="#ef4444">- 1/N</text>
  
  <text x="400" y="220" font-size="14" font-family="Roboto" font-weight="bold" fill="#64748b">N</text>
  <text x="400" y="295" font-size="14" font-family="Roboto" font-weight="bold" fill="#64748b">i=1</text>
  
  <text x="510" y="255" class="math">log P(wᵢ | wᵢ₋₁)</text>
  <text x="610" y="255" class="math">)</text>

</svg>
