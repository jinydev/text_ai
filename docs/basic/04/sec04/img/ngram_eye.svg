<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#0f172a" rx="10"/>

  <text x="400" y="40" fill="#cbd5e1" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">N-gram 타협의 마법: 과거를 싹둑 자르고 시야(N)를 스스로 제한하다</text>

  <!-- Full History Sentence -->
  <rect x="50" y="120" width="400" height="60" fill="#1e293b" stroke="#475569" stroke-width="2" rx="5"/>
  <text x="250" y="155" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">"어제 전학을 온 안경 쓴 착한 little_boy"</text>
  <text x="250" y="105" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">과거 히스토리 (전체 문맥)</text>

  <!-- The Cut -->
  <line x1="380" y1="80" x2="380" y2="200" stroke="#f43f5e" stroke-width="4" stroke-dasharray="8,4"/>
  <text x="380" y="70" fill="#fca5a5" font-family="sans-serif" font-size="20" text-anchor="middle">✂️ 싹둑! (과거 망각)</text>

  <!-- Kept Word (N=1) -->
  <rect x="400" y="110" width="100" height="80" fill="#064e3b" stroke="#10b981" stroke-width="3" rx="5"/>
  <text x="450" y="145" fill="#34d399" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">"boy"</text>
  <text x="450" y="175" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">직전 단어 1개</text>

  <text x="530" y="155" fill="#10b981" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">+</text>

  <!-- Target Word -->
  <rect x="570" y="120" width="80" height="60" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="610" y="155" fill="#93c5fd" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"is"</text>
  <text x="610" y="105" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">예측 정답</text>


  <!-- Approximation Formula -->
  <path d="M 670 140 C 700 140 700 80 740 80" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="670" y="50" width="100" height="40" fill="#422006" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="720" y="75" fill="#fde68a" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">P (is | boy)</text>


  <!-- Tooltip Explanation -->
  <rect x="100" y="220" width="600" height="50" fill="#020617" stroke="#10b981" stroke-width="2" rx="10"/>
  <text x="400" y="250" fill="#34d399" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">"앞에 문맥이 100줄이든 10줄이든 알 바 아님! 난 내 눈앞에 있는 제일 마지막 글자 하나(boy)만 보고 베팅한다!"</text>

</svg>
